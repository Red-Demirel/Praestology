# ─────────────────────────────────────────────
# CONFORMAL PREDICTION: VIABILITY-BOUNDED STATISTICS
# ─────────────────────────────────────────────

conformal_prediction_alignment:
  source: "Venn, Gammerman, Shafer — distribution-free uncertainty quantification"
  independence_note: |
    Conformal Prediction was developed as a statistical framework for rigorous
    uncertainty quantification, with no reference to process ontology. The
    structural isomorphism with ℛ(ψ) and the pre-commitment regime was not
    designed in — it arose from the same formal pressure: how to maintain
    a bounded envelope of viable configurations without premature collapse.

  praestological_mapping:
    prediction_sets:
      praestology_equivalent: "Pre-commitment regime (ψ, R3 exploration)"
      isomorphism: |
        CP refuses to collapse uncertainty into a single realized point
        prematurely. It maintains an open envelope of viable configurations
        until the evidence warrants closure. This is formally identical to
        the pre-commitment regime — ψ holding multiple viable configurations
        before R5 selection fires. The prediction set IS the open dilemma
        space before realization.

    nonconformity_scores:
      praestology_equivalent: "Viability measure 𝓥(ψ)"
      isomorphism: |
        A nonconformity score measures how poorly a potential prediction fits
        the structural context of calibration data. This maps directly to
        𝓥(ψ) evaluating whether a configuration meets the viability threshold
        V_c. Both are measures of fit between a candidate state and the
        ambient structure — with rejection of poor-fitting candidates.

    coverage_guarantee:
      praestology_equivalent: "Metastable zone maintenance / Responsibility"
      isomorphism: |
        CP mathematically enforces a minimum coverage guarantee — the prediction
        set must contain the true outcome with specified probability. This is
        the formal analog of the Responsibility principle: never commit to a
        realized outcome without a rigorously bounded envelope of viability.
        Over-realization (false certainty, premature commitment below V_c)
        is excluded by construction.

    what_this_confirms: |
      Responsible agency — maintaining the pre-commitment regime until viability
      is established, then committing — is not only an ethical principle. It is
      a mathematically optimal strategy for navigating open systems, independently
      arrived at by statistical theory. The Agency Triad (exploration, commitment,
      selection) has a formal statistical instantiation that was not derived from
      Praestology.

    what_this_does_not_confirm: |
      CP's validity as a statistical method does not validate Praestology's
      ontological reading of what viability selection means at the process level.
      The isomorphism is structural. Whether the same formal structure describes
      both statistical inference and physical realization remains Praestology's
      own claim.

