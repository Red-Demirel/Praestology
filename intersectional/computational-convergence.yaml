# ─────────────────────────────────────────────
# CLIFFORDNET: GA AS NATIVE COMPUTATIONAL LANGUAGE
# ─────────────────────────────────────────────

cliffordnet_alignment:
  source: "Zhongping Ji (2026) — CliffordNet: All You Need is Geometric Algebra"
  independence_note: |
    CliffordNet was developed as a computational architecture question, not as
    a response to Praestology or process philosophy. The convergence on GA as
    the natural language for relational computation arose from internal
    engineering pressure — the same structural problems producing the same
    structural resolution.

  praestological_mapping:
    pattern_of_additions_in_computation: |
      Standard neural networks use flat, realized-level tensors. Because these
      tensors strip away orientation, chirality, and relational structure,
      architectures require attention heads, residual connections, and
      positional encodings as patches — each added to compensate for
      structural information that was discarded at the representation level.

      This is the pattern-of-additions from clarifications/clifford-analogy.yaml
      applied to computation: hitting a limit at the realized level (flat tensors),
      patching it with new realized-level entities (attention mechanisms), rather
      than working at the level where the structure is native.

    cliffordnet_resolution: |
      CliffordNet uses multivectors and the geometric product to natively encode
      orientation, rotation, and relational structure. The patches become
      unnecessary because the structural information is not discarded in the
      first place.

      In Praestology terms: CliffordNet operates at the grade-structured level
      where commitment and orientation are explicit, rather than projecting
      onto flat tensors (the computational analog of the Madelung projection
      onto ρ, ∇S) and then trying to recover the structure that was lost.

    what_this_confirms: |
      GA is not a mathematical preference or a downstream physical analogy.
      It is the natural language for relational structure at whatever level
      relational structure exists — confirmed independently by computational
      practice. This provides external grounding for the claim in
      analogy-disclaimer.md that GA earns its exception from the "borrowed
      downstream" critique: it is not borrowed from spatial geometry but
      arrived at from structural necessity.

    what_this_does_not_confirm: |
      CliffordNet's success does not confirm Praestology's ontological claims
      about ψ, η, or the R1-R5 process. It confirms that GA is the right
      language for relational computation. The ontological reading of what
      that computation represents remains Praestology's own claim, subject
      to its own standards of derivation and falsification.

