ai_and_technology:
  description: "Technology must expand capacity, not induce pathology."
  principles:
    - "AI as Tool: Use AI to expand Ξ (modeling capacity), not replace ω (choice)."
    - "AI as Learner: AI training data is curriculum. Ensure it doesn't inherit human pathologies."
    - "Attention Economy: Avoid designs that hijack ι (impulse) via addiction mechanics."
    - "Semantic Overlap: Use technology to build σ (shared understanding) across cultures."

The optimal configuration will emerge through viability selection, not top-down decree.

This approach does not erase borders or differences; it makes them navigable. It does not impose a uniform global culture; it cultivates the capacity to resonate across cultures. Unity, in Praestological terms, is not homogeneity—it is the ability of distinct agents to co‑sustain a shared viable region.

