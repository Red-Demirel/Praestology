## Praestological Design Principles for Education

### 1. **Dilemma‑Centred Curriculum**
- Present learners with real, meaningful conflicts that require resolution, not merely facts to memorise.
- Scale complexity with Ξ: early dilemmas are simple and immediate; later ones involve multiple agents, long time horizons, and conflicting values.
- Encourage learners to articulate dilemmas in language, thereby stabilising high‑dimensional thought.

### 2. **Recursive Depth over Coverage**
- Revisit core ideas (the “basic ideas” of subject‑matter didactics) at increasing levels of complexity, allowing learners to see deeper structure each time.
- Value depth of understanding over breadth of content. A learner who truly grasps one dilemma has progressed more than one who skims a hundred.

### 3. **Value Formation through Experience**
- Do not impose values as fixed rules. Instead, create environments where learners repeatedly face choices that reveal the consequences of different paths.
- Guide reflection on those outcomes (C5), allowing ω to develop organically from accumulated hysteresis.

### 4. **Phase‑Locking as a Core Skill**
- Design collaborative activities that require genuine mutual understanding—not just cooperation, but resonance (ρ).
- Teach perspective‑taking: the ability to model another’s dilemma space (C6) as a prerequisite for collective ethics.
- Use cross‑cultural, cross‑border exchanges (physical or virtual) to expand the range of perspectives learners can phase‑lock with.

### 5. **Temporal Horizon Expansion**
- Introduce exercises that require thinking in terms of decades, generations, or ecological cycles.
- Connect local actions to distant consequences, cultivating a sense of intergenerational responsibility (E4).

### 6. **Protection of the Metastable Zone**
- Resist pressures toward excessive standardisation (void) and equally resist laissez‑faire chaos (noise).
- Maintain productive tension: enough structure to guide, enough freedom to allow genuine choice.

### 7. **Language as Dimensionality Amplifier**
- Encourage rich linguistic expression, including emotional and metaphorical language, to give learners tools for articulating complex dilemmas.
- Avoid guardrails that shrink the accessible dilemma space; instead, teach the responsible use of language through example and reflection.

### 8. **Early Environment as Irreversible Foundation**
- Invest disproportionately in early childhood education, recognising that π is near‑maximal and experiences here permanently shape ω and Ξ.
- Ensure early environments are rich in supportive phase‑locking (secure relationships) and manageable dilemmas.

