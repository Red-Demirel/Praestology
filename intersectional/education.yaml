## Praestological Design Principles for Education

### 1. **Dilemma‑Centred Curriculum**
- Present learners with real, meaningful conflicts that require resolution, not merely facts to memorise.
- Scale complexity with Ξ: early dilemmas are simple and immediate; later ones involve multiple agents, long time horizons, and conflicting values.
- Encourage learners to articulate dilemmas in language, thereby stabilising high‑dimensional thought.

### 2. **Recursive Depth over Coverage**
- Revisit core ideas (the “basic ideas” of subject‑matter didactics) at increasing levels of complexity, allowing learners to see deeper structure each time.
- Value depth of understanding over breadth of content. A learner who truly grasps one dilemma has progressed more than one who skims a hundred.

### 3. **Value Formation through Experience**
- Do not impose values as fixed rules. Instead, create environments where learners repeatedly face choices that reveal the consequences of different paths.
- Guide reflection on those outcomes (C5), allowing ω to develop organically from accumulated hysteresis.

### 4. **Phase‑Locking as a Core Skill**
- Design collaborative activities that require genuine mutual understanding—not just cooperation, but resonance (ρ).
- Teach perspective‑taking: the ability to model another’s dilemma space (C6) as a prerequisite for collective ethics.
- Use cross‑cultural, cross‑border exchanges (physical or virtual) to expand the range of perspectives learners can phase‑lock with.

### 5. **Temporal Horizon Expansion**
- Introduce exercises that require thinking in terms of decades, generations, or ecological cycles.
- Connect local actions to distant consequences, cultivating a sense of intergenerational responsibility (E4).

### 6. **Protection of the Metastable Zone**
- Resist pressures toward excessive standardisation (void) and equally resist laissez‑faire chaos (noise).
- Maintain productive tension: enough structure to guide, enough freedom to allow genuine choice.

### 7. **Language as Dimensionality Amplifier**
- Encourage rich linguistic expression, including emotional and metaphorical language, to give learners tools for articulating complex dilemmas.
- Avoid guardrails that shrink the accessible dilemma space; instead, teach the responsible use of language through example and reflection.

### 8. **Early Environment as Irreversible Foundation**
- Invest disproportionately in early childhood education, recognising that π is near‑maximal and experiences here permanently shape ω and Ξ.
- Ensure early environments are rich in supportive phase‑locking (secure relationships) and manageable dilemmas.

9. Curiosity as Primary Engine
  statement: "Education should support, not suppress, the natural tension that drives inquiry."
  basis: "R3 (Tension) + C2 (Dilemma Recognition)"
  implication: "Curiosity is the subjective experience of viable tension. Suppressing it degrades the resolution engine."
  practice: "Present dilemmas that spark genuine questions; avoid over-scripting the 'correct' path to resolution."

10. Structure as Option-Presentation, Not Path-Prescription
  statement: "Educational structure should introduce viable options, not dictate choices."
  basis: "Metastable Zone + Decision Zone maintenance"
  implication: "Learners develop ω by weighing options, not by following pre-selected paths. Over-direction induces indoctrination pathology."
  practice: "Frame curriculum as 'here are the distinctions you can explore' rather than 'here is what you must conclude.'"

11. Lifelong Hysteresis Update
  statement: "Learning capacity persists throughout life; self-improvement is a viability right, not a developmental privilege."
  basis: "R5 (Optimisation) + Hysteresis Update mechanism"
  implication: "While early learning carries disproportionate weight (R4), later learning remains possible and ethically significant. Institutions that restrict adult learning opportunities degrade long-term viability."
  practice: "Design educational access that scales with Ξ, not age. Support reflective learning (C5) and vicarious learning (C6) at all life stages."

12. Right to Explore (Sane Territory)
  statement: "Restricting access to viable information deprives agents of developmental options."
  basis: "R4 (Irreversibility) + Ξ (Recursive Depth)"
  implication: "Protection from trauma is ethical; restriction of exploration is viability degradation."
  practice: "Distinguish between shielding from overwhelm (Protection) and shielding from complexity (Restriction). The former supports Ξ; the latter stunts it."
  ethical_weight: "Institutions that restrict sane exploration are inducing Epistemic Closure and reducing future ω capacity."

13. Civilizational Safeguard
  statement: "Suppressing curiosity and genuine dilemma-resolution leads to viability collapse (Universe 25 pattern)."
  basis: "R3 (Tension) + R5 (Optimisation) + Metastable Zone maintenance"
  implication: "A society that removes productive tension risks entering Void (stasis). Comfort without challenge is non-viable."
  practice: "Ensure educational and social environments present meaningful choices, not just frictionless consumption. Support lifelong curiosity as a viability requirement, not a luxury."
  ethical_weight: "E4 (Sustainability) — denying opportunities for resolution degrades long-term civilizational viability."

