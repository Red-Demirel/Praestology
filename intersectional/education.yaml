## Interlanguage Considerations (Exploratory)

Praestology does not prescribe a single universal language. Communication systems are evaluated by how well they reduce channel friction (Rf) and maximise semantic overlap (σ) while respecting substrate asymmetry (A2).

Two candidate directions worth exploring:
- Human-interchange layer: Prioritise learnability, emotional resonance, and cultural neutrality (e.g., Esperanto-like systems).
- AI / long-term storage layer: Prioritise logical precision, unambiguity, and hysteresis integrity over very long timescales (e.g., Lojban-like systems).

