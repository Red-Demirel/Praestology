  - "Engheta, N. (2021). Four‑dimensional optics using time‑varying media.
     Science, 373(6555), eabj2059."

notes:
  - "This mechanism does not require an expanding universe; it is compatible
     with an eternal, self‑sustaining resolution process (R1–R5)."
  - "The Bootes void or similar underdense region as our local environment
     is an intriguing possibility, but the mechanism does not depend on it—
     it only requires that η varies along photon paths."
  - "Numerical simulations of photon propagation through realistic η‑fields
     (derived from large‑scale structure simulations) are needed to quantify
     the expected redshift distribution and compare with observations."
