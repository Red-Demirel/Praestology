           rotation curve amplitudes across galaxy sample"

  - prediction: "CMB non-Gaussianity signature"
    mechanism: "Initial substrate fluctuations follow Kolmogorov
                turbulence spectrum rather than Gaussian"
    test: "Higher-order CMB statistics — bispectrum and trispectrum
           measurements from future surveys (CMB-S4, LiteBIRD)"

  - prediction: "Density-transition redshift at galaxy boundaries"
    mechanism: "Dark matter halo boundary sharpness correlates with
                anomalous redshift of background sources"
    test: "Statistical analysis of quasar spectra behind galaxy
           clusters as function of projected halo boundary crossing"


  - prediction: "Bullet cluster post-collision lensing asymmetry"
    mechanism: >
      Substrate wakes have a relaxation timescale set by the
      substrate phonon decay rate. During a cluster collision,
      the wake from the pre-collision approach does not disappear
      instantly — it persists with amplitude decaying as
      tau_wake ~ 1/(D * nabla^2 omega). The two post-collision
      mass concentrations should show a slight asymmetry in their
      lensing mass maps encoding this wake relaxation timescale.
    test: >
      Reanalysis of existing Chandra/Hubble bullet cluster
      lensing data for asymmetry between the two post-collision
      sub-clusters. Standard CDM predicts symmetric post-collision
      lensing (collisionless particles simply separate). Praestology
      predicts slight asymmetry from wake persistence — detectable
      in existing data with sufficient precision reanalysis.
      No new observations required.
    distinguishable_from: >
      CDM: symmetric lensing, no wake relaxation signature.
      Praestology: asymmetry correlated with collision velocity
      and time since closest approach — wake amplitude decays
      predictably.

  - prediction: "Solo-vortex spectroscopic signature"
    mechanism: >
      A solo-vortex passing through an atomic cloud produces
      a transient R elevation — brief shift in atomic transition
      frequencies proportional to the solo-vortex winding number
      and proximity. In large numbers, this produces a stochastic
      background of frequency fluctuations in precision atomic
      spectroscopy.
    test: >
      Statistical analysis of frequency noise in optical atomic
      clocks and lattice spectroscopy experiments. The noise
      spectrum should show a characteristic solo-vortex signature:
      frequency fluctuations with power spectral density encoding
      the local solo-vortex flux and velocity distribution.
      Distinguished from vibration and environmental noise by
      correlation structure across spatially separated clocks.
    distinguishable_from: >
      Standard dark matter: no spectroscopic signature expected
      for WIMPs or axions at atomic clock precision. Praestology:
      specific stochastic signal from substrate R fluctuations.

  - prediction: "Direct detection null result is confirming"
    mechanism: >
      Substrate wakes, phonons, and solo-vortices are field effects
      and fractional-winding topological excitations — not particles
      with strong nuclear cross-sections. They do not produce nuclear
      recoils in underground detectors. BH strain fields are
      macroscopic. None of the three dark matter components produce
      the signal that WIMP dark matter searches target.
    test: "Already confirmed — 50 years, many orders of magnitude
           sensitivity improvement, zero signal. LUX, XENON, PandaX,
           LZ, CDMS, CRESST, DAMA (contested), DEAP — all null."
    distinguishable_from: >
      Standard dark matter: null result is a problem requiring
      explanation (maybe WIMPs have very low cross-section,
      maybe there is no WIMP, maybe dark matter is something else).
      Praestology: null result was predicted from the start.
      It is confirming, not embarrassing. The searches have
      definitively ruled out the wrong model.

