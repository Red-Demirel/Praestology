    cosmos:   "Determines stellar luminosity, nuclear reaction rate,
               expansion rate of universe, clock rate in voids vs filaments."

  R_resistance:
    physics:  "Substrate impedance to redistribution."
    cosmos:   "Gravitational potential depth. High R = deep well =
               slow clocks = high stellar density. Low R = void =
               fast clocks = diffuse structure."

  S_anomaly:
    physics:  "Local momentum density deviation."
    cosmos:   "Mass-energy distribution. Galaxy mass = integrated S×R
               over the structure including dark matter components."

  hysteresis_H:
    physics:  "Memory of past resolutions."
    cosmos:   "Cosmic chemical enrichment history. Each stellar
               generation adds to the accumulated element inventory.
               Galaxy morphology carries history of merger events."

  dark_matter_composite:
    physics: >
      Three-component substrate decomposition:
      (1) Substrate wakes/phonons (~60-80%, primary),
      (2) Solo-vortices with fractional winding (~10-30%, halos),
      (3) BH strain/magnetic backreaction (~5-10%, clusters/voids).
      No single particle species. Collisionless by construction.
      Null detection result (LUX, XENON, PandaX, LZ) is confirming.
    cosmos: >
      Each component has distinct spatial distribution:
      Wakes: trace committed structure closely.
      Solo-vortices: diffuse halo extending beyond baryons,
        quantum pressure resolves core-cusp problem.
      BH strain: long-range, correlates with AGN distribution.
      Combined: explains rotation curves, halo profiles,
      cluster lensing, bullet cluster, core-cusp, halo diversity.

