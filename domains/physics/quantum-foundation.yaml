    status: "Dissolved"
    resolution: >
      No collapse. R5 selection when interaction forces
      commitment. No observer required. No special physical
      process to find. The measurement problem was generated
      by treating the wavefunction as a physical wave that
      must somehow collapse — it is a tension landscape
      that resolves. The problem dissolves with the reframing.

  born_rule_origin:
    status: "Mechanism identified — formal derivation open"
    resolution: >
      R5 viability weighting produces |ψ|² as the selection
      probability. Quadratic form from interference cross-terms.
      Derivable rather than postulated.

  wave_particle_duality:
    status: "Dissolved"
    resolution: >
      Engine (particle aspect) and trail (wave aspect) are
      two properties of one vortex topology. Not paradox;
      not complementarity. Two measurement modes sampling
      different physical aspects of the same entity.

  uncertainty_principle_origin:
    status: "Dissolved"
    resolution: >
      Engine/trail structural distinction. Position and
      momentum are properties of different physical aspects
      of the vortex — cannot be simultaneously collapsed
      because they are genuinely different things.

  entanglement_mechanism:
    status: "Dissolved"
    resolution: >
      Phase-locking ρ in substrate commitment structure.
      Non-local correlations from non-separable commitment
      pattern. Bell-compatible — not a local hidden variable.
      No spooky action — the coupling is already in the substrate.

  quantisation_origin:
    status: "Dissolved"
    resolution: >
      R5-stable phase-lock configurations are discrete.
      Continuous intermediate values are topologically
      unstable and decay immediately. Discreteness is
      physical, not a mathematical boundary condition artefact.

  quantum_classical_boundary:
    status: "Dissolved"
    resolution: >
      Continuous ratio of Tik amplitude to commitment density.
      No fundamental boundary — a crossover. Macroscopic
      objects are classical because their commitment density
      renders Tik fluctuations negligible, not because
      of a separate physical law.

  epr_paradox:
    status: "Dissolved"
    resolution: >
      Particles carry coupled substrate commitment, not
      individual hidden properties. EPR's assumption
