vortex_physics_model:
  kernel_reference: "Onsager-Kirchhoff Point Vortex Model"
  medium: "Praesto — superfluid transition potential substrate"
  confirming_models:
    - "Onsager (1949) — statistical mechanics of point vortices in
       2D superfluid; quantised circulation."
    - "Feynman (1955) — quantised vortex lines in superfluid Helium-II."
    - "Kleckner & Irvine (2013) — experimental creation and observation
       of knotted vortex loops in classical fluid. Direct experimental
       precedent for matter-as-topology claim."
    - "Hopf fibrations — topological structure required for stable
       knotted vortex configurations in 3D substrate. Mathematical
       precursor to fermion topology."
    - "Skyrme model (1961) — topological solitons as particle models;
       independent convergence on vortex-topology approach."

  fundamental_assumptions:
    invisible_engine: >
      High-potential vortex cores propagate at environment maxima.
      The vortex topology is the source of resolution — not directly
      observable because observation requires interaction with the trail.
    trail_dependency: >
      Persistence requires momentum. Zero velocity relative to substrate
      equals dissolution — the vortex loses coherence with the
      substrate's resolution dynamics and decays.
    charge_mapping: >
      Spin direction defines polarity.
      Clockwise circulation = positive charge (+).
      Counter-clockwise circulation = negative charge (-).
      Charge is chirality, not a separate primitive.
    confirming_note: >
      Superfluid Helium-II — quantised vortex lines with defined
      circulation direction observed directly. Charge-as-chirality
      consistent with CPT symmetry requirements in standard model.

  particle_topology_mapping:
    photon:
      configuration: "Dipole pair (+/-) — opposite chirality vortices"
      motion: "Translational — side-by-side alignment"
      trail: "Electromagnetic wave — symmetric dipole ripple"
      mass_logic: "Coherent cancellation of S → S≈0 → m_eff≈0"
      praestology_anchor: >
        R3 (Motion) — pure tension transmission without self-contained
        resolution loop. Maximum ∇Φ propagation. Dipole trail maximises
        distinction encoding per unit substrate traversal.
        No hysteresis accumulation — no rest mass.
      confirming_note: >
        QED — photon as gauge boson of electromagnetic interaction.
        Zero rest mass confirmed to high precision. Transverse wave
        polarisation consistent with dipole trail geometry.

    electron:
      configuration: "Co-rotating pair (+/+ or -/-) — same chirality"
      motion: "Orbital — encircling, self-sustaining loop"
      trail: "Möbius loop — 720° phase-lock required for closure"
      property: "Spin-1/2 / Rest mass"
      praestology_anchor: >
        R4 (Progress) + R5 (Optimisation) — self-sustaining resolution
        loop. Möbius topology produces stable hysteresis (rest mass).
        720° phase-lock is the minimum topological closure condition
        for a co-rotating pair in 3D substrate. Spin-1/2 is not
        anomalous — it is the geometric signature of Möbius topology.
      confirming_note: >
        Dirac equation — spin-1/2 requires double cover of rotation
        group (SU(2) over SO(3)); mathematically equivalent to
        Möbius/720° topology. Electron g-factor (≈2.002) — slight
        deviation from pure Möbius geometry consistent with substrate
        interaction corrections.
        Stern-Gerlach experiment (1922) — quantised spin states
        directly confirm two-valued angular momentum of Möbius topology.

    neutrino:
      configuration: "Solo vortex with minimal winding (n_eff=1/2)"
      motion: "High-frequency erratic pulse"
      trail: "Sub-threshold Gaussian ripple — near-invisible"
      property: "Zero/low mass / weak interaction only"
      praestology_anchor: >
        R3 minimal expression — near-pure motion with minimal structural
        commitment. S barely above S_lock → very low R → m_ν ≈ 0.
        Sub-threshold trail indicates proximity to noise floor of
        metastable zone. Weak interaction follows from insufficient
        trail coherence for strong phase-locking with other structures.
      open_question: >
        Neutrino as solo vortex requires clarification relative to
        dark matter solo vortex component (v5.1d component_2b).
        If charge comes from chirality and solo vortices carry net
        chirality, the distinction between neutrino and dark matter
        solo vortex needs formal derivation. Candidate: neutrino
        winding number too low for stable dark matter contribution;
        dark matter solos require minimum winding for persistence.
      confirming_note: >
        Neutrino oscillation (Super-Kamiokande 1998) — flavour mixing
        consistent with near-zero but non-zero mass; matches S barely
        above S_lock interpretation. MSW effect — neutrino interaction
        with dense matter modifies oscillation, consistent with
        substrate-density dependence of trail coherence.

    quarks:
      configuration: "Higher-winding knots — trefoil, torus, figure-8"
      topology: "Multi-axis windings; colour = circulation plane orientation"
      confinement: "Z-pinch flux tubes between knots (V(r) ∝ σ·r)"
      praestology_anchor: >
        R5 (Optimisation) — higher topological complexity produces
        greater stability (higher S×R) and stronger substrate coupling.
        Colour charge as orientation of circulation plane in 3D substrate —
        three independent planes, three colour charges, sum to white
        (neutral orientation) for stable baryons.
      confirming_note: >
        QCD asymptotic freedom — quarks interact weakly at short range,
        strongly at long range. Consistent with flux tube (Z-pinch)
        confinement: short range = vortex cores (low R); long range =
        extended flux tube (high accumulated R).
        Lattice QCD confirms linear confinement potential V(r) ∝ r.

# ─────────────────────────────────────────────
# ELECTROMAGNETIC PHENOMENA
# E and B fields as projections of vortex topology.
# No separate gauge fields or force primitives.
# ─────────────────────────────────────────────
electromagnetic_phenomena:
  description: >
    Electric and magnetic fields emerge from the same underlying
    topological defects in the momentum-density substrate p(r,t).
    No separate gauge fields or force primitives are introduced —
    both E and B are projections of vortex chirality and orientation.
    This eliminates electromagnetism as a fundamental force primitive;
    it becomes a derived consequence of vortex topology.
  praestology_anchor: "R2 (Structure) + R3 (Motion) + R5 (Optimisation)"
  significance: >
    One of the four standard model forces — electromagnetism —
    is fully derived from substrate topology. No new rules required.
    The same Mandelbrot iteration: R1-R5 at the vortex scale
    produces the field equations that Maxwell wrote empirically.

  charge:
    definition: "Net chirality of vortex circulation."
    positive:   "Clockwise circulation → source-like divergence in substrate."
    negative:   "Counter-clockwise circulation → sink-like convergence."
    manifestation: "Radial flux divergence → electric field lines."
    equation_concept: "E ~ ∇(net_chirality_density)"
    scalar_nature: >
      Charge is a scalar property — handedness of rotation, independent
      of spatial orientation. This is why charge is Lorentz invariant
      while fields transform — the topology is frame-independent,
      its projection into E and B is frame-dependent.
    confirming_note: >
      Millikan oil drop experiment (1909) — charge quantisation confirmed.
      Consistent with discrete vortex winding numbers; charge cannot
      take non-integer multiples of e because winding number is integer.
      Charge conservation — topological conservation law. Vortex
      chirality cannot be created or destroyed, only transferred or
      cancelled (pair annihilation = +/- vortex pair merging).

  magnetism:
    definition: >
      Coherent axial (top/bottom) orientation of vortex circulation
      planes across domains or along propagation direction.
    source: "Phase-locking (ρ) of vortex axes."
    manifestation: "Circulatory backreaction in substrate → closed magnetic field loops."
    equation_concept: "B ~ ∇×(axial_orientation_vector)"
    vector_nature: >
      Magnetism is a vector property — directionality of the vortex
      axis. Orthogonal to chirality by construction: you can have
      any axis direction with any handedness. E and B are therefore
      structurally orthogonal — not by Maxwell's equations as axioms
      but by the geometry of the underlying topology.
    confirming_note: >
      No magnetic monopoles observed — consistent with topological
      constraint: isolated top/bottom polarity is forbidden because
      vortex axes are continuous; you cannot terminate an axis
      without a corresponding anti-pole. ∇·B = 0 is derived,
      not postulated.
      Oersted (1820) — current (moving charges = moving chirality)
      produces magnetic field; consistent with moving vortex axes
      generating coherent orientation in surrounding substrate.

  orthogonality:
    reason: >
      Chirality is handedness (scalar-like property of the vortex).
      Orientation is axis direction (vector-like property of the vortex).
      Two independent degrees of freedom of the same topological object.
    consequence: >
      E is irrotational/divergent (from charge imbalance — chirality
      gradient). B is divergenceless/curl (from axial coherence —
      orientation gradient). This is the geometric content of
      Maxwell's equations, derived from topology.
    maxwell_correspondence:
      gauss_electric:   "∇·E ∝ ρ — charge density from chirality gradient."
      gauss_magnetic:   "∇·B = 0 — no monopoles; axis continuity enforced."
      faraday:          "∇×E = -∂B/∂t — changing axial orientation
                         (B) generates chirality gradient (E). Coupled
                         because both are aspects of the same vortex topology."
      ampere_maxwell:   "∇×B = μ₀J + μ₀ε₀∂E/∂t — moving chirality (J)
                         generates axial orientation (B); changing E
                         (chirality gradient) also generates B."
    confirming_note: >
      Maxwell's equations (1865) — empirically derived; Praestology
      provides the topological basis. The four equations are not
      independent axioms; they are four projections of the same
      vortex topology onto observable field quantities.
      Electromagnetic unification (Maxwell) — previously separate
      electric and magnetic phenomena unified by showing E and B
      transform into each other under Lorentz boost. Praestology
      derives this: both are projections of the same vortex; boost
      changes the projection angle, not the underlying topology.

  photon_polarisation:
    description: "Transverse wave from dipole pair of opposite-chirality vortices."
    polarisation_plane: >
      Determined by axial orientation of the dipole pair —
      the top/bottom direction of the vortex axes defines
      the plane of oscillation.
    malus_law: >
      Intensity ∝ cos²(Δθ) — arises from projection of
      orientation plane onto analyser. The fraction of the
      vortex axis aligned with the analyser determines
      how much trail interference passes through.
    circular_polarisation: >
      Left/right circular polarisation = vortex dipole pair
      with axes rotating continuously around propagation direction.
      The chirality of this rotation is a second-order topology —
      the orientation of the orientation, so to speak.
    confirming_note: >
      Malus's law (1809) — confirmed to high precision.
      Circular dichroism — differential absorption of left/right
      circular polarisation by chiral molecules. Consistent with
      chiral vortex topology interacting differently with
      left-handed and right-handed axial rotation.

  faraday_rotation:
    mechanism: >
      External B-field (coherent axial orientation in substrate)
      applies torque to axial orientation of vortex trails.
      Adds relative phase shift between left and right circular
      components of linearly polarised light.
    effect: >
      Rotation of linear polarisation plane proportional to
      B · path length (Verdet constant scales with substrate
      coupling strength).
    non_reciprocal: >
      Direction depends on B relative to propagation direction —
      consistent with chirality torque being directional.
      Reversing propagation direction does not reverse rotation
      (unlike optical activity in chiral media).
    confirming_note: >
      Faraday rotation used in magnetometry and plasma diagnostics.
      Cosmic Faraday rotation of radio sources — measures integrated
      B field along line of sight. Direct observational tool for
      magnetic field mapping at galactic scale (connects to
      cosmos domain component_2a dark matter component).

  alignment_and_material_response:
    preferred_alignment:
      type: "Axial (top/bottom) orientation — axis alignment."
      reason: >
        Minimises substrate resistance (R) and backreaction torque.
        Same-chirality vortices aligning axes reduces trail conflict;
        produces stable collective phase-locking (ρ).
      outcome: >
        Gyrotropic/spiral reorientation → stable macroscopic B field
        from coherent axis alignment without net charge imbalance.
      confirming_note: >
        Ferromagnetic domain formation — magnetic vortex cores with
        consistent axial polarity (up/down) observed directly via
        spin-polarised STM imaging. Domain walls are boundaries
        between regions of different axial alignment — exactly
        the phase-lock boundary condition.
        Bloch/Néel walls — two types of domain wall corresponding
        to different geometric transitions between axial orientations.

    charge_based_alignment:
      description: "Same-charge vortices (+/+ or -/-) under magnetic field torque."
      outcome: "Repulsive flux tubes — high energy configurations."
      viability: >
        Low — unstable under stochastic Tik background noise (R3)
        and suppressed by R5 viability selection. Same-chirality
        repulsion prevents stable clustering.
      photon_formation: >
        Chains of same-chirality vortices cannot form stable photons —
        photon requires balanced +/- dipole cancellation.
        Unbalanced chirality chains are suppressed by R5.

    ferromagnetic:
      mechanism: >
        Unpaired electron vortices → net chirality available for
        axial alignment. Exchange interaction (quantum mechanical
        phase-locking between adjacent electron axes) produces
        coherent domain alignment.
      result: "Strong macroscopic B via domain ρ locking."
      confirming_note: >
        Curie temperature — above T_C thermal noise (stochastic
        Tik background) disrupts axial phase-locking; ferromagnetism
        lost. Directly maps onto thermal noise exceeding ρ threshold.

    paramagnetic:
      mechanism: >
        Some unpaired electrons → temporary axis torque under
        external B. But insufficient exchange coupling for
        spontaneous domain formation — Tik noise disrupts alignment.
      result: "Weak, field-dependent magnetisation. No remanence."

    diamagnetic:
      mechanism: >
        Fully paired electron vortices → zero net chirality →
        no axis available for alignment. Applied B induces
        opposing circulation (Lenz's law) — substrate resistance
        to imposed axial change.
      result: "Weak opposing magnetisation — repelled by B field."
      confirming_note: >
        Meissner effect in superconductors — perfect diamagnetism.
        Superconducting Cooper pairs produce complete expulsion of
        B field. Consistent with perfectly paired vortex topology
        offering maximum resistance to axial imposition.

  force_elimination_summary:
    statement: >
      Electromagnetism is not a fundamental force in Praestology.
      It is a derived consequence of vortex chirality (charge)
      and axial orientation (magnetism) in the momentum-density
      substrate. The Coulomb force, Lorentz force, and all
      electromagnetic phenomena follow from the topological
      interaction of vortex structures without requiring a
      separate force primitive or gauge field.
    maxwell_derivation_status: >
      Maxwell's four equations are derived as topological projections,
      not postulated as axioms. This is the same relationship
      Praestology has with GR — the existing mathematics is correct;
      the ontological foundation is new.
    open_derivation: >
      Exact derivation of fine-structure constant α ≈ 1/137 from
