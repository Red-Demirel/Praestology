    name: "Self-Sustained Symmetry Restoration"
    process: >
      Dipole alignment creates a leading potential gradient (wake) —
      a resolution debt the substrate drives to restore at Φ_max.
      Restoration force propagates forward through the wake, pushing
      the dipole to terminal velocity c. The photon does not accelerate
      to c — it is restored to c by the substrate's equilibrium-seeking dynamics.
    why_c_is_terminal: >
      c is not an imposed speed limit. It is the rate at which the substrate
      can restore viability equilibrium — Φ_max. Cannot exceed c because the
      substrate cannot restore faster than its own maximum flux.
    confirming_note: >
      Cherenkov radiation — when charged particles exceed local c in a medium
      (lower Φ_max than vacuum), the substrate cannot restore fast enough;
      the excess resolution debt radiates as light.

