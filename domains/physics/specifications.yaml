excluded_phenomena:
  singularities:
    excluded: true
    reason: >
      Infinite density requires compression below Planck grain size —
      impossible without energy shattering into incoherent background.
      R5 topological minimum prevents it. Applies inside black holes
      (saturation state, not singularity) and at Big Bang
      (high-φ region, not t=0 point). Doubly grounded: physical
      (GP saturation) and mathematical (open manifold topology).
  warp_drives:
    excluded: true
    reason: >
      Require negative energy density — no substrate configuration
      produces negative resolution potential (∇Φ < 0 absolutely).
      Massive structures generate resolution debt far exceeding what
      substrate backreaction can restore at Φ_max.
  wormholes:
    excluded: true
    reason: >
      Require topology change of the substrate — connecting two separated
      regions through a handle. R4 forbids this: substrate topology
      accumulates irreversibly. No mechanism exists to create macroscopic
      substrate topology change without violating R4.
  time_travel:
    excluded: true
    reason: >
      Time is R4 — accumulated progress. R4 is irreversible by definition:
      you cannot un-accumulate progress. Backward time travel would require
      reversing hysteresis globally, which contradicts the ontological basis
      of time itself. Forward time differential (differential φ) is not
      travel — it is clocks running at different rates, which GR already
      describes and which the framework fully accommodates.

