# ─────────────────────────────────────────────
# PROPULSION MECHANICS
# ─────────────────────────────────────────────
propulsion_mechanics:
  photon_drive:
    name: "Self-Sustained Symmetry Restoration"
    praestology_anchor: "R3 (Motion) + R5 (Optimisation)"
    process:
      step_1_displacement: >
        Dipole alignment creates a leading potential gradient — the wake.
        The vortex pair displaces substrate ahead of it, creating a
        resolution debt: a region where the substrate's distinction
        pattern is disturbed and requires restoration.
      step_2_sensing: >
        Substrate senses the resolution debt in the wake. The local
        Φ gradient is disturbed; R5 drives toward restoration.
      step_3_backreaction: >
        Praesto substrate restores equilibrium at Φ_max — maximum
        local resolution flux. The restoration force acts on the
        wake region, which is coupled to the dipole pair.
      step_4_propulsion: >
        Restoration force propagates forward through the wake,
        pushing the dipole to terminal velocity c. The photon
        does not accelerate to c — it is restored to c by the
        substrate's own equilibrium-seeking dynamics.
    why_c_is_terminal: >
      c is not an imposed speed limit. It is the rate at which the
      substrate can restore viability equilibrium — Φ_max. A photon
      travelling below c creates a resolution debt that is immediately
      restored to c. A photon cannot exceed c because the substrate
      cannot restore faster than its own maximum flux.
    confirming_note: >
      Cherenkov radiation — when charged particles exceed local c
      in a medium (lower Φ_max than vacuum), the substrate cannot
      restore equilibrium fast enough; the excess resolution debt
      radiates as light. Direct confirmation of backreaction mechanism.
      Photon self-energy in QED — vacuum polarisation corrections
      consistent with continuous substrate interaction during propagation.

  light_speed:
    definition: "Universal rate of substrate backreaction — Φ_max."
    praestology_anchor: "R5 (Optimisation) — saturation of resolution flux"
    note: >
      Φ_max sets the ceiling for all signal propagation.
      Local variations in R produce local variations in effective c —
      which is what gravitational lensing and Shapiro delay measure.

# ─────────────────────────────────────────────
# REDSHIFT MECHANISMS
# Three distinct, independently measurable components.
# ─────────────────────────────────────────────
redshift_mechanisms:
  description: >
    Praestology identifies three distinct redshift mechanisms that
    current models partially conflate. Separating them produces
    independent testable predictions.

  cosmological_redshift:
    mechanism: >
      Substrate expansion increases resolution debt faster than
      backreaction can fully restore. Photon trail wavelength
      stretches as ∇Φ decreases at cosmic scale.
    praestology_anchor: "R4 (Progress) — irreversible substrate expansion"
    confirming_note: >
      Hubble (1929) — galaxy recession velocity proportional to
      distance. CMB temperature uniformity confirms large-scale
      substrate homogeneity at early epochs.

  gravitational_redshift:
    mechanism: >
      Photon climbing out of high-R region loses trail energy to
      substrate resistance. Local Φ increases as photon moves to
      lower-R environment; wavelength stretches to compensate.
    praestology_anchor: "rule_5_refraction — R gradient effect on Φ"
    confirming_note: >
      Pound-Rebka experiment (1959) — gravitational redshift
      measured to 1% precision in laboratory. GPS frequency
      corrections confirm gravitational redshift at operational level.

  density_transition_redshift:
    mechanism: >
      Photon traverses boundary between substrate regions of differing R.
      Wake (resolution debt) enters higher-R environment while
      backreaction push is calibrated to prior lower-R conditions.
      Mismatch produces friction — partial dissipation of trail energy
      into incoherent substrate background.
    praestology_anchor: "R3 friction + R5 mismatch at ΔR boundary"
    energy_loss: >
      Proportional to ΔR across the transition boundary and traversal
      rate. Small per transition; cumulative over many transitions or
      sustained density gradients.
    key_prediction: >
      Redshift magnitude correlates with ΔR gradient steepness, not
      just ΔR magnitude. A sharp boundary produces more dissipation
      than a gradual one of equal total density difference.
      This is testable and distinguishable from all current redshift models
      which are functions of total density or distance only.
    secondary_prediction: >
      Cosmic redshift measurements assuming homogeneous expansion
      may be systematically overcounting — photons traversing many
      filament/void boundaries accumulate density-transition redshift
      on top of cosmological redshift. The two effects should be
      independently measurable in high-resolution surveys of
      large-scale structure with boundary-tagged photon paths.
    cross_prediction: >
      Dark matter substrate wake (v5.1d component_1) creates exactly
      the density gradients that produce measurable density-transition
      redshift at galaxy boundaries. This is a cross-prediction between
      two independent parts of the framework — testable via correlation
      between dark matter halo boundary sharpness and anomalous redshift.
    confirming_note: >
      Wave experiments with rapidly shifting environmental densities —
      energy dissipation at transition boundaries observed in analogous
      wave systems. Consistent with wake-backreaction mismatch mechanism.
      Anomalous redshift in inhomogeneous cosmic environments (Lyman-alpha
      forest, galaxy cluster boundaries) shows excess redshift not fully
      explained by expansion alone — consistent with density-transition
      contribution.
    distinction_from_tired_light: >
      This is not a revival of the tired light hypothesis (Zwicky 1929),
      which was falsified by supernova distance measurements and CMB
      surface brightness scaling. Density-transition redshift is a
      boundary effect, not a continuous energy loss. Substrate expansion
      remains the primary cosmological redshift mechanism; entropy
      contribution and density-transition effects are secondary and
      separately measurable.

# ─────────────────────────────────────────────
# OBSERVATIONAL INTERFACE
# Engine/trail architecture — derives wave-particle
# duality and uncertainty from substrate topology.
# ─────────────────────────────────────────────
observational_interface:
  praestology_anchor: "R2 (Structure) + H (Hysteresis) + ∇Φ"

  invisible_engine:
    description: >
      The vortex topology — source of resolution. Not directly observable
      because observation requires interaction with the trail, which
      disturbs the engine. The engine is real; its inaccessibility is
      architectural, not epistemological.

  visible_reality:
    description: >
      The trail — wavelike interference pattern in the substrate.
      The wake left by the vortex's propagation through the medium.
      All measurement accesses the trail, not the engine directly.

  uncertainty_derivation:
    statement: >
      Inverse correlation between resolution of engine (position)
      and trail (momentum) is an ontological feature of the
      engine/trail architecture — not an epistemological limitation
      or measurement disturbance.
    mechanism: >
      Pinning position requires interacting with the engine —
      which disturbs the trail (momentum becomes indeterminate).
      Pinning momentum requires measuring the trail wavelength —
      which loses engine location (position becomes indeterminate).
      The two are coupled by the substrate topology; you cannot
      access both simultaneously because they are physically
      distinct aspects of the same structure.
    formula: "ΔxΔp ≥ ℏ/2 — derivable from engine/trail geometry."
    open_derivation: >
      The specific form of the uncertainty relation (ℏ/2) should be
      derivable from the vortex pair geometry and minimum trail
      wavelength (Planck scale grain size). Full derivation pending.
    confirming_note: >
      Double-slit experiment — trail interference pattern when
      engine path unobserved; pattern destruction when engine
      path measured. Direct confirmation of engine/trail coupling.
      Wheeler's delayed-choice experiment — interference depends
      on whether which-path information is accessible, not on
      when measurement occurs. Consistent with engine/trail
      architecture where topology, not timing, determines observability.

  wave_particle_duality:
    resolution: >
      Not a paradox in this framework. The 'particle' is the engine
      (vortex topology — localised, persistent). The 'wave' is the
