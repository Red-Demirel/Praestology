      (mass) depletes local free potential φ. The φ gradient ∇φ
      refracts all propagating structure toward regions of lower φ —
      toward mass. Gravity is substrate advection and impedance
      gradient, not a force. Trajectories follow φ gradients because
      the process rate Γ ∝ φ varies spatially — structure is carried
      toward lower Γ by the substrate's own potential flow current.
