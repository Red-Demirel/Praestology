    physical: >
      R5 topological minimum at Planck scale prevents infinite density.
      GP saturation: as commitment density approaches n_sat, the
      saturating nonlinearity stiffens the field. Infinite compression
      is physically impossible; the field saturates asymptotically.
    mathematical: >
      Open non-compact manifold with continuous Ricci-flow surgery
      (Twitch prevents curvature singularity by firing before closure)
      cannot contain true singularities by Perelman-Hamilton topological
      theorem. The Twitch is physically what Perelman's surgery is
      mathematically.
    convergence: >
      Two independent derivations — one from substrate physics, one from
      pure topology — arrive at identical conclusion: no singularities.
      Priority open derivation: formal proof that Twitch mechanism
      satisfies Ricci flow surgery conditions exactly — elevates this
      from structural convergence to formal theorem.
  black_hole_interior:
    status: "Genuinely underdetermined — honest open question."
    what_is_excluded: "Singularity — GP saturation prevents infinite commitment density."
    what_is_unknown: >
      The positive topology of the interior. Candidate: a compact
      sub-manifold of near-zero φ, topologically isolated but not
      singular — a saturated GP region with internal structure
      inaccessible to external observers because outward impedance
      effectively diverges at the horizon.
    why_inaccessible: >
      Once outward impedance diverges asymptotically, no resolution
      event inside can propagate outward. The interior runs on internal
      process cycles with no coupling to external commitment accumulation.
      Time inside is genuinely disconnected from time outside —
      not merely unmeasurable but causally decoupled.

