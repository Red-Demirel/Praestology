description: >
  Physics is one instantiation of Praestology's logical ontology.
  All physical observables derive from R1-R5 operating on the
  momentum-density substrate. No physical primitive is assumed
  prior to the substrate derivation. Where possible, connections
  to confirming experiments and established models are noted —
  not as proof of the framework, but as evidence of convergence
  between independent lines of inquiry.

  Recursive note: The same R1-R5 rules that generate ethics,
  consciousness, and communication generate physics. Increasing
  depth reveals increasing complexity from the same five primitives —
  as in a Mandelbrot set, the generating equation is fixed;
  the structure emerges from iteration.

  Methodological principle: no structure is assumed in advance of
  the substrate dynamics. Dimensionality is derived (R5 stability),
  not assumed (3D). Time is derived (R4 accumulation), not a
  background axis. Metric is emergent (commitment density gradients),
  not imposed. Algebraic structure is found from the grade decomposition
  of the substrate field, not specified beforehand. In each case the
  rule is the same: follow R1-R5 without pre-constraining the answer
  and describe what emerges. This methodological consistency is why
  the framework finds structure — S³ orientation space, Clifford torus,
  Hopf fibration, geometric algebra grade structure — that assumption-
  first approaches would have missed or forced into a pre-existing mold.

  Reading order for new readers:
    substrate-potential.yaml      — potential field as primary framing
    this file                     — substrate derivation, forces, predictions
    foundations.yaml              — four pillars and commitment stress
    commitment-response-function.yaml — GP saturating nonlinearity
    quantum-foundation.yaml       — QM primitives reframed
    alpha-rydberg-z0.yaml         — constant stack derivation

# ─────────────────────────────────────────────
# PROCESS ONTOLOGY
# The core framing: reality is a process, not a
# static container. All other sections derive from
# this. Read this before the substrate derivation.
# ─────────────────────────────────────────────

process_ontology:
  headline: >
    Reality is a process with a rate. We are not in a static
    given — we are inside an ongoing act of resolution. The
    past is fixed committed structure; the present is the
    active decoherence front; the future is unresolved potential
    in at least Heisenberg-like superposition. What we call
    'time' is the measurement of this process — cycles counted
    from inside a resolution sequence, not an external coordinate.

  what_this_means_for_physics:
    time: >
      Time is not a dimension. It is R4 — accumulated progress
      measured from inside a resolution sequence. The process has
      a rate; that rate varies with local free potential φ. Clocks
      do not measure an external flow — they count local resolution
      events. Gravitational time dilation is the process running
      slower where free potential is depleted by committed topology.
      SR time dilation is the same mechanism: a moving structure
      commits potential into its own trail, reducing the local φ
      available for internal resolution events.

    energy: >
      Energy is a consequence of the process, not a primitive.
      It is the measure of process flow rate — the rate at which
      potential resolves into commitment. E = hν is the process
      rate of a photon's oscillation cycle; E = mc² is the
      commitment density of a self-sustaining vortex topology;
      kinetic energy is the additional commitment from a structure's
      trail. Energy is not more fundamental than the process that
      produces it. The Hamiltonian generates time evolution because
      energy IS the process rate — they are the same thing viewed
      from different angles. Treating energy as a primitive and
      deriving time from it inverts the causal order.

    entropy: >
      Entropy is a coarse-grained description of commitment density
      distribution. High entropy means many equivalent commitment
      configurations — the process has distributed its resolved
      structure across many microstates. The second law does not
      cause the arrow of time: the arrow of time (R4 — commitment
      accumulates irreversibly) is why entropy increases. Entropy
      is what the process looks like from outside when individual
      commitment events are not resolved. The standard framing hides
      the setup of a process behind a statistical summary.
      Precise statement: entropy = log(Ω_commitment) where Ω is
      the number of equivalent commitment configurations. dS/dt > 0
      because R4 is irreversible — not the other way around.

    uncertainty: >
      The future is not merely unknown — it is genuinely unresolved.
      R3 tension holds multiple configurations simultaneously before
      R5 selection. Quantum superposition is the real physical state
      of unresolved potential, not a description of ignorance.
      Heisenberg uncertainty follows from the engine/trail
      architecture: the vortex topology (engine) and its substrate
      disturbance (trail) are two aspects of the same structure.
      You cannot simultaneously resolve both because resolving one
      requires interacting with the other, which changes it. The
      uncertainty is architectural, not epistemological.

  bec_turbulence_analogy:
    observation: >
      A Bose-Einstein condensate at rest has near-zero viscosity —
      maximum free flow, minimum impedance. As turbulence is
      introduced — vortex tangles accumulate — the superfluid
      becomes progressively more rigid and resistant to flow.
      This is the inverse of normal matter under heat: heating
      a solid reduces rigidity (melts it); turbulencing a BEC
      increases rigidity.
    resolution: >
      The two effects are the same mechanism on different axes.
      Normal matter under heat: thermal energy (increased Tik
      amplitude) exceeds the phase-lock strength of the commitment
      structure (lattice bonds). The structure dissolves — rigidity
      falls. You are disrupting commitment with process rate.
      BEC under turbulence: vortex tangles are committed topological
      defects added directly to the substrate. More committed
      topology = higher impedance to further flow = more solid-like.
      You are adding commitment as topology, not disrupting it.
      The distinction is which substrate parameter is being driven:
        Normal matter heating: process rate (Tik) exceeds S_lock → commitment dissolves
        BEC turbulence:        topology (vortex count) increases → commitment accumulates
      Same R1-R5 rules; opposite observable outcomes because opposite
      substrate parameter is the driving variable. This is not a
      coincidence — it is the process ontology making a specific
      prediction about two apparently contradictory phenomena.
    significance: >
      Material rigidity in Praestology is topological commitment
      density, not thermal state. A turbulent superfluid and a cold
      solid are both high-commitment-density states, arrived at by
      different routes. Temperature is one way to modify commitment
      structure; vortex nucleation is another. The BEC result is
      direct experimental confirmation that rigidity = committed
      topology density, independent of temperature.

  process_vs_block_universe:
    statement: >
      The block universe (eternalism) and the process view make
      identical predictions for all currently performed experiments —
      the past is fixed in both. The empirical difference only
      appears in predictions that depend on the rate of 'now'
      varying in ways that exceed GR. The strongest current candidate:
      φ-dependent decoherence rate — if the rate of commitment
      accumulation varies with local free potential in ways that
      produce measurable deviations from GR time dilation at extreme
      environments (deep voids, Lagrange points), that is a
      process-specific signature. The φ-variation of α (fine
      structure constant) is the same prediction at the coupling level.
    open_derivation: >
      Identify a prediction where the process view gives a different
      numerical result than GR, not just a different interpretation.
      Candidate: sub-ppm α variation between gravitational environments
      (STE-QUEST, FOCOS missions). If confirmed, this is a process
      signature with no block-universe equivalent.

