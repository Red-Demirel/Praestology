kernel:
  name: "Praesto"
  definition: >
    The fundamental state of presence and resolution — the 'something'
    that exists as unresolved tension of potential. Derived from R1
    (existence is necessary) and R2 (existence requires distinction).
    Not a substance or medium assumed prior to physics — a logical
    necessity that manifests as a momentum-density field once
    dimensionality is derived.
  operating_layer: "Praestology-Core (R1-R5)"
  logic_type: >
    Recursive — same R1-R5 iterated at every scale.
    Complexity increases with depth, not with new rules.
    Mirrors Mandelbrot set: same generating equation,
    increasing structural detail at each zoom level.

# ─────────────────────────────────────────────
# SUBSTRATE DERIVATION
# Logical descent from R1-R5 to physical primitives.
# No physics vocabulary until substrate emerges as
# necessary consequence of the rules.
# ─────────────────────────────────────────────

substrate_derivation:
  description: >
    The clean derivation chain. Each step is forced by the
    previous — no additional assumptions imported.
  steps:
    - rule: "R1 — Existence"
      output: "Something exists. No further specification yet."
      confirming_note: >
        Leibniz's question 'Why is there something rather than nothing?' —
        Praestology answers: because nothing is self-defeating. Not an
        empirical claim; a logical one.

    - rule: "R2 — Structure"
      output: >
        That something has internal distinctions. Distinction requires
        at least two differentiable states — the minimum for a field.
        The substrate is not uniform; it has internal variation.
      confirming_note: >
        Consistent with field theories across all physics domains —
        fields are the standard description of structured substrates.

    - rule: "R3 — Motion"
      output: >
        Distinctions generate tension. Tension drives toward resolution.
        The substrate is therefore dynamic — not a static field but a
        flowing, resolving medium. Action is necessary.
      confirming_note: >
        Least action principle — physical systems follow paths that
        extremise action. Praestology derives why: R3 compels resolution;
        R5 selects the most viable path.

    - rule: "R4 — Progress"
      output: >
        Resolutions accumulate irreversibly. The substrate has memory —
        prior resolutions bias future ones. This is hysteresis at the
        physical level; manifests as inertia and persistence of structure.
        Time is this accumulation measured from inside a resolution sequence —
        not a background coordinate but a derived process counter.
        Energy is the rate of this accumulation — derived from the process,
        not prior to it.
      confirming_note: >
        Second law of thermodynamics — entropy increases irreversibly.
        Praestology derives this from R4 rather than assuming it.
        Arrow of time is R4, not an axiom. Energy conservation follows
        from the process rate being finite and conserved across the substrate.

    - rule: "R5 — Optimisation"
      output: >
        Viable substrate configurations are amplified; non-viable ones
        suppressed. The substrate self-tunes toward the metastable zone.
        This produces the specific parameter set of our physical cosmos —
        not as arbitrary constants but as the viable solution space.
      confirming_note: >
        Anthropic principle reframed — not 'the universe is fine-tuned
        for observers' but 'non-viable configurations are suppressed by
        R5; we observe a viable configuration because non-viable ones
        do not persist.'

  dimensionality_derivation:
    claim: "3 spatial dimensions are derived, not assumed."
    argument: >
      R5 selects the minimum dimensional configuration supporting
      stable vortex topology without over-constraining resolution paths.
      2D: insufficient — stable closed knots impossible; all vortex
          structures eventually reconnect and annihilate.
      3D: metastable — closed vortex structures (knots, links, Hopf
          fibrations) possible; resolution paths bounded but not frozen.
      4+ spatial dimensions: too many simultaneous resolution paths —
          vortex topology becomes unstable; pushes toward chaos (R5 violation).
      3 is the unique metastable solution under R5.
    time_clarification: >
      Time is not a 4th spatial dimension. It is R4 — accumulated
      progress measured from inside a resolution sequence. The '+1'
      in '3+1' is categorically different from the 3: it is a process
      counter, not a structural axis. 'Spacetime' as a symmetric 4D
      manifold is a useful mathematical tool that conflates two distinct
      ontological categories — structural dimensions (R2) and accumulated
      process (R4). This conflation is the source of several pseudo-problems
      in physics (block universe, time travel, t=0 singularity).
    confirming_note: >
      Ehrenfest (1917) showed that stable planetary orbits and atoms
      require exactly 3 spatial dimensions — fewer or more produce
      unstable systems. Praestology derives this from topology rather
      than orbital mechanics, arriving at the same conclusion from
      a more fundamental level.

  emergence_hierarchy:
    statement: >
      Spatial structure does not precede the process — it emerges from it.
      The dimensionality derivation above identifies 3D as the R5-stable
      solution, but it operates at the level of an already-spatial substrate.
      The emergence hierarchy describes how space itself arises from a
      pre-spatial mode distribution through three stages, closing the prior
      circularity in the dimensionality argument.
    stage_1_pure_mode_space:
      name: "Pure Mode Space — pre-spatial"
      description: >
        The substrate begins as a distribution of amplitudes and phases
        over mode variables. No metric, no coordinates, no dimensionality —
        only a continuous field of unresolved potential (R1) carrying
        internal distinctions (R2) in mode space. The mode variables are
        not spatial coordinates — they are abstract degrees of freedom over
        which the dilemma landscape is distributed.
      r_rules_active: "R1 (existence), R2 (structure in mode space)"
    stage_2_connectivity_network:
      name: "Dynamic Connectivity Network — proto-spatial"
      description: >
        As certain modes begin to phase-lock (R3 tension resolving into
        coherent pairs), local connectivity patterns emerge. Nodes represent
        locally coherent mode clusters; edges represent allowed momentum or
        phase transfer between clusters. Effective local dimensionality
        begins to appear through the statistical stabilisation of connectivity.
        R5 viability selection prunes non-reinforcing connections; only
        mutually reinforcing clusters survive as stable nodes.
      r_rules_active: "R3 (phase-locking), R4 (persistence), R5 (pruning)"
      note: >
        The neural connectivity analogy (large pool of connections pruned
        by viability selection to stable low-resistance pathways) illustrates
        the selection process only. The substrate is not computing; it is
        resolving dilemmas through R1-R5 at the pre-spatial level.
    stage_3_effective_3d_geometry:
      name: "Effective 3D Geometry — fully spatial"
      description: >
        Full 3D spatial geometry emerges as a collective phenomenon when
        phase relationships among locked modes become coherent and isotropic.
        R5 selects isotropy (no preferred direction) at the connectivity level.
        The R5 dimensionality argument then applies: of all isotropic
        connectivity geometries, 3D is the unique metastable solution for
        stable vortex topology. Vortices, triality, sphere projections, and
        all higher-order topological organisation appear at this stage.
      r_rules_active: "R5 (geometry selection), all rules at spatial scale"
    resolution_of_circularity: >
      The prior dimensionality argument assumed a spatial substrate. The
      emergence hierarchy resolves this: stages 1-2 produce spatial structure
      from pre-spatial mode dynamics; stage 3 applies R5 to the resulting
      geometry. The R5 stability argument applies to the output of the
      connectivity emergence, not as a prior assumption.
    connection_to_master_equation: >
      The master equation (core/core-dynamical-equation.yaml) operates at
      stage 3. The viability measure 𝓥(ψ) = w₀|ψ|² + w₁|∇ψ|² + w₂|∇φ|²|ψ|²
      formalises the stage 2/3 transition: it measures exactly the quantities
      that distinguish a surviving stable mode cluster from a transient one.
      See core/praestology-model.yaml for the simulation-ready formalization.
    ontological_interpretation: >
      The emergence hierarchy describes the mechanism. The ontological
      interpretation — what it means that space emerges from recursive
      commitment rather than being a prior container — is in
      core/emergent-relational-manifold.yaml. The two files are
      complementary: the hierarchy gives the how; the manifold document
      gives the what-it-means.

  primitive_field:
    quantity: "p(r,t) — momentum density field"
    derivation: >
      Momentum density is the first physical primitive to emerge.
      It is not assumed — it is the specific parameterization that
      satisfies R3 (tension drives flow) and R5 (viable configurations
      persist) in a 3-dimensional resolution space with irreversible
      accumulation (R4).
    potential_field_primary: >
      The potential field φ(r,t) is the more fundamental description
      (see substrate-potential.yaml). Momentum density p = ρ_s·∇φ
      is derived from the potential field gradient. φ is primary;
      p is derived. Both are used in different files depending on
      which framing is more tractable for the derivation at hand.
    gauge_principle: >
      p → p + p₀ leaves physics unchanged.
      Only gradients (∇p) and curvatures (∇²p) are observable.
      Absolute momentum density is not measurable — only differences.
    confirming_note: >
      Gauge invariance is foundational to all standard model physics.
      Praestology derives it from the substrate's distinction-based
      ontology (R2) — you can only observe differences, never absolutes.

