excluded_phenomena:
  singularities:
    excluded: true
    reason: >
      Infinite density requires compression below Planck grain size —
      impossible without energy shattering into incoherent background.
      R5 topological minimum prevents it. Applies inside black holes
      (saturation state, not singularity) and at Big Bang
      (high-Φ region, not t=0 point).

  warp_drives:
    excluded: true
    reason: >
      Require negative energy density — no substrate configuration
      produces negative resolution potential (∇Φ < 0 absolutely).
      Additionally: massive structures generate resolution debt far
      exceeding what substrate backreaction can restore at Φ_max.
      Photons work because their trail is minimal; a massive ship
      would require superluminal backreaction — saturation limit violation.

  wormholes:
    excluded: true
    reason: >
      Require topology change of the substrate — connecting two
      separated regions through a handle. R4 forbids this: substrate
      topology accumulates irreversibly. Past resolution states cannot
      be rerouted. No mechanism exists to create macroscopic substrate
      topology change without violating R4.

  time_travel:
    excluded: true
    reason: >
      Time is R4 — accumulated progress. R4 is irreversible by
      definition: you cannot un-accumulate progress. Backward time
      travel would require reversing hysteresis globally, which
      contradicts the ontological basis of time itself. Forward time
      differential (differential Φ) is not travel — it is clocks
      running at different rates, which GR already describes.

  substrate_energy_harvesting:
    status: "Possible under specific conditions — open derivation"
    reason: >
      The Tik background carries real resolution flux. Structures
      that can couple resonantly to the Tik background rather than
      merely being perturbed by it could in principle extract net
      flux. Conditions for viable coupling require formal derivation.
      Not zero-point energy extraction (QFT) — substrate gradient
      harvesting from ∇Φ across engineered resistance differentials.
    open_derivation: >
      Specify minimum coupling geometry and threshold ∇Φ required
      for net energy extraction without violating R5 metastable zone.

