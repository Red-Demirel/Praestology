    confirming_note: >
      General relativity (Einstein 1915) — geodesic equation recovered.
      Gravitational lensing, Shapiro delay, frame dragging, gravitational
      waves (LIGO 2015) all consistent. Hawking radiation as GP pressure
      leakage at impedance-diverging horizon.

