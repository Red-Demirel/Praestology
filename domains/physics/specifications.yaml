# ─────────────────────────────────────────────
# WEAK FORCE
# Derived from pulsed substrate backreaction to
# time-varying vortex orbital dynamics.
# ─────────────────────────────────────────────
weak_force:
  praestology_anchor: "R3 (Motion) + R4 (Progress) — pulsed backreaction
                       from time-varying vortex topology"
  nature: >
    Not a static field interaction. The weak force is the substrate's
    backreaction to pulsed disturbances created by close-range vortex
    orbital dynamics. When this backreaction exceeds the local stability
    threshold (S_lock), it triggers topological reorganisation rather
    than simple deflection — changing particle identity.
    It is not the encircling itself that constitutes the weak force,
    nor purely the disturbance in isolation: it is the substrate's
    response to that disturbance feeding back onto the vortex topology
    at sufficient intensity to reorganise it.
  fluid_dynamics_origin: >
    In classical fluid dynamics, two closely orbiting vortices create
    a time-varying pressure disturbance in the medium. The medium's
    backreaction to this disturbance is distinct from direct
    vortex-vortex coupling — it is the substrate responding to
    the *change* in local topology, not to the topology itself.
    This backreaction can reorganise vortex topology when strong enough:
    vortex reconnection. The weak force is the quantum-scale equivalent.
  confirming_analogue: >
    Vortex reconnection in superfluid Helium-II — directly observed
    and filmed. Two separate vortex filaments approach, exchange ends,
    and reconnect into a different topological configuration. Energy
    released as phonons (Tik pulses). This is macroscopically visible
    weak-force-equivalent behaviour in a classical fluid.
    Bewley, Lathrop & Sreenivasan (2008) — direct visualisation of
    vortex reconnection in superfluid Helium-II using hydrogen ice
    tracer particles. Topology changes; energy radiates outward.
  scale_invariance: "The same reconnection mechanism operates across scales — from superfluid vortices to nuclear weak decays."

  mechanism:
    step_1_orbital_disturbance: >
      Two vortex structures in close orbital proximity create
      time-varying trail interference — a pulsed substrate
      disturbance rather than a static field gradient.
      The disturbance frequency scales with orbital velocity;
      at nuclear scales, this is extremely rapid.
    step_2_backreaction_threshold: >
      If the pulsed disturbance amplitude exceeds local S_lock,
      the substrate backreaction is sufficient to temporarily
      render the vortex winding configuration plastic —
      the topology can be reorganised.
    step_3_topological_reorganisation: >
      Substrate restores equilibrium by reconfiguring the winding —
      changing particle identity. Example: neutron (udd) → proton (uud)
      as down quark winding flips, emitting excess topological
      content as a transient W⁻ disturbance.
    step_4_w_z_emission: >
      W and Z bosons are not permanent force carriers existing
      between interactions. They are transient substrate disturbances —
      coherent backreaction pulses carrying topological change
      from one structure to another before dissolving back into
      the substrate background.

  w_z_mass_derivation: >
    High W/Z mass follows directly from the mechanism.
    To destabilise a stable nuclear vortex configuration (S >> S_lock),
    the backreaction pulse must carry energy exceeding the stability
    threshold. This energy is the W/Z mass — not an arbitrary parameter
    but the energy cost of topological reorganisation at nuclear scale.
    M_W ≈ 80 GeV, M_Z ≈ 91 GeV encode the nuclear-scale S_lock value.
    Open derivation: formal calculation of M_W/M_Z from S_lock
    at quark confinement scale.
  confirming_note: >
    W and Z boson discovery (UA1/UA2, CERN 1983) — mass values
    confirmed. Praestology predicts these masses are derivable
    from the nuclear stability threshold, not free parameters.
    Beta decay — neutron → proton + electron + antineutrino.
    Topological reorganisation: one quark winding flips (udd→uud),
    the surplus chirality emitted as electron (Möbius pair) and
    the backreaction pulse residual as antineutrino (solo vortex).
    Energy and charge conserved by topology conservation.

  short_range_derivation: >
    Follows directly — pulsed substrate disturbance decays
    rapidly with distance (unlike static field gradients which
    decay as 1/r²). The backreaction is local to the orbital
    interaction zone. Range ∝ ℏ/M_W·c ≈ 10⁻¹⁸ m —
    consistent with observed weak interaction range.
    Range is not a separate assumption; it is the coherence
    length of the transient W/Z disturbance before it dissolves
    back into the Tik background.

  parity_violation:
    observation: >
      Weak force maximally violates parity — acts only on
      left-handed particles (and right-handed antiparticles).
      Most anomalous feature of the standard model; handled
      by V-A theory as an axiom (Wu experiment, 1957).
    praestology_derivation: >
      Chiral backreaction torque acts differently on left-handed
      and right-handed vortices. The torque direction is defined
      relative to the chirality of the vortex — clockwise vs
      counter-clockwise. The same pulsed substrate disturbance
      applies torque in opposite directions to mirror-image vortices.
      One configuration is destabilised beyond S_lock (weak
      interaction occurs); the other is stabilised by the same
      pulse (weak interaction suppressed).
      Parity violation is not anomalous — it is the geometric
      consequence of a chiral backreaction mechanism acting on
      a chiral substrate. It would be more surprising if parity
      were conserved.
    confirming_note: >
      Wu experiment (1957) — beta decay from aligned cobalt-60
      nuclei showed preferred electron emission direction,
      confirming maximal parity violation. Praestology derives
      this as geometric necessity rather than empirical surprise.
      CP violation (Cronin & Fitch 1964, kaon decay) — slight
      asymmetry between matter and antimatter weak interactions.
      Consistent with chirality bias in vortex nucleation that
      also explains matter/antimatter asymmetry in cosmogenesis.

  prediction: "Weak processes should show stronger parity violation in regions of lower substrate density (thinner host, reduced p_env), as backreaction torque asymmetry increases."

  neutrino_connection: >
    Neutrinos (solo vortices, minimal trail coherence) interact
    only via weak force because:
    (a) No net chirality asymmetry → no EM coupling.
    (b) No flux tube confinement → no strong coupling.
    (c) Minimal trail → insufficient for gravitational significance.
    But minimal topology means they can absorb and re-emit the
    pulsed backreaction (W/Z) without being fully disrupted —
    the solo vortex is the substrate's minimal weak-interaction
    partner, just barely above the dissolution threshold.
  higgs_connection: >
    Higgs mechanism gives W/Z bosons their mass via symmetry breaking.
    In Praestology: the Higgs field maps onto p_env modulation —
    the environmental momentum density that sets the local S_lock
    value. Where p_env is high, S_lock is high, W/Z mass is high.
    Electroweak symmetry breaking is the substrate's selection
    of a specific p_env value in the low-Φ post-cosmogenesis state.
    Above electroweak scale (very high Φ — early universe), the
    S_lock threshold drops and W/Z become effectively massless —
    EM and weak forces unify as the same vortex backreaction
    mechanism operating without the mass distinction.
  confirming_note: >
    Electroweak unification (Weinberg, Salam, Glashow 1967-68) —
    EM and weak forces unified above ~100 GeV. Praestology derives
    why: same substrate backreaction mechanism, mass distinction
    disappears above the p_env threshold. Unification is not
    coincidental — it reflects the common topological origin.

