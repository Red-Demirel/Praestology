cosmos_medium:
  state: "Superfluid-like substrate of transition potential."
  energy_definition: >
    Differential resolution potential — ∇Φ across the substrate.
    Energy is the rate of process flow, not a primitive. See
    process_ontology.energy above.
  confirming_models:
    - >
      Superfluid vacuum theory (SVT) — treats quantum vacuum as
      superfluid medium. Praestology provides the ontological grounding
      SVT lacks: the process ontology that explains why the vacuum
      is superfluid rather than merely asserting it.
    - >
      Navier-Stokes fluid dynamics — turbulence index Ξ maps onto
      the complexity parameter in viscous flow equations.
    - >
      Bose-Einstein condensates — macroscopic quantum coherence
      demonstrates superfluid substrate behaviour at observable scales.
      The turbulence/rigidity inversion (see process_ontology.bec_turbulence_analogy)
      provides direct experimental confirmation of the commitment
      density picture.

  derived_quantities:
    S_anomaly:    "|p(r) - p_env(r)| — local deviation from environment"
    R_resistance: "p_env × κ × (1 + β·Ξ) — impedance to redistribution"
    Xi_complexity: "|∇×p|²/|p|² + (∇ρ)²/ρ² — turbulence index"
    V_potential:  "|∇p| — gradient magnitude"
    Phi_capacity: "V/R = |∇p|/R — local resolution flux"

  viability_limits:
    stasis_limit: >
      Maximum potential tension — all distinctions present, none resolved.
      Triggers phasic resolution (the Twitch). R3: tension cannot
      persist without driving toward resolution.
    saturation_limit: >
      Zero remaining potential locally — all tension resolved.
      Event horizon condition: Φ → 0, R → ∞.
      Not a breakdown of physics — a region where resolution flux stalls.
      No singularity: R5 suppresses infinite density via topological
      minimum (Planck scale grain size). Structure approaches a maximally
      committed state asymptotically; GP saturation prevents infinite density.
      What lies inside the event horizon is genuinely underdetermined by
      the current framework — the interior cannot be a singularity (GP
      saturation prevents it) but its positive topology is an open question.
      See topological_validation.geometry.boundary for the formal treatment.
    chaos_limit: >
      Zero coherent potential — distinctions present but uncorrelated.
      Dispersed, unreliable state. Noise boundary of metastable zone.

  planck_scale:
    role: "Substrate grain size — mean free path, not lattice spacing."
    value: "ℓ_Planck ≈ 1.6×10⁻³⁵ m"
    nature: "Dynamic and emergent, not fixed coordinate grid."
    singularity_prevention: >
      Cannot compress below grain size without energy shattering into
      incoherent background. No infinite densities possible. Natural
      UV regularisation from topology, not discretisation.

# ─────────────────────────────────────────────
# FIVE UNIVERSAL MECHANISMS
# ─────────────────────────────────────────────

mechanisms:
  rule_1_flow_capacity:
    praestology_anchor: "R3 (Motion) + R5 (Optimisation)"
    statement: "Process rate proportional to Φ = V/R"
    formula: "dτ = Φ·dt (proper time from flow capacity)"
    interpretation: >
      Local clocks run at rate determined by gradient/resistance ratio.
      High R → low Φ → slow processes (gravitational time dilation).
      Time is not dilated by gravity — the process accumulates more
      slowly where resolution flux is lower. This is time dilation
      as a process rate difference, not as spacetime geometry stretching.
    manifestation: "Time dilation in gravitational wells and for moving structures."
    confirming_note: >
      GPS satellite clock corrections — clocks run faster at altitude
      (lower R, higher Φ) than at surface. Measured to high precision;
      consistent with Φ-based time accumulation.
      Pound-Rebka experiment (1959) — gravitational redshift of photons
      confirms differential clock rates in gravitational fields.

  rule_2_inertia:
    praestology_anchor: "R4 (Progress) + R5 (Optimisation)"
    statement: "Inertial mass proportional to S × R; dynamic inertia from asymmetric wake-trail"
    formula: "m_eff = (α·S·R)/c²"
    interpretation: >
      Mass emerges from anomaly (what differs from environment) times
      resistance (how hard to change it). Mass is not intrinsic —
      it is a relational property of the substrate configuration.
      Machian consequence: inertia is the global integral of substrate
      impedance across all committed structure (see substrate-potential.yaml,
      backreaction_as_impedance). The equivalence principle follows
      as a theorem: inertial and gravitational mass are both couplings
      to the same substrate impedance field, necessarily equal.
    manifestation: "Resistance to acceleration."

    wake_trail_mechanism:
      statement: >
        The static formula m_eff = α·S·R gives rest mass. Dynamic inertia —
        why moving objects resist velocity changes — requires a separate but
        complementary mechanism: the asymmetric impedance-wake and Regress trail.
      mechanism: >
        A moving committed structure temporarily binds extra free potential
        ahead (R_forward → forward impedance-wake, higher local resistance).
        Behind it, the Regress/dissolution kernel leaves a low-commitment
        trail — a sink of depleted potential. The net kinetic momentum is
        the sustained flow imbalance carried by the phase-gradient term
        |∇φ|²|ψ|² in the viability measure 𝓥(ψ).
      three_states:
        at_rest: >
          Symmetric commitment density around the structure. No net
          wake ahead, no trail behind. 𝓥's flow term |∇φ|²|ψ|² = 0
          in all directions. Zero net inertial force — no energy cost
          to remain in this state.
        uniform_motion: >
          Persistent asymmetry — forward impedance-wake, rear dissolution
          trail. The flow term is non-zero but constant. The structure
          maintains this asymmetry without additional energy input.
          This is why Newton's first law holds: uniform motion in the
          substrate is a stable asymmetric state. The Regress dissolution
          of the rear trail is balanced by the forward binding, reaching
          a steady-state flow — no net force required.
        under_acceleration: >
          The wake-trail asymmetry must change — the wake must grow,
          shift direction, or reorganise. This requires actively
          redistributing commitment density around the structure, which
          costs substrate bandwidth proportional to the rate of change.
          This is the inertial force: the substrate's resistance to
          changing the wake-trail configuration.
      kinetic_energy_recovery: >
        The classical kinetic energy T = ½mv² is recovered as the
        flow term ∫|∇φ|²|ψ|² d³r integrated over the moving vortex
        solution — not imported from classical mechanics but derived
        from the viability measure 𝓥(ψ). The v² dependence follows
        from the quadratic dependence of the phase gradient on velocity.
        Open derivation: formal recovery of v² from the integral over
        a moving GP vortex solution — see foundational/F114.
      regress_trail_memory: >
        The dissolved rear wake — the Regress trail — encodes the
        structure's past trajectory as a gradually fading commitment
        pattern. This connects inertia directly to R4 (accumulated
        history) and Regress (the renewal mechanism). A structure's
        kinetic history persists in the substrate, fading at rate R_diss.
        The Machian picture (global commitment density of all matter
        providing the inertial reference frame) is the cosmological
        limit of this local wake-trail picture — the global integral
        of all past trails sets the substrate's inertial reference.
      alpha_coupling: >
        The wake-trail coupling strength is set by α — the closure-
        defect fraction that governs how efficiently the structure
        binds free potential into its forward wake. A universe with
        α = 0 would produce no impedance wake — matter would move
        through the substrate without inertial resistance. α > 0 is
        why inertia exists at all. This connects dynamic inertia to
        the same fundamental constant as electromagnetic coupling.
      relativistic_limit: >
        At v → c, the forward wake saturates (commitment density
        cannot exceed n_sat ahead of the structure) while the rear
        trail deepens. The asymmetry becomes extreme — infinite
        resistance to further acceleration. The Lorentz factor emerges
        from the saturation of the forward impedance-wake at n_sat.
        Formal derivation open — but the mechanism is identified.
      open_derivation: >
        Formal recovery of v² from ∫|∇φ|²|ψ|² d³r over a moving
        vortex solution in the GP field. This is the priority
        derivation for the inertia mechanism — see foundational/F114.

    confirming_note: >
      Higgs mechanism — mass generation via coupling to field that
      modulates local resistance. Praestology maps Higgs field onto
      p_env modulation (breathing mode); mass generation is δR
      enhancement from vortex-environment coupling.
      Equivalence principle confirmed to 10⁻¹⁵ precision (MICROSCOPE, 2022) —
      consistent with both mass types deriving from the same S×R origin.
      Inertial anisotropy prediction: slight asymmetry in inertial
      resistance direction parallel vs perpendicular to the cosmic
      large-scale structure orientation — testable with precision
      inertia experiments (foundational/F48).

  rule_3_stability_threshold:
    praestology_anchor: "R4 (Progress) + H (Hysteresis)"
    statement: >
      Structure persists when S > S_lock.
      Structure dissolves when S < S_unlock.
      Hysteresis: S_unlock < S_lock.
    interpretation: >
      Protects existing structures from noise. Once locked, harder
      to unlock than to initially form. This is R4 operating at
      particle level — accumulated resolution states resist change.
    manifestation: "Particle stability despite quantum fluctuations."
    confirming_note: >
      Particle decay rates — stable particles (proton, electron)
      have effectively infinite lifetime; unstable ones decay at
      rates consistent with S dropping below S_unlock threshold.
      Quantum Zeno effect — frequent observation stabilises unstable
      states by continuously resetting the lock condition.

  rule_4_saturation_limit:
    praestology_anchor: "R5 (Optimisation) + H5 saturation"
    statement: "Maximum velocity v_max = c·√(1 - (S/S_max)²)"
    saturation: "S_max = p_env/ℓ_Planck (Planck-scale gradient limit)"
    interpretation: >
      As anomaly approaches maximum gradient, available phase space
      for motion decreases. The substrate cannot propagate distinctions
      faster than its own resolution flux ceiling.
    manifestation: "Light speed limit (S≈0), Pauli exclusion (S→S_max)."
    confirming_note: >
      Special relativity — Lorentz factor emerges from the same
      saturation mathematics. Praestology derives the invariant
      speed from substrate dynamics rather than postulating it.
      Pauli exclusion as topological saturation — fermions cannot
      occupy the same state because S→S_max prevents it physically,
      not as a separate postulate.

  rule_5_refraction:
    praestology_anchor: "R3 (Motion) + R5 (Optimisation)"
    statement: "Trajectories follow Φ gradients"
    formula: "d²x/dt² = -c²·∇ln(Φ) = -c²·[∇ln(V) - ∇ln(R)]"
    components:
      attractive: "-c²·∇ln(R) — toward higher resistance (gravity)"
      repulsive:  "+c²·∇ln(V) — from potential gradient (anti-collapse)"
    interpretation: >
      Gravity is not a force. It is a geometric consequence of R
      gradients in the substrate — trajectories refract toward
      higher resistance regions because that is where resolution
      flux is lower and accumulated hysteresis is greater.
      Anti-collapse from V gradients prevents singularities —
      repulsion dominates at small scales where V gradient is steep.
    manifestation: "Geodesics, gravitational lensing, orbital dynamics."
    confirming_note: >
      General relativity — geodesic equation has identical mathematical
      form to rule_5_refraction. GR describes the geometry correctly;
      Praestology derives why the geometry has that form.
      GR and SR are correct for their angle — no different outcome
      is predicted for well-tested regimes. Problems like singularities
      arise from applying the geometric description past its valid domain
      (where GP saturation changes the physics). The framework supplements
      GR's ontology without contradicting its predictions.
      Gravitational lensing (Eddington 1919) — light bends around massive
      objects because R gradient refracts its trajectory.
      Shapiro delay — light slows near massive objects because local
