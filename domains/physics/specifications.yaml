# domains/physics/specifications.yaml
name: "Physics Domain"
version: "0.7 — All Four Forces Derived"
core_version: "1.5"
status: "Derivation in progress — all four forces, EM phenomena, topological validation"
description: >
  Physics is one instantiation of Praestology's logical ontology.
  All physical observables derive from R1-R5 operating on the
  momentum-density substrate. No physical primitive is assumed
  prior to the substrate derivation. Where possible, connections
  to confirming experiments and established models are noted —
  not as proof of the framework, but as evidence of convergence
  between independent lines of inquiry.
  Recursive note: The same R1-R5 rules that generate ethics,
  consciousness, and communication generate physics. Increasing
  depth reveals increasing complexity from the same five primitives —
  as in a Mandelbrot set, the generating equation is fixed;
  the structure emerges from iteration.

# ─────────────────────────────────────────────
# KERNEL
# ─────────────────────────────────────────────
kernel:
  name: "Praesto"
  definition: >
    The fundamental state of presence and resolution — the 'something'
    that exists as unresolved tension of potential. Derived from R1
    (existence is necessary) and R2 (existence requires distinction).
    Not a substance or medium assumed prior to physics — a logical
    necessity that manifests as a momentum-density field once
    dimensionality is derived.
  operating_layer: "Praestology-Core (R1-R5)"
  logic_type: >
    Recursive — same R1-R5 iterated at every scale.
    Complexity increases with depth, not with new rules.
    Mirrors Mandelbrot set: same generating equation,
    increasing structural detail at each zoom level.

# ─────────────────────────────────────────────
# SUBSTRATE DERIVATION
# Logical descent from R1-R5 to physical primitives.
# No physics vocabulary until substrate emerges as
# necessary consequence of the rules.
# ─────────────────────────────────────────────
substrate_derivation:
  description: >
    The clean derivation chain. Each step is forced by the
    previous — no additional assumptions imported.
  steps:
    - rule: "R1 — Existence"
      output: "Something exists. No further specification yet."
      confirming_note: "Leibniz's question 'Why is there something rather than
                        nothing?' — Praestology answers: because nothing is
                        self-defeating. Not an empirical claim; a logical one."

    - rule: "R2 — Structure"
      output: >
        That something has internal distinctions. Distinction requires
        at least two differentiable states — the minimum for a field.
        The substrate is not uniform; it has internal variation.
      confirming_note: "Consistent with field theories across all physics domains —
                        fields are the standard description of structured substrates."

    - rule: "R3 — Motion"
      output: >
        Distinctions generate tension. Tension drives toward resolution.
        The substrate is therefore dynamic — not a static field but a
        flowing, resolving medium. Action is necessary.
      confirming_note: "Least action principle — physical systems follow paths
                        that extremise action. Praestology derives why: R3 compels
                        resolution; R5 selects the most viable path."

    - rule: "R4 — Progress"
      output: >
        Resolutions accumulate irreversibly. The substrate has memory —
        prior resolutions bias future ones. This is hysteresis at the
        physical level; manifests as inertia and persistence of structure.
        Time is this accumulation measured from inside a resolution sequence —
        not a background coordinate but a derived process counter.
      confirming_note: "Second law of thermodynamics — entropy increases
                        irreversibly. Praestology derives this from R4 rather
                        than assuming it. Arrow of time is R4, not an axiom."

    - rule: "R5 — Optimisation"
      output: >
        Viable substrate configurations are amplified; non-viable ones
        suppressed. The substrate self-tunes toward the metastable zone.
        This produces the specific parameter set of our physical cosmos —
        not as arbitrary constants but as the viable solution space.
      confirming_note: "Anthropic principle reframed — not 'the universe is
                        fine-tuned for observers' but 'non-viable configurations
                        are suppressed by R5; we observe a viable configuration
                        because non-viable ones do not persist.'"

  dimensionality_derivation:
    claim: "3 spatial dimensions are derived, not assumed."
    argument: >
      R5 selects the minimum dimensional configuration supporting
      stable vortex topology without over-constraining resolution paths.
      2D: insufficient — stable closed knots impossible; all vortex
          structures eventually reconnect and annihilate.
      3D: metastable — closed vortex structures (knots, links, Hopf
          fibrations) possible; resolution paths bounded but not frozen.
      4+ spatial dimensions: too many simultaneous resolution paths —
          vortex topology becomes unstable; pushes toward chaos (R5 violation).
      3 is the unique metastable solution under R5.
    time_clarification: >
      Time is not a 4th spatial dimension. It is R4 — accumulated
      progress measured from inside a resolution sequence. The '+1'
      in '3+1' is categorically different from the 3: it is a process
      counter, not a structural axis. 'Spacetime' as a symmetric 4D
      manifold is a useful mathematical tool that conflates two distinct
      ontological categories — structural dimensions (R2) and accumulated
      process (R4). This conflation is the source of several pseudo-problems
      in physics (block universe, time travel, t=0 singularity).
    confirming_note: >
      Ehrenfest (1917) showed that stable planetary orbits and atoms
      require exactly 3 spatial dimensions — fewer or more produce
      unstable systems. Praestology derives this from topology rather
      than orbital mechanics, arriving at the same conclusion from
      a more fundamental level.

  primitive_field:
    quantity: "p(r,t) — momentum density field"
    derivation: >
      Momentum density is the first physical primitive to emerge.
      It is not assumed — it is the specific parameterization that
      satisfies R3 (tension drives flow) and R5 (viable configurations
      persist) in a 3-dimensional resolution space with irreversible
      accumulation (R4).
    gauge_principle: >
      p → p + p₀ leaves physics unchanged.
      Only gradients (∇p) and curvatures (∇²p) are observable.
      Absolute momentum density is not measurable — only differences.
    confirming_note: >
      Gauge invariance is foundational to all standard model physics.
      Praestology derives it from the substrate's distinction-based
      ontology (R2) — you can only observe differences, never absolutes.

# ─────────────────────────────────────────────
# COSMOS MEDIUM
# ─────────────────────────────────────────────
cosmos_medium:
  state: "Superfluid-like substrate of transition potential."
  energy_definition: "Differential resolution potential — ∇Φ across the substrate."
  confirming_models:
    - "Superfluid vacuum theory (SVT) — treats quantum vacuum as
       superfluid medium. Praestology provides the ontological
       grounding SVT lacks."
    - "Navier-Stokes fluid dynamics — turbulence index Ξ maps onto
       the complexity parameter in viscous flow equations."
    - "Bose-Einstein condensates — macroscopic quantum coherence
       demonstrates superfluid substrate behaviour at observable scales."

  derived_quantities:
    S_anomaly: "|p(r) - p_env(r)| — local deviation from environment"
    R_resistance: "p_env × κ × (1 + β·Ξ) — impedance to redistribution"
    Xi_complexity: "|∇×p|²/|p|² + (∇ρ)²/ρ² — turbulence index"
    V_potential: "|∇p| — gradient magnitude"
    Phi_capacity: "V/R = |∇p|/R — local resolution flux"

  viability_limits:
    stasis_limit: >
      Maximum potential tension — all distinctions present, none resolved.
      Triggers phasic resolution (the Twitch). R3: tension cannot
      persist without driving toward resolution.
    saturation_limit: >
      Zero remaining potential locally — all tension resolved.
      Event horizon condition: Φ → 0, R → ∞.
      Not a breakdown of physics — a region where resolution flux stalls.
      No singularity: R5 suppresses infinite density via topological
      minimum (Planck scale grain size). Structure dissolves into
      incoherent background before infinite density is reached.
    chaos_limit: >
      Zero coherent potential — distinctions present but uncorrelated.
      Dispersed, unreliable state. Noise boundary of metastable zone.
    confirming_note: >
      Black hole thermodynamics (Bekenstein, Hawking) treats event
      horizons as thermodynamic boundaries — consistent with saturation
      limit as Φ → 0 rather than as a singularity. Praestology predicts
      no singularity inside black holes; the event horizon is a
      saturation state, not a geometric breakdown.

  planck_scale:
    role: "Substrate grain size — mean free path, not lattice spacing."
    value: "ℓ_Planck ≈ 1.6×10⁻³⁵ m"
    nature: "Dynamic and emergent, not fixed coordinate grid."
    singularity_prevention: >
      Cannot compress below grain size without energy shattering
      into incoherent background. No infinite densities possible.
      Natural UV regularisation from topology, not discretisation.
    confirming_note: >
      Loop quantum gravity and spin foam models also predict
      a minimum length scale as emergent from quantum geometry.
      Praestology derives the same result from R5 topological
      stability rather than from quantised spacetime.

# ─────────────────────────────────────────────
# FIVE UNIVERSAL MECHANISMS
# ─────────────────────────────────────────────
mechanisms:
  rule_1_flow_capacity:
    praestology_anchor: "R3 (Motion) + R5 (Optimisation)"
    statement: "Process rate proportional to Φ = V/R"
    formula: "dτ = Φ·dt (proper time from flow capacity)"
    interpretation: >
      Local clocks run at rate determined by gradient/resistance ratio.
      High R → low Φ → slow processes (gravitational time dilation).
      Time is not dilated by gravity — it accumulates more slowly
      where resolution flux is lower.
    manifestation: "Time dilation in gravitational wells."
    confirming_note: >
      GPS satellite clock corrections — clocks run faster at altitude
      (lower R, higher Φ) than at surface. Measured to high precision;
      consistent with Φ-based time accumulation.
      Pound-Rebka experiment (1959) — gravitational redshift of photons
      confirms differential clock rates in gravitational fields.

  rule_2_inertia:
    praestology_anchor: "R4 (Progress) + R5 (Optimisation)"
    statement: "Inertial mass proportional to S × R"
    formula: "m_eff = (α·S·R)/c²"
    interpretation: >
      Mass emerges from anomaly (what differs from environment) times
      resistance (how hard to change it). Mass is not intrinsic —
      it is a relational property of the substrate configuration.
    manifestation: "Resistance to acceleration."
    confirming_note: >
      Higgs mechanism — mass generation via coupling to field that
      modulates local resistance. Praestology maps Higgs field onto
      p_env modulation (breathing mode); mass generation is δR
      enhancement from vortex-environment coupling.
      Equivalence principle: inertial = gravitational mass because
      both derive from same S×R origin.

  rule_3_stability_threshold:
    praestology_anchor: "R4 (Progress) + H (Hysteresis)"
    statement: >
      Structure persists when S > S_lock.
      Structure dissolves when S < S_unlock.
      Hysteresis: S_unlock < S_lock.
    interpretation: >
      Protects existing structures from noise. Once locked, harder
      to unlock than to initially form. This is R4 operating at
      particle level — accumulated resolution states resist change.
    manifestation: "Particle stability despite quantum fluctuations."
    confirming_note: >
      Particle decay rates — stable particles (proton, electron)
      have effectively infinite lifetime; unstable ones decay
      at rates consistent with S dropping below S_unlock threshold.
      Quantum Zeno effect — frequent observation stabilises
      unstable states by continuously resetting the lock condition.

  rule_4_saturation_limit:
    praestology_anchor: "R5 (Optimisation) + H5 saturation"
    statement: "Maximum velocity v_max = c·√(1 - (S/S_max)²)"
    saturation: "S_max = p_env/ℓ_Planck (Planck-scale gradient limit)"
    interpretation: >
      As anomaly approaches maximum gradient, available phase space
      for motion decreases. The substrate cannot propagate distinctions
      faster than its own resolution flux ceiling.
    manifestation: "Light speed limit (S≈0), Pauli exclusion (S→S_max)."
    confirming_note: >
      Special relativity — Lorentz factor emerges from the same
      saturation mathematics. Praestology derives the invariant
      speed from substrate dynamics rather than postulating it.
      Pauli exclusion as topological saturation — fermions cannot
      occupy the same state because S→S_max prevents it physically,
      not as a separate postulate.

  rule_5_refraction:
    praestology_anchor: "R3 (Motion) + R5 (Optimisation)"
    statement: "Trajectories follow Φ gradients"
    formula: "d²x/dt² = -c²·∇ln(Φ) = -c²·[∇ln(V) - ∇ln(R)]"
    components:
      attractive: "-c²·∇ln(R) — toward higher resistance (gravity)"
      repulsive:  "+c²·∇ln(V) — from potential gradient (anti-collapse)"
    interpretation: >
      Gravity is not a force. It is a geometric consequence of R
      gradients in the substrate — trajectories refract toward
      higher resistance regions because that is where resolution
      flux is lower and accumulated hysteresis is greater.
      Anti-collapse from V gradients prevents singularities —
      repulsion dominates at small scales where V gradient is steep.
    manifestation: "Geodesics, gravitational lensing, orbital dynamics."
    confirming_note: >
      General relativity — geodesic equation has identical mathematical
      form to rule_5_refraction. GR describes the geometry; Praestology
      derives why the geometry has that form.
      Gravitational lensing (Eddington 1919, confirmed) — light bends
      around massive objects because R gradient refracts its trajectory.
      Shapiro delay — light slows near massive objects because local
      Φ decreases (higher R); measured to high precision.

