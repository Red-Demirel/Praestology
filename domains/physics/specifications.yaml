description: >
  Standard cosmology rests on a cluster of mutually supporting assumptions:
  global expansion, hot Big Bang origin, cosmological constant Λ, dark energy,
  and exotic dark matter particles. These are not independent — each supports
  and requires the others. The cluster was built incrementally, each assumption
  introduced to explain an anomaly that appeared within the framework defined
  by prior assumptions. The result is a self-consistent but potentially
  self-referential edifice.

  This file examines the foundational assumption — that the universe is
  homogeneous at large scales and that observed redshift is predominantly
  recession velocity — and traces the consequences of relaxing it within
  the Praestology substrate picture.

  The core argument: we observe the universe from a specific location
  embedded in a specific large-scale structure environment (near the edge
  of a significant void, in the outskirts of a supercluster). Every
  cosmological measurement is refracted through the substrate density
  gradient between our location and what we observe. We do not correct
  for this because the homogeneity assumption says there is nothing
  systematic to correct for. That assumption is increasingly contradicted
  by the data it was meant to describe.

  When the homogeneity assumption is relaxed and three distinct redshift
  mechanisms are correctly separated — gravitational redshift, density-
  transition redshift, and any genuine recession velocity — the need for
  Λ, dark energy, and the specific hot Big Bang model all diminish
  substantially. The assumption cluster does not collapse simultaneously;
  it requires renegotiation. But the renegotiation is motivated by internal
  evidence, not by Praestology imposing a preferred picture.

  Epistemic note: the framework's confidence in this critique is high at
  the structural level — the homogeneity assumption is doing hidden work
  that the data increasingly contradicts. The specific quantitative claims
  (how much of the supernova dimming is density-transition redshift, what
  the exact Hubble tension decomposition is) require derivations that are
  currently open. The argument is stated with appropriate confidence at
  each level.

