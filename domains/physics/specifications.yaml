    Dark energy / Λ: dissolved as argued above. Replaced by
      substrate Tik background pressure, which is real but
      not Λ in the standard sense and does not require
      fine-tuning.
    Inflation: loses primary motivation (horizon problem
      dissolves if Big Bang doesn't require it). The CMB
      uniformity is the initial high-φ isotropy of the substrate.
    Exotic dark matter particles: replaced by dark matter
      composite (specifications.yaml). Substrate wake, magnetic
      tension, superfluid phonons, Machian inertia.

  the_unresolved_challenge: >
    Light element nucleosynthesis (BBN): the standard model
    makes precise predictions for H:He:Li ratios from the
    hot Big Bang. These are confirmed to good precision.
    Praestology does not currently have an alternative
    nucleosynthesis mechanism. This is the most significant
    unresolved challenge for the cosmological reframing.
    Options: (a) early high-φ substrate undergoes a phase
    of high commitment density (not a singularity but a
    dense early epoch) that reproduces nucleosynthesis
    conditions; (b) element abundances have a different
    explanation not yet identified. This is stated honestly
    as an open problem, not papered over.

  confidence_levels:
    hubble_tension_as_phi_differential:   "High — mechanism is clear, magnitude plausible"
    density_transition_redshift_exists:   "High — mechanism derived, magnitude open"
    dark_energy_as_misidentification:     "Medium-high — requires quantitative DT-redshift calculation"
    no_global_expansion:                  "Medium — structural argument strong, quantitative open"
    lambda_dissolution:                   "High for jobs 1 and 2; high for fine-tuning problem"
    bbn_alternative:                      "Low — unresolved, acknowledged honestly"
    cmb_reinterpretation:                 "Medium — structure correct, acoustic peak derivation open"

# ─────────────────────────────────────────────
# FALSIFICATION CONDITIONS
# ─────────────────────────────────────────────

falsification_conditions:
  confirms_praestology:
    - >
      Hubble tension correlates with large-scale structure environment:
      H₀ derived from void-located calibrators > H₀ from filament-
      located calibrators. Continuous trend, not just local vs CMB.
      Test: DESI/Rubin data stratified by LSS environment.
    - >
      Supernova residuals from Hubble diagram correlate with LOS
      filament-void boundary count. Systematic dimming excess for
      lines of sight through more boundaries.
      Test: Rubin LSST ~100,000 SN Ia with precise LSS context.
    - >
      Direction-dependent H₀ variation correlating with large-scale
      structure anisotropy. Already hinted at in existing data.
      Test: full-sky supernova sample with LSS overlay.
    - >
      Density-transition redshift magnitude from boundary steepness:
      sharper filament-void boundaries show excess redshift per unit
      density contrast vs gradual boundaries.
      Test: precision redshift survey of boundary-classified galaxies.

  falsifies_praestology:
    - >
      Hubble tension shows no correlation with LSS environment after
      accounting for known systematics. H₀ is the same in voids
      and filaments to precision better than the tension magnitude.
    - >
      Supernova residuals show no correlation with LOS boundary
      count after accounting for dust, host galaxy environment,
      and other known systematics.
    - >
      Gravitational wave sirens (LIGO/Virgo standard sirens) measure
      H₀ independently of electromagnetic distance ladder and CMB,
      converging on a single value inconsistent with a void-location
      bias explanation of the tension.

# ─────────────────────────────────────────────
# OPEN DERIVATIONS
# ─────────────────────────────────────────────

open_derivations:
  priority_1:
    - >
      Density-transition redshift magnitude as a function of
      filament-void boundary contrast and steepness. Compute from
      the GP substrate parameters and the commitment density
      contrast between cosmic filaments and voids. The key
      quantitative question: is the cumulative density-transition
      redshift over a z ≈ 0.5 path large enough to explain the
      supernova brightness deficit without dark energy?
      If yes: dark energy is dissolved quantitatively.
      If no: some combination of regional dynamics and density-
      transition redshift explains part of the signal; a residual
      may require alternative explanation.
    - >
      Hubble tension magnitude from KBC void η contrast.
      Compute the process-rate differential Φ_void/Φ_cosmic_mean
      from the estimated density contrast of the KBC void (~20-30%
      underdensity over ~300 Mpc). Verify it produces ~9% H₀
      discrepancy. This would quantitatively explain the Hubble
      tension from a known substrate structure.

  priority_2:
    - >
      CMB acoustic peak positions from early-substrate Tik
      fluctuation spectrum. The standard model produces peak
      positions from acoustic oscillations in the photon-baryon
      plasma. The substrate picture requires deriving the same
      peak positions from the first commitment topology events
      in a high-φ, cooling substrate. This is the most
      demanding cosmological test.
    - >
      Alternative nucleosynthesis pathway in high-φ early
      substrate. Whether an early high-commitment-density epoch
      (not infinite density — GP saturation prevents it, but
      high by current standards) can reproduce the observed
      H:He:Li ratios. This requires specifying the early
      substrate state in sufficient detail to compute
      nuclear reaction rates.

  priority_3:
    - >
      Large-scale structure self-organization from substrate
      dynamics alone. The cosmic web emerges from void expansion
      (high η, outward pressure) and filament formation (low η,
      gravitational infall). Reproduce the observed web statistics
      — filament length distribution, void size function, cluster
      mass function — from substrate dynamics without exotic
      dark matter particles.

