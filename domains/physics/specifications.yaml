lambda_dissolution:
  three_jobs_of_lambda: >
    Λ has been given three different jobs over its history:
    (1) Einstein (1917): balance gravity for a static universe.
        Abandoned when expansion was observed.
    (2) Post-1998: explain the accelerating expansion from
        supernova dimming. This is its current primary job.
    (3) As vacuum energy: QFT predicts the vacuum has enormous
        zero-point energy. Λ was identified with this. But
        the QFT prediction is ~10¹²⁰ times too large, requiring
        extraordinary fine-tuning. The cosmological constant
        problem.

  job_1_dissolved: >
    No static universe to maintain. The universe has structure
    and regional dynamics — not a static, homogeneous entity
    requiring balance. Job 1 is moot.

  job_2_dissolved: >
    The accelerating expansion is an artifact of density-
    transition redshift misattributed to recession velocity,
    within a homogeneity assumption that prevents correction.
    If the supernova dimming is substantially explained by
    cumulative density-transition redshift, Λ is not needed
    to produce acceleration. Job 2 dissolves with the
    expansion assumption.

  job_3_reidentified: >
    The QFT vacuum energy is real — the substrate ground-state
    Tik background is the physical mechanism behind it. But
    its magnitude is set by ξ (the Planck-scale grain size)
    as the natural UV cutoff, not by naive QFT integration
    to infinite momentum. The substrate Tik pressure at
    η = 1 is the correct vacuum energy — small, finite,
    without fine-tuning, because ξ provides the natural cutoff.
    This is not Λ in the standard sense — it is the substrate
    ground-state pressure, producing the void-outward dynamics
    that organize the cosmic web. It is real and physically
    motivated. Its magnitude does not require fine-tuning to
    120 decimal places. The cosmological constant problem
    dissolves: there is no fine-tuning because there is no
    Λ as a fundamental parameter. The substrate Tik pressure
    is what it is, set by ξ.

  the_fine_tuning_problem_dissolved: >
    The cosmological constant problem (why is Λ 10¹²⁰ times
    smaller than QFT predicts?) was generated by:
    (1) Identifying Λ (dark energy) with the QFT vacuum energy.
    (2) Computing the QFT vacuum energy without a UV cutoff.
    (3) Finding the result 10¹²⁰ times too large.
    (4) Concluding that extraordinary fine-tuning is required.
    The substrate picture dissolves each step:
    (1) Λ as measured is a misidentification of density-transition
        redshift as an energy component. The true vacuum energy
        is the Tik background pressure — much smaller.
    (2) The UV cutoff is ξ — the substrate grain size. The integral
        is finite. No infinite divergence to cancel.
    (3) The substrate Tik pressure at η = 1 with UV cutoff ξ is
        naturally small — consistent with what was measured as Λ
        before it was interpreted as an energy density.
    (4) No fine-tuning required because there is no mismatch between
        two large numbers that must cancel.
    The problem was created by the standard framework's ontology —
    treating the vacuum as empty and then being surprised by its
    energy. Remove the empty-vacuum assumption and the problem
    does not arise.

