      Mismatch produces friction — partial dissipation of trail energy.
    key_prediction: >
      Redshift magnitude correlates with ΔR gradient steepness, not just
      ΔR magnitude. A sharp boundary produces more dissipation than a
      gradual one of equal total density difference. Distinguishable from
      all current redshift models, which are functions of total density
      or distance only.
