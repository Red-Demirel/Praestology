# ─────────────────────────────────────────────
# ALPHA DEFINITION
# What α IS at the ontological level
# ─────────────────────────────────────────────

alpha_definition:
  statement: >
    α is the residual closure-defect fraction per stable coupling opportunity
    or characteristic winding/closure cycle. It quantifies the degree to
    which a topology's intrinsic self-coupling manifold is not perfectly
    commensurate with the ambient 3D isotropic interaction space.
  formal_limit: >
    In the idealised limit of perfect commensurability between intrinsic
    closure logic and ambient coupling space, the residual mismatch tends
    toward zero. A universe with α = 0 would have no electromagnetic coupling,
    no spontaneous emission, no arrow of time from Λ — no structure.
    α > 0 is not a coincidence; it is the signature of a topology embedded
    in a space of higher dimensionality than its intrinsic closure requires.
  preferred_language:
    - "residual closure-defect fraction"
    - "dimensionless mismatch parameter"
    - "embedding imperfection scale"
    - "coupling mismatch fraction"
  what_not_to_say:
    - "'probability amplitude squared' — α is not a raw probability"
    - "'arbitrary coupling constant' — it is geometrically determined"
    - "'renormalization input' — the running of α is a consequence, not a definition"

# ─────────────────────────────────────────────
# INTERPRETIVE FRAMEWORK
# The geometric mechanism producing α
# ─────────────────────────────────────────────

interpretive_framework:
  substrate_axiom: >
    Dimensionality is treated as emergent resolution multiplicity under
    R5 optimisation rather than as a primitive backdrop. The 3D interaction
    environment is the R5-selected minimal geometry supporting stable
    vortex topology (see core/specifications.yaml, emergence_hierarchy).
  topological_basis: >
    Stable matter-like excitations are self-consistent topological closures
    (chiral Möbius-like 720° windings, dipolar pairings, triality
    stabilizations) whose local coupling logic is effectively lower-
    dimensional than the full ambient interaction space. A Möbius band
    lives in 3D but its intrinsic topology is quasi-2D — the self-
    intersection (crossover) is a 0D point where the two faces connect.
  mechanism: >
    To remain stable in a 3D isotropic environment, such topologies
    require a persistent closure accommodation — writhe, phase offset,
    or equivalent geometric relaxation. α is the dimensionless remnant
    of this accommodation cost when normalised to the available coupling
    or saturation opportunity.
  geometric_embedding:
    statement: >
      The relevant mismatch is between a topology's effective lower-
      dimensional self-coupling manifold (quasi-2D winding support) and
      the full 3D isotropic interaction environment in which that topology
      must persist and interact.
    implication: >
      α measures the cost of maintaining stable closure when intrinsic
      coupling logic is only approximately commensurate with the ambient
      interaction space. This is not a failure — it is the mechanism by
      which the topology couples to its environment at all. Without the
      mismatch, there is no coupling channel; with too much mismatch,
      the topology is unstable. α is the R5-selected equilibrium mismatch.

# ─────────────────────────────────────────────
# NUMERICAL CANDIDATE
# The pi-series bare geometric ansatz
# ─────────────────────────────────────────────

numerical_candidate:
  status: "Bare geometric ansatz — candidate, not final derivation"
  formula: "α⁻¹_bare = 4π³ + π² + π = π(4π² + π + 1)"
  value_calculated: 137.036303776
  codata_2018: 137.035999084
  delta: 0.000305
  relative_deviation: "2.22 × 10⁻⁶ (2.2 ppm)"

  geometric_interpretation:
    statement: >
      The formula encodes three distinct geometric costs at three
      dimensional levels for a stable 720° Möbius vortex embedded in the
      S³ quaternion orientation phase space of the Praegress reservoir.
      This is derivable from the Hopf fibration S¹ → S³ → S² — each
      term corresponds to one level of the Hopf structure.
      See quaternion-field-formulation.yaml for the full derivation.
    components:
      term_4pi3:
        expression: "4π³ = 2π × 2π²"
        role: "Bulk 3D cost — U(1) phase loop × S³ volume"
        geometric_mapping: >
          S³ volume = 2π². The Möbius vortex carries a U(1) phase loop
          of periodicity 2π. Bulk embedding cost = 2π × 2π² = 4π³.
          Hopf fibration: total space S³ × fibre U(1) length.
          The dominant term — the cost of embedding the phase loop
          in the full quaternion orientation phase space.
      term_pi2:
        expression: "π²"
        role: "Boundary 2D cost — Clifford torus area in S³"
        geometric_mapping: >
          The Clifford torus is the flat torus embedded in S³ — product
          of two perpendicular great circles, total area π². It is the
          natural boundary surface of the quasi-2D winding support
          within S³, and the boundary between the two solid tori in the
          Hopf decomposition. The interfacial cost of the quasi-2D
          winding in the quaternion phase space = Clifford torus area = π².
      term_pi:
        expression: "π"
        role: "Path 1D residue — first-pass 360° before crossover"
        geometric_mapping: >
          The first 360° pass of the Möbius band sends Q → −Q (quaternion
          sign change). This half-closure accumulates one factor of π
          in phase before the crossover. The second pass restores Q → Q.
          Hopf fibration: S¹ half-period = π.
    hopf_summary: >
      α⁻¹ = (S³ total space cost) + (Clifford torus boundary) + (S¹ residue)
           = 4π³ + π² + π
      Three topological costs, three dimensional levels, one Hopf fibration.

  factored_reading: >
    α⁻¹ = π × (4π² + π + 1)
    Outer π: projection factor — the Möbius crossover couples to the
      substrate through one rotation's worth of projection geometry.
    4π²: full external dipole phase space — two complete spherical solid
      angles matching the 720° double-rotation topology.
    π: internal loop contribution — one 360° pass before the crossover.
    1: the crossover self-intersection point — one minimum topological
      coupling quantum independent of loop geometry.

  discrepancy_interpretation:
    status: "Mechanism identified — measurement substrate effect; source magnitude open"

    core_claim: >
      The 2.22 ppm discrepancy is NOT a correction to the bare formula.
      It is a measurement artifact — the same apparatus η-depression
      effect identified throughout the framework. The bare formula gives
      the topological α as it exists in the free-potential vacuum substrate
      (η = 1). The measured value is what you obtain when probing that
      topology with apparatus made of committed topology, operating in a
      committed environment where η_local < η_vacuum.

    mechanism:
      statement: >
        Commitment-resistance IS inertia (see specifications.yaml,
        rule_2_inertia, wake_trail_mechanism). The measurement apparatus
        — the electron being probed, the photon carrying the probe, the
        electromagnetic field mediating the interaction — all exist in a
        substrate partially depleted of free potential by the surrounding
        committed matter. The local η is reduced by the commitment density
        of the measurement environment.
      mathematical_form: >
        α_measured = α_bare × (η_local / η_vacuum)

        η_local/η_vacuum = α_measured/α_bare
                         = 137.035999 / 137.036304
                         = 1 − 2.223 × 10⁻⁶

        The measurement environment has a commitment fraction of 2.22 ppm
        relative to the free vacuum. This shifts the apparent coupling
        from its bare topological value downward by 2.22 ppm.
      planck_connection: >
        Planck's constant enters as follows: ħ is the minimum commitment
        action per resolution cycle — the smallest R4 event. In a
        committed environment with η_local < 1, the effective substrate
        resistance R_eff = R₀/η_local is slightly elevated. The inertia
        m_eff = α·S·R_eff/c² is therefore slightly enhanced relative to
        the vacuum value. The measurement uses this enhanced inertia to
        calibrate everything, including ħ itself. Since ħ_eff/ħ_vacuum
        = η_vacuum/η_local (the commitment-resistance enhancement), the
        measured ħ absorbs the commitment fraction, and the apparent α
        is reduced by the same factor. The relationship is:
          α_measured × ħ_measured = α_bare × ħ_vacuum
        The product α·ħ is invariant — the coupling constant and the
        action quantum vary inversely with local commitment level, but
        their product (which governs physical cross-sections) remains
        fixed. Measurements of α and ħ are always performed in the same
        committed environment, so the product is consistent but both
        individual values are shifted from their vacuum levels.
      why_not_just_qed: >
        Standard QED vacuum polarization running of α gives ~0.1%
        correction from q=0 to q=m_e·c². The 2.22 ppm is 50× smaller
        and distinct in character — it is not a loop correction within
        the theory but a substrate-level effect from the commitment
        density of the measurement environment itself.
      why_not_gravitational: >
        Earth's surface gravitational potential φ/c² ≈ 6.95 × 10⁻¹⁰
        produces a commitment fraction far smaller (3200× less) than
        the 2.22 ppm required. Solar system potential is ~9.85 × 10⁻⁹,
        still 226× too small. The dominant commitment source at the
        2.22 ppm level is not classical gravity.

    candidate_source: >
      The most physically motivated source: the zero-point electromagnetic
      field — the Tik background at η ≈ 1 permeating the laboratory
      environment. At atomic scales, the vacuum is not purely free
      potential — it carries the zero-point field activity of the
      electromagnetic ground state. In the substrate picture this is
      a non-zero background commitment density from photon-like Tik
      events that are below S_lock but collectively contribute a small
      η-depression relative to the ideal η = 1 vacuum.
      This is the same Tik background that produces the Lamb shift —
      the connection between the Lamb shift and the α discrepancy is
      therefore not coincidental: both are the same zero-point substrate
      activity seen through different observables. The Lamb shift is
      the energy correction; the α discrepancy is the coupling correction.
      Both are 2-5 ppm level effects from the same source.

    derivation_target: >
      Compute the zero-point Tik background commitment density at η ≈ 1
      from the GP fluctuation spectrum. This is a calculation of the
      background commitment fraction from the substrate's own ground-state
      fluctuations — the same calculation needed for the Lamb shift but
      applied to the local η rather than to the energy eigenvalue.
      Target: background commitment fraction C_Tik = 2.22 × 10⁻⁶.
      If the GP zero-point fluctuation integral gives this value, the
      entire 2.22 ppm discrepancy is explained and the bare formula
      4π³+π²+π is confirmed as exact. See alpha-rydberg-z0.yaml,
      measurement_substrate_effect, for the alkali series test.

    falsification: >
      The α × ħ invariance prediction is testable in principle:
      measure α and ħ independently in environments with different
      known commitment densities (different gravitational potentials,
      different matter densities). If α × ħ remains constant while
      both individually shift in proportion to the local η, the
      commitment-resistance mechanism is confirmed.
      The alkali series test from alpha-rydberg-z0.yaml (non-monotonic
      α_exp vs Z for Li → Fr atom interferometry) is the most
      immediately feasible experimental discriminator.



