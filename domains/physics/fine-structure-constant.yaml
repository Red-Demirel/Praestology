relation_to_process_drag:
  status: "Structural bridge hypothesis"
  statement: >
    The same residual closure defect that governs microscopic coupling
    mismatch is hypothesised to act as a microscopic source of process drag.
    As committed topologies accumulate, local resolution efficiency is
    reduced — each additional committed structure adds its closure-defect
    overhead to the local substrate update cost.
  inertia_connection: >
    The wake-trail mechanism of inertia (see specifications.yaml,
    rule_2_inertia, wake_trail_mechanism) inherits α as its coupling
    scale: the forward impedance-wake and rear dissolution trail are
    both mediated by the substrate's response to moving committed
    topology, and the coupling strength of that response is set by the
    closure-defect fraction α. A universe with α = 0 would have no
    impedance wake — matter would move through the substrate without
    resistance. α > 0 is why inertia exists.
  gravitational_connection: >
    In high-commitment regions, the compounded closure-defect overhead
    of many committed topologies suppresses the local resolution rate
    Φ = V/R — producing effective time dilation and gravitational
    redshift. The per-topology contribution is of order α; the
    macroscopic GR metric emerges from the integral over all committed
    structure in the region.
  caution: >
    This remains a structural unification hypothesis. A full quantitative
    bridge from microscopic α-scaling to macroscopic metric-like behaviour
    requires deriving the Green's function of the closure-defect field.

