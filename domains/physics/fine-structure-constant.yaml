    In the linearised η-field regime, transition probabilities retain
    amplitude-squared behaviour. Within this framework, α sets the
    characteristic scale for electromagnetically mediated transitions
    involving stable chiral/dipolar coupling channels, rather than
    serving as a universal raw probability.
  refined_claim: >
    The transition weight associated with a characteristic coupling cycle
    is of order α when the process is controlled by the residual
    closure-defect channel. This is why fine-structure splittings,
    spontaneous emission rates, and cross-sections scale as α or α²
    — they are probing the closure-defect coupling channel.
  formula_candidates:
    - "P_transition ~ O(α) for single closure-defect channel"
    - "α ≈ sin(θ_crit)/(4π) — normalized closure-defect ratio"
    - "α ≈ (n_chiral/n_dipole)² normalized — chirality/dipole phase space ratio"
  caution: >
    These are interpretive scaling statements, not complete derivations
    of the Born rule or all transition amplitudes. They are consistent
    placeholders for a future formal stability derivation.

