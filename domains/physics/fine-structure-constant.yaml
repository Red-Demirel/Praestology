# PRAEGRESS AS RESOLUTION MULTIPLICITY
# ─────────────────────────────────────────────

praegress_as_resolution_multiplicity:
  statement: >
    Praegress is the effective multiplicity of unresolved resolution
    pathways in the η-field — the weighted volume of still-open viable
    branches. It is the substrate's capacity for new commitment.
  relation_to_dimensionality: >
    Observed 3-dimensionality is the minimal effective multiplicity
    supporting stable defect persistence under R5 optimisation.
    2D multiplicity is insufficient for stable closed vortex topology;
    4D multiplicity over-determines the resolution pathways and produces
    chaotic instability. 3D is the R5 selection.
  relation_to_alpha: >
    α then measures the residual closure cost within that selected
    interaction environment — the irreducible mismatch between a
    topology's intrinsic closure logic and the ambient 3D multiplicity
    in which it must remain stable. The Praegress multiplicity is 4π
    steradians (full isotropic solid angle); the topology's intrinsic
    closure covers slightly less; α is the fractional gap.
  implication: >
    This connects α directly to the emergence hierarchy: the same R5
    selection that produces 3D space also determines what α must be.
    A different dimensionality selection would yield a different α.
    The observed α = 1/137 is therefore not coincidental — it is the
    closure-defect cost of a 720° Möbius topology embedded in the
    specific 3D interaction environment that R5 selects.

