description: >
  Parton distribution functions (PDFs) — the momentum distributions of
  quarks, antiquarks, and gluons inside the proton — have been measured
  to high precision over decades of deep inelastic scattering (DIS) and
  Drell-Yan experiments. Several features have resisted clean theoretical
  explanation within the standard model and required non-perturbative
  corrections that are essentially fitted rather than derived.

  This file shows that all four major PDF features — the valence 2:1
  momentum asymmetry, the d̄ > ū sea asymmetry, the gluon low-x
  dominance with crossover scale, and the intrinsic heavy flavour
  high-x peak — follow directly from the sphere geometry of triality
  closure on S². No new parameters are introduced. The explanatory
  frame is the sphere-geometry picture established in
  quark-sphere-mapping.yaml: the proton is a uud triality junction
  whose commitment density projects isotropically onto S², and all
  internal flow patterns are substrate responses to the geometric
  asymmetries of that junction.

  The d̄ > ū asymmetry is the key diagnostic: in the standard model
  it is anomalous (naive SU(3) flavour symmetry predicts ū = d̄);
  in the sphere-geometry picture it is *predicted* from the winding
  geometry before looking at the data. This causal inversion — from
  anomaly requiring explanation to prediction confirmed by data — is
  the main epistemic contribution of this file.

  Historical note: several of the patterns described here have kept
  physicists puzzling for decades. The NuSea d̄ > ū result (1998)
  contradicted the naive expectation and initiated twenty-five years
  of model-building. The intrinsic charm component remained
  controversial until NNPDF (Nature 2022) confirmed it. The sphere
  geometry picture offers a unified explanatory frame for all of them
  from one source — the geometric asymmetry of the uud triality
  junction on S².

  All momentum fraction values at Q² ≈ 10 GeV² from global PDF fits
  (NNPDF4.0, CT18, MMHT) unless stated.

