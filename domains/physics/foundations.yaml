# ARROW OF TIME
# ─────────────────────────────────────────────
arrow_of_time:
  statement: >
    The arrow of time is derivable at three levels from
    the potential field description. Each level is more
    fundamental than the previous. Together they give a
    complete account of temporal directionality without
    appealing to initial conditions or statistical arguments.
  three_levels:
    level_1_thermodynamic:
      description: "Entropy increases — statistical"
      status: "Incomplete — requires low-entropy initial condition"
      praestology_grounding: >
        The statistical argument is correct but not fundamental.
        It is grounded in level 2: entropy increases because
        free potential flows into commitment, and there are
        more high-commitment configurations than low ones.
        The low-entropy initial condition (Big Bang) is the
        high-φ cosmogenesis state from cosmos/specifications.yaml —
        the substrate began with maximum free potential,
        and the arrow of time is the process of that
        potential flowing into commitment structure.

    level_2_potential_field:
      description: "Free potential flows into commitment — irreversible"
      status: "Fundamental — derived from R1+R4"
      derivation: >
        R1 (Existence): the substrate exists — potential is real.
        R4 (Progress): resolution accumulates irreversibly —
        commitment is permanent at the field level.
        Once potential resolves into commitment, the commitment
        structure is in the field. Un-committing requires
        a specific resolution event consuming more free
        potential. The net direction is always: free potential
        decreasing, commitment increasing.
        This is why time has a direction: it is the direction
        in which φ decreases and commitment accumulates.
        A time-reversed universe would have commitment
        spontaneously converting to free potential — which
        would require a systematic source of anti-resolution,
        contradicting R4. Time reversal is impossible not
        statistically but ontologically.
      connection_to_decoherence: >
        'Now' is the decoherence front. The arrow of time
        is the direction of propagation of this front —
        always from potential toward commitment, never
        the reverse. The present moment is always the
        leading edge of commitment accumulation. The past
        is fixed commitment structure; the future is
        unresolved potential. The asymmetry is absolute.

    level_3_closure_imperfection:
      description: "GP field accumulates phase correction irreversibly"
      status: "Microscopic arrow — connects α to time"
      derivation: >
        The GP field around every vortex accumulates a
        small phase correction per cycle — the closure
        imperfection from finite substrate R (commitment-
        response-function.yaml). Each correction is a
        tiny R4 accumulation in the GP field. Irreversible:
        the correction cannot spontaneously un-accumulate.
        The microscopic arrow of time runs at a rate
        proportional to α — the closure imperfection
        rate per quantum cycle. α ≈ 1/137 means that
        for every 137 complete phase rotations, one
        unit of irreversible GP field correction accumulates.
        A universe with smaller α would have a weaker
        microscopic arrow of time — slower irreversibility
        accumulation, longer-lived structures, slower
        evolution toward equilibrium.
      unification: >
        The fine structure constant α is the rate of the
        arrow of time at the quantum scale.
        The existence of structure and the arrow of time
        are the same condition: both require finite α
        (finite closure imperfection, finite R).
        A zero-α universe (perfect GP superfluid) would
        have no electromagnetic coupling, no spontaneous
        emission, no irreversibility, no arrow of time,
        and no structure formation. The universe exists
        because α ≠ 0. The arrow of time exists because
        α ≠ 0. These are the same statement.

# ─────────────────────────────────────────────
# QUANTUM GRAVITY DISSOLVED
# ─────────────────────────────────────────────
quantum_gravity:
  statement: >
    The quantum gravity problem dissolves under the
    potential field description. It was generated by
    having two incompatible descriptions of what is
    actually one thing — and attempting to unify them
    by quantising one in terms of the other.
  how_the_problem_was_generated: >
    GR: spacetime is a smooth 4D pseudo-Riemannian
    manifold that curves in response to mass-energy.
    The manifold is the arena; matter and geometry couple.
    QM: fields propagate on a fixed background manifold;
    states are superpositions; outcomes are probabilistic.
    Incompatibility: you cannot consistently quantise
    the manifold itself — the arena cannot be both
    the stage and a quantum field on the stage.
    Decades of attempts (string theory: extra dimensions;
    LQG: spin foam networks; CDT: discrete triangulation)
    all try to quantise the geometric arena.
    None have succeeded in producing a testable,
    background-independent, UV-complete theory.
  dissolution: >
    Praestology never has a geometric manifold.
    The substrate is a potential field φ(r,t).
    The potential field is already quantum — it obeys
    the GP equation with Tik fluctuation background.
    Gravity is the gradient structure of the potential
    field at scales where Tik fluctuations are negligible.
    Quantum mechanics is the potential field dynamics
    at scales where Tik fluctuations are non-negligible.
    Both are descriptions of the same field at different
    commitment density regimes. The transition between
    regimes is continuous — handled by the saturating
    GP nonlinearity without a seam.
    There is no arena to quantise because there is no
    arena — only the potential field and the structures
    that emerge from it. The problem was generated by
    a false ontological premise (spacetime as container).
    Remove the premise; the problem does not arise.
  what_replaces_quantum_gravity: >
    The GP equation with saturating nonlinearity:
    iħ ∂θ/∂t = [-ħ²/(2m_eff)·∇² + V_ext
                 + g·|θ|²/(1 + |θ|²/n_sat) - μ_local] θ
    This single equation describes:
    At low |θ| (quantum regime, high Tik sensitivity):
      → Schrödinger equation in linear limit
      → Quantum interference, tunnelling, entanglement
    At moderate |θ| (gravitational regime):
      → Newton's law in linear GP limit
      → MOND transition at GP nonlinearity onset
    At high |θ| (strong gravity, near saturation):
      → GR corrections, frame dragging, event horizons
      → Hawking radiation as GP pressure leakage
    At all |θ|:
      → Potential field with Tik background
      → Arrow of time from commitment accumulation
      → Continuous decoherence as 'now'
    One equation; all regimes; no seam; no separate
    quantisation of gravity required.
  planck_scale_behaviour: >
    The Planck scale is where ξ(r) → ξ_min — the
    minimum healing length at maximum commitment density.
    This is not a singularity or a new physics threshold —
    it is the GP field at its maximum density, where
    the saturating nonlinearity's dV/d(|ψ|²) → 0.
    The field does not break down at the Planck scale;
    it saturates. The UV completion is provided by the
    saturating nonlinearity — n_sat at Planck density
    sets the maximum commitment, and the potential
    gradient approaches zero there. No new physics;
    same GP equation at extreme parameters.
  testable_predictions:
    decoherence_rate_measurement: >
      Precision atomic clock comparisons between
      different potential environments (Earth surface,
      satellite orbit, deep space) should show decoherence
      rate differences proportional to φ difference.
      Already confirmed at GPS precision — but sub-ppm
      precision across larger φ differences (Moon,
      Lagrange points) would test the potential field
      description beyond GR correspondence.
    alpha_variation: >
      α_local varies with local φ — sub-ppm variation
      between different gravitational environments.
      Next-generation atomic clock experiments in space
      (STE-QUEST, FOCOS) could detect this. A confirmed
      α variation with gravitational potential would be
      a direct confirmation of the potential field
      description over the standard model's fixed-α assumption.
    mond_environment_dependence: >
      MOND threshold a₀ varies with local μ_local —
      measurably different in cluster vs void vs isolated
      galaxy environments. McGaugh radial acceleration
      relation scatter at cluster scales is already
      consistent with this. Systematic study of a₀
      variation with environment would confirm
      environment-dependent GP nonlinearity.
    hawking_crossover: >
      T_H deviation from 1/M at very small black hole mass —
      where interior GP pressure comparable to exterior
      Tik amplitude. Testable with primordial black hole
      observations (if PBHs exist at required mass scale).
    inertial_anisotropy: >
      Slight inertial anisotropy in the direction of
      nearby massive objects — Jupiter, galactic centre.
      Currently below experimental sensitivity but
      predicted at the level of (M_Jupiter/M_universe) × G.
      Future precision inertia experiments could detect.


# ─────────────────────────────────────────────
# BACKREACTION AS IMPEDANCE
# The substrate's resistance to potential change
# is one quantity measured in multiple ways.
# ─────────────────────────────────────────────
backreaction_as_impedance:
  statement: >
    The Praesto backreaction — the substrate's resistance
    to changes in its committed potential distribution —
    is a single physical property measured in different
    ways depending on the interaction mode and scale.
    It appears as inertia when measured via force and
    acceleration, as Z₀ when measured via electromagnetic
    field propagation, as R when measured via wave
    equation damping, and as Shapiro delay when measured
    via signal travel time. These are not different
    mechanisms — they are different measurement modes
    of the same substrate impedance to potential change.
  core_identity: >
    Impedance = resistance to changing the local φ
    distribution. Every physical effect that involves
    the substrate resisting a change to its commitment
    pattern is an impedance measurement. The framework
    provides a unified description; the existing
    mathematical formulas were always describing this
    one quantity from different angles.

  the_measurement_triangle:
    description: >
      Z₀, R₀, and α form a closed measurement triangle —
      fix any two, the third is determined:
      Z₀ = 4π · R₀ / α
    Z0: >
      Global impedance floor of the potential field to
      EM propagation. Z₀ = μ₀c ≈ 376.73 Ω.
      The vacuum's resistance to dipole vortex pair
      (photon) propagation — the substrate's minimum
      impedance in the near-zero commitment limit.
      Has been in Maxwell's equations since 1865.
      Physical meaning: the substrate's backreaction
      to the phase-flip rate of a propagating photon.
      Why this value: set by R₀ and α — the baseline
      substrate resistance and the GP field coupling
      imperfection. Not a mysterious given; a derived
      consequence of substrate topology.
    R0: >
      Baseline local impedance from healing length ξ
      and environmental momentum density p_env in the
      near-vacuum limit. R₀ = Z₀·α/(4π).
      The substrate's intrinsic resistance per unit
      volume at cosmic average commitment density —
      the impedance floor before any local structure
      raises it further.
    alpha: >
      GP field coupling imperfection per rotation ≈ 1/137.
      The fractional impedance mismatch between one
      complete Möbius rotation and a perfect dipole
      closure — ≈ 2.627° per cycle.
      Appears in the triangle as the ratio that converts
      between the local baseline impedance R₀ and the
      global propagation impedance Z₀. The factor 4π
      is the spherical geometry of isotropic substrate
      coupling — the substrate backreacts in all
      directions simultaneously.

  global_inertial_impedance:
    statement: >
      Inertia is the global integral of the substrate
      impedance across all committed structure — the
      Machian sum of all matter's contribution to the
      local backreaction against potential change.
    formula: >
      Z_inertia(r) = ∫ Z₀ · ρ_committed(r') / |r - r'| d³r'
      where ρ_committed is the committed topology density
      (mass distribution across the universe).
      Inertial mass: m_inertia ∝ Z_inertia(r) · V_footprint
      where V_footprint is the commitment footprint volume
      of the structure being accelerated.
    uniform_universe: >
      In a homogeneous universe, Z_inertia is constant
      and isotropic everywhere — matching observed
      isotropic inertia. The Machian integral converges
      because ρ_committed falls off with distance and
      the geometry provides the necessary convergence
      factor. The absolute value of inertia is set by
      the total committed topology in the observable
      universe — which is why G and inertial mass are
      related through the same substrate parameters.
    asymmetric_environments: >
      Near a massive body (Jupiter, galactic centre),
      Z_inertia acquires a slight anisotropy — lower
      impedance along the axis toward the body (potential
      gradient assists motion), higher impedance
      perpendicular. Predicted inertial anisotropy:
      ΔZ/Z₀ ~ G·M_body/(c²·r) — same order as
      gravitational potential. Currently below
      experimental sensitivity but predicted and
      in principle measurable.
    equivalence_principle: >
      Inertial mass = gravitational mass because both
      are proportional to Z_inertia. Gravitational
      mass is the coupling of a body's commitment
      topology to the global φ gradient — the same
      integral from the other side. Same impedance;
      necessarily equal. The equivalence principle
      is the statement that Z_inertia = Z_gravitational
      — a theorem from the impedance description,
      not a postulate.

  shapiro_delay_as_impedance_measurement:
    statement: >
      The Shapiro delay — the excess travel time of
      a signal passing near a massive body — is a
      direct path-integrated impedance measurement
      of the substrate's potential field. Every
      Shapiro delay measurement is an impedance
      measurement.
    formula: >
      Δt_Shapiro = (1/c) · ∫_path ΔZ(r)/Z₀ · dl
      where ΔZ(r) = Z₀ · (φ_∞ - φ(r))/φ_∞
                  = Z₀ · C(r)/φ_∞
      — the impedance excess at position r from
      φ depletion by the nearby mass.
    physical_meaning: >
      The signal travels slower in the higher-impedance
      region near the mass — not because spacetime
      curves but because the substrate's backreaction
      to the signal's propagation is stronger where
      φ is lower. Each metre of path near the mass
      takes longer because the impedance is higher there.
      The total excess time is the integral of the
      impedance excess along the path.
    existing_measurements: >
      Shapiro delay confirmed by Viking landers (1979)
      to 0.1% precision, Cassini spacecraft (2003)
      to 0.002% precision. These are the most precise
      direct measurements of the substrate's impedance
      field around the Sun. The measurements confirm
      that the impedance profile matches the φ depletion
      profile of the solar commitment density — to
      parts per hundred thousand.
      The math has been there since Shapiro (1964).
      What it was measuring — substrate impedance —
      was not identified.

  gravitational_redshift_as_impedance_gradient:
    statement: >
      Gravitational redshift is the change in the GP
      field's phase rotation rate as a photon propagates
      through changing impedance. Higher impedance →
      slower phase rotation → lower frequency → redshift.
    mechanism: >
      The photon's frequency ν is the GP field's local
      phase rotation rate — the rate at which the dipole
      vortex pair completes each oscillation cycle.
      This rate is proportional to local φ (decoherence rate).
      As the photon climbs out of a gravitational well
      (increasing φ, decreasing impedance), its phase
      rotation rate increases — the frequency increases —
      blueshift. As it falls in, redshift.
      Pound-Rebka experiment (1959): confirmed gravitational
      redshift in Earth's gravitational field to 10%
      precision. Later refined to 1% and better.
      Physical meaning now identified: Pound-Rebka
      measured the impedance gradient of Earth's
      commitment density field directly.

  refractive_index_as_local_impedance:
    statement: >
      The refractive index n of any medium is the ratio
      of local impedance to vacuum impedance:
      n_eff = Z_eff/Z₀ = c_vacuum/c_eff
    unified_optics_gravity: >
      Optical refraction (Snell's law) and gravitational
      lensing are both impedance gradient effects:
      Snell's law:        n₁sinθ₁ = n₂sinθ₂
                          — trajectory bends at impedance
                          discontinuity between media
      Gravitational lens: continuous impedance gradient
                          from φ depletion near mass —
                          same refraction, no discontinuity
      The refractive index of a material and the
      gravitational lensing angle are both measurements
      of local Z_eff/Z₀ — same quantity, different
      physical context. Glass and a gravitational field
      are both regions of elevated substrate impedance.
      Optics and GR lensing have used the same mathematics
      (Fermat's principle, variational path) since before
      GR was formulated. The physical reason — same
      impedance gradient mechanism — was not identified.

  event_horizon_as_impedance_divergence:
    statement: >
      The event horizon is the surface where outward-
      directed substrate impedance diverges — not a
      topological boundary but an asymptotic impedance
      condition approached but never reached.
    mechanism: >
      As commitment density approaches n_sat, the
      saturating nonlinearity makes each additional
      unit of commitment cost more free potential.
      The outward-directed impedance — resistance to
      outward propagation — scales with the commitment
      density gradient dC/dr. Near the Schwarzschild
      radius, dC/dr becomes so steep that Z_outward
      effectively diverges for any classically propagating
      signal. The signal cannot acquire enough free
      potential to overcome the outward impedance.
      Z_outward → ∞ as an asymptote — never reached
      at finite commitment density (saturating GP
      ensures finite density at all r > 0). The horizon
      is a practical impedance divergence, not a
      mathematical singularity.
    hawking_as_impedance_leak: >
      The finite substrate resistance R at the horizon
      means Z_outward never reaches true infinity —
      it is very large but finite. GP structural pressure
      from the interior (enormous g·|θ|²) divided by
      this large but finite Z_outward gives a tiny but
      nonzero outward flux — Hawking radiation.
      T_H ∝ dZ_outward/dr|_horizon — the Hawking
      temperature is proportional to the impedance
      gradient steepness at the horizon.
      Smaller black holes have steeper impedance gradients
      (smaller r_s for the same dC/dr structure) →
      higher T_H. T_H ∝ 1/M follows from r_s ∝ M.
      Physical meaning of Hawking temperature: the
      rate at which the horizon's impedance gradient
      allows GP pressure leakage. Has been derived
      semiclassically since Hawking (1974). The
      impedance gradient mechanism was not identified.

  complete_impedance_table:
    description: >
      One substrate property — impedance to potential
      change — measured in seven different ways.
      The mathematics has existed for each row.
      The unified physical picture is new.
    measurements:
      - effect: "Inertia"
        formula: "F = m·a"
        impedance_reading: "Z_inertia(r) — global Machian integral"
        known_since: "Newton 1687"
      - effect: "Vacuum impedance Z₀"
        formula: "Z₀ = μ₀c = E/H"
        impedance_reading: "Global floor Z₀ = 4π·R₀/α"
        known_since: "Maxwell 1865"
      - effect: "Refractive index"
        formula: "n_eff = c/c_eff"
        impedance_reading: "n_eff = Z_eff/Z₀"
        known_since: "Snell ~1621"
      - effect: "Gravitational lensing"
        formula: "δ = 4GM/rc²"
        impedance_reading: "Continuous Z gradient from φ depletion"
        known_since: "Einstein 1915 / Eddington 1919"
      - effect: "Shapiro delay"
        formula: "Δt = (1/c)∫2GM/rc² dl"
        impedance_reading: "Path-integrated ΔZ/Z₀"
        known_since: "Shapiro 1964"
      - effect: "Gravitational redshift"
        formula: "Δν/ν = ΔΦ/c²"
        impedance_reading: "Local dZ/dr — impedance gradient"
        known_since: "Einstein 1907 / Pound-Rebka 1959"
      - effect: "Event horizon"
        formula: "r_s = 2GM/c²"
        impedance_reading: "Z_outward → ∞ (asymptotic)"
        known_since: "Schwarzschild 1916"
      - effect: "Hawking radiation"
        formula: "T_H = ħc³/8πGMk_B"
        impedance_reading: "GP pressure / Z_outward at horizon"
        known_since: "Hawking 1974"
      - effect: "Time dilation"
        formula: "Δτ = Δt·√(1 - 2GM/rc²)"
        impedance_reading: "Γ ∝ 1/Z_eff — decoherence rate"
        known_since: "Einstein 1905/1915"
      - effect: "MOND transition"
        formula: "a₀ ≈ 1.2×10⁻¹⁰ m/s²"
        impedance_reading: "d²Z/dr² = 0 — GP nonlinearity onset"
        known_since: "Milgrom 1983 (phenomenological)"

  why_the_mechanism_was_missing: >
    The mathematics described the behaviour correctly
    in every case above. The mechanism was missing because:
    (1) The substrate was not identified as a potential field.
        Without the field, impedance has no medium to be
        a property of. Z₀ was a defined constant; the
        vacuum was empty; impedance was a formula, not a
        physical measurement.
    (2) Spacetime was treated as a geometric container.
        Lensing and redshift were geometric effects of
        curved spacetime — not impedance effects of a
        physical field. The mathematics was equivalent;
        the ontology was different.
    (3) Quantum mechanics and gravity were separate frameworks.
        Without the potential field as the common substrate,
        there was no way to see that Z_inertia and Z₀ and
        Z_Shapiro were all measuring the same quantity.
    Praestology provides the physical picture. The
    mathematics was always correct; what it was measuring
    was not identified. The framework's contribution
    is the physical interpretation that unifies the
    existing mathematical descriptions.

