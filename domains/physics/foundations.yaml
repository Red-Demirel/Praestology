derivation_structure:
  from_potential_to_physics:
    step_1: >
      Potential field φ(r,t) — primary substrate description.
      Obeys GP equation with saturating nonlinearity and
      Tik fluctuation background.
    step_2: >
      Momentum density: p = ρ_s·∇φ — the potential
      field's local flow. This is the p(r,t) field of
      specifications.yaml, derived from φ.
    step_3: >
      Commitment density: C(r,t) = φ_max - φ(r,t) —
      the depletion of free potential by committed structure.
      High C = low φ = near mass. Low C = high φ = void.
    step_4: >
      Decoherence rate: Γ(r,t) ∝ φ(r,t) — the rate of
      R4 accumulation at each point. This is the local
      rate of 'now'. Varies with φ directly.
    step_5: >
      All observable effects derive from Γ variation:
      Time dilation:    Γ_low/Γ_high < 1 (slower clock in low φ)
      Gravity:          ∇Γ — decoherence rate gradient
                        advects structure toward lower φ
      Inertia:          resistance to Γ change (commitment
                        footprint rearrangement cost)
      Quantum effects:  phase accumulation ∝ φ (interference)
                        Tik fluctuations ∝ 1/φ (sensitivity)
      Arrow of time:    Γ running in one direction —
                        φ decreasing, C increasing

  open_derivations:
    priority_1:
      - >
        Formal derivation of p = ρ_s·∇φ connecting
        momentum density wave equation (specifications.yaml)
        to potential field φ(r,t). This makes the
        potential field description formally primary.
      - >
        Decoherence rate Γ(r,t) ∝ φ(r,t) — formal
        derivation from GP equation showing that the
        local resolution event rate scales with free
        potential amplitude.
      - >
        Time dilation formula from Γ ratio — recover
        GR gravitational time dilation as Γ_low/Γ_high
        without invoking spacetime geometry.
    priority_2:
      - >
        Machian inertia from global φ_background integral —
        show that the inertial mass equals the body's
        coupling to the global potential field integral
        over all matter. Reproduce Newton's second law
        as a consequence of global φ coupling.
      - >
        Arrow of time from R1+R4 — formal proof that
        the GP field equation has no time-symmetric
        solutions in the presence of finite Tik background
        (finite α). Shows time-reversal symmetry breaking
        is a property of the field equation, not statistics.
    priority_3:
      - >
        Inertial anisotropy prediction — compute the
        inertia tensor modification from nearby massive
        objects via φ_background asymmetry. Predict the
        magnitude of Jupiter's contribution to Earth's
        inertial anisotropy.
      - >
        α from φ dynamics — show that the closure
        imperfection rate of the GP field around a
        Möbius vortex equals α in the current cosmic
        φ_background. Connects α derivation to the
        potential field description.

