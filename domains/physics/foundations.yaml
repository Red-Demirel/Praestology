name: "Substrate as Potential Field"
version: "1.0"
parent_domain: "Physics"
core_version: "1.5"
status: "Defined — formal derivations of momentum density and GP connection open"
description: >
  This file establishes the potential field as the primary
  character of the Praesto substrate — the most fundamental
  description from which all other substrate properties derive.
  The substrate is not primarily a density field, a viscosity,
  or a momentum field — it is a potential field. Density,
  viscosity, momentum, and commitment are what the potential
  field looks like at different scales and interaction modes
  to observers embedded within it.
  Central claim: 'now' is the continuous decoherence of
  potential into commitment — the ongoing process by which
  unresolved R3 tension resolves into R4 accumulated structure.
  The rate of 'now' varies with local free potential.
  All physical effects — gravity, inertia, time dilation,
  frame dragging, quantum interference, the arrow of time —
  are consequences of this single process operating at
  different commitment density regimes.
  Quantum gravity consequence: gravity and quantum mechanics
  are both descriptions of the same potential field at
  different commitment density regimes. The quantum gravity
  problem dissolves because there is no geometric manifold
  to quantise — the potential field is already quantum
  (GP equation with Tik background). Quantum mechanics is
  the low-commitment high-Tik-sensitivity regime; gravity
  is the gradient structure at scales where Tik fluctuations
  are negligible. The transition is continuous — no seam,
  no incompatibility, no separate quantisation required.

relation_to_other_files: >
  specifications.yaml:                 substrate wave equation
                                       (momentum density formulation)
  foundations.yaml:                    four pillars + commitment stress
  commitment-response-function.yaml:   GP saturating nonlinearity
  quantum-foundation.yaml:             QM primitives reframed
  This file:                           primary framing — potential field
                                       from which all others derive.
  Reading order: this file BEFORE specifications.yaml for new readers.
  The momentum density p(r,t) in specifications.yaml is the
  dynamical expression of the potential field gradient:
  p = ρ_s · ∇φ where φ(r,t) is the potential field and
  ρ_s is the substrate density. The potential field φ is primary;
  p is derived.

# ─────────────────────────────────────────────
# THE SUBSTRATE IS A POTENTIAL FIELD
# ─────────────────────────────────────────────
substrate_as_potential:
  primary_statement: >
    The Praesto substrate is a potential field φ(r,t) —
    a scalar field encoding the local availability of
    unresolved tension at each point in space and at each
    process-counter increment. Where φ is high: abundant
    free potential, rapid decoherence possible, low
    commitment density. Where φ is low: depleted free
    potential, slow decoherence, high commitment density.
  what_it_is_not: >
    Not primarily a density field: density is a derived
    appearance of the potential field at the atomic/molecular
    scale — the rate at which the potential field resists
    vortex traversal.
    Not primarily a viscosity: viscosity is the potential
    field's resistance to commitment footprint rearrangement
    — derived from the local potential gradient.
    Not primarily a momentum density: momentum density
    p(r,t) is the dynamical variable describing the
    potential field's local flow — derived as p = ρ_s·∇φ.
    All three are real and measurable — but all three are
    what the potential field looks like from within,
    at specific interaction scales.
  why_potential_is_primary: >
    The potential field φ generates all derived properties
    without requiring separate mechanisms at each scale.
    A single scalar field with GP-type nonlinear self-
    interaction and Tik fluctuation background produces:
    quantum interference (potential phase differences),
    atomic hardness (potential gradient resistance),
    gravity (potential field curvature),
    dark energy (potential field zero-point pressure),
    the arrow of time (potential flowing into commitment).
    Five phenomena; one field; no additional primitives.

  scale_dependent_appearances:
    quantum_scale:
      appearance: "Phase accumulation rate differential"
      mechanism: >
        At quantum scale, the potential field's phase
        varies spatially at the scale of ξ (substrate grain).
        Different paths through the potential field accumulate
        phase at different rates — proportional to local φ.
        Phase differences produce interference.
        The wavefunction ψ IS the potential field amplitude
        — the GP order parameter θ(r,t) = φ(r,t)/φ₀
        (normalised potential field). The Schrödinger equation
        is the linearised GP equation for the potential field
        in the low-commitment regime. Quantum mechanics is
        potential field dynamics in the Tik-sensitive regime.
      key_effects: >
        Double-slit interference: two paths through different
        potential regions accumulate different phases → fringe pattern.
        Tunnelling: Tik fluctuations temporarily elevate
        local φ across barrier → potential re-establishes
        on far side. Quantisation: only potential field
        configurations with integer phase closure are stable.

    atomic_molecular_scale:
      appearance: "Viscosity / resistance to traversal"
      mechanism: >
        At atomic scale, the committed vortex topology of
        atoms and molecules has reduced the local free
        potential below the phase-lock threshold for
        additional topology. The substrate resists vortex
        traversal — feels viscous to incoming structure.
        Hardness is the steepness of the potential gradient
        at the material boundary. Soft materials: gentle
        gradient. Hard materials: steep gradient.
        The potential field's gradient IS the material's
        mechanical property.
      key_effects: >
        Impenetrability: local φ too low for new phase-lock.
        Hardness: steepness of ∇φ at boundary.
        Friction: energy cost of dragging vortex topology
        through a region of reduced φ — potential is
        consumed by the traversal, heating the material.

    gravitational_scale:
      appearance: "Potential gradient → refraction"
      mechanism: >
        At gravitational scale, the cumulative committed
        topology of mass distributions reduces φ over
        large regions. The potential gradient ∇φ refracts
        all propagating structure toward regions of lower φ
        (higher commitment density) — toward mass.
        Gravity is not a force — it is refraction in the
        potential field. The trajectory of any structure
        (matter or photons) bends toward lower φ because
        the decoherence process re-establishes faster in
        the direction of higher free potential... wait:
        structure bends TOWARD lower φ (toward mass)
        because the commitment density gradient draws the
        substrate flow inward. The potential field's current
        flows toward mass; structure embedded in the field
        is advected by that current.
        Precise statement: structure is advected toward
        higher commitment density (lower φ) by the
        substrate's potential flow current. Gravity is
        substrate advection, not geometric curvature.
      key_effects: >
        Gravitational lensing: photon trajectory advected
        toward mass by potential current.
        Orbital dynamics: matter advected into stable
        potential flow pattern around mass.
        Frame dragging: rotating mass establishes rotating
        potential flow pattern — nearby structure advected
        into rotation. Machian inertia: global potential
        flow established by all cosmic matter sets the
        local resistance to decoherence rate change.

    cosmological_scale:
      appearance: "Pressure field"
      mechanism: >
        At cosmological scale, the potential field's
        zero-point floor (Tik background) acts as an
        isotropic pressure — the substrate's resistance
        to complete potential depletion. This is dark energy:
        not a cosmological constant but the potential field's
        own zero-point pressure, varying with local
        commitment density (μ_local from GP equation).
      key_effects: >
        Dark energy: Tik background pressure from 0°/360°
        phase wrap — potential field resisting complete
        commitment. Cosmic expansion: regions of lower
        commitment density (voids) have higher φ — potential
        field pressure drives expansion from voids outward.
        Hubble tension: μ_local variation between observers
        in different potential environments.

# ─────────────────────────────────────────────
# 'NOW' AS CONTINUOUS DECOHERENCE
# ─────────────────────────────────────────────
now_as_decoherence:
  statement: >
    'Now' is not a point in time. It is the continuous
    process by which unresolved R3 tension (potential)
    resolves into R4 accumulated structure (commitment).
    The experienced present moment is the leading edge
    of this process — the ongoing decoherence front where
    potential becomes commitment. This is what R4 feels
    like from inside the process.
  process_description: >
    At every point in space, the potential field φ(r,t)
    is continuously resolving — Tik fluctuations trigger
    resolution events, vortex topologies commit their
    phase-lock configurations, the GP field updates its
    local state. This ongoing resolution IS the flow of
    time. The process counter t is not an external clock
    — it is the accumulation index of these resolution events.
  rate_varies_with_potential:
    statement: >
      The rate of 'now' — the decoherence rate — varies
      directly with local free potential φ(r,t).
      High φ (void, far from mass): abundant free potential
      → rapid resolution events → fast 'now' → fast clocks.
      Low φ (near mass, high commitment density): depleted
      free potential → slow resolution events → slow 'now'
      → slow clocks.
    time_dilation_as_process_rate: >
      Gravitational time dilation is not spacetime geometry
      stretching. It is the decoherence process running
      at different rates in regions of different φ.
      A clock near mass ticks slower because each tick
      is a resolution event, and resolution events are
      slower where free potential is lower. The GPS
      correction (+38 μs/day for satellites vs ground)
      is the potential difference between satellite orbit
      (higher φ) and Earth surface (lower φ) expressed
      as decoherence rate difference.
      This is the clearest observational confirmation
      of the potential field picture: time dilation is
      measured directly and matches the potential field
      gradient precisely.
    velocity_time_dilation: >
      A moving structure commits potential into its own
      trail — R4 accumulation from traversal. This
      reduces the local free potential available for
      the structure's internal processes. Internal
      decoherence slows — the moving clock ticks slower.
      Same mechanism as gravitational dilation; different
      source of φ depletion (self-trail vs external mass).
      SR and GR time dilation unified: both are decoherence
      rate reduction from φ depletion, from different sources.

  dragging_connected_structures:
    statement: >
      When structure enters a lower potential region,
      its decoherence rate slows. Connected structures
      — phase-locked (ρ > 0) partners — cannot maintain
      a different decoherence rate while phase-locked.
      The slower structure drags all connected structures
      to its slower rate. This is not a force — it is
      the phase-locked decoherence process enforcing
      a common resolution rate across coupled structures.
    mechanism: >
      Phase-locking (ρ > 0) means the resolution events
      of coupled structures are correlated — they cannot
      decohere independently. When one structure's
      decoherence slows (lower φ), the correlated
      partner cannot continue at the higher rate without
      breaking the phase-lock. The phase-lock is maintained
      at the cost of the faster partner slowing to match.
      The slower partner does the dragging; the phase-lock
      transmits the drag.
    examples:
      rigid_body: >
        The atoms of a solid object are phase-locked at
        high ρ — strong commitment coupling. When one
        part of the object enters lower φ, all parts
        are dragged to the slower decoherence rate
        simultaneously. The object falls as a unit
        because its parts cannot decohere at different
        rates while remaining phase-locked. Rigidity
        is phase-lock; gravitational acceleration is
        uniform drag via phase-lock.
      frame_dragging: >
        A rotating mass establishes a rotating potential
        flow pattern in the substrate. Nearby structure
        — even non-rotating — has weak phase-lock (low
        but nonzero ρ) to the rotating potential flow.
        The rotating flow drags the nearby structure into
        rotation — frame dragging. The drag strength scales
        with ρ (phase-lock strength) and ∇φ (potential
        gradient). Lense-Thirring effect confirmed by
        Gravity Probe B — consistent with potential flow
        drag on phase-locked gyroscopes.
      tidal_disruption: >
        A body extended across a potential gradient has
        different parts phase-locked at slightly different
        φ levels. The lower-φ parts decohere slower;
        the higher-φ parts decohere faster. The differential
        decoherence rate tries to stretch the body —
        tidal force is differential φ drag across an
        extended phase-locked structure. Tidal disruption
        occurs when the differential drag exceeds the
        phase-lock strength of the material.
      photon_redshift: >
        A photon propagating into lower φ: its decoherence
        rate (oscillation frequency) slows proportionally
        to the φ decrease. Energy E = hν decreases as ν
        decreases. Gravitational redshift is the photon's
        decoherence rate slowing in lower φ — the oscillation
        carries less energy per cycle because each cycle
        takes longer. The photon is not losing energy to
        an external force; it is running at the local
        decoherence rate maximum, which is lower in lower φ.

  machian_derivation:
    statement: >
      Mach's principle — inertia arises from the relation
      of a body to all other matter — is derived, not
      postulated. Inertia is the resistance to changing
      decoherence rate, and the decoherence rate is set
      by the global potential field established by all
      committed structure (all matter) in the universe.
    derivation: >
      All matter has committed the local substrate —
      established commitment density in the potential field.
      The global distribution of committed structure
      establishes the background potential field φ_background(r,t).
      The local free potential at any point is:
      φ_local = φ_background - φ_committed_local
      A body's inertia is its resistance to changing its
      commitment footprint trajectory in φ_background.
      Changing trajectory requires the body to re-establish
      its commitment footprint in a new direction —
      working against the global potential flow established
      by all matter. The resistance to this is inertia.
      Inertia is therefore not a local property but the
      local expression of the global potential field.
      If the mass distribution of the universe were different,
      φ_background would be different, and local inertia
      would be different. Mach's principle is derived
      from the potential field structure.
    isotropy: >
      Inertia appears isotropic because φ_background is
      approximately isotropic on large scales — the universe
      is approximately homogeneous. Strong local mass
      asymmetry (e.g., Jupiter nearby) produces slight
      inertial anisotropy — marginally easier to accelerate
      perpendicular to Jupiter than toward/away from it.
      Too small to measure currently but predicted.
    equivalence_principle_rederived: >
      Inertial mass = gravitational mass because both are
      the same coupling between local decoherence rate
      and the global potential field. Gravity is the local
      φ gradient dragging the decoherence rate. Inertia
      is resistance to changing the decoherence rate.
      Same field; same coupling; necessarily equal.
      Not a coincidence; not a postulate. A theorem
      from the potential field description.

