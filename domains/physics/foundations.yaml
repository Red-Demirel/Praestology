# domains/physics/foundations.yaml
name: "Physics Domain — Ontological Foundations"
version: "1.0"
parent_domain: "Physics"
core_version: "1.5"
status: "Defined"
description: >
  This file states the three foundational ontological commitments
  of the Praestology physics domain explicitly. These commitments
  are not assumptions imported from outside the framework —
  each is derived from R1-R5 and each replaces a concept from
  the standard model or GR that functions as an unexplained
  primitive or implicit substance.
  The three commitments are:
  (1) Mass as inertia-effect — not an intrinsic property
  (2) Space-time replacement by QHD and optics — not a container
  (3) Energy as Φ bookkeeping — not a substance
  These are the strongest conceptual claims in the physics domain.
  The quantitative derivations (α, M_W, R∞) build on these
  foundations. The foundations themselves are derivable from
  R1-R5 without measurement — they are structural consequences
  of the framework's ontology.
  Purpose of this file: make these commitments explicit so that
  (a) the physics process files can reference them cleanly,
  (b) falsification conditions are unambiguous, and
  (c) the departure from standard model ontology is stated
      rather than implied.

relation_to_standard_model: >
  The standard model and GR are not wrong — their mathematics
  correctly describes observations to extraordinary precision.
  Praestology's claim is that their ontological foundations
  are incomplete: they correctly describe what observers see
  but mistake observational coordinate systems and bookkeeping
  quantities for fundamental ontological primitives.
  SR and GR: correct as observational frameworks; incomplete
  as ontologies. The Lorentz transformation describes what
  light-based observers see; it is not a fundamental symmetry
  of reality.
  QED/QCD/electroweak: correct as effective theories; their
  gauge fields and force primitives are derived from substrate
  topology rather than assumed as given.
  The relationship is the same as Praestology has with Maxwell
  and GR throughout: the mathematics is right; the ontological
  foundation is new.

# ─────────────────────────────────────────────
# COMMITMENT 1: MASS AS INERTIA-EFFECT
# ─────────────────────────────────────────────
mass_as_inertia_effect:
  statement: >
    Mass is not an intrinsic property of particles.
    Mass is the dynamic resistance of a self-sustaining vortex
    topology to changes in its trajectory through the substrate.
    It is an effect — the substrate's backreaction to forced
    vortex acceleration — not a substance the particle possesses.
  what_this_replaces: >
    Standard model: mass is either an unexplained intrinsic
    property (pre-Higgs) or acquired via interaction with the
    Higgs field (post-Higgs). In both cases, mass is treated
    as a quantity a particle has. The Higgs mechanism explains
    how particles acquire mass but not what mass fundamentally is.
    Praestology: mass is what inertia feels like from the outside.
    The Higgs field is the p_env modulation that sets the effective
    substrate resistance — correctly identified by the standard
    model, differently interpreted.

  derivation:
    from_r3_r5: >
      R3 (Motion): a vortex topology propagates through the substrate
      by continuous self-sustaining resolution — the engine/trail
      mechanism. The vortex does not travel through empty space;
      it continuously re-establishes itself in the substrate ahead
      while its trail disperses behind.
      R5 (Optimisation): the substrate selects the minimum resistance
      trajectory. Any deviation from this trajectory requires work
      against the substrate's resolution dynamics.
    inertia_mechanism: >
      When an external force attempts to change a vortex's trajectory,
      it must redirect the substrate's resolution dynamics that sustain
      the vortex. The substrate resists this redirection — not because
      of a property the vortex possesses but because redirecting a
      self-sustaining resolution process requires energy input against
      the existing momentum density field p(r,t).
      This resistance is inertia. Its magnitude is mass.
      m_eff = α · S · R / c²
      where S is the local anomaly (vortex complexity),
      R is the substrate resistance at the vortex location,
      c² = Φ_max² is the maximum substrate resolution rate squared,
      α is the substrate coupling constant.
      Mass scales with vortex complexity (S) and local resistance (R)
      — more complex topology, harder to redirect; denser substrate
      region, more resistance to traverse.
    zero_mass_derivation: >
      Photon (dipole vortex pair, coherent S cancellation):
      S_net ≈ 0 → m_eff ≈ 0.
      Not a coincidence or a postulate. The photon has zero mass
      because its topology produces coherent anomaly cancellation —
      nothing to resist redirection because the vortex pair's
      opposing circulations cancel in the substrate.
      This is derived, not assumed.
    higgs_correspondence: >
      Higgs field = p_env (environmental momentum density) modulation.
      In the high-Φ early universe, p_env is near-uniform and low —
      W/Z bosons propagate with near-zero effective mass (electroweak
      unification regime). As the universe cools (Φ decreases), p_env
      settles to its current value — electroweak symmetry breaking.
      The specific p_env value determines M_W and M_Z via the S_lock
      threshold for quark winding reorganisation (beta-decay.yaml).
      The Higgs mechanism is correct; its physical interpretation is
      p_env settling, not a separate scalar field acquiring a
      vacuum expectation value as an unexplained given.
    mach_principle: >
      Mach's principle: inertia of a body arises from its interaction
      with all other matter in the universe. Long considered
      philosophically compelling but never formally incorporated
      into GR (Einstein tried and partially succeeded with frame-dragging).
      Praestology realises Mach's principle: the substrate p(r,t) field
      is the integrated effect of all matter distributions on the
      local momentum density. Inertia is resistance from the substrate,
      which encodes the global matter distribution. Mach is derived,
      not postulated.

  consequences:
    - >
      Variable inertia: in regions of different substrate R (near
      massive objects, in voids), effective mass is slightly different.
      This is a small effect but in principle measurable — inertial
      mass should show weak environmental dependence not predicted
      by the standard model.
    - >
      Neutrino mass: solo vortex with minimal winding, S barely above
      S_lock. m_ν is small but nonzero because S > 0. The specific
      values (m_ν < 0.12 eV from cosmological constraints) encode
      the minimum stable winding S_lock value — derivable in principle.
    - >
      Graviton not required: gravity is substrate geometry (R gradient
      curvature), not particle exchange. The graviton is a mathematical
      artefact of attempting to quantise a geometric effect. No graviton
      detection is expected because there is no graviton — gravity is
      not a force in the particle-exchange sense.
  confirming_note: >
    Equivalence principle (inertial mass = gravitational mass) —
    in Praestology these are the same quantity: both are the
    substrate resistance of the vortex topology. No coincidence;
    no fine-tuning. Identity follows from derivation.
    Higgs boson discovery (CERN 2012) — confirms the Higgs field
    existence. Praestology interprets it as p_env modulation
    confirmed experimentally. The boson is the quantised excitation
    of the p_env field — the Tik pulse of the Higgs substrate mode.
    Pioneer anomaly — slight unexplained acceleration of Pioneer
    spacecraft. Consistent with weak substrate R dependence of
    effective inertia at large distances from the solar system's
    mass concentration. Partially resolved by thermal recoil
    explanation but residual uncertainty remains.

  standard_model_open_question_dissolved: >
    "Why do particles have the masses they do?" — currently
    unanswered in the standard model (mass values are empirical
    inputs, not derived). Praestology's answer: mass values
    encode vortex topology complexity (S) and local substrate
    resistance (R). Deriving specific mass values requires
    completing the knot/topology classification (open derivation
    in specifications.yaml) — but the mechanism is identified.

