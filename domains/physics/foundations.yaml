        potential amplitude.
      - >
        Time dilation formula from Γ ratio — recover
        GR gravitational time dilation as Γ_low/Γ_high
        without invoking spacetime geometry.
    priority_2:
      - >
        Machian inertia from global φ_background integral —
        show that the inertial mass equals the body's
        coupling to the global potential field integral
        over all matter. Reproduce Newton's second law
