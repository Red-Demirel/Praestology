rydberg_derivation:
  statement: >
    The Rydberg constant is the orbital transition energy
    scale for hydrogen-like atoms:
    R∞ = (α² · m_eff · c) / (2h)
    where m_eff = α · S_electron · R (electron inertia
    from commitment density) and h is the substrate grain
    response time (Planck constant from Tik floor).
    Substituting the topological α and m_eff:
    R∞ = α³ · S_electron · R · c / (2h)
    R∞ is now derived purely from vortex stability
    conditions — no empirical inputs.
  physical_meaning: >
    R∞ sets the energy scale of atomic spectra —
    the Rydberg energy E_R = hcR∞ ≈ 13.6 eV is the
    binding energy of hydrogen in its ground state.
    Under Praestology: E_R is the commitment energy
    stored in the electron's ground-state orbital
    phase-lock configuration around the proton.
    The precise value reflects the exact balance between
    the electron vortex's kinetic commitment (trail
    oscillation) and its potential commitment (proton
    chirality gradient binding) at the minimum stable
    phase-lock radius (Bohr radius a₀).
  cubic_alpha_sensitivity: >
    R∞ ∝ α³ — cubic dependence on α. This makes R∞
    the sharpest numerical test of the topological α
    formula. A 1% error in α produces a 3% error in R∞.
    R∞ is measured to 12 significant figures
    (10,973,731.568160 m⁻¹) — the most precisely measured
    constant in physics. If the topological α is correct
    to the required precision, R∞ follows to 12 significant
    figures. This is the highest-leverage quantitative
    test in the framework.
  bohr_radius_connection: >
    a₀ = α / (4π · R∞) = ℏ / (α · m_eff · c)
    The Bohr radius is the minimum stable orbital phase-lock
    radius — the distance at which the electron's commitment
    footprint rearrangement rate (kinetic energy) equals
    the proton's chirality gradient commitment attraction
    (potential energy). a₀ follows from α and m_eff
    without additional parameters.
  numerical_target: "R∞ ≈ 10,973,731.568160 m⁻¹ (CODATA 2018)"
  open_derivation: >
    Compute S_electron from Möbius 720° vortex stability
    equations. Compute m_eff = α · S_electron · R with
    R from baseline substrate state. Verify R∞ matches
    measured value to available significant figures.
    This derivation is the convergence test for the
