# ─────────────────────────────────────────────
# SHARED ORIGIN
# ─────────────────────────────────────────────
shared_origin:
  statement: >
    All four constants share a single structural origin:
    the stability relationship between the Möbius 720° vortex
    (electron) and the dipole vortex pair (photon) in the
    substrate commitment field.
    The electron is the minimal stable chirally asymmetric
    topology. The photon is the minimal stable chirally
    neutral topology. Their stability ratio determines α.
    The substrate's resistance to field propagation in the
    photon limit determines Z₀ from the same ratio.
    The electron's orbital commitment energy scale determines
    R∞ from α and m_eff. The Tik background fluctuation
    amplitude at the orbital scale determines ΔE_L from
    the same α and substrate grain ξ.
    Four constants; one stability structure.
  substrate_parameters_required:
    ΔS_chiral: >
      Anomaly cost of chiral asymmetry — the additional S
      required for the Möbius winding that breaks the
      dipole's chiral symmetry. This encodes the topological
      "price" of being charged rather than neutral.
    S_dipole_sat: >
      Dipole saturation threshold — the maximum S achievable
      by a perfect dipole vortex pair before the pair's
      mutual coherence breaks. This is the maximum neutral
      topology anomaly before topology change is forced.
    R0: >
      Baseline substrate impedance set by healing length ξ
      and environmental momentum density p_env in the
      near-vacuum limit. The substrate's resistance to
      field propagation where S ≈ 0.
    xi: >
      Substrate grain size — the healing length below which
      the continuum approximation breaks down and topology
      is discrete. Sets the natural UV cutoff for all
      Tik fluctuation integrals. Equivalent to Planck length
      at current best estimate — open derivation.

# ─────────────────────────────────────────────
# CONVERGENCE 1: FINE STRUCTURE CONSTANT α
# ─────────────────────────────────────────────
alpha_derivation:
  statement: >
    α is the dimensionless ratio of the chiral asymmetry
    anomaly cost to the dipole saturation threshold,
    with the spherical geometry factor 4π from substrate
    isotropy:
    α = ΔS_chiral / (4π · S_dipole,sat)
  physical_meaning: >
    α measures the topological coupling efficiency between
    the electron's chiral commitment structure and the
    photon's dipole commitment structure. It is the
    probability amplitude for a single photon emission
    or absorption event — the strength of the EM coupling
    — stated as a ratio of the two topologies' anomaly scales.
    α ≈ 1/137.036 means the chiral asymmetry cost is
    approximately 1/137th of the dipole saturation threshold
    per steradian. The electron is weakly chirally asymmetric
    relative to the maximum neutral dipole — which is why
    EM coupling is weak (α << 1) and why perturbation
    theory in powers of α works so well in QED.
  four_pi_factor: >
    The 4π is the solid angle of the full sphere — the
    geometric factor for isotropic substrate coupling.
    The substrate has no preferred direction in the absence
    of committed structure (R5 isotropy). The chiral
    asymmetry radiates into the full 4π steradians of
    the substrate. This factor is derived from R5 substrate
    isotropy, not assumed. Its appearance confirms the
    geometry of the substrate coupling is spherically symmetric.
  why_dimensionless: >
    α is a ratio of two anomaly scales — both measured
    in the same substrate units (S). The substrate units
    cancel, leaving a pure number. This is why α is
    dimensionless and why it is the same in all unit
    systems — it is a geometric ratio, not a physical
    quantity with units.
  running_coupling: >
    In QED, α is not strictly constant — it "runs" with
    energy scale, increasing at higher energies. At the
    Z boson mass, α ≈ 1/128 rather than 1/137.
    Under Praestology: running coupling is the energy-
    dependence of the effective ΔS_chiral/S_dipole,sat
    ratio as the probing energy approaches and exceeds
    the vortex topology's own scale. At low energies,
    the full vortex structure is sampled — giving the
    low-energy α ≈ 1/137. At high energies, only the
    core is sampled — giving a different effective ratio.
    Running coupling is topology scale-dependence,
    not a new phenomenon requiring separate explanation.
  numerical_target: "α ≈ 1/137.035999084 (CODATA 2018)"
  open_derivation: >
    Compute ΔS_chiral and S_dipole,sat from Möbius and
    dipole vortex stability equations respectively.
    Verify ratio equals 1/(4π · 137.036...).
    This is the highest-priority numerical derivation
    in the physics domain — all other constants in this
    file depend on α being fixed first.

# ─────────────────────────────────────────────
# CONVERGENCE 2: VACUUM IMPEDANCE Z₀
# ─────────────────────────────────────────────
z0_derivation:
  statement: >
    Z₀ is the substrate impedance in the S ≈ 0 photon
    (near-neutral dipole) limit:
    Z₀ = 4π · R₀ / α
    where R₀ is the baseline impedance from healing length
    ξ and p_env. Once α is fixed topologically, Z₀ follows
    directly from the same R-elevation profile that enforces
    impenetrability.
  physical_meaning: >
    Z₀ = μ₀c = 1/(ε₀c) ≈ 376.73 Ω is the ratio of
    electric field to magnetic field amplitude in a
    plane wave propagating through vacuum — the vacuum's
    electromagnetic "resistance" to field propagation.
    Under Praestology: Z₀ is the substrate's resistance
    to dipole vortex pair propagation in the low-S limit.
    It is R₀ (baseline substrate impedance) scaled by
    the topological coupling factor 4π/α — the same
    factor that appears in α's definition, now inverted
    to give the field propagation resistance.
  connection_to_impenetrability: >
    The R-elevation profile that enforces impenetrability
    (foundations.yaml, pillar 5) is the same profile
    that sets R₀. The substrate's resistance to topology
    invasion (solidity) and its resistance to field
    propagation (Z₀) are two expressions of the same
    commitment density structure. This is a genuine
    unification currently invisible in the standard model:
    Maxwell's equations give Z₀; Pauli exclusion gives
    impenetrability; their shared commitment geometry
    origin is unrecognised.
  c_from_z0: >
    c = 1/√(μ₀ε₀) = 1/(Z₀ε₀).
    Under Praestology: c = Φ_max (maximum substrate
    commitment rate). The relationship c = 1/√(μ₀ε₀)
    is the statement that Φ_max is set by the product
    of the substrate's electric and magnetic field
    propagation resistances — both determined by the
    same R₀ profile. The speed of light is a substrate
    impedance property, not a separately postulated constant.
  numerical_target: "Z₀ = μ₀c ≈ 376.730313668 Ω (exact in SI)"
  open_derivation: >
    Compute R₀ from healing length ξ and p_env in the
    near-vacuum limit. Verify Z₀ = 4π · R₀ / α with
    α from convergence 1. Check c = Φ_max follows
    from the same R₀ without additional parameters.

# ─────────────────────────────────────────────
# CONVERGENCE 3: RYDBERG CONSTANT R∞
# ─────────────────────────────────────────────
rydberg_derivation:
  statement: >
    The Rydberg constant is the orbital transition energy
    scale for hydrogen-like atoms:
    R∞ = (α² · m_eff · c) / (2h)
    where m_eff = α · S_electron · R (electron inertia
    from commitment density) and h is the substrate grain
    response time (Planck constant from Tik floor).
    Substituting the topological α and m_eff:
    R∞ = α³ · S_electron · R · c / (2h)
    R∞ is now derived purely from vortex stability
    conditions — no empirical inputs.
  physical_meaning: >
    R∞ sets the energy scale of atomic spectra —
    the Rydberg energy E_R = hcR∞ ≈ 13.6 eV is the
    binding energy of hydrogen in its ground state.
    Under Praestology: E_R is the commitment energy
    stored in the electron's ground-state orbital
    phase-lock configuration around the proton.
    The precise value reflects the exact balance between
    the electron vortex's kinetic commitment (trail
    oscillation) and its potential commitment (proton
    chirality gradient binding) at the minimum stable
    phase-lock radius (Bohr radius a₀).
  cubic_alpha_sensitivity: >
    R∞ ∝ α³ — cubic dependence on α. This makes R∞
    the sharpest numerical test of the topological α
    formula. A 1% error in α produces a 3% error in R∞.
    R∞ is measured to 12 significant figures
    (10,973,731.568160 m⁻¹) — the most precisely measured
    constant in physics. If the topological α is correct
    to the required precision, R∞ follows to 12 significant
    figures. This is the highest-leverage quantitative
    test in the framework.
  bohr_radius_connection: >
    a₀ = α / (4π · R∞) = ℏ / (α · m_eff · c)
    The Bohr radius is the minimum stable orbital phase-lock
    radius — the distance at which the electron's commitment
    footprint rearrangement rate (kinetic energy) equals
    the proton's chirality gradient commitment attraction
    (potential energy). a₀ follows from α and m_eff
    without additional parameters.
  numerical_target: "R∞ ≈ 10,973,731.568160 m⁻¹ (CODATA 2018)"
  open_derivation: >
    Compute S_electron from Möbius 720° vortex stability
    equations. Compute m_eff = α · S_electron · R with
    R from baseline substrate state. Verify R∞ matches
    measured value to available significant figures.
    This derivation is the convergence test for the
    entire quadruple loop — R∞'s precision makes it
    the definitive numerical confirmation.

