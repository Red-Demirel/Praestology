z0_derivation:
  statement: >
    Z₀ is the substrate impedance in the S ≈ 0 photon
    (near-neutral dipole) limit:
    Z₀ = 4π · R₀ / α
    where R₀ is the baseline impedance from healing length
    ξ and p_env. Once α is fixed topologically, Z₀ follows
    directly from the same R-elevation profile that enforces
    impenetrability.
  physical_meaning: >
    Z₀ = μ₀c = 1/(ε₀c) ≈ 376.73 Ω is the ratio of
    electric field to magnetic field amplitude in a
    plane wave propagating through vacuum — the vacuum's
    electromagnetic "resistance" to field propagation.
    Under Praestology: Z₀ is the substrate's resistance
    to dipole vortex pair propagation in the low-S limit.
    It is R₀ (baseline substrate impedance) scaled by
    the topological coupling factor 4π/α — the same
    factor that appears in α's definition, now inverted
    to give the field propagation resistance.
  connection_to_impenetrability: >
    The R-elevation profile that enforces impenetrability
    (foundations.yaml, pillar 5) is the same profile
    that sets R₀. The substrate's resistance to topology
    invasion (solidity) and its resistance to field
    propagation (Z₀) are two expressions of the same
    commitment density structure. This is a genuine
    unification currently invisible in the standard model:
    Maxwell's equations give Z₀; Pauli exclusion gives
    impenetrability; their shared commitment geometry
    origin is unrecognised.
  c_from_z0: >
    c = 1/√(μ₀ε₀) = 1/(Z₀ε₀).
    Under Praestology: c = Φ_max (maximum substrate
    commitment rate). The relationship c = 1/√(μ₀ε₀)
    is the statement that Φ_max is set by the product
    of the substrate's electric and magnetic field
    propagation resistances — both determined by the
    same R₀ profile. The speed of light is a substrate
    impedance property, not a separately postulated constant.
  numerical_target: "Z₀ = μ₀c ≈ 376.730313668 Ω (exact in SI)"
  open_derivation: >
    Compute R₀ from healing length ξ and p_env in the
    near-vacuum limit. Verify Z₀ = 4π · R₀ / α with
    α from convergence 1. Check c = Φ_max follows
    from the same R₀ without additional parameters.

