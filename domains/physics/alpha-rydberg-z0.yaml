shared_origin:
  statement: >
    All six constants share a single structural origin:
    the stability relationship between the Möbius 720° vortex
    (electron) and the dipole vortex pair (photon) in the
    substrate commitment field.
    The electron is the minimal stable chirally asymmetric
    topology. The photon is the minimal stable chirally
    neutral topology. Their stability ratio determines α.
    The substrate's resistance to field propagation in the
    photon limit determines Z₀ from the same ratio.
    The electron's orbital commitment energy scale determines
    R∞ from α and m_eff. The Tik background fluctuation
    amplitude at the orbital scale determines ΔE_L from
    the same α and substrate grain ξ. G follows from
    the same ξ, p_env, and the substrate response κ.
    Six constants; one stability structure.

  conjugate_chirality:
    statement: >
      Chirality in the substrate is the handedness of vortex
      circulation — clockwise (+) or counter-clockwise (−).
      Conjugate chirality is the exact mirror of a given
      chirality: the conjugate of +n winding is −n winding.
      Chirality is an algebraic quantity: it adds as a
      signed scalar. The vector sum of chiral fractions
      over a composite topology determines its net charge
      and electromagnetic coupling strength.
    algebra: >
      Let χ denote the chiral winding fraction of a topology,
      with sign indicating handedness:
        Full Möbius electron: χ = +1 (or −1 for positron)
        Photon dipole pair:   χ_+ + χ_− = (+1) + (−1) = 0
        Antiquark (ū):        χ = −2/3  (conjugate of u quark)
        Antidown (d̄):         χ = +1/3  (conjugate of d quark)
      The net chiral fraction χ_net = Σ χ_i over all
      constituent windings determines:
        Charge:    Q = χ_net (in units of electron charge)
        S_net:     proportional to |χ_net| — net anomaly
        EM coupling: scales with χ_net via α
    why_introduced_here: >
      α = ΔS_chiral / (4π · S_dipole,sat) is the coupling
      ratio for a topology with χ_net = 1 (full Möbius).
      For a topology with χ_net = f (fractional), the
      effective coupling scales as:
        α_eff(f) = f² · α
      This is why quark EM coupling constants are (2/3)²·α
      and (1/3)²·α — the fractional chiral weights appear
      squared in coupling probabilities (amplitude squared).
      The photon's χ_net = 0 means α_eff = 0: the photon
      does not self-couple electromagnetically — consistent
      with U(1) gauge theory's massless, neutral carrier.
      Introducing conjugate chirality here grounds the
      quark charge assignments and the vector sum rules
      in the constant stack derivation, before the
      hadronic topology is developed in quark-topology.yaml.
    vector_sum_rule: >
      For any stable composite topology to be viable under
      R5 (no unresolved net orientation burden):
        Colour neutrality:  Σ orientation_i = 0  (see quark-topology.yaml)
        Charge:             Σ χ_i = integer       (whole-unit net chirality)
      The proton (uud): χ_net = 2/3 + 2/3 − 1/3 = +1  ✓
      The neutron (udd): χ_net = 2/3 − 1/3 − 1/3 = 0   ✓
      The pion (ud̄): χ_net = 2/3 + 1/3 = +1            ✓
      These are not fitted — they follow from the vector
      sum algebra applied to the fractional winding assignments.
    confirming_note: >
      Gell-Mann–Nishijima formula Q = I₃ + Y/2 — the
      standard model relationship between charge, isospin,
      and hypercharge. Praestology derives Q directly as
      χ_net from winding fractions; the Gell-Mann–Nishijima
      formula is a classification of the same structure in
      group-theoretic language. The numerical agreements above
      are internal consistency checks, not post-hoc fits —
      the fractions 2/3 and 1/3 are forced by triality
      (three orientations, 120° spacing) before the charge
      values are computed.
  gauge_symmetry_note: >
    The standard model requires gauge symmetry (U(1), SU(2),
    SU(3)) as a constraint because it lacks the underlying
    topology picture. Gauge freedom arises from treating the
    wavefunction phase as arbitrary — requiring gauge invariance
    to restore physical content. In Praestology, the phase
    is the trail's physical winding number — topologically
    fixed, not arbitrary. The gauge redundancy never arises
    because the description is physical from the start.
    Reality favours asymmetry: the Möbius vortex is chirally
    asymmetric — that asymmetry is the source of charge and
    is ontologically primary. Gauge symmetry is a mathematical
    artefact of the standard model's incomplete description,
    not a feature of the substrate. The SU(3)×SU(2)×U(1)
    structure is a topology classification label system,
    not a fundamental symmetry. Praestology does not require
    gauge symmetry as a constraint — the physics is derived
    from topology directly.
  substrate_parameters_required:
    ΔS_chiral: >
      Anomaly cost of chiral asymmetry — the additional S
      required for the Möbius winding that breaks the
      dipole's chiral symmetry. This encodes the topological
      "price" of being charged rather than neutral.
    S_dipole_sat: >
      Dipole saturation threshold — the maximum S achievable
      by a perfect dipole vortex pair before the pair's
      mutual coherence breaks. This is the maximum neutral
      topology anomaly before topology change is forced.
    R0: >
      Baseline substrate impedance set by healing length ξ
      and environmental momentum density p_env in the
      near-vacuum limit. The substrate's resistance to
      field propagation where S ≈ 0.
    xi: >
      Substrate grain size — the healing length below which
      the continuum approximation breaks down and topology
      is discrete. Sets the natural UV cutoff for all
      Tik fluctuation integrals. Equivalent to Planck length
      at current best estimate — open derivation.

