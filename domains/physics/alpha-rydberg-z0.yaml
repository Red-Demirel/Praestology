alpha_derivation:
  statement: >
    α is the dimensionless ratio of the chiral asymmetry
    anomaly cost to the dipole saturation threshold,
    with the spherical geometry factor 4π from substrate
    isotropy:
    α = ΔS_chiral / (4π · S_dipole,sat)
  physical_meaning: >
    α measures the topological coupling efficiency between
    the electron's chiral commitment structure and the
    photon's dipole commitment structure. It is the
    probability amplitude for a single photon emission
    or absorption event — the strength of the EM coupling
    — stated as a ratio of the two topologies' anomaly scales.
    α ≈ 1/137.036 means the chiral asymmetry cost is
    approximately 1/137th of the dipole saturation threshold
    per steradian. The electron is weakly chirally asymmetric
    relative to the maximum neutral dipole — which is why
    EM coupling is weak (α << 1) and why perturbation
    theory in powers of α works so well in QED.
  four_pi_factor: >
    The 4π is the solid angle of the full sphere — the
    geometric factor for isotropic substrate coupling.
    The substrate has no preferred direction in the absence
    of committed structure (R5 isotropy). The chiral
    asymmetry radiates into the full 4π steradians of
    the substrate. This factor is derived from R5 substrate
    isotropy, not assumed. Its appearance confirms the
    geometry of the substrate coupling is spherically symmetric.
  why_dimensionless: >
    α is a ratio of two anomaly scales — both measured
    in the same substrate units (S). The substrate units
    cancel, leaving a pure number. This is why α is
    dimensionless and why it is the same in all unit
    systems — it is a geometric ratio, not a physical
    quantity with units.
  running_coupling: >
    In QED, α is not strictly constant — it "runs" with
    energy scale, increasing at higher energies. At the
    Z boson mass, α ≈ 1/128 rather than 1/137.
    Under Praestology — mechanistic derivation (v1.4):
    At low energies (atomic scale), the full Möbius
    electron topology is sampled — the complete 720°
    self-integral with χ_net = 1. The effective coupling
    ratio is ΔS_chiral(full) / S_dipole,sat = α ≈ 1/137.
    As probe energy increases above Λ_QCD (~200 MeV),
    the probe begins resolving the hadronic substructure —
    sampling the fractional quark windings (χ = ±2/3, ±1/3)
    inside the hadron rather than the full electron Möbius.
    At energies approaching M_Z (~91 GeV), the effective
    ΔS_chiral sampled is that of the quark partial windings,
    which have a higher S_burden/S_dipole,sat ratio per unit
    volume than the full Möbius — giving α_eff ≈ 1/128.
    The transition tracks Λ_QCD, not an arbitrary scale:
    α runs because the topology being sampled changes at
    the confinement boundary, not because of vacuum
    polarisation in the abstract. This is the same physical
    mechanism as the running of α in QCD (asymptotic freedom)
    — topology scale-dependence — now unified with the
    electromagnetic running under one substrate picture.
    Prediction: the running of α_eff with energy should
    show a distinctive kink at Λ_QCD where the transition
    from full-Möbius to partial-winding sampling occurs.
    Standard QED predicts smooth logarithmic running; this
    predicts a slight inflection at the hadronic threshold.
    Current precision data is consistent with both — a
    precision measurement of dα/d(ln q²) near Λ_QCD could
    distinguish them.
    Cross-reference: quark-topology.yaml, confinement and
    hadronic_scale_extension below.
  numerical_target: "α ≈ 1/137.035999084 (CODATA 2018)"
  open_derivation: >
    Compute ΔS_chiral and S_dipole,sat from Möbius and
    dipole vortex stability equations respectively.
    Verify ratio equals 1/(4π · 137.036...).
    This is the highest-priority numerical derivation
    in the physics domain — all other constants in this
    file depend on α being fixed first.

