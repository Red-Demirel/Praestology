# CONVERGENCE 6: GRAVITATIONAL CONSTANT G
# The strangest constant — now the most explicable.
# ─────────────────────────────────────────────
gravitational_constant_derivation:
  version: "1.0 — Derived Coupling Constant"
  status: "High-confidence path — κ identification open"
  statement: >
    G is the effective coupling strength between total
    topological commitment density and the resulting Φ
    gradient — the proportionality constant between mass
    distribution and the commitment stress field it generates.
    It is not a fundamental constant. It emerges from the
    same substrate parameters that already fix α, ħ, and R∞:
    G = c² · (ξ² / p_env) · (κ · α)
    where ξ is the substrate grain size, p_env is the baseline
    environmental momentum density, and κ is the substrate
    response coefficient relating topology commitment to
    Φ gradient generation.
  physical_meaning: >
    G measures how strongly a given commitment density
    (mass) distorts the local Φ gradient (gravity field).
    Under Praestology: gravity is not a force but refraction
    — paths bend toward higher commitment density (R gradient).
    G is the strength of that refraction per unit committed
    topology. It is a property of the substrate medium, not
    a fundamental coupling of nature. Changing the substrate
    grain size ξ or baseline density p_env would change G.
    In a different region of the cosmos with different p_env,
    G would be locally different — a testable prediction
    (see testable_prediction below, and cosmos domain Cs6).

  hierarchy_problem_dissolved:
    statement: >
      The hierarchy problem: why is gravity ~10⁴² times
      weaker than electromagnetism? This is one of the
      deepest puzzles in physics — currently no explanation.
      Under Praestology: G is weak because ξ²/p_env is
      extremely small. The substrate grain ξ is at the
      Planck scale (~10⁻³⁵ m); p_env is set by the
      total cosmic commitment density — large. Their ratio
      ξ²/p_env is tiny, making G tiny relative to α.
      Gravity's weakness is a geometric consequence of the
      substrate's density structure — the grain is
      immeasurably smaller than the cosmic density scale.
      Not a fine-tuning coincidence; a scale separation.
    quantitative_path: >
      G/G_EM ~ (ξ²/p_env) · (κ/1)
      where G_EM is the effective EM coupling strength.
      The ratio ξ²/p_env must equal ~10⁻⁴² in Planck units.
      This constrains the relationship between ξ and p_env —
      a consistency condition on the substrate parameters
      that is independent of (and must be consistent with)
      the α, ħ, R∞ derivations. If all six constants close
      consistently from the same substrate parameters,
      the hierarchy is derived rather than assumed.
    significance: >
      The hierarchy problem has driven three decades of
      beyond-standard-model physics — supersymmetry, large
      extra dimensions, technicolour — all attempting to
      explain the weakness of gravity without fine-tuning.
      Praestology dissolves the problem: the hierarchy is
      a consequence of the substrate's grain-to-density
      scale separation, which is not fine-tuned but
      geometrically necessary given the substrate's
      structure. No new particles, no extra dimensions,
      no symmetry breaking required.

  derivation:
    formula: "G = c² · (ξ² / p_env) · (κ · α)"
    factors:
      c_squared: >
        c² = Φ_max² — the maximum substrate commitment rate
        squared. Sets the energy-momentum units for the
        coupling. Ensures G has correct SI dimensions
        [m³ kg⁻¹ s⁻²] when ξ, p_env, and κ are expressed
        in substrate units.
      xi_squared_over_p_env: >
        ξ²/p_env — the substrate geometry factor.
        ξ² is the grain area — the minimum spatial scale
        of a commitment event. p_env is the baseline
        momentum density — the "stiffness" of the substrate
        against commitment distortion. Their ratio is the
        substrate's susceptibility to Φ gradient formation
        per unit committed topology.
        This ratio is small (ξ << p_env^(1/2)) — explaining
        G's smallness from substrate geometry, not fine-tuning.
      kappa_alpha: >
        κ · α — the topological response coefficient.
        κ is the substrate response coefficient: how
        efficiently a unit of committed topology generates
        a Φ gradient per unit substrate susceptibility.
        α is the topological coupling efficiency already
        derived from Möbius/dipole stability.
        The product κα links the gravitational coupling
        to the electromagnetic coupling — both involve
        the same α but at different substrate scales.
        κ is the open parameter: it must be derived from
        the substrate's nonlinear response to commitment
        density accumulation (commitment stress backreaction,
        foundations.yaml pillar 5).
    kappa_identification: >
      κ is the key open derivation. It encodes how the
      substrate's backreaction to committed topology
      generates a Φ gradient — the mechanism already
      described in foundations.yaml (pillar 5, gravitational
      effect). κ is the proportionality constant in:
      ∇Φ = κ · ∇(S×R) / p_env
      This should be derivable from the substrate wave
      equation (QHD, pillar 2) applied to the slow
      (gravitational timescale) limit of commitment
      density variation. Open derivation — priority 1
      for this convergence.

  unification_with_constant_stack: >
    G connects to the same substrate parameters as α, ħ,
    R∞, Z₀: all involve ξ, p_env, S_electron, and the
    Möbius/dipole stability ratios. The complete constant
    set is now:
      α     from ΔS_chiral/S_dipole,sat (topology)
      Z₀    from α + R₀(ξ, p_env) (impedance)
      R∞    from α³ × S_electron × R/ħ (orbital scale)
      ħ     from α² × m_eff × c / (2R∞) (action unit)
      ΔE_L  from α⁵ × Tik(ξ) (fluctuation correction)
      G     from c² × (ξ²/p_env) × κα (gravitational scale)
    Six constants; three substrate parameter families:
      Topology:   ΔS_chiral, S_dipole,sat, S_electron
      Grain:      ξ (Planck scale)
      Density:    p_env (cosmic baseline)
    Zero free parameters once these five substrate
    quantities are computed from the stability equations.

  connection_to_planck_units: >
    In Planck units (ξ = 1, c = 1, ħ = 1):
    G = 1 by definition — Planck units are defined to
    make G unity. Praestology interprets this: Planck
    units are the natural substrate units where the
    grain size ξ = 1, making the substrate geometry
    factor ξ²/p_env directly visible. The Planck length
    is not arbitrary — it is the substrate grain ξ.
    The Planck mass M_P = √(ħc/G) ≈ 2.18 × 10⁻⁸ kg
    is the mass at which a vortex topology's commitment
    footprint equals one substrate grain area — the
    minimum mass for classical gravitational behaviour.
    Below M_P, quantum Tik fluctuations dominate over
    gravitational commitment — the quantum gravity regime
    which under Praestology is simply the regime where
    Tik fluctuation amplitude exceeds the gravitational
    Φ gradient. No new physics required at the Planck scale;
    just the Tik-dominated vs commitment-dominated crossover.

  testable_prediction:
    primary: >
      In regions of varying p_env (near strong gravitational
      sources or in cosmic voids), effective G should show
      subtle correlated deviations with local substrate
      impedance R — the same p_env profile affects both
      gravity (via ξ²/p_env) and inertia (via m_eff = α·S·R).
      This is the same correlated variation predicted in
      foundations.yaml (pillar 5, commitment stress backreaction)
      — now with G's explicit p_env dependence making the
      prediction quantitative rather than qualitative.
    secondary: >
      G should be slightly smaller in cosmic voids (lower p_env
      → larger ξ²/p_env → larger G — wait: lower p_env means
      lower substrate density means higher susceptibility).
      Direction: lower p_env → higher ξ²/p_env → higher G_local.
      Voids should show slightly stronger gravitational coupling
      per unit mass — consistent with the observed void galaxy
      distribution anomaly (voids contain more structure than
      ΛCDM predicts at small scales).
    mond_connection: >
      At low acceleration (a << a₀), the nonlinear backreaction
      regime (foundations.yaml, MOND connection) effectively
      modifies G_eff. The MOND acceleration threshold a₀ may
      encode the scale at which κ transitions from linear to
      nonlinear response — making a₀ derivable from κ's
      nonlinear onset. G and MOND are then related via the
      same κ parameter — a strong internal consistency constraint.
    precision_tests: >
      Fifth force experiments — torsion balance measurements
      of G at different length scales and in different
      gravitational environments. Current precision: G known
      to only 5 significant figures (worst-measured fundamental
      constant). Praestology predicts environmental dependence
      correlated with local R — distinguishable from
      systematic experimental error by correlation structure.
      Lunar laser ranging — precise measurement of Moon's
      orbit sensitive to time-variation of G. Any secular
      change in p_env (from cosmic expansion) would produce
      Ġ/G ≠ 0 at predicted level.
    confirming_note: >
      Varying G measurements — laboratory measurements of G
      show unexplained scatter of ~0.05% between experiments
      that cannot be attributed to systematic error alone.
      Possibly environmental p_env variation between
      laboratory locations and times. Praestology predicts
      this variation should correlate with local gravitational
      environment (depth below surface, nearby mass concentrations).
      Anderson et al. (2015) — G measurements correlate
      with length of day and other geophysical signals.
      Tentative but consistent with environmental p_env
      modulation of effective G.

  removes_from_mystery_list:
    G_weakness: >
      Currently: "hierarchy problem" — gravity is 10⁴²
      times weaker than EM; no explanation without fine-tuning.
      After: geometric consequence of ξ²/p_env scale separation.
      Not fine-tuned; structurally necessary.
    G_value: >
      Currently: least precisely measured fundamental constant
      (5 significant figures); no theoretical prediction.
      After: derivable from ξ, p_env, κ, α. Environmental
      dependence explains measurement scatter.
    quantum_gravity: >
