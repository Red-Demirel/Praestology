hadronic_scale_extension:
  statement: >
    The six constants derived above cover atomic physics and
    gravity. The same substrate parameters (ξ, p_env, α)
    determine the QCD scale constants — string tension σ
    and confinement scale Λ_QCD — extending the stack
    downward without new primitives. The caveat "non-nuclear,
    non-quark" in earlier versions is now a temporary boundary,
    not a structural limit.
  string_tension:
    formula: >
      σ ≈ ρ_s · κ² / ξ²
      where ρ_s is substrate density, κ = h/m_eff is the
      quantum of circulation (Onsager-Feynman), and ξ is
      the substrate grain (healing length = Planck scale).
    physical_meaning: >
      σ is the commitment density per unit length of the
      flux tube between confined quarks. The flux tube is
      a region of concentrated substrate commitment —
      high R, low η — sustained between two open partial
      windings that cannot close independently.
      The formula expresses: circulation quantum squared
      (the topological unit of the flux tube) divided by
      the grain area (the minimum spatial commitment unit)
      times the substrate density. Same parameters as ħ
      and R∞ derivations — no new inputs.
    numerical_target: "σ ≈ 0.18 GeV² (lattice QCD)"
    open_derivation: >
      Compute ρ_s and κ from GP substrate parameters.
      Verify σ matches 0.18 GeV² without free parameters.
      This is the first quantitative QCD test of the framework.

  confinement_scale:
    formula: >
      Λ_QCD ≈ ħc / ξ_core
      where ξ_core is the vortex core size — the healing
      length at the commitment density of a confined quark,
      which differs from the vacuum ξ by the local η depression.
    physical_meaning: >
      Λ_QCD is the energy scale below which quarks are
      confined — equivalently, the scale at which the flux
      tube commitment density equals the vortex core density,
      and asymptotic freedom transitions to confinement.
      ξ_core is ξ modulated by the local η at the quark
      core: ξ_core = ξ / √(1 − η_core). Near the quark
      core, η is depressed by the partial winding's own
      commitment — ξ_core is larger than the vacuum ξ,
      giving Λ_QCD < ħc/ξ_Planck, which is correct
      (Λ_QCD ~ 200 MeV << Planck energy ~10¹⁹ GeV).
    numerical_target: "Λ_QCD ≈ 200 MeV"
    open_derivation: >
      Compute η_core for a 240° or 480° partial winding
      from GP vortex stability. Derive ξ_core from η_core.
      Verify Λ_QCD = ħc/ξ_core ≈ 200 MeV.

  neutron_proton_mass_difference:
    statement: >
      Δm(n−p) = 1.293 MeV is the first sharp quantitative
      test linking the hadronic scale to the constant stack.
      It requires no new parameters — only the winding energy
      difference between 480° (d quark) and 240° (u quark)
      partial windings, computed from the same GP substrate
      parameters as m_eff.
    approach: >
      m_eff = α · S · R / c². For a partial winding of angle θ:
      S(θ) ∝ θ/720° × S_electron (winding fraction of full Möbius).
      Δm(n−p) ≈ (S(480°) − S(240°)) × α × R / c²
               = (2/3 − 1/3) × (1/3) × m_electron × (R_quark/R_electron)
      The ratio R_quark/R_electron encodes the different
      commitment environments of the quark core vs the free
      electron — derivable from η_core.
    numerical_target: "Δm = 1.293 MeV"
    significance: >
      If the framework produces 1.293 MeV from GP parameters
      alone, it closes the loop between the electron mass
      (0.511 MeV, full Möbius) and hadronic mass differences
      (partial winding fractions) without importing quark
      physics as new input. This would be a strong internal
      consistency confirmation across six orders of magnitude
      in energy scale.

  mass_ratio_chain:
    statement: >
      The conjugate chirality algebra and the fractional
      winding picture together predict mass ratios within
      hadrons. The full chain from substrate parameters:
        ξ, p_env, α  →  m_electron (full Möbius, 720°)
                      →  m_quark_bare (partial, 240° or 480°)
                      →  Δm(n−p) = 1.293 MeV
                      →  m_proton via confinement commitment
                      →  σ, Λ_QCD
      All from three substrate parameters and one topological
      rule (winding fraction = chiral fraction = charge fraction).
      The chain is not yet numerically closed — the open
      derivations above are the remaining steps.
    cross_reference: >
      quark-topology.yaml — full treatment of fractional
      windings, colour triality, confinement mechanism,
      and hadronic mass composition.

  reading_note: >
    This section is intentionally forward-looking —
    it identifies the path, not the result. Each open
    derivation listed here is a falsification opportunity:
    if the GP substrate parameters that fix α and R∞
    do not also reproduce σ and Λ_QCD, the framework
    requires revision at the hadronic scale. The constant
    stack's extension into QCD is a prediction, not a
    post-diction.

