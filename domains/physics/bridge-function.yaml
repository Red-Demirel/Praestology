quantum_gravity_from_eta:
  statement: >
    The bridge function η = φ/φ_max makes the quantum
    gravity unification explicit rather than structural.
    Quantum mechanics and gravity are not two theories
    describing different phenomena — they are two limiting
    regimes of the η field dynamics.
  regimes:
    quantum_regime:
      condition: "η ≈ 1, Tik amplitude non-negligible"
      description: >
        Near-vacuum, low commitment density. The η field
        fluctuates significantly from Tik background.
        The GP equation reduces to Schrödinger equation.
        Quantum interference, tunnelling, entanglement
        are η superposition and phase effects.
        Gravity negligible: η ≈ 1 everywhere → ∇η ≈ 0
        → no significant lensing or time dilation.
    gravitational_regime:
      condition: "η varies significantly, Tik negligible"
      description: >
        Significant commitment density from mass.
        η departs from 1 in structured ways from ∇η.
        Tik fluctuations negligible relative to η gradients.
        GR is the correct description of η field geometry
        as measured by light-based (η-sampling) observers.
        Quantum effects negligible: η variations smooth
        → no significant quantum interference.
    planck_regime:
      condition: "η → 0, ξ → ξ_min"
      description: >
        Both Tik fluctuations and η gradients are large.
        Neither limit applies — must use full saturating
        GP equation. This is not a new physics regime;
        it is the GP equation at extreme parameters.
        The saturating nonlinearity prevents η = 0.
        The Planck scale is where ξ(r) → ξ_min —
        the GP healing length at maximum commitment density.
        No singularity; no breakdown; same η field at
        extreme values.
  unification_statement: >
    The single equation:
    iħ ∂η/∂t = [-ħ²/(2m_eff)·∇²
                 + V_ext/φ_max
                 + g·η²/(1/φ_max + η²/n_sat·φ_max)
                 - μ_local/φ_max] η
    describes all three regimes continuously.
    Quantum mechanics: linearised limit of this equation
    (low commitment density, η ≈ 1, g·η² negligible).
    Newtonian gravity: time-independent limit with small
    (1-η) (weak field, GP nonlinearity negligible).
    GR: full geometric structure of η² field as seen
    by light-based observers (η varies significantly).
    Quantum gravity: full nonlinear equation at extreme η.
    One equation. All regimes. No seam. No separate
    quantisation of geometry. The quantum gravity problem
    does not arise because there was never a geometric
