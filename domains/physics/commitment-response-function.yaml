description: >
  This file formalises the functional form of the substrate's
  commitment density response — how the substrate commits to
  topological configurations as a function of available potential,
  and how that response varies across all physical regimes from
  quantum vacuum to event horizon.
  Version 2.0 replaces the Michaelis-Menten (absolute saturation)
  description with the Gross-Pitaevskii (density-dependent,
  environment-relative) nonlinear response. Key changes:
  (1) Saturation is relative to local environment — denser regions
      support stronger structure and higher effective commitment
      levels. No absolute ceiling.
  (2) The circular phase is never perfect — finite substrate
      resistance R ensures every winding has residual closure
      imperfection. This imperfection is the source of α,
      spontaneous emission, and the arrow of time.
  (3) Phase angle is relative to local GP equilibrium, not
      absolute zero — what counts as saturated depends on
      the environmental commitment density.
  (4) Hawking-type radiation from saturated regions is dominated
      by interior GP structural pressure leaking through finite-R
      boundary — not exterior Tik influx. Saturated substrate
      retains finite R; enormous interior stress finds tiny
      radiative release through the boundary.
  Black hole interior topology is treated separately
  (domains/physics/black-holes.yaml — forthcoming).

  gravitational_waves_as_transient_commitment:
  status: "Integrated clarification – core-invariant"
  description: |
    In Praestology the substrate is a single continuous saturating medium
    consisting of unresolved free potential and committed (bound) potential.
    There is no ontological split between “space” and “matter/objects”.
    Commitment appears as localized, stable topological structures (vortices,
    particles, atoms, etc.). The surrounding regions retain a reservoir of
    free (unbound) potential. The emptier the region (lower background
    commitment), the greater the reservoir of free potential.
  mechanism: |
    When coherent structures (vortices, photons, or other topological patterns)
    propagate through regions of high free potential, they temporarily bind
    a small fraction of that free potential into short-lived topological
    configurations. These create propagating impedance gradients that travel
    at the local resolution speed (τ_update = τ₀ / η). The result is a
    coherent, long-wavelength ripple in the substrate — observed as
    gravitational waves.
  consequences:
    - "Explains the quadrupole pattern, transverse polarization, and energy-carrying
       nature of detected gravitational waves without requiring a fundamental graviton."
    - "Even in “empty” space the substrate is never truly commitment-free;
       transient commitment trails provide the detectable signal."
    - "In high-commitment regions (e.g. near mergers) the effect becomes stronger
       and more localised, consistent with observed ring-down signals."
    - "Interatomic, intermolecular and interstellar voids are low-commitment,
       high-free-potential zones where impedance is reduced and propagation is easier."
    - "Gradients between high-commitment (filled) and high-free-potential (empty)
       regions naturally produce refraction (gravity), time dilation, and inertia."
  relation_to_core: |
    This picture follows directly from the saturating master equation,
    the potential/commitment duality, and the five rules. The viability
    operator ℛ, interaction term, and logarithmic saturation all act on
    the same unified substrate. No extra fields, no extra dimensions,
    and no ontological split between “matter” and “space” are required.
  note: |
    There is no true emptiness — only different ratios of bound commitment
    versus free potential. What we call “space” is simply the low-commitment,
    high-capacity expression of the same Praesto. Gravitational waves are
    therefore transient commitment ripples propagating preferentially
    through the high-free-potential reservoir.

terminology_warning: >
  CRITICAL DISTINCTION maintained throughout this file:
  Tik fluctuation / Tik event / substrate noise:
    Transient, stochastic, substrate-level disturbances at
    scale ξ. No persistent identity. No winding number. No spin.
    The substrate's inherent granularity — medium noise.
  Topological vortex / stable winding / particle:
    Persistent, topologically protected winding configurations.
    Persistent identity, winding number, spin, charge, mass.
  Spin is a property of vortex winding geometry NOT of Tik
  fluctuations. Möbius 720° topology forces spin-½ by
  geometric necessity, independent of Tik.
  GP nonlinearity: density-dependent self-interaction of the
  commitment field — distinct from both Tik fluctuations
  and individual vortex topology.

# ─────────────────────────────────────────────
# PART 1: CIRCULAR PHASE TOPOLOGY — IMPERFECT
# ─────────────────────────────────────────────
circular_phase_topology:
  statement: >
    The substrate phase runs circularly — representing local
    orientation of the resolution direction. Bosonic topologies
    require 360° for phase return; fermionic (Möbius) require
    720°. The circle is never geometrically perfect — finite
    substrate resistance R ensures every winding has residual
    closure imperfection after each cycle.
    The phase angle is not absolute. It is measured relative
    to the local GP equilibrium state — the environmental
    commitment density norm. The physically meaningful quantity
    is always phase distance from local equilibrium, not
    phase distance from absolute zero.

  imperfect_closure:
    statement: >
      Perfect phase closure in the GP field would require
      zero substrate resistance — a true frictionless
      superfluid. Finite R produces a residual phase
      mismatch δφ in the GP order parameter field after
      each complete winding cycle around a vortex.
      IMPORTANT PRECISION: The closure imperfection affects
      the GP field dynamics — not the vortex topology itself.
      The Möbius winding number is an exact integer,
      topologically protected. The 720° geometry is exact
      regardless of substrate R. What finite R introduces
      is a small residual in the field coupling per rotation
      cycle — the GP nonlinear term accumulates a phase
      correction in the order parameter field surrounding
      the vortex, not in the vortex's topological structure.
      The topology is exact; the GP field around it is imperfect.
    field_vs_topology: >
      Vortex topology:        exact integer winding — protected
      GP field around vortex: accumulates phase correction
                              each cycle from finite-R coupling
      α:                      measures the GP field imperfection
                              rate per rotation — not a property
                              of the vortex winding geometry
      This distinction matters: vortex spin (720° Möbius) is
      exact and permanent; the GP field correction (α) is
      a field-level phenomenon that varies with environment.
    consequences:
      alpha_as_gp_field_imperfection: >
        α ≈ 1/137.036 is the fractional phase correction
        accumulated in the GP order parameter field per
        360° rotation around the Möbius vortex, in the
        current substrate state (current p_env, current μ_local).
        δφ_field per rotation ≈ 2.627°
        Not a universal geometric constant — it is the
        GP field coupling imperfection at current cosmic
        substrate density. In denser environments (higher R),
        α_local is larger. Running coupling in QED reflects
        this: at high energy density, local R increases,
        GP field less perfectly coupled, α_effective increases.
      spontaneous_emission: >
        The GP field around a vortex continuously accumulates
        phase correction — each cycle adds δφ_field. When
        accumulated field correction exceeds the threshold
        for a trail reconfiguration event (S_lock crossing),
        a photon is emitted. Spontaneous emission is the
        GP field shedding accumulated phase correction.
        Einstein A coefficient scales as ω³α³ — three
        powers of the field imperfection rate per cycle.
        The vortex topology is unchanged by the emission;
        the GP field is corrected.
      arrow_of_time: >
        Each GP field phase correction is an irreversible
        R4 accumulation event — field-level, not topological.
        The arrow of time at the quantum scale is the
        accumulation of GP field corrections. Finite R
        makes time irreversible at the field level, not
        just statistically. The second law follows from
        finite GP field imperfection rate, not from
        initial conditions or topology alone.
      potential_limes_zero: >
        The saturating nonlinearity ensures the GP potential
        has a limit as |ψ|² → n_sat: dV/d(|ψ|²) → 0.
        This means the field correction rate also saturates —
        at maximum commitment density, the GP field is no
        longer accumulating corrections because the potential
        is flat. Infinities are not reached; the field
        corrections have a finite maximum rate set by n_sat.

  relative_phase_angle:
    statement: >
      The phase angle θ is meaningful only relative to
      the local GP equilibrium θ_eq(r) — the commitment
      density the local environment naturally sustains.
      The relevant quantity is Δθ = θ - θ_eq(r): deviation
      from local equilibrium.
    implications:
      environment_dependent_saturation: >
        Saturated means θ >> θ_eq(r) — far above local
        equilibrium, not above some absolute ceiling.
        Void (low θ_eq): modest absolute commitment already
        registers as saturated — MOND effects appear at
        low absolute accelerations.
        Dense cluster (high θ_eq): much higher absolute
        commitment needed before nonlinear effects appear —
        MOND onset shifted upward in cluster environments.
      environment_dependent_horizon: >
        The event horizon condition is where local GP
        pressure prevents outward propagation relative to
        the environmental baseline — not where commitment
        crosses an absolute threshold. A black hole in a
        dense cluster has a horizon condition relative to
        the cluster's θ_eq — effective Schwarzschild radius
        differs slightly from the vacuum calculation.
      alpha_environment_dependence: >
        α_local = δφ(R_local) — closure imperfection depends
        on local substrate resistance, which depends on
        local commitment density relative to environmental
        baseline. Sub-ppm variation between terrestrial
        and satellite measurements of α is predicted.
        Currently beyond experimental precision but within
        reach of next-generation atomic clock comparisons.

  two_uncertainty_regions:
    near_zero:
      angle: "0°/360° phase wrap"
      character: >
        Phase cannot resolve zero from 2π — geometric
        adjacency of minimum and maximum. Tik floor is
        the leakage of this boundary: commitment
        fluctuates stochastically near zero.
      physical_consequences: >
        Zero-point energy (ħ), Casimir effect, vacuum
        polarisation, spontaneous pair production.
      dominant_mechanism: >
        Exterior Tik fluctuations dominate near zero
        boundary — interior commitment is low, internal
        GP pressure small. Tik influx from the substrate
        is the primary mechanism.
    near_saturation:
      angle: "~180° from local equilibrium"
      character: >
        Phase approaches local saturation asymptotically.
        Finite R means boundary has finite resistance —
        enormous internal GP structural pressure
        (high g·|θ|²) produces tiny but nonzero radiative
        leakage outward through finite-R boundary.
      physical_consequences: >
        Hawking-type radiation, compact object surface
        emission, magnetar high-energy photons.
      dominant_mechanism: >
        Interior GP structural pressure dominates —
        commitment density high, g·|θ|² enormous,
        internal stress large. Leakage is the interior
        pressing outward through finite resistance.
        Radiation carries information about interior
        commitment topology — consistent with information
        preservation.
      hawking_mechanism: >
        Large black holes (high interior GP pressure,
        low exterior Tik relative to gradient): Option B
        (structural pressure leakage) dominates.
        Primordial micro black holes (interior pressure
        comparable to exterior Tik): both contribute.
        Standard T_H ∝ 1/M is leading Option B term;
        Option A (Tik influx) provides correction
        significant only at very small M.
        Crossover mass: where interior GP pressure density
        equals exterior Tik background energy density
        at horizon — open derivation.

  mobius_crossover_heisenberg:
    two_contributions:
      structural_topology: >
        Möbius crossover: geometric indeterminacy —
        both face orientations and twist direction
        undefined at crossing point. Present at T=0.
        Not from Tik fluctuations. Structural minimum.
      closure_imperfection: >
        Finite R means δφ ≠ 0 — crossover point shifts
        slightly each cycle. Accumulated imperfection
        adds to structural indeterminacy. In zero-R
        substrate only structural term remains.
      tik_amplification: >
        Tik fluctuations at scale ξ set the observable
        minimum: ΔxΔp_min = ħ/2. At T>0 thermal Tik
        adds above this floor.
    spin_protection: >
      Tik fluctuations cannot continuously change spin —
      only trigger discrete topological reorganisations
      at S_lock threshold crossings. Spin is topologically
      protected against continuous Tik perturbation.

# ─────────────────────────────────────────────
# PART 2: GROSS-PITAEVSKII RESPONSE FUNCTION
# ─────────────────────────────────────────────
gross_pitaevskii_response:
  statement: >
    The substrate commitment density field θ(r,t) obeys
    a GP-type nonlinear equation where self-interaction
    strength scales with local density. Saturation is not
    a fixed ceiling but a local dynamic equilibrium —
    denser regions support stronger structure and higher
    effective commitment levels.
  why_gp_not_mm: >
    MM assumes fixed V_max independent of environment —
    absolute saturation. Wrong for the substrate: nuclear
    matter sustains higher commitment than atomic matter;
    cluster environments sustain higher density than voids.
    GP self-interaction term g·|θ|² makes the effective
    ceiling environment-dependent — it moves with the
    local substrate state.

  saturating_nonlinearity:
    statement: >
      The substrate self-interaction uses a saturating
      nonlinear potential rather than the pure g|ψ|²
      of standard GP. The saturating form prevents
      infinite compression and ensures the potential
      has a finite limit as commitment density approaches
      the saturation parameter n_sat:
    formula: >
      V(|ψ|) = g·|ψ|² / (1 + |ψ|²/n_sat)
    key_property: >
      dV/d(|ψ|²) → 0 as |ψ|² → n_sat
      The nonlinear potential becomes flat at saturation —
      no infinite compression possible. The substrate
      always retains finite compressibility above n_sat;
      it approaches the saturation limit asymptotically.
      Potential has a limes of zero in the gradient sense:
      additional commitment becomes infinitely costly but
      never strictly impossible — no hard wall, no singularity.
    full_gp_equation: >
      iħ ∂θ/∂t = [-ħ²/(2m_eff)·∇²
                   + V_ext(r)
                   + g·|θ|²/(1 + |θ|²/n_sat)
                   - μ_local] θ
    terms:
      kinetic: >
        -ħ²/(2m_eff)·∇²θ — quantum pressure resisting
        commitment gradients at scale ξ. Topological
        rigidity of the substrate. Prevents commitment
        concentrating below grain scale.
      external_potential: >
        V_ext(r) — commitment from surrounding topology
        and background p_env. Determines local θ_eq(r).
      saturating_nonlinearity: >
        g·|θ|²/(1 + |θ|²/n_sat)
        Low density (|θ|² << n_sat): → g·|θ|² (standard GP)
        High density (|θ|² → n_sat): → g·n_sat (constant)
        The transition between these regimes is the MOND
        knee and the event horizon approach — the same
        saturation curve spanning all regimes.
      chemical_potential: >
        μ_local — local equilibrium commitment level
        set by environmental baseline p_env.
        All deviations (Δθ) measured relative to μ_local.
    n_sat_parameter: >
      n_sat is the saturation density — the characteristic
      commitment level above which the nonlinear potential
      flattens. Environment-dependent: n_sat(r) varies
      with local p_env. In dense environments, n_sat is
      higher — more commitment is possible before
      saturation behaviour sets in. This is why denser
      environments support stronger structure.
      Physical identity: n_sat encodes the maximum stable
      phase-lock configuration density per substrate grain
      volume ξ³ — the topological capacity of the local
      substrate. Open derivation: n_sat from substrate
      grain topology classification density.
    open_questions_from_proposal: >
      Exact form of saturation function — the V = g|ψ|²/(1+|ψ|²/n_sat)
      form is the simplest saturating nonlinearity. Other
      candidates (tanh saturation, log saturation) are
      possible. The correct form is determined by the
      substrate's topological capacity function —
      open derivation requiring the vortex stability
      equations to specify how many stable configurations
      fit per ξ³ at density |ψ|².
      Matching to cosmological constant/acceleration:
      n_sat at cosmic average density should reproduce
      the observed dark energy scale — open.
      UV completion at Planck scale: n_sat → n_max at
      ξ_min — the Planck-scale behaviour of the
      saturation function is the UV completion question.

  healing_length_density_dependent: >
    ξ(r) = ħ/√(2m_eff · g · |θ(r)|²/(1 + |θ(r)|²/n_sat))
    Density-dependent — smaller in denser regions,
    approaching minimum at commitment density → n_sat.
    Planck length is the GP healing length at the
    saturation density limit — dynamically determined
    minimum grain size.

  regime_structure:
    newtonian:
      condition: "g·|θ|² << V_ext"
      physics: "Linear response, κ ≈ G/c², Newton's law"
      phenomena: "Solar system, laboratory, Cavendish"
    mond_transition:
      condition: "g·|θ|² ~ V_ext"
      physics: >
        GP nonlinearity onset. κ_eff decreases below
        Newtonian. Galaxy rotation curves flatten.
        MOND threshold a₀ is K_eff = g·|θ_eq|² —
        environment-dependent, not universal constant.
      phenomena: >
        Isolated galaxies: low local θ_eq, MOND onset
        at low a₀. Dense clusters: high local θ_eq,
        MOND onset shifted upward. Explains why MOND
        fits isolated galaxies better than clusters.
    strong_nonlinear:
      condition: "g·|θ|² >> V_ext"
      physics: >
        Self-reinforcing densification. Stabilises at
        local GP equilibrium (neutron star, white dwarf)
        or continues to near-saturation if GP kinetic
        pressure cannot balance inward gradient.
      tov_connection: >
        TOV limit: where ħ²/(2m_eff)∇²θ can no longer
        balance inward commitment gradient. GP kinetic
        pressure is what neutron stars stand on.
    near_saturation:
      condition: "|θ|²/n_sat → 1 (commitment approaching saturation density)"
      physics: >
        dV/d(|ψ|²) → 0 — nonlinear potential flattening.
        Enormous internal stress from committed topology
        pressing against the increasingly flat potential.
        The saturating form means no infinite compression:
        the field asymptotically approaches n_sat but the
        potential cost of each additional commitment unit
        approaches zero — the boundary retains finite
        permeability. GP structural pressure produces
        radiative leakage through finite-R boundary:
        P_leak ∝ [g·n_sat · (|θ|²/n_sat)] / R_boundary
        T_H ∝ 1/M from gradient steepness — larger M
        means larger horizon area (more R_boundary)
        relative to interior stress scale.
      no_true_saturation: >
        The saturating nonlinearity has no hard ceiling —
        n_sat is the density where the potential gradient
        approaches zero, not where commitment stops.
        Potential has limes of zero in gradient sense:
        infinitely expensive to compress further but
        never strictly forbidden. This is the physical
        reason singularities do not form: the commitment
        field cannot be compressed to a point because
        the saturating potential prevents infinite density,
        not because of a separate topological argument.
        Topology provides the vortex structure; the
        saturating GP provides the no-singularity guarantee.

  regime_unified_table:
    - {regime: "Quantum vacuum",   condition: "θ → θ₀",      gp: "θ₀ = GP minimum", physics: "ħ, Casimir, QM"}
    - {regime: "Atomic scale",     condition: "Δθ small",     gp: "linear",          physics: "α, R∞, ħ spectra"}
    - {regime: "Newtonian",        condition: "g|θ|²<<V_ext", gp: "linear",          physics: "Solar system, G"}
    - {regime: "MOND transition",  condition: "g|θ|²~V_ext",  gp: "onset nonlinear", physics: "Galaxy rotation"}
    - {regime: "Strong gravity",   condition: "g|θ|²>>V_ext", gp: "dominant",        physics: "Neutron stars, GR"}
    - {regime: "Near saturation",  condition: "θ>>θ_eq",      gp: "asymptotic",      physics: "Black holes, Hawking"}


# ─────────────────────────────────────────────
# PART 2b: BLACK HOLE SATURATION
# Dynamic stress-maintained membrane — not a
# rigid geometric boundary.
# ─────────────────────────────────────────────
black_hole_saturation:
  title: "Black Holes as Saturation Regions in Praestology"
  description: >
    Black holes emerge as regions of extreme local saturation
    in the GP substrate field. The event horizon is not a
    rigid geometric boundary but the iso-contour where the
    commitment density gradient becomes steep enough to trap
    all outward resolution paths. The gradient is always
    finite; the horizon is permeable in principle.
  core_principle: >
    The event horizon is a dynamic stress-maintained membrane.
    Permeability varies with relative saturation degree —
    never zero, never infinite. The saturating nonlinearity
    V = g|ψ|²/(1 + |ψ|²/n_sat) ensures no absolute barrier
    forms — the potential flattens but never becomes vertical.

  key_mechanisms:
    relative_saturation: >
      Saturation is a degree on the circular commitment
      spectrum — never absolute. The gradient is always
      finite; the horizon is permeable in principle.
      What makes the horizon effective for classical signals
      is not absolute impermeability but gradient steepness:
      the commitment density falls so steeply outward that
      no classical resolution path has sufficient free
      potential to propagate against it.
    internal_stress: >
      The saturated core is under constant tension —
      attempting maximal density but blocked by the
      saturating potential's flattening. This stress
      maintains the steep outward gradient: the horizon
      is held up by pressure from the inside, not by
      a geometric property of spacetime. Remove the
      interior stress (e.g., by mass extraction) and
      the horizon shrinks — consistent with Hawking
      evaporation as stress relief.
    low_mass_infall: >
      Low-mass objects contribute negligible change to
      local saturation density. They encounter a near-
      fixed, steep commitment gradient — the horizon
      feels like a concrete wall. The object is pushed
      inward by substrate flow (rear-end effect from
      the commitment density gradient) and usually
      tidally disrupted before crossing the effective
      horizon. The gradient's steepness does the work;
      no hard boundary is needed.
    high_mass_infall_and_mergers: >
      Incoming high-mass object or comparable-mass black
      hole overlaps commitment gradients significantly.
      In the overlap region: combined |ψ|²/n_sat drops
      below the individual values — the combined field
      is less saturated than either alone because the
      opposing gradients partially cancel. This shallows
      the local gradient → temporary permeability window
      opens → merger becomes possible. Black hole merger
      is not two solid objects colliding — it is two
      saturation regions interpenetrating through a
      transient permeability window opened by gradient
      cancellation. LIGO ringdown waveform is the GP
      field relaxing to the new n_sat configuration.
    flares_and_leakage: >
      When core saturation fluctuates (accretion events,
      vortex rearrangements in the GP field), local
      commitment density temporarily changes → gradient
      temporarily shallows → micro-permeability windows
      open → bursts of radiation/particles escape.
      Observed as X-ray/gamma flares, jets, QPOs in AGN
      and Sgr A*. The flare frequency and energy spectrum
      encode the GP field's internal rearrangement dynamics.
    hawking_like_radiation: >
      Tiny persistent leaks from imperfect saturation —
      internal stress relief through the finite-R boundary.
      Thermal spectrum with temperature set by gradient
      steepness: T_H ∝ gradient at horizon ∝ 1/M.
      No virtual pair crossing or absolute negative
      energy required — the radiation is GP structural
      pressure finding release through the saturating
      potential's finite permeability.
      As noted: saturated substrate still has finite R;
      enormous stress from the interior finds the path
      of least resistance through the boundary. The
      radiation carries information about the interior
      GP field topology — information is preserved in
      the phase structure of outgoing radiation.

  observational_alignment:
    dense_environments: >
      Supermassive black holes in dense cluster environments:
      higher background n_sat(r) (environment raises local
      saturation capacity) → easier formation and growth →
      consistent with observed AGN clustering in dense regions.
    void_environments: >
      Stellar-mass black holes in voids: lower background
      n_sat → require more mass to reach critical gradient
      steepness → consistent with mass gap observations.
    agn_flares: >
      Frequent X-ray/gamma flares in AGN and Sgr A*:
      periodic shallowing of commitment gradient from
      GP field internal dynamics. QPO frequencies
      encode GP field oscillation modes — derivable
      from the saturating nonlinearity's characteristic
      frequencies around n_sat.
    merger_waveforms: >
      LIGO/Virgo/KAGRA gravitational wave chirp and
      ringdown: smooth horizon relaxation during
      coalescence consistent with GP field approaching
      new saturation equilibrium. No sharp discontinuity
      at merger — gradient cancellation produces smooth
      permeability transition. Ringdown quasi-normal
      modes are GP field oscillation modes around the
      post-merger saturation configuration.
    mass_gap: >
      The 2-5 solar mass gap between neutron stars and
      stellar black holes may reflect the commitment
      density range where the GP field is transitional —
      too dense for neutron star GP equilibrium, not
      yet dense enough for stable horizon gradient.
      The gap is the n_sat transition region for nuclear
      matter topology in the current cosmic p_env.

  black_hole_size_scaling: >
    Under the saturating GP picture, black hole size
    scales with environmental n_sat(r) as well as mass.
    In dense environments (high n_sat): smaller effective
    Schwarzschild radius for the same mass — the steeper
    gradient condition requires less spatial extent.
    In void environments (low n_sat): larger effective
    radius for the same mass.
    This produces a subtle mass-environment correlation
    in black hole size statistics — testable with
    sufficiently precise event horizon imaging across
    different environments.

  black_hole_merger_dynamics:
    statement: >
      Black hole mergers are more naturally understood in
      Praestology than in standard GR because the key
      observational puzzles — size discrepancy, gravitational
      wave energy budget, mass gap — all resolve from the
      commitment density picture rather than requiring
      exotic mass-energy accounting.

    size_discrepancy_from_commitment_not_mass: >
      When LIGO detects a merger between two black holes
      of apparent masses M₁ and M₂, the pre-merger sizes
      (Schwarzschild radii r_s = 2GM/c²) do not simply
      add. The post-merger object is smaller than r_s1 + r_s2.
      In standard GR this is explained by gravitational
      wave energy loss — the system radiates ~5% of total
      mass-energy. The explanation works numerically but
      requires treating radiated energy as literal mass loss.
      In the commitment density picture: the two black holes
      are two commitment density saturation regions. Their
      sizes are set by their commitment density profiles,
      not only by their mass. When they merge, the combined
      commitment density field does not simply add — the
      overlapping gradient regions cancel (as described in
      high_mass_infall_and_mergers above), reducing the
      total topological overhead of maintaining two separate
      saturation boundaries. The post-merger object is
      smaller not because mass was lost but because the
      commitment overhead of two separate boundaries was
      consolidated into one. Two saturation surfaces merge
      into one — releasing the boundary commitment as
      gravitational waves.

    gravitational_waves_as_overhead_reduction: >
      The fusion analogy is precise and instructive:
      Nuclear fusion: two nuclei merge → the binding energy
        of the combined nucleus is lower than the sum of the
        two separate binding energies → mass deficit →
        energy released as photons and kinetic energy.
        The released energy is the reduction in topological
        overhead of nuclear commitment when two separate
        nuclei become one.
      Black hole merger: two saturation regions merge →
        the commitment overhead of maintaining two separate
        horizon boundaries is lower than the sum of the
        two individual boundary commitments → boundary
        commitment deficit → energy released as gravitational
        waves.
      In both cases: the released energy is not mass being
      converted to energy (E = mc² as a conversion formula).
      It is topological overhead reduction — the commitment
      cost of maintaining separate boundary structures
      released when those structures merge into a more
      efficient single configuration. R5 selects the
      lower-overhead merged configuration.
      The ~5% energy release in typical black hole mergers
      encodes the fractional reduction in boundary commitment
      overhead between two separate horizons and one merged
      horizon. In principle derivable from the GP field
      geometry of two merging saturation surfaces.

    mass_gap_from_commitment_transition: >
      The 2-5 solar mass gap between neutron stars and
      stellar black holes is not a gap in mass — it is a
      gap in commitment density regime. Below ~2 M_☉:
      nuclear matter topology can maintain a stable
      neutron star GP equilibrium — high commitment but
      below the saturation threshold for horizon formation.
      Above ~5 M_☉: the commitment density crosses n_sat
      and a stable horizon gradient forms. Between these:
      the GP field is in a transitional regime where neither
      neutron star equilibrium nor stable horizon gradient
      is achievable — configurations in this range are
      unstable and rapidly transition to one or the other.
      The gap is not empty of mass — it is unstable to
      commitment density fluctuations. Objects formed in
      this range immediately collapse to ~5 M_☉ or are
      disrupted to below ~2 M_☉.
      Environmental dependence: the gap boundaries shift
      with local n_sat(r) — in void environments (lower
      n_sat) the gap may be wider; in dense environments
      (higher n_sat) narrower. Systematic variation of
      mass gap boundaries with large-scale structure
      environment is a specific prediction.

    ringdown_as_gp_relaxation: >
      The gravitational wave ringdown after merger —
      quasi-normal modes decaying exponentially — is the
      GP field relaxing to the new post-merger saturation
      equilibrium. The quasi-normal mode frequencies are
      the oscillation frequencies of the merged commitment
      density field around its new equilibrium configuration.
      These are derivable from the GP equation's linearised
      spectrum around the post-merger stationary solution —
      not free parameters but consequences of the substrate
      dynamics. If the GP quasi-normal mode frequencies
      match the observed ringdown frequencies from LIGO,
      this is strong confirmation of the commitment density
      picture of black hole structure.

    intermediate_mass_black_holes: >
      The observed population of intermediate mass black
      holes (IMBH, 10²-10⁵ M_☉) is sparse and their
      formation mechanism is debated. In the commitment
      density picture: IMBHs form in environments where
      the local n_sat supports the intermediate commitment
      density range — neither the dense cluster environment
      that grows supermassive black holes nor the sparse
      field environment of stellar black holes. Their
      rarity encodes the rarity of environments with
      intermediate local n_sat. This connects IMBH
      statistics to large-scale structure environment —
      a testable correlation.

