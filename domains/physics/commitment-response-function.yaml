dissolution_as_renewal:
  name: "Dissolution as Renewal — Controlled Un-committing Kernel"
  version: "0.1 — Proposed extension; maintains core invariance"
  status: "Proposed — physical manifestations identified; numerical calibration open"
  ontological_justification: >
    R5 demands perpetual sustainability: perfect irreversibility
    would eventually exhaust all free potential — φ → 0 everywhere
    — producing total stasis and R3 failure. The metastable zone
    between noise and void requires both commitment (R_forward)
    and controlled release (R_diss). Dissolution is not loss —
    it is the breathing cycle of the engine. History becoming
    fuzzy over time is the renewal mechanism that turns yesterday's
    resolved dilemmas into tomorrow's raw material for new resolution.
    This closes a logical gap: R4 accumulates irreversibly, but
    R5 requires the process to continue indefinitely. The dissolution
    kernel is the mechanism that makes R4 accumulation sustainable
    under R5 — not by reversing R4 globally (which would violate
    it) but by slowly returning weakly protected committed topology
    to the free potential reservoir, making room for new R4 accumulation.

  full_r_psi:
    statement: "R(Ψ) = R_forward(Ψ) + R_diss(Ψ)"
    r_forward:
      formula: "R_forward(Ψ) = g|Ψ|² / (1 + |Ψ|²/n_sat)"
      description: >
        Saturating commitment valve — locks potential into committed
        structure. Fast timescale (quantum/nuclear). Produces particle
        stability, mass, confinement. Hermitian. Already in v2.0.
    r_diss:
      formula: "R_diss(Ψ) = −ε|Ψ|² / (1 + τ_diss|Ψ|²) · f(topological_protection)"
      description: >
        Dissolution kernel — slowly returns weakly protected committed
        topology to the Praegress reservoir. Slow timescale (decay,
        biological, cosmological). Non-Hermitian contribution —
        introduces imaginary component producing probability decay.
    parameters:
      epsilon: >
        ε — base dissolution rate. Must satisfy:
        ε << 1/(proton lifetime) ≈ 10⁻³⁴ yr⁻¹.
        Calibrated from radioactive decay rates and cosmological
        renewal timescales (~10-100 Gyr).
      tau_diss: >
        τ_diss — topological fatigue timescale. Prevents runaway
        dissolution at extreme commitment density (black hole cores).
        At |Ψ|² >> 1/τ_diss: R_diss saturates to −ε/τ_diss · f.
      f_topological_protection: >
        f(topological_protection) — topology-dependent modulation.
        f ≈ 0: strongly wound (proton, electron) — effectively stable.
        f ≈ 1: weakly wound (unstable isotopes, molecular patterns,
          large-scale structure) — full dissolution rate applies.
        Candidate form: f ≈ exp(−n_winding · R_eff / R_threshold)
        where R_eff = R₀/η. In voids (η high, R_eff low): f increases
        for weakly protected topology — void dissolution enhancement.
        In dense environments (η low, R_eff high): f decreases —
        binding suppresses dissolution.

  physical_manifestations:
    radioactive_decay: >
      Topological charge leakage at rate ε_eff = ε · f(topology).
      Half-life = ln(2)/ε_eff. The full spectrum of nuclear half-lives
      — from milliseconds to billions of years — maps to the range
      of f values across nuclear winding topologies. Not fitted:
      f is derivable from vortex-stabilization.yaml winding numbers.
      Void enhancement: half-lives of unstable nuclei slightly shorter
      in void environments (lower R_eff → higher f). Potential
      explanation for contested reports of environment-dependent
      decay rates (Jenkins et al. and subsequent measurements).

    memory_pruning: >
      Synaptic engrams (weakly committed neural topology) fade unless
      reinforced — R_diss acting on biological commitment patterns.
      Memory consolidation reduces f for specific patterns by
      increasing their effective topological protection (repeated
      activation increases local commitment density, raises |Ψ|²,
      which via τ_diss suppresses the dissolution rate).
      Forgetting is not failure — it is R_diss maintaining the
      neural substrate's capacity for new commitment (R5 sustainability
      at the cognitive scale).

    cosmic_structure_relaxation: >
      Accumulated large-scale committed structure (filaments, halos,
      sheets) gradually returns to the Praegress reservoir on Gyr
      timescales. Released commitment feeds the void-outward substrate
      pressure identified in cosmological-expansion-critique.yaml.
      The dark energy-like pressure is partially dynamic — not a
      constant but varying with the age and commitment density of
      large-scale structure. Old, weakly protected structure dissolves
      faster; young, dense structure dissolves slower.

    black_hole_evaporation_analogue: >
      At extreme commitment density (near n_sat), R_diss saturates
      to −ε/τ_diss · f. With f → 0 for maximally wound topology
      but non-zero from finite τ_diss, residual dissolution of the
      black hole core generates slow internal free potential buildup.
      This is the internal dissolution mechanism distinct from
      Hawking radiation. For supermassive black holes where T_H ≈ 0,
      R_diss may be the dominant long-term evolution mechanism.
      Black holes are more dynamic than currently thought —
      not static objects but slowly breathing commitment structures
      whose interiors evolve on cosmological timescales via R_diss.

  invariance_check: >
    The dissolution kernel must not violate the established framework:
    (1) Proton/electron stability: f ≈ 0 for these topologies at
        all η values. Lifetime > 10³⁴ yr preserved by construction.
    (2) Sextuple constant convergence: R_diss is non-Hermitian but
        small (ε << 1). Its perturbative effect on α, R∞, ħ, Z₀,
        ΔE_L, G must be below measurement precision. Verify: the
        imaginary part of eigenvalues from R_diss << real part for
        all stable particle topologies.
    (3) Thermodynamic consistency: total dissolution rate integrated
        over the universe must balance Tik nucleation rate — the
        substrate's overall commitment density evolves toward a
        steady state (R5), not toward zero or infinity.

  open_numerical_tasks:
    - >
      Calibrate ε and τ_diss from observed half-lives (³H: 12.3 yr,
      ¹⁴C: 5730 yr, ²³⁸U: 4.47 Gyr) while preserving sextuple
      convergence and proton stability. Three constraints; two
      parameters — overdetermined, which is a falsification test.
    - >
      Derive f(topological_protection) from vortex-stabilization.yaml
      winding numbers. Predict half-lives for a range of unstable
      nuclei from f values. Compare to measured half-life spectrum.
    - >
      Compute void enhancement factor: Δf/f = (R_threshold − R_eff)/R_threshold
      for the KBC void η contrast (~20-30% underdensity). Predict
      the fractional change in decay rates for ¹⁴C in void vs
      filament environments. Current measurement precision is ~10⁻⁴
      per year — borderline detectable.

