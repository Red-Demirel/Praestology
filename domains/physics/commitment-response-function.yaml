intergalactic_and_bh_dissolution_extensions:
  name: "Inter-Galactic Dissolution and Black-Hole Environmental Sensitivity"
  version: "0.1 — Proposed refinement; core-invariant"
  status: "Proposed — mechanisms identified; quantitative calibration open"

  intergalactic_dissolution:
    statement: >
      Low local resistance in voids (high η, low R_eff) accelerates
      R_diss for weakly protected committed topology. The gradual
      return of potential to the Praegress reservoir produces:
      (a) A path-dependent redshift contribution — photons traversing
          void regions accumulate additional redshift from the
          dissolution pressure in those regions.
      (b) A diffuse outward pressure from the released potential —
          the substrate breathing outward from voids, contributing
          to the apparent expansion signal.
      Both effects were previously attributed to cosmic expansion
      or dark energy. They are the dissolution kernel operating
      in low-resistance environments.
    link: "domains/cosmos/cosmological-expansion-critique.yaml"

  tired_light_path_integral:
    statement: >
      Cumulative dissolution along photon paths produces a
      path-dependent redshift component — distinct from
      density-transition redshift (boundary-crossing) but
      related. Where density-transition redshift is a discrete
      boundary effect, dissolution redshift is a continuous
      low-level energy leak from the substrate's R_diss in
      low-R_eff void regions.
    formula: >
      Δz_diss ≈ ∫_path ε · f(R_eff(s)) · |Ψ(s)|² ds
      Path integral of dissolution rate along the photon path.
      Amplified in voids (high f from low R_eff).
      Suppressed in filaments (low f from high R_eff).
    distinction_from_tired_light: >
      NOT the Zwicky tired light mechanism (continuous energy loss
      proportional to path length, falsified by surface brightness
      scaling). This is path-dependent dissolution: varying rate
      along the path, concentrated in void regions, correlated
      with large-scale structure. The two produce different
      redshift-distance relations and different surface brightness
      predictions — distinguishable.
    prediction: >
      The dissolution redshift component should correlate with
      the integrated void fraction along the line of sight —
      photon paths through more void volume accumulate more
      Δz_diss than paths through the same distance but through
      more filaments. Testable with precision redshift surveys
      cross-correlated with void catalogues (DESI, Euclid).

  bh_environmental_migration:
    statement: >
      When a black hole migrates from a high-R_eff environment
      (dense cluster) to a low-R_eff environment (void), or
      when the surrounding commitment density decreases (cluster
      dispersal, AGN feedback evacuating the environment), the
      local n_sat drops. The black hole's existing commitment
      density profile now exceeds the new local n_sat — it is
      over-committed relative to its environment.
    consequence: >
      The excess commitment relative to the new local n_sat
      spikes the topological fatigue parameter τ_diss — the
      black hole's commitment density is now in a regime of
      higher environmental mismatch, which accelerates R_diss
      at the horizon boundary. This produces:
      Enhanced jet activity — the R_diss spike at the horizon
        generates episodic topological release via the jet channel.
      Increased flare frequency — internal commitment density
        fluctuations become more pronounced as the equilibrium
        shifts to a new lower n_sat configuration.
      Partial evaporation signatures — enhanced Hawking-like
        radiation as horizon permeability temporarily increases
        during the equilibrium readjustment.
    observable: >
      Black holes in recently dispersed cluster environments
      (post-merger clusters, AGN-feedback-evacuated regions)
      should show elevated jet and flare activity compared to
      black holes in stable dense environments or stable voids.
      The activity should decay on the τ_diss timescale as the
      black hole reaches its new environmental equilibrium.

  dark_energy_reinterpretation: >
    The positive pressure from controlled dissolution of committed
    potential in voids — the substrate breathing — is a component
    of the observed acceleration signal. Combined with the
    density-transition redshift (boundary-crossing) already in
    cosmological-expansion-critique.yaml, the full picture:
    (a) Density-transition redshift: discrete, at boundaries
    (b) Dissolution redshift: continuous, in void interiors
    (c) Void-outward substrate pressure: from released potential
    All three contribute to what was interpreted as dark energy
    and accelerating expansion. None require Λ as a fundamental
    constant. All are consequences of R_diss operating in the
    low-R_eff void environment.

  overdetermined_calibration_gate: >
    The (ε, τ_diss) calibration is constrained by five
    independent observational inputs — two parameters, five
    constraints. Strongly overdetermined; rigorous falsification test:
    Constraint 1: proton lifetime > 10³⁴ yr
    Constraint 2: ¹⁴C half-life = 5730 yr
    Constraint 3: cosmic renewal timescale ~ 10-100 Gyr
    Constraint 4a: observed void-redshift rate from Δz_diss integral
    Constraint 4b: BH jet/flare statistics from R_diss spike timescale
    Constraint 5: angular broadening statistics from regress diffusion
    If no (ε, τ_diss) pair simultaneously satisfies all five,
    the dissolution kernel requires structural revision.

