# REGRESS DIFFUSION LENS
# High-φ substrate as a distributed diverging lens
# ─────────────────────────────────────────────

regress_diffusion_lens:
  name: "Regress-Effect — High-φ Diffusion Lens on Photons"
  version: "0.1 — Proposed refinement; core-invariant"
  status: "Proposed — mechanism identified; quantitative derivation open"

  distinction_from_dissolution_redshift: >
    Dissolution redshift is an energy loss mechanism — the photon
    loses energy to the Praegress reservoir via R_diss in void regions
    (Δz, frequency shift). The regress diffusion lens is geometrically
    distinct: not energy loss but wavefront broadening. The photon's
    transverse spatial extent increases as it traverses high-φ void
    regions, producing apparent dimming and angular broadening without
    frequency shift. Both mechanisms coexist; confusing them is the
    standard model error that collapses all dimming into a single
    expansion signal.

  mechanism:
    transverse_tik_pull: >
      In a high-φ void, the substrate is near-uniform free potential —
      no strong ∇C gradient to bias the Tik background. The Tik
      fluctuations are omnidirectional. Their transverse components
      exert gentle, random transverse displacements on the photon's
      vortex pair — not along the propagation direction (which would
      shift frequency) but perpendicular to it (which broadens the
      wavefront). Each Tik event adds a small random δr⊥. Over path
      length L through void regions, these accumulate as a random walk:
        σ⊥ ~ √(L_void / λ_Tik) · δr_Tik
      The wavefront broadens as √L_void — a distributed diverging lens.
    dense_regions: >
      In dense regions (low φ, high commitment), the Tik background
      is suppressed relative to the commitment structure. The ∇C
      gradient dominates — gravitational convergence, not diffusion.
      The regress diffusion effect is negligible in matter-rich
      environments. It is a void-specific phenomenon.

  observational_signatures:
    angular_broadening: >
      Distant point sources traversing long void paths appear slightly
      resolved. Angular broadening scales as √L_void / d_angular.
      For radio waves (large λ): effect suppressed. For optical/UV
      (small λ): larger effect. Future space-VLBI and ngVLA may
      detect as anomalous angular size vs redshift for sources
      behind identified voids.
    apparent_dimming_without_redshift: >
      Wavefront broadening reduces surface brightness (∝ θ_diff²)
      without shifting frequency. Contributes to supernova brightness
      deficit alongside dissolution redshift. Three contributions
      to dimming now identified:
        (a) Gravitational: standard distance modulus
        (b) Dissolution: Δz_diss energy loss in voids
        (c) Regress diffusion: Δθ_diff angular broadening in voids
      Separating them requires measuring redshift, angular size, and
      surface brightness independently — achievable with Rubin LSST
      and Euclid for large samples.
    void_path_dependence: >
      Broadening is stronger along lines of sight through more void
      volume. Sources behind cosmic voids should show more angular
      broadening than sources at the same redshift behind filament-
      rich paths. Testable by cross-correlating angular sizes with
      void catalogues.

  relation_to_dual_r: >
    Three photon-path effects now formally distinct:
    R_forward (dense): ∇C converging lens — gravitational lensing.
    R_diss (void): dissolution energy loss — mild frequency shift.
    Regress diffusion (high-φ Tik): wavefront broadening — apparent
      dimming without frequency shift.
    Together these replace "cosmological redshift + dark energy" with
    three physically distinct, separately measurable effects.

  open_numerical_tasks:
    - >
      Derive θ_diff from integrated high-φ exposure along z ≈ 0.5
      path. Requires Tik background amplitude at η ≈ 1, δr_Tik from
      ξ and GP fluctuation spectrum, effective void fraction.
      Predict angular broadening for Type Ia supernova at z = 0.5.
    - >
      Separate three dimming contributions. Show their sum reproduces
      observed brightness deficit without dark energy using same
      (ε, τ_diss) from nuclear calibration.
    - >
      Incorporate as Constraint 5 in overdetermined calibration gate.

