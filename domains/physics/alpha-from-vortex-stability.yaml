measurement_substrate_discrepancy:
  statement: >
    All measurements of fundamental constants are performed
    from outside the committed structures being measured.
    The measuring apparatus and the subject both perturb
    the local η field — each commits substrate, reducing
    the local free potential in the measurement region.
    Therefore the measured value α_exp is not the "true"
    internal coupling efficiency α_int of an isolated vortex
    in perfect vacuum, but the external projection in a
    substrate slightly depressed by the subject's own
    presence and the apparatus's committed topology.
  prediction: >
    α_exp should vary systematically with the local η
    environment — different measurement techniques, different
    apparatus materials, different energy scales — all
    converging on the same α_int only after correcting for
    the self-depression effect (extrapolating to zero
    self-depression, i.e. η → η_vacuum).
  implication: >
    The small discrepancies between precision measurements of
    α are not purely experimental errors — they are real
    signals of the substrate's response to the measurement
    configuration. Each technique has a different self-
    depression profile; each gives a slightly different α_exp.

  connection_to_pi_series:
    statement: >
      The pi-series formula 4π³ + π² + π = 137.036304
      may be α_int⁻¹ — the bare topological coupling of an
      isolated Möbius vortex with no self-depression.
      The CODATA value 137.035999 is α_exp⁻¹ — measured
      with self-depression from the electron's own η field
      and the measurement apparatus. Difference: 0.000305
      (2.2 ppm) — the self-depression correction magnitude.
    direction: >
      Apparatus commitment depresses local η → increases
      local Z_eff → slightly modifies the effective coupling
      projection. The sign and magnitude of the correction
      depend on the specific η regime and the nonlinearity
      of the GP saturation function at the measurement scale.
      The 2.2 ppm difference is consistent with a leading-order
      self-depression correction at the electron scale.
    implication: >
      If confirmed: the pi-series is the correct bare formula
      α_int⁻¹ = π(4π² + π + 1), and CODATA measurements
      always include a self-depression correction. The "true"
      isolated-vortex coupling is slightly weaker (α⁻¹ slightly
      larger) than any measurement can directly access.

  current_precision_measurements:
    description: >
      The spread between independent high-precision α
      measurements is currently attributed to experimental
      systematics. The proposal predicts part of this spread
      is real — encoding different self-depression profiles
      of different measurement techniques.
    measurements:
      - method:   "Electron g-2 (Harvard/Northwestern)"
        value:    "α⁻¹ = 137.035999084(21)"
        apparatus: "Penning trap — electron in strong magnetic field"
        depression: "Electron self-field + magnetic field commitment"

      - method:   "Rubidium atom interferometry"
        value:    "α⁻¹ = 137.035999206(11)"
        apparatus: "Rb atomic cloud in optical lattice"
        depression: "Rb electron configuration commitment (Z=37)"
        note:     "Higher α⁻¹ than Cs — higher Z → more depression?"

      - method:   "Caesium atom interferometry"
        value:    "α⁻¹ = 137.035999046(27)"
        apparatus: "Cs atomic cloud in optical lattice"
        depression: "Cs electron configuration commitment (Z=55)"
        note:     "Lower α⁻¹ than Rb despite higher Z — nonlinear effect"

      - method:   "Quantum Hall effect"
        value:    "α⁻¹ = 137.035997(~)"
        apparatus: "2D electron gas in semiconductor"
        depression: "Solid-state material commitment — highest depression"
        note:     "Lowest α⁻¹ — consistent with highest apparatus commitment"

    rb_cs_discrepancy: >
      The Rb-Cs difference (137.035999206 vs 137.035999046)
      is 1.6 × 10⁻⁷ — currently the most significant
      unexplained precision discrepancy in α measurements.
      Standard model: should be zero (same fundamental constant,
      different measurement methods should converge).
      Praestology prediction: the difference encodes the
      different η depression profiles of Rb (Z=37) vs Cs (Z=55)
      atomic commitment densities. The discrepancy should
      correlate with the difference in atomic electron
      configuration commitment — derivable from the atomic
      commitment density at the measurement scale.
      This is testable: measure α with other alkali atoms
      (Li, Na, K, Rb, Cs, Fr) and plot α_exp vs atomic
      commitment density. Standard model predicts no
      correlation. Praestology predicts a systematic trend.

  achieving_alpha_int:
    statement: >
      Measuring α_int — the true bare coupling — requires
      either measuring from inside the vortex (impossible
      by definition: no external observer can be inside)
      or extrapolating to zero self-depression
      (η → η_vacuum, no apparatus).
    extrapolation_method: >
      Measure α_exp with multiple techniques of varying
      self-depression magnitude. Plot α_exp vs estimated
      δη for each method. Extrapolate to δη = 0.
      The zero-depression intercept is α_int.
      If the intercept is the pi-series value 137.036304,
      the formula is confirmed as the bare topological coupling.
    running_coupling_connection: >
      In QED, α "runs" with energy scale — increasing at
      higher energies (~1/128 at M_Z vs 1/137 at low energy).
      Current Praestology explanation (intuitive, not yet
      mechanistic): higher energy measurements probe smaller
      spatial scales where the self-depression from the
      vortex's own commitment footprint is larger.
      What is needed for a mechanistic treatment:
      (1) A scale-dependent overlap functional F(q²) mapping
          energy scale q² to the effective substrate region
          being probed — the resolution functional.
      (2) The self-topological burden S_burden(q²) as a
          function of the probed scale — how much of the
          Möbius self-integral's full burden is sampled at
          each q².
      (3) The capacitative saturation S_cap,sat(q²) at the
          same scale — how the photon-mode saturation threshold
          varies with the probed region.
      (4) α_eff(q²) = S_burden(q²) / (4π · S_cap,sat(q²))
          — the running coupling as a ratio of scale-dependent
          quantities, not a vacuum polarisation screening effect.
      Until this functional is derived, running coupling
      remains an intuitive explanation. The self-depression
      picture is physically motivated and directionally correct
      but is not a derivation.
      Open derivation: F(q²) from the GP field's scale-
      dependent resolution of the Möbius self-integral.
      This is a priority 2 open derivation — dependent on
      the primary α derivation being completed first.

  falsification_conditions: >
    (1) If α measurements from different atomic species show
        no systematic correlation with atomic commitment density,
        the substrate self-depression interpretation fails.
    (2) If the extrapolation to zero self-depression does not
        converge to the pi-series value (or any specific value),
        the pi-series formula is not the bare α.
    (3) If α is confirmed to be exactly the same across all
        measurement methods at current precision (no residual
        spread beyond statistical errors), the self-depression
        effect is below the current experimental floor —
        not ruled out but not confirmed.

