# domains/physics/alpha-from-vortex-stability.yaml
name: "Alpha from Vortex Stability — Multiple Candidate Formulas"
version: "1.1 — Verified Numerics"
parent_domain: "Physics"
core_version: "1.5"
status: "Exploratory — high-confidence path, numerical closure pending"
description: >
  α is the ratio of the electron's self-integral coupling
  strength (at the Möbius crossover) to the photon's
  maximum capacitative saturation threshold (S_cap,sat),
  scaled by the isotropic geometry factor 4π. It is the fundamental
  coupling constant because the electron is the first
  self-integral in the substrate — not merely two vortices
  in external alignment (capacitative / photon) but a
  single topology coupled to its own prior state (self-integral
  / electron). α measures how efficiently the self-integral
  coupling projects onto the capacitative phase space.
  All candidates are scale-invariant and emerge from the
  geometry of the Möbius self-intersection relative to the
  external dipole phase space. No external length or energy
  scales are introduced — all are pure topological ratios.
  The primary derivation path (alpha-rydberg-z0.yaml):
    α = S_burden / (4π · S_cap,sat)
  This file extends that path by identifying specific candidate
  formulas for S_burden / S_cap,sat from the vortex stability
  equations — giving multiple independent routes to the same
  numerical target.
  CODATA 2018: α⁻¹ = 137.035999084(21)
  All candidates are evaluated against this target.

