description: >
  Quantum entanglement described from substrate first principles.

  Core claim: entangled particles share a dilemma — a single unresolved
  R3 tension expressed at two or more substrate locations simultaneously.
  They are not two separate things that happen to be correlated. They are
  two expressions of one pre-commitment structure in the potential field.
  Measurement resolves the dilemma at the process layer — prior to the
  committed-topology layer where locality, c, and causal ordering apply.
  The apparent non-locality is not a violation of physical law — it is
  the process layer operating by its own rules, which are prior to the
  restrictions that the committed layer derives from it.

  This is intrinsic to Praesto: space is the substrate, unresolved
  dilemmas exist in the potential field which has no gaps, therefore a
  dilemma can be expressed at multiple spatial locations without any
  transfer between them. Distance is a committed-topology concept; the
  dilemma is pre-commitment. The interaction is real but occurs at the
  processing level where distance is not yet a defined quantity.

  The file then identifies two physical mechanisms by which shared
  dilemmas are instantiated — committed phase-lock and substrate
  resonance coupling — which are two ways the same dilemma ontology
  is physically realised. The mechanisms differ in decoherence profile,
  range, and chirality dependence.

