# RELATION TO EXISTING FILES
# What this file adds vs replaces
# ─────────────────────────────────────────────

relation_to_existing_files:
  quantum_foundation_entanglement: >
    The entanglement section of quantum-foundation.yaml
    describes committed phase-lock entanglement — mechanism 1.
    That treatment is correct and is not superseded. This
    file extends it by adding mechanism 2 (resonance coupling)
    and distinguishing the two.
    quantum-foundation.yaml should be updated to note that
    its entanglement treatment covers mechanism 1 specifically,
    and refer to this file for mechanism 2.

  vortex_stabilization: >
    The resonance condition ω_env = n · ω_vortex in
    vortex-stabilization.yaml is the formal basis for
    the resonance coupling mechanism. That condition was
    derived for vortex formation in a dynamic environment.
    This file applies it to the correlation of already-formed
    (or near-threshold) vortices through shared mode coupling.

  specifications_chirality: >
    Chirality as vortex handedness (specifications.yaml,
    electromagnetic_phenomena.charge) is the same chirality
    that determines resonance mode coupling here. The
    connection between charge (observable chirality) and
    resonance mode coupling (entanglement mechanism) is new
    in this file — charge determines which substrate modes
    a particle couples to, which determines its entanglement
    character.

