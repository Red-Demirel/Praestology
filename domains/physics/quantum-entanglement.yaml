# ─────────────────────────────────────────────
# THE TWO MECHANISMS — OVERVIEW
# ─────────────────────────────────────────────


# ─────────────────────────────────────────────
# THE DILEMMA AS THE ENTANGLING STRUCTURE
# The primary ontological account — what
# entanglement IS at the substrate level
# ─────────────────────────────────────────────

dilemma_as_entangling_structure:
  statement: >
    Entangled particles share a dilemma.
    Not a correlation. Not a predetermined property. Not a signal.
    A dilemma — a single unresolved R3 tension with multiple viable
    resolution paths, expressed at two or more locations in the
    substrate simultaneously. The entangled particles are not two
    separate things that happen to be correlated. They are two
    localised expressions of one shared unresolved tension in the
    potential field φ(r,t).
  what_a_dilemma_is: >
    In R1-R5 terms: a dilemma is the substrate state where R3
    tension exists — distinction drives toward resolution — but
    R5 has not yet selected which resolution path to commit to.
    Multiple paths remain viable simultaneously. The substrate
    holds them open. This is not epistemic uncertainty (we don't
    know which path was taken) — it is ontological openness (no
    path has been taken yet). The dilemma is genuinely unresolved.
    This is what quantum superposition describes mathematically.
    The wavefunction ψ encodes the full set of viable resolution
    paths weighted by their R5 viability — the resolution landscape
    of the dilemma. Collapse is the dilemma committing. Not the
    wavefunction "changing" — the dilemma resolving into R4.
  why_measurement_of_one_determines_the_other: >
    Measurement is a resolution event — it commits the dilemma
    locally. When the shared dilemma commits at one expression
    point, it commits entirely — not partially. A dilemma is one
    thing. It cannot resolve to "up" at one node and remain
    unresolved at another. The resolution is a single R4 event
    that the dilemma undergoes. Both nodes simultaneously reflect
    the committed outcome because they were never two separate
    dilemmas — they were one dilemma expressed in two places.
    No signal travels. The substrate updates its own state.
    The update is not a transfer across distance — it is the
    process taking a step, and committed topology reflecting
    that step at all locations where the dilemma was expressed.
  why_no_predetermined_hidden_variable: >
    The dilemma has no predetermined resolution. R3 tension
    genuinely holds multiple paths open simultaneously until R5
    selects. There is no hidden variable encoding which path
    will be taken — because no path has been taken. Einstein's
    intuition that the particle "must" carry a definite property
    before measurement assumed the particle is a committed object
    with pre-existing properties. But an unresolved dilemma is
    not committed. It is prior to commitment. You cannot assign
    a definite pre-existing property to a pre-commitment structure
    any more than you can assign a definite position to a wave
    before it breaks. Bell's theorem proves no local hidden
    variable theory works — correct. The dilemma is not a local
    hidden variable. It is a non-local substrate structure that
    is genuinely, ontologically unresolved until it commits.
  interaction_intrinsic_to_praesto: >
    A kind of interaction is not ruled out — but it is intrinsic
    to Praesto, not a transfer across distance. The two nodes of
    a shared dilemma don't interact *across* a distance because
    they were never fully separated. Distance is a property of
    committed topology — it is measured between committed
    footprints in the substrate. An unresolved dilemma has not
    fully committed to a spatial footprint. Its nodes are where
    it is expressed in partially committed topology, but the
    dilemma's unresolved core exists in the potential field φ(r,t),
    which extends across space — because space IS the substrate.
    The "interaction" is the substrate updating its own dilemma
    state. The update is local to the processing layer, even
    though its consequences are reflected at spatially separated
    committed expressions. No transfer occurs across the distance
    between the nodes — because the distance is a committed-layer
    concept being applied to a pre-commitment structure.
  epr_dissolved_precisely: >
    Einstein-Podolsky-Rosen: either (a) quantum mechanics is
    incomplete — the particles have predetermined properties not
    described by the wavefunction, or (b) there is spooky action
    at a distance — measuring one instantly affects the other.
    The dilemma framing dissolves both horns:
    (a) The wavefunction is complete — it correctly describes the
        full resolution landscape of the dilemma. There are no
        hidden predetermined properties because the dilemma is
        genuinely unresolved. Completeness is confirmed.
    (b) There is no action at a distance — measurement resolves
        the dilemma at the process layer, which is prior to the
        spatial separation that "at a distance" refers to. The
        resolution is intrinsic to the substrate, not transmitted
        across it. No spooky action. The interaction is real but
        it occurs at the processing level, not the committed-
        topology level where distance is a meaningful concept.
    EPR's either/or was exhaustive only within the assumption
    that particles are committed objects with local properties.
    The dilemma is a pre-commitment structure. The assumption
    doesn't apply.

# ─────────────────────────────────────────────
# THE PROCESS LAYER AND LOCALITY
# Why entanglement non-locality is not a
# violation of physical law but a feature of
# the processing layer that precedes physical law
# ─────────────────────────────────────────────

process_layer_and_locality:
  statement: >
    The laws of physics as we experience them — c as a speed limit,
    locality, causal ordering, the arrow of time — are descriptions
    of R4-accumulated committed structure. They are regularities of
    the process's output, not rules of the process itself.
    The processing layer — R3 tension, dilemma formation, resolution,
    R4 accumulation — operates at a level prior to those restrictions.
    Restrictions that belong to the output layer cannot retroactively
    constrain the processing layer that produces them.
  time_and_space_as_derived: >
    Time is R4 — the accumulation of resolution events counted from
    inside a resolution sequence. Space is the substrate's 3D extension
    under R5 dimensionality selection. Neither is a prior container
    within which the process operates. Both are derived from the process.
    This has a precise consequence: the process does not operate within
    time and space. Time and space are what the process looks like from
    inside committed topology. The process generates them. It is not
    constrained by them in the way that committed topology is constrained
    by them.
  c_as_r4_layer_property: >
    The speed of light c = Φ_max is the maximum rate of substrate
    resolution flux — the fastest the substrate can propagate committed
    topology changes. It is a property of the committed layer. R3
    propagation — signals, forces, influences traveling through the
    substrate as committed disturbances — is what c constrains.
    R4 resolution — a dilemma committing — is not a propagation.
    It is the process taking a step. The step is not constrained
    by c because c is a property of the propagation layer, not the
    resolution layer. The resolution produces the committed state
    that propagation then operates on.
  r4_and_the_process_stages: >
    R4 is the accumulation of resolutions — each resolution event
    is a R4 increment. The arrow of time, the "now," the progression
    of experience — these are what R4 looks like from inside the
    accumulation sequence. The measurement of time as cycles is the
    counting of R4 events from inside one of those events.
    But R4 itself — the principle that resolutions accumulate
    irreversibly — is not inside time. It is what generates time.
    The stages of the processing — R3 dilemma formation, the holding
    of multiple viable paths, the R5 selection, the R4 commitment —
    occur at a level that precedes the time measurement that would
    constrain them. The processing is not in time. Time is in
    the processing, as its accumulated output.
    This is why entanglement resolution appears instantaneous from
    outside: "instantaneous" is a temporal concept applied to a
    processing event that occurs prior to the temporal layer.
    From inside committed topology, the resolution has no measurable
    duration — not because it happened faster than c, but because
    it happened at the processing layer where the duration measurement
    doesn't apply. R4 produces durations; the R4 event itself has
    no duration in the layer where duration is measured.
  no_signalling_preserved: >
    This does not enable faster-than-light communication. The reason
    is precise: R5 selects the resolution outcome. The experimenter
    cannot choose which path the dilemma commits to — they can only
    trigger the commitment (measurement). The remote node's state
    updates when the dilemma resolves, but the remote observer cannot
    extract information from that update without a classical (committed-
    layer, c-limited) signal telling them that a measurement occurred
    and what its outcome was.
    The dilemma resolved at the process layer. The outcome propagates
    in the committed layer at c. The update is process-layer-instant;
    the information about the update is committed-layer-limited.
    No violation of no-communication theorem. No paradox.
    The two layers operate by different rules. That is not a loophole —
    it is the ontological structure of a framework where the committed
    layer is derived from the process layer, not the other way around.
  entanglement_as_natural_not_anomalous: >
    From this perspective, quantum entanglement is not weird. It is
    the most natural thing the substrate does. The process holds
    dilemmas open across the substrate — that is what R3 does.
    The substrate has no reason to treat spatially separated
    expressions of the same dilemma as independent things — they
    are not independent things. Committed topology has location
    and separation; unresolved dilemmas do not, in the same sense.
    What is genuinely surprising is that we expected particles —
    which are committed topology — to behave the same way as
    unresolved dilemmas. That expectation imported the committed-
    layer rules (locality, separability, predetermined properties)
    into a pre-commitment context where they don't apply. The
    weirdness was in the expectation, not in the phenomenon.

# ─────────────────────────────────────────────
# THE TWO MECHANISMS
# How shared dilemmas are physically instantiated
# ─────────────────────────────────────────────

two_mechanisms:
  statement: >
    Entanglement in the substrate has two distinct physical
    mechanisms — two ways a shared dilemma can be instantiated
    and maintained. They share the same fundamental ontology
    (a shared unresolved R3 tension) but differ in how that
    tension is coupled and sustained in the substrate field.
    Conflating them produces the standard picture where all
    entanglement is treated as equally fragile, equally
    short-range, and equally dependent on initial interaction.
    The two mechanisms have measurably different properties.


  mechanism_1_committed_phase_lock:
    name: "Committed phase-lock entanglement"
    basis: >
      Two vortex topologies with sufficient commitment (S > S_lock)
      interact and establish mutual trail coupling. Their commitment
      patterns become non-separable in the substrate p(r,t) field.
      This is the mechanism in quantum-foundation.yaml — phase-locking
      ρ in the committed commitment structure.
    requires: >
      Both participants must have sufficient commitment density to
      sustain stable trails. The phase-lock itself costs substrate
      bandwidth — a committed connection in the η field between
      the two topology locations.
    range: >
      Limited by the coherence length of the committed phase-lock
      channel between the two topologies. In dense matter (low η),
      this is short — thermal Tik disrupts the channel rapidly.
      In high-η environments (vacuum, cryogenic isolation), longer.
    decoherence: >
      Sensitive to thermal Tik amplitude — any fluctuation above
      the phase-lock stability threshold disrupts the committed
      channel. Decoherence rate scales with thermal Tik amplitude
      and local commitment density (low η → high R → shorter
      coherence time for the phase-lock channel).
    chirality_role: >
      Chirality determines the type of phase-lock (same-chirality
      → orbital Möbius pair; opposite-chirality → dipole pair/
      photon). For the correlation itself, chirality is encoded in
      the phase-lock geometry but does not select different
      mechanisms — both chirality combinations use the same
      committed-trail coupling.
    examples: >
      Cooper pairs in superconductors; entangled photon pairs from
      parametric down-conversion (high-commitment interaction);
      singlet/triplet states in atoms (strong orbital coupling).
    status: "Well-established in framework — quantum-foundation.yaml"

  mechanism_2_resonance_coupling:
    name: "Substrate resonance coupling"
    basis: >
      The substrate — as a superfluid-like medium — supports
      collective oscillation modes: standing patterns in the η
      field that are properties of the medium itself, not of
      localised committed topologies. Two vortices (or solo
      vortices near S_lock) that both couple to the same
      substrate resonance mode are correlated through that mode,
      without requiring direct trail-to-trail commitment.
      The resonance mode is the correlating structure — it
      exists in the medium, the vortices are coupled to it.
    requires: >
      Each participant need only couple to the resonance mode —
      the coupling condition is the resonance condition from
      vortex-stabilization.yaml: ω_vortex = n · ω_mode
      (integer multiple of the mode frequency).
      No direct interaction between the two participants is
      required. They can couple to the same mode independently,
      at different times and locations, and be correlated through it.
    range: >
      Potentially much longer than committed phase-lock. The
      resonance mode extends across the coherence length of the
      mode itself — which for ground-state substrate modes in
      high-η regions can be macroscopic or cosmological.
      Limited not by the participants' separation but by the
      mode's own coherence length in the local η environment.
    decoherence: >
      Less sensitive to thermal Tik amplitude than committed
      phase-lock (because no committed channel between participants
      to disrupt). More sensitive to local commitment density
      fluctuations that shift the mode frequency — disrupting
      the resonance condition ω_vortex = n · ω_mode.
      In high-η environments, mode coherence is higher and
      decoherence is slower. Prediction: resonance-coupled
      entanglement should show different decoherence scaling
      with temperature than committed-phase-lock entanglement —
      a potentially measurable distinction.
    chirality_role: >
      The substrate's resonance modes are chirality-structured —
      the GP field under R5 isotropy with finite substrate
      resistance R supports left-handed and right-handed
      collective modes. A vortex with chirality χ = +1 couples
      preferentially to right-handed modes; χ = −1 to left-handed
      modes. This is the genuinely new element — the resonance
      mechanism is chirality-selective in a way that committed
      phase-lock is not.
    examples: >
      Long-range entanglement in low-density quantum systems;
      entanglement in biological systems (if present — see
      consciousness domain); potential mechanism for EPR
      correlations in experiments with widely separated pairs
      that have had minimal direct interaction.
    status: "New derivation — mechanism identified from substrate superfluid
             nature; formal resonance mode spectrum open"

# ─────────────────────────────────────────────
# THE SUBSTRATE RESONANCE MODES
# What they are, why they exist, what they look like
# ─────────────────────────────────────────────

substrate_resonance_modes:
  existence: >
    A superfluid-like substrate necessarily supports collective
    oscillation modes. This is not an additional assumption —
    it follows from the GP equation that governs the substrate.
    The linearised GP equation around the ground state η = 1
    has normal mode solutions: oscillatory perturbations of the
    η field that propagate or stand in the substrate without
    requiring committed topology.
    In superfluid helium: phonons (density waves), rotons
    (higher-energy modes with characteristic dispersion).
    In BECs: Bogoliubov modes (quantised density oscillations).
    In the Praestology substrate: the equivalent modes are
    oscillations of the η field around η = 1 — variations
    in local free potential that propagate coherently without
    committed topology nucleation.
    These are Tik events that are phase-coherent with each
    other — not the incoherent stochastic Tik background
    but organised oscillations of the substrate that the
    stochastic background can seed and sustain.

  chiral_structure: >
    The substrate resonance modes are not chirality-neutral.
    Under the GP equation with finite substrate resistance R
    (the closure imperfection that gives rise to α — see
    commitment-response-function.yaml), the mode spectrum
    splits into left-handed and right-handed branches.
    This is the substrate-level analogue of circular
    polarisation in electromagnetic waves: the substrate's
    own oscillations can be left-chirally or right-chirally
    rotating, and these are distinct modes with slightly
    different dispersion relations (the difference is
    proportional to α — the closure imperfection).
    A committed vortex with chirality χ = +1 (clockwise
    circulation) resonates with the right-handed substrate
    modes: ω_vortex^+ = n · ω_mode^right.
    A committed vortex with chirality χ = −1 (counter-
    clockwise) resonates with left-handed modes.
    A solo vortex — minimal winding, near S_lock, sub-
    threshold trail — has net chirality but insufficient
    commitment to establish a strong directed trail. Its
    coupling to committed-phase-lock channels is weak.
    But its chirality still couples to the substrate's
    chiral mode structure — and this coupling is the
    basis for resonance-mode entanglement in weakly
    committed systems.

  mode_coherence_and_eta: >
    The coherence length of a substrate resonance mode —
    how far a coherent oscillation pattern extends before
    being disrupted by incoherent Tik fluctuations — scales
    with local η. In high-η regions (voids, vacuum, cryogenic
    isolation from matter): long mode coherence, large
    spatial extent of correlated oscillation. In low-η
    regions (dense matter, high temperature): short mode
    coherence, quickly disrupted.
    This gives the resonance coupling mechanism a natural
    environmental dependence: entanglement mediated by
    substrate resonance modes is more persistent in high-η
    environments. Not because isolation is achieved by
    removing the medium, but because the medium's own
    coherence is higher there.
    The medium is not the enemy of entanglement — in the
    resonance-coupling picture, the medium is the entanglement.
    Standard decoherence theory treats the environment as
    the thing that destroys entanglement. In the resonance
    picture, a coherent environment (high-η substrate) is
    what sustains it.

  open_derivation_resonance_spectrum: >
    The formal spectrum of substrate resonance modes —
    their dispersion relation ω(k), their chirality splitting
    (proportional to α), their coherence length as a function
    of η — requires solving the linearised GP equation around
    η = 1 with finite R (commitment-response-function.yaml).
    This is a tractable calculation using standard Bogoliubov
    theory applied to the GP field. The result would give
    the precise resonance frequencies and coupling strengths.
    Priority: medium — the mechanism is identified and
    physically motivated; the formal spectrum would convert
    it from a qualitative picture to a quantitative prediction.

# ─────────────────────────────────────────────
# CHIRALITY-SELECTIVE COUPLING
# Why opposite spins — derived, not postulated
# ─────────────────────────────────────────────

chirality_selective_coupling:
  statement: >
    The most common entanglement observation: two particles
    produced together have opposite spin correlations —
    measure spin-up on one, get spin-down on the other.
    Standard QM: this follows from conservation of total
    angular momentum at production. The mechanism by which
    the correlation is maintained over arbitrary separation
    is unspecified — "the wavefunction is non-separable."
    Praestology — resonance mechanism: the opposite-spin
    correlation arises because the anti-symmetric chiral
    substrate mode (the mode with zero net chirality) is
    the mode with minimum substrate commitment cost to sustain.
    Two vortices with opposite chirality couple to this mode
    naturally — they are the χ = +1 and χ = −1 pair that
    jointly have zero net chirality, matching the anti-
    symmetric mode's symmetry. The mode sustains itself
    without consuming net substrate commitment.
    A same-chirality pair (χ = +1, +1) would need to couple
    to a mode with net chirality — a mode that costs net
    substrate commitment to sustain. R5 selects minimum
    commitment cost configurations. The anti-symmetric
    (opposite-chirality) coupling is preferred.
    The opposite-spin correlation is not conserved from
    production and then mysteriously maintained. It is
    the ongoing R5 selection of the lowest-commitment
    substrate resonance mode that the pair can couple to.

  singlet_vs_triplet: >
    Singlet state (opposite spins, total S=0): couples to
    the anti-symmetric chiral substrate mode. Zero net
    chirality — minimum mode commitment cost. Most stable
    under resonance coupling.
    Triplet state (parallel spins, total S=1): couples to
    the symmetric chiral substrate mode. Net chirality ≠ 0
    — higher mode commitment cost. Less stable; decoheres
    faster under resonance mechanism.
    This predicts: singlet entanglement should be more
    persistent than triplet entanglement in high-η
    environments, because the anti-symmetric mode has
    lower commitment cost and is more robustly sustained
    by the substrate ground state. Triplet states should
    decohere faster even in isolation.
    This is distinct from the committed-phase-lock picture
    where singlet and triplet states have similar decoherence
    rates (both are committed-channel correlations of
    similar cost). The two-mechanism picture makes different
    predictions for singlet vs triplet decoherence in
    cryogenic isolation — in principle testable.

  solo_vortex_entanglement: >
    A solo vortex — the minimal topological structure in
    the substrate, near S_lock, with net chirality but
    sub-threshold trail (neutrino-like) — has insufficient
    commitment to engage committed phase-lock. But its
    chirality still couples to the substrate's chiral
    resonance modes.
    Two solo vortices of opposite chirality, if both within
    the coherence length of the same anti-symmetric
    substrate mode, are correlated through that mode.
    Their correlation costs minimum substrate commitment —
    the mode itself has zero net chirality, the coupling
    is resonant, the correlation is sustained by the
    medium's own ground state rather than by committed
    channels between the participants.
    This is the lightest form of quantum correlation
    achievable in the substrate — below the threshold
    of committed topology, in the regime of pure substrate
    resonance. It has no analogue in the standard model's
    particle-based picture of entanglement.
    Whether this kind of correlation plays a role in
    weakly interacting systems (neutrino correlations,
    dark matter component_2b solo vortices) is an open
    question worth pursuing.

  implications_for_measurement: >
    When one entangled partner is measured — its commitment
    topology is probed, crossing S_lock — the measurement
    interaction commits the partner's chirality to a
    definite trail. This changes the local η field at the
    measurement site, which shifts the local resonance
    condition ω_vortex = n · ω_mode for the measured particle.
    The shared substrate resonance mode is now coupled to
    a committed topology on one side and a still-uncoupled
    topology on the other. The mode's symmetry is broken.
    The remaining partner, still coupled to the mode, finds
    its coupling condition changed — the mode now has net
    chirality from the committed partner's measurement. The
    uncoupled partner's most stable coupling to the (now
    asymmetric) mode is to take the opposite chirality to
    restore the mode's zero-net-chirality condition.
    This is the instantaneous correlation: not a signal
    traveling between partners, but the shared medium mode
    updating its configuration when one coupled topology
    commits, and the other coupled topology finding its
    preferred resonance coupling in the updated mode.
    The update is not signaling because no information
    travels — the mode's configuration change is a
    property of the medium, and the remaining partner
    cannot extract information from it without a classical
    signal telling it what the measured partner's outcome was.

# ─────────────────────────────────────────────
# BELL THEOREM AND NON-LOCALITY
# Both mechanisms are compatible
# ─────────────────────────────────────────────

bell_theorem_compatibility:
  statement: >
    Bell's theorem proves that no local hidden variable
    theory can reproduce quantum correlations — specifically,
    no theory where each particle carries its own separate
    pre-determined property. Both Praestology mechanisms
    are compatible with Bell's theorem because neither
    assigns local hidden variables to individual particles.

  committed_phase_lock: >
    The correlating structure is the non-separable commitment
    pattern in the substrate field — a property of the
    substrate between and around both particles, not of
    either particle individually. This is explicitly non-local
    (the substrate field is an extended object) and non-
    separable (the commitment pattern cannot be decomposed
    into local properties of each particle). Already
    established in quantum-foundation.yaml.

  resonance_coupling: >
    The correlating structure is the substrate resonance mode —
    a collective oscillation of the medium that is inherently
    non-local (a mode extends across its coherence length, not
    localised at either particle). Two particles coupled to
    the same mode are correlated through that non-local
    structure. Neither particle carries a local property
    that predetermines the measurement outcome — the outcome
    is determined by the mode's state when measurement occurs,
    which is a property of the extended medium.
    This satisfies Bell's non-locality requirement while
    providing a physical mechanism — the medium's collective
    mode — that standard QM leaves unspecified.

  no_ftl_signalling: >
    Neither mechanism allows faster-than-light information
    transfer. In both cases:
    The correlating structure (committed pattern or resonance
    mode) was established before measurement. The measurement
    reads out the local portion of the shared structure.
    The remote partner's state is determined by the shared
    structure, not by a signal from the measured partner.
    But the remote partner cannot know which outcome
    occurred here without classical communication — because
    the local reading of the shared structure produces a
    random outcome, and only the correlation between the
    two random outcomes reveals the non-local structure.
    R5 selects which outcome occurs — but R5 operates
    locally at each measurement site, reading the local
    portion of the shared structure. No information about
    which local outcome was selected can travel faster than c.

# ─────────────────────────────────────────────
# DECOHERENCE — TWO MECHANISMS, TWO PROFILES
# ─────────────────────────────────────────────

decoherence_profiles:
  statement: >
    The two entanglement mechanisms have different decoherence
    profiles — different dependences on temperature, commitment
    density, and environmental structure. This produces
    testable predictions that could distinguish them
    experimentally.

  committed_phase_lock_decoherence:
    primary_driver: "Thermal Tik amplitude disrupting committed channel"
    scaling: >
      Decoherence rate Γ_1 ∝ T · R_local / ħ
      — proportional to temperature (thermal Tik amplitude)
      and local substrate resistance R (commitment density).
      High temperature → fast decoherence.
      Dense material environment (low η, high R) → fast decoherence.
      Cryogenic isolation (low T, high η) → slow decoherence.
    environmental_dependence: >
      Decoherence accelerates in any environment that disrupts
      the committed channel: electromagnetic fields that
      perturb the trail geometry, phonons that disturb the
      local commitment density, other committed topologies
      that compete for the substrate channel bandwidth.
    signature: >
      Decoherence rate scales with T (temperature) and
      with local matter density (which sets R_local via η).
      Both effects have the same parametric dependence —
      both thermal and material-density environments
      decohere committed phase-lock at the same rate scaling.

  resonance_coupling_decoherence:
    primary_driver: "Local η fluctuations disrupting resonance condition"
    scaling: >
      Decoherence rate Γ_2 ∝ δη²/η² · ω_mode
      — proportional to the fractional variance of η
      fluctuations and the mode frequency.
      High commitment density variance (lumpy environment) →
        fast decoherence of resonance coupling.
      Smooth high-η environment (uniform vacuum, isolated) →
        slow decoherence.
      Temperature enters only insofar as thermal Tik
        fluctuations create δη variance — less directly
        than for committed phase-lock.
    environmental_dependence: >
      Decoherence accelerates in any environment with
      η inhomogeneity — boundaries between materials,
      regions of varying commitment density, nearby
      committed topologies that create local η gradients.
      A smooth, homogeneous high-η environment (deep vacuum,
      interstellar space) is the most stable environment
      for resonance-coupling entanglement — even without
      cryogenic cooling, because the mechanism doesn't
      primarily require low temperature, it requires
      low η-variance.
    signature: >
      Decoherence rate scales differently with temperature
      vs material density: temperature matters less than
      η homogeneity. Prediction: resonance-coupled
      entanglement in a room-temperature but very low-density
      environment (high vacuum) may be more persistent than
      committed-phase-lock entanglement in a cryogenic
      but material-dense environment.
      This is the key experimental distinguisher: if
      decoherence depends primarily on density-homogeneity
      rather than temperature, the resonance mechanism
      is operating.

  predicted_measurable_distinction: >
    An experiment that independently varies:
    (a) Temperature of the entangled system
    (b) Density/homogeneity of the surrounding environment
    and measures decoherence rate under each condition
    would distinguish the two mechanisms:
    Committed phase-lock: Γ ∝ T, roughly independent of
      density-homogeneity for a given T.
    Resonance coupling: Γ ∝ δη-variance, less dependent
      on T for fixed η-homogeneity.
    Current entanglement experiments typically co-vary T
    and density (cryogenic systems are also well-isolated
    from material environments) — the two variables have
    not been cleanly separated. Proposed: compare
    entanglement persistence in (i) warm/high-vacuum vs
    (ii) cold/material-dense environments at matched
    decoherence rates. If warm/high-vacuum outperforms
    cold/dense, resonance coupling is the dominant mechanism.

# ─────────────────────────────────────────────
# WHICH MECHANISM OPERATES WHEN
# ─────────────────────────────────────────────

mechanism_selection:
  statement: >
    The two mechanisms are not exclusive — both can operate
    simultaneously, and which dominates depends on the
    commitment density of the participating topologies
    and the local η environment.

  committed_topology_dominant:
    condition: "Both participants have S >> S_lock — committed vortices with strong trails"
    mechanism: "Committed phase-lock — direct trail-to-trail coupling"
    examples: >
      Cooper pairs (electrons in metal — high commitment density);
      Atomic singlet/triplet states (orbital coupling — high commitment);
      Entangled photon pairs from down-conversion (strong interaction
      at production — high commitment).

  near_threshold_dominant:
    condition: "Participants have S ~ S_lock — minimal committed topology, solo-like"
    mechanism: "Resonance coupling — chirality to substrate mode coupling"
    examples: >
      Weakly interacting quantum systems at high isolation;
      Possible role in biological quantum effects if present
      (enzyme tunneling, avian magnetoreception — low-commitment
      environments where resonance coupling persists longer);
      Solo vortex correlations (neutrino-like systems).

  mixed_regime:
    condition: "One participant committed, one near threshold"
    mechanism: "Hybrid — the committed topology establishes a local mode distortion that
               the near-threshold topology couples to via resonance"
    examples: >
      Measurement itself: measuring a committed particle disrupts
      the local mode, to which the entangled near-threshold
      partner responds via resonance coupling.

  environmental_selection:
    high_eta_environment: >
      High-η (vacuum, void, cryogenic isolation): long mode coherence
      length → resonance coupling can operate over large separations.
      Committed phase-lock also persists longer but is still limited
      by coherence length of the committed channel.
    low_eta_environment: >
      Low-η (dense matter, room temperature): short mode coherence
      length → resonance coupling rapidly decoheres. Committed
      phase-lock also short but may persist longer than resonance
      coupling in very dense environments where η-variance is extreme.

