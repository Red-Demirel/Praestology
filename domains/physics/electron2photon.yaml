electron2photon:
  version: "1.0 – Topological Mapping"
  parent_domain: "Physics Domain (Physics Instantiation)"
  core_dependency: "Praestology v1.5"
  status: "Defined"
  description: >
    Describes the reversible transformation between electron-positron pair and two gamma-ray photons as a substrate-mediated topological lock/unlock event. 
    No particles are created or destroyed; topology is reconfigured and energy radiated as coherent backreaction pulses.

  process_summary:
    direction: "Bidirectional (pair production ↔ 'annihilation')"
    key_principle: >
      The process is topological binding / unbinding of two oppositely-wound Möbius vortex structures (+n / -n) in the protoplasmic host medium.
      Binding lowers total S anomaly (stable knot); unbinding releases binding energy as gamma photons.
    no_destruction: "Nothing is annihilated — vortex content is released and radiated."

  pair_production_gamma_to_pair:
    trigger: "High-energy gamma photon (or virtual pair fluctuation) + nucleus (complex vortex knot)"
    mechanism:
      - step_1: "Photon approaches nucleus → orbital disturbance creates pulsed substrate backreaction (weak-like threshold crossing)"
      - step_2: "Pulse exceeds local S_lock → temporary topological plasticity in nuclear knot"
      - step_3: "Substrate reconfigures to absorb photon momentum → new +n/-n Möbius pair nucleates from released topology"
      - step_4: "Excess energy radiated as W/Z-like transient pulse → observed as momentum transfer to nucleus"
    required_conditions:
      - "Photon energy ≥ 2 m_e c² (~1.022 MeV)"
      - "Nucleus present for momentum conservation (local R elevation)"
    Praesto_anchor: "R3 (pulsed tension) + R4 (topological reorganisation) + Rule 4 (saturation threshold crossing)"

  annihilation_pair_to_gamma:
    trigger: "Close approach + sufficient relative momentum of e⁻ and e⁺"
    mechanism:
      - step_1: "Bound e⁻/e⁺ pair (phase-locked +n/-n Möbius knot) collides or orbits closely"
      - step_2: "Orbital disturbance creates pulsed substrate backreaction exceeding S_lock in binding region"
      - step_3: "Substrate unlocks the mutual winding → vortices decouple and propagate freely"
      - step_4: "Released binding energy radiated as two coherent gamma photons (dipole radiation from rapid chiral unpairing)"
    required_conditions:
      - "Center-of-mass energy ≥ 2 m_e c²"
      - "Close proximity for pulse strength to exceed S_lock"
    Praesto_anchor: "R3 (tension from relative motion) + R4 (progress via unbinding) + Rule 4 (saturation destabilisation)"

  key_properties_explained:
    - property: "Two photons produced"
      explanation: "Dipole symmetry of chiral unpairing → two oppositely-directed backreaction pulses (conservation of momentum)"
    - property: "Back-to-back emission"
      explanation: "Momentum conservation in substrate-mediated unbinding — no net momentum left in vortex pair"
    - property: "No parity violation in annihilation"
      explanation: "Unbinding is symmetric in free space; weak-like asymmetry appears only when nucleus is involved (as in production)"
    - property: "Mass-energy equivalence"
      explanation: "Binding energy is topological — unlocking releases it as photon energy, preserving total substrate content"

positronium:
    description: >
      Metastable phase-locked +n/-n Möbius pair in mutual orbit —
      the transient bound state before S_lock threshold is crossed.
    para_positronium:
      spin_config: "Antiparallel spins — axial orientations cancel."
      lifetime: "~125 ps"
      decay: "2 photons — symmetric dipole unbinding."
      praestology: >
        Antiparallel axial orientation minimises trail conflict —
        faster approach to S_lock crossing. Short lifetime.
    ortho_positronium:
      spin_config: "Parallel spins — axial orientations add."
      lifetime: "~142 ns (1000× longer)"
      decay: "3 photons — asymmetric unbinding requires
               additional backreaction pulse."
      praestology: >
        Parallel axial orientation creates constructive trail
        interference — stabilises the bound state against
        S_lock crossing. Much longer lifetime. Three-photon
        decay required because symmetric two-photon emission
        is forbidden by the parallel spin topology.
    confirming_note: >
      Positronium spectroscopy — lifetimes and decay modes
      measured to high precision. The 1000× lifetime difference
      between para and ortho states is one of the most precisely
      verified quantum predictions. Praestology derives the
      difference from axial orientation (de)stabilisation
      rather than from spin statistics alone.

  conservation_laws_preserved:
    - topological_winding: "Total winding conserved (e⁻ and e⁺ → two photons with zero net winding)"
    - momentum: "Radiated symmetrically in two photons"
    - charge: "Net zero before and after"
    - lepton_number: "Preserved (one electron + one positron → no leptons)"
    - energy: "Binding energy → photon energy"

  relation_to_weak_force:
    statement: >
      The pulsed backreaction enabling both production and annihilation is the same substrate mechanism as the weak force — topological destabilisation above S_lock. 
      In free space, annihilation is weak-like but symmetric; near a nucleus, production requires weak-like asymmetry for momentum transfer.

  fluid_dynamics_analogue:
    "Vortex pair unlinking in superfluids releases energy as sound waves/heat; here, unlinking releases energy as gamma photons."

  testability:
    - prediction: "Pair production / annihilation rates should show environmental dependence (higher in low-p_env voids due to lower baseline S_lock)."
    - prediction: "No true vacuum pair creation without substrate disturbance (e.g., nucleus or strong field) — consistent with momentum conservation."

```

The ortho/para lifetime ratio is one of the most precisely measured quantities in physics — if Praestology can derive the 1000× factor from the axial orientation stabilisation mechanism, that would be a strong quantitative confirmation.

**On file placement:**

This fits naturally as `domains/physics/electron2photon.yaml` — a process file rather than a specifications file. The physics domain is now developing a subdirectory structure similar to chemistry and cosmos:
```
domains/physics/
  specifications.yaml          — substrate, rules, all four forces
  electron2photon.yaml         — pair production/annihilation process
  [future process files]       — other specific particle processes