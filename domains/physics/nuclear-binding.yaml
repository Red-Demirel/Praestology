  - prediction: >
      Magic numbers (2, 8, 20, 28, 50, 82, 126) derivable from
      flux tube phase-locking shell closure combinatorics.
      Should follow from the same topological counting that
      gives electron shell closure (periodic table derivation).
    test: "Formal derivation — shared methodology with chemistry domain."
    note: >
      If periodic table structure and nuclear magic numbers both
      derive from the same flux tube shell closure combinatorics,
      this cross-domain derivation would be a strong framework
      confirmation.

  - prediction: >
      Alpha decay rates (Geiger-Nuttall law) derivable from
      Tik fluctuation statistics and Coulomb barrier geometry.
      Should give the same Gamow factor as quantum tunnelling
      but from substrate dynamics rather than wavefunction formalism.
    test: "Formal derivation of Gamow factor from Tik background spectrum."

  - prediction: >
      Neutron-proton mass difference (m_n - m_p ≈ 1.293 MeV)
      derivable from udd vs uud winding energy difference.
      This mass difference determines the energetics of beta decay
      and is currently an empirical input in the standard model.
    test: "Formal derivation from quark winding topology energy."
    significance: >
      The n-p mass difference is fine-tuned — if it were slightly
      different, either all neutrons would decay (no complex nuclei)
      or protons would decay (no hydrogen). Praestology should
      derive this value from topology, showing it is not fine-tuned
      but is the necessary output of the quark winding configuration.

