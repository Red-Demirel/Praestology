# OPEN DERIVATIONS
# ─────────────────────────────────────────────

open_derivations:
  priority_1:
    - >
      Explicit projection rules: given Q = η + F, derive the rules for
      projecting onto specific measurement axes and recovering the
      observable scalar quantities. This connects the quaternion
      formulation to the measurement apparatus picture and the
      commitment-resistance/measurement-substrate discussion in
      fine-structure-constant.yaml.
    - >
      Calugareanu-White writhe in quaternion language: reformulate the
      writhe calculation of the equilibrium Möbius GP vortex as a
      quaternion path integral in S³. The quaternion formulation may
      be the natural setting for this calculation — the writhe is
      essentially the winding number of the quaternion orientation
      map Q(s) around the vortex loop, which is a winding number in S³.
  priority_2:
    - >
      PT-symmetry analysis of ℛ(Q): the non-Hermitian dissolution kernel
      ℛ(Q) in the quaternion formulation. Determine the PT-symmetry
      conditions for the quaternion master equation and whether the
      quaternion structure changes the threshold for PT-symmetry breaking
      (dissolution transition).
    - >
      Dirac equation recovery: show that the linearised quaternion field
      equation with the double-cover condition and appropriate identification
      of the quaternion components recovers the Dirac equation for a free
      fermion. This would establish the quaternion formulation as the
      substrate-level derivation of Dirac spinors.
    - >
      Maxwell recovery: show that the linearised quaternion field equation
      for the vector part F recovers Maxwell's equations in the appropriate
      limit. This would unify the scalar (gravitational) and vector
      (electromagnetic) force derivations into a single quaternion equation.
  priority_3:
    - >
      Formal derivation of the Clifford torus area as the interfacial
      term in the coupling constant. The geometric motivation is strong;
      formal derivation requires showing that the GP field's boundary
      energy for the Möbius winding support in S³ equals π².
    - >
      Connection between quaternion non-commutativity and the 3D
      emergence: the three imaginary axes (i, j, k) generate the three
      spatial directions through their anticommutation. Show formally
      that the R5-stable connectivity pattern (3D) corresponds to the
      minimal non-commutative quaternion algebra.

