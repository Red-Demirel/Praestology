description: >
  The master equation is expressed in quaternion form to make explicit the
  rotational (spinor) structure implicit in the scalar complex formulation.
  The quaternion algebra naturally encodes the double cover of rotations
  (SU(2) ≅ unit quaternions), which is the topological signature of the
  Möbius vortex. It unifies scalar commitment density with vectorial
  orientation and flow into a single dynamical object without new primitives.

  This file is a mathematical upgrade of the scalar complex master equation
  — it does not replace it. The scalar formulation remains the primary
  computational form. The quaternion form makes the spinor structure and
  the geometric origin of α⁻¹ explicit.

  Key new result: the three terms of α⁻¹_bare = 4π³ + π² + π have a
  complete geometric derivation from the quaternion/S³ structure:
    4π³ = 2π × 2π²: U(1) phase loop × S³ orientation volume
    π²  = Clifford torus area: boundary surface of the quasi-2D winding in S³
    π   = one-loop path residue: single 360° pass before the crossover
  This is not a decomposition of a known formula — it is a geometric
  derivation from the Hopf fibration structure of the quaternion phase space.

