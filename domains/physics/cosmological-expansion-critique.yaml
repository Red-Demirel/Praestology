# FALSIFICATION CONDITIONS
# ─────────────────────────────────────────────

falsification_conditions:
  confirms_praestology:
    - >
      Hubble tension correlates with large-scale structure environment:
      H₀ derived from void-located calibrators > H₀ from filament-
      located calibrators. Continuous trend, not just local vs CMB.
      Test: DESI/Rubin data stratified by LSS environment.
    - >
      Supernova residuals from Hubble diagram correlate with LOS
      filament-void boundary count. Systematic dimming excess for
      lines of sight through more boundaries.
      Test: Rubin LSST ~100,000 SN Ia with precise LSS context.
    - >
      Direction-dependent H₀ variation correlating with large-scale
      structure anisotropy. Already hinted at in existing data.
      Test: full-sky supernova sample with LSS overlay.
    - >
      Density-transition redshift magnitude from boundary steepness:
      sharper filament-void boundaries show excess redshift per unit
      density contrast vs gradual boundaries.
      Test: precision redshift survey of boundary-classified galaxies.
    - >
      Polarization angle scatter increases with redshift as √(boundary
      count) for an ensemble of high-z sources — increased dispersion
      of polarization angles, not systematic rotation. Requires large
      quasar polarization catalogues stratified by redshift and LOS
      structure. Standard model predicts no redshift-dependent scatter
      beyond intrinsic source variance.
    - >
      Quasar polarization alignment (Hutsemekers effect) correlates
      specifically with filament orientation in the large-scale
      structure along the line of sight — not just with redshift or
      separation distance. The alignment pattern should track the
      committed density geometry of the intervening filament network.
      Test: cross-correlate Hutsemekers alignment signal with
      large-scale structure maps from SDSS/DESI.
    - >
      Cosmic birefringence (~0.35 degrees, Minami & Komatsu 2020)
      is confirmed at high significance AND its angular power
      spectrum is consistent with a path-integrated effect
      (flat or slowly varying with angular scale) rather than
      a scale-dependent axion field signature. The path-integrated
      character would distinguish substrate chirality bias from
      particle physics alternatives.

  falsifies_praestology:
    - >
      Hubble tension shows no correlation with LSS environment after
      accounting for known systematics. H₀ is the same in voids
      and filaments to precision better than the tension magnitude.
    - >
      Supernova residuals show no correlation with LOS boundary
      count after accounting for dust, host galaxy environment,
      and other known systematics.
    - >
      Gravitational wave sirens (LIGO/Virgo standard sirens) measure
      H₀ independently of electromagnetic distance ladder and CMB,
      converging on a single value inconsistent with a void-location
      bias explanation of the tension.
    - >
      Quasar polarization alignment shows no correlation with
      large-scale structure filament orientation after systematic
      corrections — the Hutsemekers signal is instrumental or
      source-intrinsic, not path-mediated.
    - >
      Cosmic birefringence angular power spectrum shows scale-
      dependent structure inconsistent with a path-integrated
      substrate effect — requiring a localised particle physics
      source rather than a medium property.

