    Dark energy / Λ: dissolved as argued above. Replaced by
      substrate Tik background pressure, which is real but
      not Λ in the standard sense and does not require
      fine-tuning.
    Inflation: loses primary motivation (horizon problem
      dissolves if Big Bang doesn't require it). The CMB
      uniformity is the initial high-φ isotropy of the substrate.
    Exotic dark matter particles: replaced by dark matter
      composite (specifications.yaml). Substrate wake, magnetic
      tension, superfluid phonons, Machian inertia.

  the_unresolved_challenge: >
    Light element nucleosynthesis (BBN): the standard model
    makes precise predictions for H:He:Li ratios from the
    hot Big Bang. These are confirmed to good precision.
    Praestology does not currently have an alternative
    nucleosynthesis mechanism. This is the most significant
    unresolved challenge for the cosmological reframing.
    Options: (a) early high-φ substrate undergoes a phase
    of high commitment density (not a singularity but a
    dense early epoch) that reproduces nucleosynthesis
    conditions; (b) element abundances have a different
    explanation not yet identified. This is stated honestly
    as an open problem, not papered over.

