# ─────────────────────────────────────────────
# HISTORICAL CONTEXT
# How the expansion interpretation became
# entrenched — and why that matters
# ─────────────────────────────────────────────

historical_context:
  observation_precedes_interpretation: >
    The redshift was observed first. Slipher measured galaxy
    redshifts from 1912 onward. Hubble published the distance-
    velocity relation in 1929. The recession interpretation —
    that redshift means galaxies are moving away — was not the
    only available reading. It was the interpretation that fit
    most naturally within the physics vocabulary of the time,
    and it was adopted without being established as the unique
    correct interpretation.
    Zwicky proposed tired light the same year as Hubble's paper —
    1929. He was asking the right question: does redshift require
    recession? The mechanism he proposed (photon energy loss to
    the medium along the path) was wrong. But the question was
    legitimate and has never been fully answered — only the
    specific tired light mechanism was falsified, not the general
    class of non-recession redshift mechanisms.

  hubble_himself_was_uncertain: >
    Edwin Hubble was not fully convinced by the expansion
    interpretation of his own data. In his 1937 Royal Astronomical
    Society address he referred consistently to "apparent
    velocities" rather than actual velocities, and explicitly
    noted that the redshift might have "some other cause not yet
    identified." This is almost never mentioned in standard
    cosmological history, where Hubble is presented as the
    discoverer of the expanding universe. He was the discoverer
    of the redshift-distance relation. The expanding universe
    interpretation was Lemaître and de Sitter's.
    The equation called "Hubble's Law" — v = H₀d — was actually
    first written by Lemaître in 1927, two years before Hubble's
    paper. Hubble's contribution was the observational distance
    calibration, not the expansion interpretation.

  tired_light_falsified_on_specific_grounds: >
    Tired light — Zwicky's continuous-energy-loss mechanism —
    was correctly ruled out by specific observational tests:
    (a) Surface brightness scaling: tired light predicts SB ∝
        (1+z)^(−3); expansion predicts SB ∝ (1+z)^(−4). Data
        favors the expansion prediction.
    (b) Supernova light curve time dilation: supernovae at high
        redshift have their light curves stretched by (1+z) —
        consistent with time dilation from expansion, inconsistent
        with tired light which predicts no time dilation.
    These are valid falsifications of tired light specifically.
    They do not falsify density-transition redshift, which is
    categorically different:
    Tired light: continuous energy loss proportional to path length.
    Density-transition: discrete energy loss at commitment density
      boundaries — not continuous, not proportional to path length
      in the simple sense, proportional to boundary count and steepness.
    The surface brightness test and the time dilation test apply
    to the continuous-loss mechanism. The discrete-boundary mechanism
    has different predictions for both — and those predictions have
    not been tested because the mechanism was not considered.
    The conflation of "tired light falsified" with "all non-recession
    redshift mechanisms falsified" is an error of generalisation
    that has persisted for decades.

  convenience_and_entrenchment: >
    The expansion interpretation was convenient for a specific
    reason: it implied the universe was smaller and denser in the
    past. Extrapolating backward produced a hot dense initial state.
    Lemaître's "hypothesis of the primeval atom" (1931) — the
    precursor to the Big Bang — required expansion to make sense.
    The expansion interpretation and the Big Bang model were
    co-dependent from the beginning: expansion motivates Big Bang,
    Big Bang predicts expansion. Each supported the other.
    When the CMB was discovered in 1964 — a genuine prediction
    of the hot Big Bang model — the credibility of the whole
    framework increased enormously. The CMB success insulated
    the foundational expansion interpretation from scrutiny.
    Why question the interpretation of redshift when the model
    built on that interpretation successfully predicted the CMB?
    This is not a conspiracy or a failure of science — it is
    the normal sociology of successful scientific frameworks.
    Successful models earn credibility that protects their
    foundations. The protection becomes a problem when the
    foundations have alternatives that weren't adequately
    explored before the superstructure was built.
    The BBN lithium problem — predicted Li-7 is ~3× observed —
    is an existing crack in the foundation. The Hubble tension
    is another. The density-transition redshift mechanism offers
    a path that doesn't require reopening every question
    simultaneously — it questions one specific interpretation
    (recession velocity as the sole source of cosmological
    redshift) and traces the consequences.

  zwicky_right_question_wrong_mechanism: >
    Fritz Zwicky deserves rehabilitation on this point. His
    tired light mechanism was wrong. His question — "why assume
    recession?" — was right. The field answered his mechanism
    and stopped there. The substrate picture provides what
    Zwicky was reaching for: a physical mechanism by which
    photons accumulate redshift through their interaction with
    the medium, without continuous energy loss along the path,
    without a preferred frame, and without violating surface
    brightness or time dilation observations. Not tired light.
    Boundary-crossing redshift. The question Zwicky asked in
    1929 finally has a candidate answer.

# ─────────────────────────────────────────────
# CURVATURE VS REFRACTION
# Why these are not equivalent descriptions
# and what distinguishes them observationally
# ─────────────────────────────────────────────

curvature_vs_refraction:
  statement: >
    GR describes gravity as geometric curvature of spacetime —
    photons follow geodesics in a curved manifold. The substrate
    picture describes gravity as refraction through a commitment
    density gradient — photons follow paths of least resistance
    through a medium of varying η. Both produce path deflection.
    They are not equivalent descriptions — they make different
    predictions for photon internal structure, specifically
    for polarization behaviour under gravitational influence.

  geometric_curvature_picture:
    mechanism: >
      Spacetime curvature bends the path of the photon — the
      manifold itself is curved, and the geodesic follows that
      curvature. The photon's path is deflected but the photon
      is not interacting with anything — it is simply following
      the geometry of the space it travels through.
    polarization_consequence: >
      In a purely geometric picture, the photon's internal
      structure — its polarization state, the axial orientation
      of its electromagnetic oscillation — is parallel-transported
      along the geodesic. Parallel transport preserves the
      polarization plane relative to the path. A photon bent
      by gravitational lensing has its polarization plane
      rotated by exactly the amount needed to keep it parallel-
      transported along the curved path — a geometric rotation
      that is entirely predictable from the path geometry and
      produces no additional polarization signal beyond what
      the path deflection itself implies.
      Critically: the curvature couples to the photon's path
      but not to the photon's internal dipole structure
      independently. There is no mechanism for the medium to
      exert a torque on the polarization plane beyond the
      parallel-transport requirement. No drag. No differential
      coupling across the photon's transverse extent.

  substrate_refraction_picture:
    mechanism: >
      The commitment density gradient ∇η refracts the photon
      — the effective impedance Z_eff = Z₀/η varies across the
      path, and the photon's trajectory bends toward higher
      commitment density (lower η), exactly as light refracts
      toward higher refractive index in optics.
      The photon is a dipole vortex pair propagating through
      a medium. It is interacting with that medium at every
      point — not following geometry but responding to the
      medium's local properties.
    polarization_consequence: >
      Because the photon is interacting with the medium, the
      medium can couple to the photon's internal structure —
      specifically to the axial orientation of the vortex pair
      (the polarization plane). Two mechanisms produce
      polarization effects that geometric curvature cannot:

      Mechanism 1 — Transverse η gradient:
      The photon has finite transverse extent (of order its
      wavelength). If the commitment density gradient has a
      component transverse to the photon's path, the two sides
      of the photon's spatial extent experience slightly different
      η. The two vortices of the dipole pair couple to the
      substrate with slightly different effective impedance.
      This differential coupling exerts a torque on the vortex
      pair's axial orientation — rotating the polarization plane
      by an amount proportional to the transverse η gradient
      integrated along the path.
      This is a genuine drag on the polarization plane — the
      medium pulling on the photon's internal structure — that
      geometric curvature has no mechanism to produce.

      Mechanism 2 — Chiral substrate modes:
      The substrate's own resonance modes have chiral structure
      (left and right-handed modes, split by α — see
      quantum-entanglement.yaml). A photon traversing a region
      of non-trivial commitment density topology couples
      differentially to these chiral modes. The net effect is
      a rotation of the polarization plane proportional to the
      integrated chiral mode coupling along the path — a Faraday-
      rotation-like effect from the substrate's own mode structure
      rather than from an external magnetic field.

  observational_distinction:
    gravitational_lensing_polarization: >
      GR prediction: gravitational lensing deflects photon paths
      but produces no polarization rotation beyond what parallel
      transport along the deflected path implies. The polarization
      pattern around a gravitational lens (galaxy cluster, dark
      matter halo) should show the geometric rotation pattern —
      purely radial or tangential relative to the lens centre,
      consistent with the deflected path geometry.
      Substrate refraction prediction: gravitational lensing
      produces additional polarization rotation from the transverse
      η gradient across the lens. This rotation should correlate
      with the commitment density gradient profile of the lensing
      structure — stronger rotation where the gradient is steeper,
      orientation correlated with the gradient direction rather
      than purely with the path deflection geometry.
      The two predictions are distinguishable: GR produces a
      purely geometric polarization pattern; substrate refraction
      produces an additional gradient-correlated component.
    current_observations: >
      Weak gravitational lensing surveys (DES, HSC, KiDS) measure
      galaxy shape distortions (shear) as a proxy for lensing.
      Polarization rotation around lensing structures is less
      studied but not absent — weak systematic polarization
      signals around galaxy clusters have been reported and
      are currently attributed to dust, magnetic fields, or
      instrumental systematics. The substrate picture predicts
      these should correlate specifically with the commitment
      density gradient (not just with the total mass) — a
      distinguishing test that has not been performed.

  polarization_observables:
    correction_note: >
      An earlier version of this section predicted that high-z
      sources would show increased systematic polarization rotation
      due to accumulated boundary crossings. This was wrong.
      Filament-void boundaries in the cosmic web are statistically
      isotropic — their transverse η gradients point in random
      directions. Polarization rotations at successive boundaries
      accumulate as a random walk, not as a coherent drift. The
      net rotation after N crossings scales as √N, not N. For
      large N, the signal averages toward zero in the mean while
      the variance grows. More boundaries means more scrambling,
      not more net rotation. The high-z polarization fraction
      prediction is withdrawn.

    what_is_observable:
      polarization_angle_scatter: >
        The correct statistical signal is increased *dispersion*
        of polarization angles across an ensemble of high-z
        sources compared to low-z sources of similar intrinsic
        properties. Not a systematic shift in the mean rotation
        but an increase in variance — the random-walk accumulation
        of boundary-crossing rotations spreads the polarization
        angle distribution. This is a measurable but subtle
        signal requiring large samples and careful control of
        intrinsic source polarization scatter.
        GR prediction: polarization angle scatter is set by
        source properties, independent of redshift.
        Substrate prediction: scatter increases with redshift
        as √(boundary count) — a specific functional form
        testable against large quasar polarization catalogues.

      coherent_alignment_within_structure: >
        Where the prediction holds cleanly: polarization
        alignment *within* large-scale structure regions where
        the filament orientation is known. Here the gradient
        direction is correlated across the source sample —
        photons from sources embedded in the same filament
        network traverse the same oriented commitment density
        gradients. Their polarization rotations are coherent,
        not random. The Hutsemekers (1998) large-scale alignment
        of quasar polarization axes — sources separated by
        hundreds of Mpc showing correlated orientations —
        is exactly this signal. The alignment is not random-walk
        accumulation but coherent torque from a common filament
        geometry. This prediction is defensible and has existing
        supporting data.
        Standard model: no mechanism for coherent alignment
        over hundreds of Mpc from structure alone.
        Substrate: filaments oriented in a common direction
        exert a common transverse η torque on all photons
        traversing them — the medium's geometry prints
        correlated orientations onto the traversing photons.

      cosmic_birefringence: >
        The ~0.35 degree uniform rotation of CMB polarization
        (Minami & Komatsu 2020, ~3σ) requires separate treatment.
        This is not a random-walk effect — it is a *uniform*
        rotation of the full CMB, all photons from all directions,
        implying a systematic rather than random accumulated effect.
        For this to be a substrate chiral mode signal, the
        substrate must have net global chirality — a preferred
        handedness across the observable universe. This is not
        arbitrary: the cosmogenesis picture in
        vortex-stabilization.yaml identifies a chirality bias
        from the first Möbius formation in the dominant gradient
        direction of the high-φ initial state. If the substrate
        has net global chirality from cosmogenesis, then CMB
        photons traversing the cosmic web do accumulate a
        coherent chiral mode rotation — not random-walk but
        systematically biased by the substrate's own handedness.
        The uniform rotation is the integral of that bias over
        the full path length to last scattering.
        Status: conditional on the cosmogenesis chirality bias
        being quantifiable. If the bias is established from
        vortex-stabilization.yaml, the birefringence calculation
        follows. If the bias is zero or random, the birefringence
        washes out and requires another explanation.
        This is an honest open question, not a confirmed prediction.

  summary_of_distinction: >
    Physical spacetime curvature: bends paths, parallel-transports
    polarization, predicts no polarization effects beyond the
    geometric path rotation. The photon follows geometry —
    the medium exerts no torque on its internal structure.
    Substrate refraction: bends paths AND couples to the photon's
    internal vortex pair structure via transverse η gradients and
    chiral mode coupling. The medium can torque the polarization.
    The observable consequences are more subtle than initially
    stated: random boundary crossings produce polarization scatter
    (not systematic rotation) that grows as √N with distance;
    coherent structure produces alignment within regions of
    common filament orientation (Hutsemekers effect); net global
    substrate chirality from cosmogenesis could produce uniform
    CMB birefringence (conditional).
    The cleanest near-term discriminator is the Hutsemekers
    alignment — it exists in the data, has no standard model
    explanation, and follows directly from the substrate's
    filamentary commitment density geometry exerting coherent
    torques on photons traversing common filament networks.
    GR has no mechanism for this. The substrate does.

