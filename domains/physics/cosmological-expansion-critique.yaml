# ─────────────────────────────────────────────
# THE OBSERVER'S POSITION
# We are not in a generic location
# ─────────────────────────────────────────────

observer_position:
  statement: >
    We observe the universe from a specific, non-generic location.
    We are embedded in the Local Group of galaxies, which is a
    gravitationally bound structure in the outskirts of the Virgo
    Supercluster (Laniakea), which is itself near the edge of a
    significant underdensity — the KBC void, approximately 300 Mpc
    in diameter, one of the largest known underdensities in the
    observable universe.
    In the substrate picture: we are in a region of relatively high η
    — higher free potential, faster process rate, lower commitment
    density than the cosmic average. Our local substrate state is
    not the cosmic average. Every measurement we make is performed
    from inside this specific η environment, calibrated against local
    standards set by this environment, and then applied to the
    interpretation of photons that have traversed regions of very
    different η on their way to us.

  the_doctor_fish_analogy: >
    A small fish near coral, looking out into the open ocean, makes
    measurements using light that has propagated through a density
    gradient at the coral edge. The fish cannot see the gradient
    directly — it is inside it. If it assumes the medium is
    homogeneous, it will systematically miscalculate distances,
    velocities, and structures beyond the gradient. Its map of the
    ocean will be systematically distorted in proportion to its
    failure to correct for the medium it is embedded in.
    We are that fish. The coral is the large-scale structure boundary
    at the edge of our local void. The ocean is the cosmic web beyond.
    The assumption of homogeneity is the assumption that the density
    gradient at the reef edge is negligible. It is not negligible.
    It is a ~5-7% effect on distance measurements, compounding over
    cosmological paths.

  substrate_consequence: >
    In the substrate picture, the KBC void is a region of η above
    the cosmic average — higher free potential, faster decoherence
    rate, faster clocks, higher effective c_eff. Our local standards
    for time, length, and energy are all calibrated in this
    above-average-η environment.
    When we observe objects outside the void — in the denser
    surrounding filaments and walls — we are comparing measurements
    made in different η environments without correcting for the
    difference. The process rate Φ = V/R varies with η. A clock
    in our void environment runs faster than a clock in the denser
    surrounding structure. We don't see this directly because we
    have no external reference — we are inside the void, using
    void-calibrated instruments.

# ─────────────────────────────────────────────
# THE HOMOGENEITY ASSUMPTION
# What it does, why it was adopted, why it fails
# ─────────────────────────────────────────────

homogeneity_assumption:
  statement: >
    The cosmological principle: the universe is homogeneous and
    isotropic at sufficiently large scales (typically taken as
    >100 Mpc). This means: any sufficiently large region is
    statistically equivalent to any other. No location is
    special. No direction is preferred.
  why_adopted: >
    Mathematical necessity: the Friedmann-Lemaître-Robertson-Walker
    (FLRW) metric — the mathematical framework for all standard
    cosmology — requires exact homogeneity and isotropy to be
    solvable analytically. Without this assumption, the Einstein
    field equations for a lumpy universe have no known exact
    solution. Homogeneity was adopted because it made the
    mathematics tractable, not because it was observationally
    established. Eddington, Milne, and others explicitly noted
    this at the time.
    Early observational support: the CMB temperature uniformity
    (variations of 1 part in 100,000) was taken as confirming
    homogeneity at early epochs. Galaxy surveys appeared to show
    increasing homogeneity above ~100 Mpc.
  why_it_is_increasingly_strained: >
    The observed large-scale structure is profoundly inhomogeneous:
    KBC void: ~300 Mpc underdensity centered near the Local Group.
      The largest known underdensity. Our location is not typical.
    Hercules-Corona Borealis Great Wall: ~3 Gpc structure —
      larger than homogeneity scale allows under ΛCDM.
    CMB Cold Spot: ~200 Mpc underdensity in the CMB — too large
      and too cold for standard inflation to produce easily.
    Bulk flows: coherent peculiar velocities of galaxy clusters
      over scales of 200-300 Mpc — inconsistent with the small
      bulk flows ΛCDM predicts at those scales.
    Hubble tension: H₀ local ≈ 73 vs H₀ CMB ≈ 67 km/s/Mpc.
      9% discrepancy between measurements using different methods
      in different environments. Persists despite decades of
      systematic error investigation.
    Each anomaly is handled individually within the homogeneity
    framework — local peculiar velocity, statistical fluctuation,
    systematic error. But the accumulation of anomalies, each
    requiring separate ad hoc treatment, is the signature of a
    framework under strain rather than a description matching
    reality.
  what_homogeneity_hides: >
    By assuming homogeneity, standard cosmology:
    (1) Cannot account for the systematic effect of our specific
        location on our measurements — location bias is defined
        away by the assumption.
    (2) Cannot account for the cumulative density-transition
        redshift from filament-void crossings along photon paths —
        all redshift is attributed to recession velocity.
    (3) Cannot account for the process-rate difference between
        void and filament environments on clocks, distance ladders,
        and energy measurements — the calibration environment is
        assumed universal.
    (4) Forces any residual unexplained signal into new parameters:
        Λ, dark energy, dark matter particle candidates — each
        absorbing an anomaly that homogeneity prevents from being
        explained by structure.

# ─────────────────────────────────────────────
# THE THREE REDSHIFT MECHANISMS — CORRECTLY WEIGHTED
# ─────────────────────────────────────────────

redshift_reanalysis:
  preamble: >
    Standard cosmology recognizes two redshift mechanisms:
    recession velocity (Doppler/metric expansion) and gravitational
    redshift. Density-transition redshift — the third mechanism
    identified in specifications.yaml — is not recognized and not
    corrected for. Its magnitude and distance-dependence are the
    key questions for the expansion critique.

  gravitational_redshift:
    mechanism: >
      Photon climbing out of a commitment well loses energy as
      its oscillation rate slows in decreasing φ. Well-established,
      precisely measured (Pound-Rebka, GPS corrections, gravitational
      wave sirens). Routinely corrected for in cosmological measurements
      for obvious local sources (host galaxy gravitational potential).
      Not corrected for the large-scale potential gradient between
      void (our location, higher φ) and surrounding structure (lower φ).
    local_void_contribution: >
      If we are in a ~5-7% underdensity relative to the cosmic mean
      (KBC void), photons arriving from outside the void have climbed
      out of a deeper potential well than our local environment.
      They arrive blueshifted relative to what they would be in a
      homogeneous universe — but we don't correct for this because
      we assume homogeneity. The blueshift from climbing out of the
      surrounding denser region partially offsets recession redshift
      for nearby objects, and the offset varies with the depth and
      extent of the void. This is a known effect (Rees-Sciama,
      integrated Sachs-Wolfe) but typically treated as small
      and secondary.

  density_transition_redshift:
    mechanism: >
      Photon traversing a boundary between substrate regions of
      differing commitment density. The photon's wake (resolution
      debt) is calibrated to the source-side η; entering the
      receiver-side η, the mismatch produces partial dissipation
      of trail energy — a small redshift proportional to ΔR at
      the boundary and to the boundary steepness.
      Key property: magnitude correlates with boundary steepness
      (ΔR gradient), not just ΔR total. Sharp filament-void
      boundaries produce more redshift per unit density contrast
      than gradual ones.
    distance_dependence: >
      A photon from a nearby galaxy crosses few filament-void
      boundaries. A photon from a galaxy at z = 0.5 crosses
      potentially hundreds of boundaries — every large-scale
      structure element along the line of sight contributes.
      The cumulative density-transition redshift therefore grows
      with distance, but not linearly — it grows with the number
      and sharpness of boundaries encountered, which itself
      depends on the large-scale structure geometry along that
      specific line of sight.
      This distance-dependence mimics the redshift-distance
      relation of an expanding universe at a qualitative level,
      but differs quantitatively in specific ways:
        (a) Scatter at fixed redshift should correlate with
            large-scale structure boundary count along the LOS.
        (b) The effective "expansion rate" derived should vary
            with direction, correlating with void vs filament
            orientation.
        (c) The signal should show characteristic filamentary
            anisotropy in precision redshift surveys.

  recession_velocity:
    status: >
      Not ruled out by this framework — regional dynamics
      (void expansion outward, filament infall) produce genuine
      relative velocities between structures. What is questioned
      is whether global, monotonic, isotropic expansion is real
      or whether it is the interpretation of cumulative
      density-transition redshift plus regional dynamics read
      through a homogeneity assumption.
    regional_vs_global: >
      The substrate picture naturally produces regional dynamics:
      Voids: high η → high substrate pressure outward → void
        galaxies move outward relative to filaments. Real velocity.
      Filaments: low η → stronger gravitational infall → filament
        galaxies move inward. Real velocity.
      The net effect from our void location: most galaxies appear
      to be receding, because most galaxies are in denser regions
      (filaments, walls) from which void-outflow velocity is
      positive. This mimics global expansion from our perspective,
      without requiring global expansion.
      The question is not whether relative velocities exist —
      they do. The question is whether the universe is globally
      expanding or whether the apparent global expansion is a
      superposition of: (a) regional dynamics misread as global,
      (b) density-transition redshift misread as recession, and
      (c) observer-location bias from our void environment.

