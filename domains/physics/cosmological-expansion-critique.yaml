# THE HUBBLE TENSION AS PROCESS-RATE DIFFERENTIAL
# ─────────────────────────────────────────────

hubble_tension:
  observation: >
    H₀ measured locally (Cepheids, supernovae, strong lensing):
    ~73 km/s/Mpc.
    H₀ measured from CMB (Planck, assuming ΛCDM):
    ~67 km/s/Mpc.
    Discrepancy: ~9%, >5σ significance.
    Persists across independent measurement methods.
    Currently the most significant tension in cosmology —
    either systematic error (not found after decades of search)
    or new physics beyond ΛCDM.

  substrate_explanation: >
    In the substrate picture, H₀ is not a universal constant —
    it is the local measurement of the redshift-distance relation,
    which depends on the local η environment of both the observer
    and the calibration objects used.

    Local H₀ measurement (Cepheids, supernovae):
    Calibrated using objects in the local universe — within
    ~100-300 Mpc. This volume is substantially within or near
    the KBC void — a region of above-average η. The distance
    ladder is calibrated in an above-average-η environment.
    Objects appear slightly closer than they would in an
    average-η environment (higher process rate → photons
    propagate faster → less time for redshift to accumulate
    per unit proper distance). The derived H₀ is higher than
    the cosmic average because the local measurement environment
    has higher φ than average.

    CMB H₀ measurement (angular scale of acoustic peaks):
    Averages over the full last-scattering surface — a
    representative sample of the cosmos at z ≈ 1100, before
    the void structure developed. The CMB measurement is
    closer to the cosmic average η. It gives a lower H₀
    because it is not biased by the local void's above-average φ.

    The ~9% tension encodes the φ difference between our local
    void environment and the cosmic average. In the substrate
    picture: Φ_local/Φ_cosmic_average ≈ 73/67 ≈ 1.09. Our
    local process rate is ~9% higher than the cosmic average.
    This is a measurable substrate property — the η difference
    between the KBC void interior and the cosmic mean — not a
    tension requiring new physics.

  prediction: >
    The Hubble tension should correlate with large-scale structure:
    H₀ measured in void environments should be systematically
    higher than H₀ measured in filament/cluster environments,
    by an amount proportional to the η contrast between the
    two environments. This is a specific, testable prediction:
    not just "local vs CMB" but a continuous correlation between
    measurement environment density and derived H₀.
    This can be tested with existing survey data (DES, SDSS,
    DESI) by stratifying H₀ measurements by the large-scale
    structure environment of the calibration objects.
    Standard cosmology predicts no such correlation (homogeneity).
    Praestology predicts a systematic trend.

# ─────────────────────────────────────────────
# THE SUPERNOVA DIMMING AND DARK ENERGY
# ─────────────────────────────────────────────

supernova_dimming:
  observation: >
    Perlmutter, Schmidt, Riess (Nobel 2011): Type Ia supernovae
    at z ≈ 0.5-1 are ~25% dimmer than expected for a universe
    decelerating under gravity alone. Interpreted as evidence
    for accelerating expansion. Requires a repulsive dark energy
    component — 68% of the universe's energy content.

  standard_inference_chain: >
    Supernova redshift z
    → assumes z = recession velocity → infers distance d_recession
    → measures apparent brightness
    → compares to expected brightness at d_recession
    → brightness deficit → object further than expected
    → expansion is accelerating
    → requires Λ (cosmological constant) or dark energy

  where_the_chain_breaks: >
    Step 1 — z = recession velocity:
    If a fraction of z is density-transition redshift from
    filament-void crossings along the line of sight to the
    supernova, then d_recession is overestimated. The supernova
    is not as far as the full redshift implies. Its apparent
    brightness deficit is partly because its redshift was
    overcounted — not because it is further than expected.

    Step 2 — distance-dependent excess:
    Density-transition redshift accumulates with path length.
    Supernovae at higher z have their photons crossing more
    filament-void boundaries. Their z has a larger density-
    transition component. Therefore: the brightness deficit
    grows with z not because expansion is accelerating but
    because the density-transition redshift contribution
    grows with path length. This mimics the signature of
    accelerating expansion precisely because both produce
    a z-dependent distance overcounting that grows with z.

    Step 3 — homogeneity prevents the correction:
    If you assume all redshift is recession, you never look
    for the density-transition component. The systematic is
    invisible by construction. The residual is attributed to
    a new energy component.

  dark_energy_as_misidentification: >
    Dark energy (Λ) is the parameter introduced to absorb the
    brightness deficit of distant supernovae within the
    homogeneity + recession-only-redshift framework.
    If the brightness deficit is substantially explained by
    density-transition redshift accumulated over the photon's
    path — a systematic that grows with distance and is not
    corrected for — then dark energy is not a substance or
    property of space. It is a numerical artifact of an
    incomplete redshift accounting.
    The 68% dark energy content of the standard model would
    then be the fraction of the cosmological parameter space
    required to absorb an unrecognized systematic. Its value
    is not a measurement of space's energy content — it is
    a measure of how much cumulative density-transition
    redshift has been misattributed to recession velocity
    over cosmological distances.

  falsification_test: >
    If density-transition redshift explains the supernova
    dimming, then:
    (a) The residuals from the Hubble diagram (supernova
        brightness vs redshift) should correlate with the
        number and sharpness of large-scale structure
        boundaries along each supernova's line of sight.
        Standard ΛCDM: residuals are statistical scatter.
        Praestology: residuals correlate with LOS structure.
    (b) Supernovae along lines of sight through more
        filament-void boundaries should appear systematically
        dimmer (more excess redshift) than those along
        void-dominated lines of sight at the same z.
    (c) The brightness-z relation should show direction-
        dependent variation correlating with the large-scale
        structure map. Already hints of this in the data
        (hemisphere asymmetry in supernova samples) —
        currently attributed to systematic error.
    Rubin Observatory LSST will measure ~100,000 Type Ia
    supernovae with precise large-scale structure context.
    This is the definitive test.

# ─────────────────────────────────────────────
# THE HOT BIG BANG AND ITS EXPANSION DEPENDENCY
# ─────────────────────────────────────────────

big_bang_dependency:
  the_cluster: >
    The hot Big Bang model (ΛCDM) is a cluster of mutually
    supporting assumptions, not a monolithic theory. Each
    assumption was introduced to explain an observation, often
    within the framework already established by prior assumptions.
    The cluster:
      Global expansion → hot dense early universe → Big Bang
      Big Bang → inflation to explain CMB uniformity
      CMB uniformity → acoustic peaks → ΛCDM calibration
      Supernova dimming → Λ (dark energy)
      Galaxy rotation curves → exotic dark matter particles
      Large-scale structure → cold dark matter seeds
      Λ + CDM → ΛCDM
    These support each other: expansion gives Big Bang, Big Bang
    gives inflation, inflation gives CMB structure, CMB structure
    calibrates H₀, H₀ discrepancy requires dark energy, dark
    energy requires Λ. Pull one, and the cluster needs
    renegotiation — not necessarily collapse, but revision.

  expansion_as_foundation: >
    Global expansion is the foundational assumption. Without it:
    Hot Big Bang loses its primary motivation — why assume an
      initially hot dense state unless the current expansion
      implies contraction backward in time to a singularity?
    Inflation loses its primary job — it was introduced to
      explain why a hot Big Bang produces a CMB so uniform
      (the horizon problem). If there's no hot Big Bang, the
      uniformity requires a different explanation — which the
      substrate picture provides: the substrate began in a
      high-φ, maximum free potential state (R1-R5 cosmogenesis)
      that is inherently uniform, without requiring inflation.
    Λ loses its job — as argued above, dark energy was introduced
      to explain the supernova dimming within the expansion
      framework. Without expansion as the baseline, the dimming
      is explained by density-transition redshift.
    The ΛCDM parameter count — ~20-30 free parameters — was built
      up incrementally to absorb anomalies within the expanding
      homogeneous framework. Many of those parameters are absorbing
      signals of structure that the framework couldn't account for.

  praestology_cosmogenesis: >
    The Praestology alternative to hot Big Bang cosmogenesis
    is already in the framework (cosmos/specifications.yaml):
    the substrate began in a high-φ initial state — maximum free
    potential, minimum committed topology — and the arrow of time
    is the ongoing process of that potential flowing into
    commitment structure. This is not a "before the Big Bang"
    scenario — it dissolves the t=0 singularity entirely.
    There was no moment of infinite density. There was a region
    (not a moment) of maximum free potential from which
    committed topology has been accumulating ever since.
    The CMB uniformity in this picture: the early high-φ state
    was inherently near-uniform because commitment density was
    near-zero everywhere — the substrate at η ≈ 1 is isotropic
    by R5. Uniformity is the starting condition, not something
    that requires inflation to produce.
    The CMB acoustic peaks: these are the first commitment
    topology structures — the first vortex formations from
    Tik fluctuations in the high-φ early substrate — imprinted
    at the recombination epoch. Their scale encodes the substrate
    grain ξ and the early Tik amplitude. Not acoustic oscillations
    in a photon-baryon plasma, but the first topological commitment
    events in a cooling, differentiating substrate.
    Open derivation: reproduce CMB peak positions and amplitudes
    from early-substrate Tik fluctuation spectrum and GP parameters.
    This is the most demanding test of the cosmogenesis picture.

  what_remains_without_expansion: >
    Removing global expansion as a foundational assumption does
    not leave cosmology empty. It leaves:
    Regional dynamics — void expansion outward, filament infall,
      bulk flows — all real, all derivable from the substrate
      commitment density gradient picture.
    Gravitational redshift — well-established, precisely measured,
      continues to explain the distance-dependent redshift component
      from large-scale potential gradients.
    Density-transition redshift — the new mechanism that absorbs
      the cosmological redshift previously attributed to recession.
    Substrate ground-state pressure — the Tik background isotropic
      pressure from voids outward, driving the self-organization
      of the cosmic web. This is the genuine physical effect that
      was misidentified as dark energy.
    CMB — real, precisely measured, reinterpreted as the imprint
      of early-substrate commitment topology rather than hot
      plasma acoustic oscillations.
    Nucleosynthesis — the light element abundances (H, He, Li)
      currently explained by hot Big Bang nucleosynthesis. This
      is the most constrained prediction of the standard model
      and requires careful treatment. Open: whether substrate
      cosmogenesis produces the observed element abundances from
      a different mechanism. This is an unresolved challenge
      for the framework and is stated honestly as such.

