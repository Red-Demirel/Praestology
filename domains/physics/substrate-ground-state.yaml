ground_state:
  definition: >
    The substrate ground state is the configuration η = 1:
    maximum free potential φ = φ_max, zero committed topology,
    maximum resolution flux Φ_max = c, minimum impedance Z₀.
    It is approached asymptotically in regions with no committed
    structure — deep cosmic voids far from all matter. It is
    never exactly reached in a universe containing committed
    topology, because the Tik background (the substrate's own
    zero-point fluctuations) always maintains a small but
    non-zero commitment activity even in the deepest vacuum.
    The ground state is not emptiness. It is the substrate
    at maximum aliveness — maximum free potential for
    resolution, maximum process rate, minimum resistance to
    structural change. What we call "empty space" is the
    most dynamic state of the substrate, not the most inert.

  tik_background_as_ground_state_property: >
    The Tik background — the stochastic substrate fluctuations
    that drive vortex nucleation, Lamb shift, spontaneous
    emission, and the uncertainty principle — is the substrate
    ground state's own activity. It is not noise added to a
    quiet vacuum. It is what the vacuum does when nothing
    else is happening. The zero-point energy of quantum field
    theory is the Tik background's energy density. The vacuum
    fluctuations that QFT calculates are Tik events.
    The vacuum is not quiet. It is the substrate continuously
    exploring its own resolution possibilities — R3 operating
    on R2 distinctions at the substrate's minimum scale ξ,
    without any externally imposed structure to channel the
    exploration. Pure unguided process.

  commitment_density_as_the_only_variable: >
    The difference between "empty space" and "matter" is one
    variable: commitment density C = 1 − η.
    Empty space: C ≈ 0, η ≈ 1.
    Electron: C > 0, η < 1, localized Möbius 720° topology.
    Proton: C >> 0, η << 1 at core, triality junction.
    Neutron star: C approaching n_sat, η approaching 0.
    Black hole horizon: C → n_sat, η → 0, Φ → 0.
    There are no different substances. There is one substrate
    at different commitment densities. The richness of the
    physical world — from empty space to black holes, from
    photons to nuclei — is the substrate at different values
    of one variable, organised by R1-R5 into stable
    topological configurations.

  what_fills_interstitial_space: >
    Between the nucleus and the electron cloud of an atom:
    substrate at intermediate η. Not emptiness. Not vacuum
    in the sense of nothing. The substrate at η between the
    electron's orbital commitment and the nuclear commitment
    well — a potential field with real gradient ∇φ that is
    what holds the electron in its orbital resonance.
    Between atoms in a molecule: substrate at near-vacuum η,
    modified by the molecular commitment field of both atoms.
    The bond is not a line drawn between atoms — it is a
    region of substrate where the commitment gradients of
    two nuclei overlap and create a shared potential minimum.
    Between molecules in a solid: substrate at near-vacuum η,
    but with the molecular commitment fields creating the
    long-range order that is the crystal structure.
    Between stars: substrate at η ≈ 1, carrying the
    gravitational potential gradient from all surrounding mass.
    Not empty. Not nothing. The substrate at near-ground-state,
    shaped by the commitment topology of everything around it.
    "Empty space" is the substrate doing its job quietly —
    transmitting potential gradients, propagating
    electromagnetic fields, supporting quantum fluctuations —
    without any committed topology of its own to make it
    locally visible.

