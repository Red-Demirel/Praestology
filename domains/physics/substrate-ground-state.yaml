praesto_vs_standard_cosmology:
  purpose: >
    Compact positioning table for engagement with researchers
    familiar with FLRW cosmology and Minkowski spacetime.
    Neither framework is dismissed — FLRW and Minkowski are
    effective descriptions that work at their level. The
    contrast identifies what Praestology does differently
    and why the differences matter for unresolved problems.

  comparison:
    ontological_foundation:
      praesto: >
        Dynamic field of free potential (Praegress reservoir).
        No background geometry assumed. Space, time, metric all
        emerge from the commitment dynamics of the potential field.
        The substrate IS space; there is no prior container.
      flrw_minkowski: >
        Pre-existing 4D manifold (FLRW cosmologically, Minkowski
        locally) whose curvature is the primary object. Matter and
        energy are sources that modify the manifold. The manifold
        is assumed; its properties are derived from Einstein's equations.

    gravity_mechanism:
      praesto: >
