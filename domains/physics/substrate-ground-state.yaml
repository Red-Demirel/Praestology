      flrw_minkowski: >
        Cosmological constant problem: unsolved (10¹²⁰ fine-tuning).
        Quantum gravity: unsolved (GR and QM incompatible at Planck scale).
        Dark components: unresolved (no identified particles).
        Hubble tension: unresolved (>5σ, no satisfactory explanation).

