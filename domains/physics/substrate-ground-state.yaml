    a Lorentz-invariant potential field whose extension IS space,
    whose ground state IS the quantum vacuum, and whose
    commitment density gradient IS gravity; Michelson-Morley
    falsified a medium with a preferred frame, not a Lorentz-
    invariant medium, and the standard model has been measuring
