    vacuum:
      praesto: >
        The vacuum is the Praegress reservoir at η ≈ 1 — maximum free
        potential, pre-energy (undifferentiated potential is not yet
        energy; energy only actualises via gradients). The vacuum
        appears empty because it is uniform — sameness is invisible.
