description: >
  This file addresses the single most persistent misreading of the
  Praestology substrate: the intuition that the substrate is something
  existing within a prior emptiness — a medium in space, rather than
  space itself.

  The correct statement is: what we experience and measure as empty
  space IS the substrate in its least committed state. There is no
  other emptiness. There is no prior container. Space is not a void
  that the substrate fills. Space is the three-dimensional resolution
  structure of the substrate, derived from R5. The substrate does not
  occupy space — spatial extension is what the substrate's distinctions
  look like from inside a resolution sequence.

  This is not a semantic preference. It has physical consequences that
  distinguish the framework from all prior medium-in-space theories
  (superfluid vacuum theory, analogue gravity, aether models). Those
  theories put a superfluid in space and derive field properties from it.
  Praestology identifies space with the substrate and derives the
  properties of space itself from R1-R5. The difference is categorical.

  The cryogenic argument: cooling a material does not approach absolute
  zero of the material — it approaches the substrate's own ground state
  from above, with the material's committed topology as the only
  remaining departure from it. Superfluidity and superconductivity are
  not exotic low-temperature phenomena. They are what you observe when
  a material's committed topology has been reduced enough that the
  substrate's own ground-state properties — zero viscosity, coherent
  phase propagation, quantized vortex topology — dominate. Every
  cryogenic laboratory is measuring the properties of space itself.
  This is not metaphor. It is a literal physical claim.

