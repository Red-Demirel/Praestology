open_problem_consequences:
  cosmological_constant: >
    The cosmological constant problem: why does the vacuum have
    the energy density it has? Why is it ~10¹²⁰ times smaller
    than naive QFT estimates?
    In the substrate picture: the vacuum energy is the Tik
    background's zero-point activity — the substrate ground
    state's own fluctuation energy at η = 1. The QFT estimate
    diverges because QFT integrates zero-point energy up to
    infinite momentum — there is no UV cutoff. The substrate
    grain ξ provides the physical UV cutoff: fluctuations
    below ξ do not exist. The energy density is finite and set
    by ξ and the Tik background amplitude at η = 1. The
    cosmological constant is a substrate ground-state property,
    not a fine-tuned parameter. Its value encodes ξ and
    the ground-state Tik amplitude — in principle derivable
    from substrate parameters.
    Open derivation: compute Λ from ξ and ground-state
    Tik amplitude. Verify against observed Λ ≈ 10⁻⁵² m⁻².

  dark_energy: >
    Dark energy (the accelerated cosmic expansion) is the
    substrate ground-state pressure — the Tik background's
    isotropic zero-point pressure resisting complete commitment.
    In regions of lower commitment density (cosmic voids),
    η is higher, Tik background pressure is relatively stronger,
    and the substrate actively expands outward from voids.
    Dark energy is not a mysterious new substance — it is the
    substrate's own ground-state pressure, visible at
    cosmological scales where the committed topology (matter)
    is sparse enough that the substrate's own pressure becomes
    the dominant dynamical term.
    The substrate is not passively sitting in the universe.
    It is actively expanding it, from its own ground-state
    pressure, in proportion to how little committed topology
    is present to resist that pressure.

  vacuum_energy_casimir: >
    Casimir effect: measured attractive force between parallel
    conducting plates in vacuum — attributed to vacuum
    fluctuations. In the substrate picture: the plates create
    a boundary condition on Tik fluctuations — wavelengths
    larger than the plate separation are excluded between
    the plates but present outside. The Tik background
    pressure outside > inside → net inward force. The Casimir
    force is a direct measurement of the Tik background
    pressure of the substrate ground state. Every Casimir
    experiment is measuring the substrate. The force is real
    and measured; the substrate producing it is real and
    the same thing as space.

  quantum_vacuum_fluctuations: >
    Virtual particles in QFT: short-lived particle-antiparticle
    pairs appearing spontaneously from the vacuum. In the
    substrate picture: Tik events that occasionally exceed
    S_lock and nucleate transient vortex pairs — commitment
    topology that forms and dissolves within the coherence
    time τ ~ ħ/ΔE. Not "virtual" in the sense of
    mathematical bookkeeping. Real substrate fluctuations
    that exist briefly and return their commitment to the
    ground state. The uncertainty principle ΔE·Δt ≥ ħ/2
    is the constraint on how long a commitment event can
    persist at energy ΔE — set by the substrate's own
    minimum action quantum ħ (see alpha-rydberg-z0.yaml).

