# THE FIBONACCI / GOLDEN RATIO NOTE
# ─────────────────────────────────────────────

fibonacci_golden_ratio:
  status: "Emergent statistical attractor — not a primitive, not hard-coded"
  statement: >
    Fibonacci sequences and the golden ratio φ ≈ 1.618 appear
    in shell-filling patterns (phyllotaxis-like optimal packing),
    quasicrystal structures, and certain molecular symmetries.
    These are not evidence for a deeper Fibonacci primitive in
    the framework — they are consequences of recursive isotropic
    packing under the saturation constraint.
  mechanism: >
    When structures must pack recursively in 3D isotropic space
    while minimising commitment overlap (Pauli exclusion at each
    level) and approaching but not exceeding saturation (R5),
    the optimal packing ratio converges on φ. This is a known
    mathematical result: the golden ratio is the "most irrational"
    number — it produces the least overlap in recursive angular
    subdivision. Sunflower seed packing and atomic shell spacing
    both converge on φ for the same reason: minimise overlap,
    respect the isotropy constraint.
  implication: >
    If Fibonacci patterns appear in higher-shell atomic structures
    or in the nesting hierarchy of composite particles, this is
    a confirmation that R5 recursive packing is operating — not
    a new input to the framework. The framework predicts these
    patterns will appear wherever recursive isotropic packing
    under saturation operates. Finding them is a consistency
    check, not a surprise.

