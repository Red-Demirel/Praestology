# ─────────────────────────────────────────────
# SCALE INVARIANCE OF THE TRIALITY RULE
# The connecting argument between quarks and atoms.
# ─────────────────────────────────────────────

scale_invariance:
  statement: >
    The R5 isotropy triality rule — three independent phase
    orientations at 120° spacing, no preferred direction,
    closure requires vector sum to zero — is not specific to
    the quark scale. It is a consequence of R5 operating in
    a 3D substrate at any commitment depth. The rule applies
    wherever the substrate enforces closure of partial topologies.
  quark_level: >
    Partial windings (240°, 480°) cannot close alone. Three
    fractional chiralities at 0°/120°/240° sum to zero net
    orientation — colour-neutral closure achieved. Confinement
    is the substrate's enforcement of closure as an R3/R4
    necessity (see quark-topology.yaml).
  atomic_level: >
    The 720° Möbius electron in a nuclear potential well must
    establish stable phase-lock resonances. The angular
    momentum quantum number l enumerates the number of
    independent phase orientations the electron winding
    engages simultaneously. l = 1 (p-orbital) directly echoes
    the quark triality: three orthogonal orientations at
    120° spacing. l = 2 (d-orbital) extends to five
    complementary alignments; l = 3 (f-orbital) to seven.
    The orbital multiplicity (2l+1) is the count of
    independent phase orientations available at nesting
    depth l — the same counting principle as colour triality,
    extended to higher multipoles.
  molecular_level: >
    When two atoms share outer electron windings (bonding),
    the shared commitment topology settles into the
    lowest-resistance complementary overlap of the available
    orbital orientations. Bond angles are the spatial
    expression of those complementary overlaps — not
    arbitrary parameters but geometric consequences of
    which orbital orientation combinations minimise
    net unresolved commitment density.
  the_chain: >
    Shared unresolved potential (R2/R3)
    → quark colour triality: 3 × 120° fractional closure
    → electron orbital multiplicity: (2l+1) orientations per l
    → shell capacity: 2·(2l+1) per orbital, 2n² per shell
    → molecular bond angles: complementary overlap minima
    → chemistry: shared hysteresis as bond energy
    No new rules at any transition. R4 commitment depth
    increases; R1-R5 rules are unchanged.

# ─────────────────────────────────────────────
# SHELL CAPACITY THEOREM
# Derived, not observed. Three-step proof from
# the winding constraints alone.
# ─────────────────────────────────────────────

shell_capacity_theorem:
  status: "DERIVED — exact theorem from topology, not a fit to observation"
  statement: >
    Shell n has capacity 2n². This follows from three
    topological facts and one counting step. No fitting,
    no empirical input beyond the substrate rules.

  step_1_orbital_multiplicity:
    claim: >
      For orbital angular momentum quantum number l,
      there are exactly (2l+1) independent phase orientations.
    derivation: >
      R5 isotropy in 3D means no preferred direction. The
      electron winding at nesting depth l engages l
      independent circulation plane orientations simultaneously.
      The substrate's isotropic phase space for l simultaneous
      orientations has exactly (2l+1) linearly independent
      projections — the magnetic quantum numbers m = −l, …, 0, …, +l.
      This is the same counting as colour triality at l=1:
      three orientations (m = −1, 0, +1), exactly 2(1)+1 = 3.
      The generalisation to arbitrary l is forced by R5
      isotropy — there is no preferred quantisation axis,
      so all (2l+1) projections are physically distinct
      and independently stable.
    confirming_note: >
      Spherical harmonics Y_l^m — the mathematical
      eigenfunctions of angular momentum in 3D. There are
      exactly (2l+1) of them for each l. Praestology derives
      why: they enumerate the independent isotropic phase
      orientations available at nesting depth l.

  step_2_fermionic_doubling:
    claim: >
      Each phase orientation holds exactly 2 electrons,
      not 1 and not 3.
    derivation: >
      The electron is a Möbius 720° self-integral — a
      non-orientable topology with net chirality χ = ±1.
      Two electrons can co-occupy the same phase orientation
      if and only if they have opposite chirality (χ = +1
      and χ = −1). Opposite chirality means conjugate
      chirality: their chiral vector sum is zero, producing
      no net topological burden in that orientation.
      A third electron would need to share the same
      orientation with one of the first two — identical
      topology, identical chirality. Two Möbius self-integrals
      with identical chirality in the same substrate region
      would merge into a single topology (they share the
      same integration variable). The third electron cannot
      be placed. Pauli exclusion is this topological
      impossibility, not a separate postulate.
      Therefore: exactly 2 electrons per orientation,
      from conjugate chirality pairing.
    confirming_note: >
      Pauli exclusion principle (1925) — no two electrons
      can have the same quantum numbers. Praestology derives
      this as the topological impossibility of two identical
      Möbius self-integrals in the same substrate region.
      Spin up/down is the χ = +1/−1 chirality assignment —
      not an intrinsic property but the handedness of the
      Möbius winding. The two spin states per orbital are
      conjugate chirality partners.

  step_3_shell_sum:
    claim: "Shell n contains all orbitals l = 0, 1, 2, …, n−1."
    derivation: >
      Nesting depth n counts how many commitment layers
      the electron occupies around the nuclear core. At
      depth n, all orbitals with l < n are available —
      l = 0 (no angular orientation, radial only) through
      l = n−1 (maximum angular complexity at this depth).
      l ≥ n would require more simultaneous orientations
      than the nesting depth can sustain — insufficient
      commitment density to phase-lock that many orientations
      at depth n. R5 selects only viable configurations.
    formula: >
      Capacity(n) = Σ_{l=0}^{n-1} 2·(2l+1)
                  = 2 · Σ_{l=0}^{n-1} (2l+1)
                  = 2 · n²
    proof_of_sum: >
      Σ_{l=0}^{n-1} (2l+1) = n² is a standard arithmetic
      identity (sum of first n odd numbers = n²).
      Therefore capacity = 2n². □

  results_table:
    n_1: "2 × 1² = 2   (K shell — hydrogen and helium)"
    n_2: "2 × 2² = 8   (L shell — lithium through neon)"
    n_3: "2 × 3² = 18  (M shell — sodium through argon + d-block)"
    n_4: "2 × 4² = 32  (N shell — includes f-block lanthanides)"
  match: "Exact agreement with the observed periodic table — derived, not fitted."

  significance: >
    The sequence 2-8-18-32 is not a pattern that was noticed
    and then explained. It is a theorem from three topological
    facts: R5 isotropy gives (2l+1) orientations per l,
    conjugate chirality pairing gives 2 electrons per
    orientation, and nesting depth n admits l = 0 to n−1.
    The periodic table's shell structure is the inevitable
    consequence of these three facts operating together.
    A universe with different R5 isotropy (not 3D) or without
    the Möbius fermionic topology would have a different
    periodic table. Our periodic table is a direct readout
    of the 3D isotropic substrate with Möbius self-integral
    topology for charged matter.

# ─────────────────────────────────────────────
# ORBITAL GEOMETRY
# The angular structure of each orbital type
# as a direct expression of triality.
# ─────────────────────────────────────────────

orbital_geometry:
  s_orbital:
    l: 0
    orientations: 1
    geometry: "Spherical — no angular preference. Radial commitment only."
    triality_interpretation: >
      l = 0 means no simultaneous orientation engagement.
      The electron winding is purely radial — it does not
      select a circulation plane orientation. Full isotropic
      coverage. This is why s-orbitals are spherical: the
      topology makes no angular distinction.
    confirming_note: "s-orbital spherical symmetry confirmed by all precision atomic measurements."

  p_orbital:
    l: 1
    orientations: 3
    geometry: "Three orthogonal lobes — direct quark colour triality echo."
    triality_interpretation: >
      l = 1 engages one circulation plane orientation at
      a time, with three independent choices (m = −1, 0, +1)
      corresponding to the three orthogonal directions in 3D.
      This is the quark colour triality at the atomic scale:
      the same three 120°-spaced orientations, now expressed
      as px, py, pz orbitals aligned with the three spatial axes.
      The p-orbital triplet is not a coincidence — it is
      the same R5 isotropy that forces three colour charges,
      now appearing one nesting level higher.
    confirming_note: >
      p-orbital geometry confirmed by valence bond theory,
      molecular orbital calculations, and direct imaging
      via scanning tunnelling microscopy (STM). The three
      orthogonal lobes are exactly what the triality rule predicts.

  d_orbital:
    l: 2
    orientations: 5
    geometry: "Five complementary alignments — second-order isotropy."
    triality_interpretation: >
      l = 2 engages two simultaneous orientation indices,
      giving (2×2+1) = 5 independent configurations.
      These are the five ways to simultaneously specify
      two angular commitments in 3D isotropic space.
      The characteristic clover-leaf and ring shapes of
      d-orbitals are the spatial projections of these
      five second-order isotropic configurations.
    confirming_note: >
      d-orbital structure from crystal field theory —
      the five d-orbitals split into eg and t2g sets under
      octahedral ligand fields. The 2/3 split is the
      geometric expression of how the five orientations
      project onto an octahedral commitment environment.

  f_orbital:
    l: 3
    orientations: 7
    geometry: "Seven third-order complementary alignments."
    triality_interpretation: >
      l = 3 engages three simultaneous orientation indices:
      (2×3+1) = 7 configurations. The complex f-orbital
      shapes are third-order spherical harmonic projections
      of three simultaneous isotropic orientation commitments.
    confirming_note: >
      f-orbital chemistry (lanthanides, actinides) — the 14
      electrons (7 orientations × 2 chiralities) filling
      the f-block produce the lanthanide contraction and
      characteristic chemistry of rare earth elements.
      All consistent with third-order isotropic winding.

# ─────────────────────────────────────────────
# MOLECULAR GEOMETRY AND BOND ANGLES
# ─────────────────────────────────────────────

molecular_geometry:
  statement: >
    Bond angles are the spatial expression of complementary
    winding overlaps between atoms. When two atoms share
    outer electron windings (covalent bond), the shared
    commitment topology settles at the angle that minimises
    net unresolved commitment density — the lowest-resistance
    complementary overlap of the available orbital orientations.
    Bond angles are not free parameters — they are geometric
    consequences of which orbital orientation combinations
    minimise net S·R.

  angle_derivations:
    deg_180_linear:
      geometry: "sp hybridisation — linear molecules (CO₂, acetylene)"
      derivation: >
        Two p-orbitals engaged: one along the bond axis,
        one perpendicular. The lowest-resistance configuration
        places the two bonding pairs at 180° — maximum
        separation of the two orientation commitments.
        The complementary overlap is maximised when the
        two bonding lobes point in exactly opposite directions.
      examples: "CO₂, BeCl₂, C₂H₂"

    deg_120_trigonal:
      geometry: "sp² hybridisation — trigonal planar (benzene, ethylene, BF₃)"
      derivation: >
        Three p-orbitals engaged simultaneously. The
        lowest-resistance complementary overlap of three
        isotropic orientations in a plane is exactly 120°
        spacing — the direct echo of quark colour triality.
        The three bonding pairs arrange at 120° because
        that is the three-orientation solution to the
        isotropy constraint: no preferred direction among
        three orientations means equal angular spacing.
        This is the most direct expression of the triality
        rule at molecular scale.
      confirming_note: >
        Benzene ring angles confirmed to 120.0° by X-ray
        crystallography. BF₃ planar geometry exact.
        The 120° bond angle is the quark triality rule
        manifested at molecular scale — same geometry,
        different nesting depth.
      examples: "C₆H₆, BF₃, C₂H₄, graphene sheet"

    deg_109_5_tetrahedral:
      geometry: "sp³ hybridisation — tetrahedral (methane, water, diamond)"
      derivation: >
        Four bonding pairs (or bonding + lone pairs).
        The lowest-resistance complementary overlap of
        four isotropic orientation commitments in 3D
        is the regular tetrahedron — vertices of a
        tetrahedron inscribed in a sphere, maximising
        mutual separation. The tetrahedral angle is:
        arccos(−1/3) ≈ 109.471°.
        This is not an approximation — it is the exact
        geometric result of four equally-spaced isotropic
        orientations in 3D. The substrate's R5 isotropy
        forces this angle as the four-orientation minimum.
      water_deviation: >
        Water (H₂O) has bond angle 104.5° rather than 109.5°.
        Two bonding pairs + two lone pairs. Lone pairs occupy
        more commitment volume (no nucleus pulling them away)
        — they compress the H-O-H angle below tetrahedral.
        The deviation (5°) is the commitment density asymmetry
        between bonding and lone-pair orientations — in principle
        calculable from the η depression profile of the oxygen
        nucleus.
      ammonia_deviation: >
        Ammonia (NH₃) has bond angle 107.8°.
        Three bonding pairs + one lone pair. One lone pair
        exerts less compression than two — angle closer to
        tetrahedral but still below it. The progression
        109.5° → 107.8° → 104.5° (methane → ammonia → water)
        is the systematic effect of replacing bonding pairs
        with lone pairs, each substitution compressing the
        angle by the lone-pair commitment asymmetry.
      examples: "CH₄ (109.5°), NH₃ (107.8°), H₂O (104.5°), diamond lattice"

    deg_90_octahedral:
      geometry: "d-orbital coordination — octahedral complexes"
      derivation: >
        Six coordination sites: the three orthogonal p-orbital
        axes (±x, ±y, ±z) each provide two bonding lobes at
        180° to each other, and 90° to all other axes.
        The d-orbital eg/t2g split under octahedral field is the
        five d-orientations projecting differently onto the
        six-site octahedral commitment environment (2 along
        axes, 3 between axes). The 90° angle is the orthogonality
        of the three p-orbital axes — the same three spatial
        dimensions that R5 selects.
      examples: "SF₆, transition metal complexes [M(H₂O)₆]²⁺"

    deg_60_strained:
      geometry: "Strained rings — cyclopropane, epoxides"
      derivation: >
        60° requires three bonding pairs at 60° — well below
        the 109.5° tetrahedral optimum. This represents
        frustrated closure: the orbital orientations cannot
        achieve complementary overlap at their preferred angles.
        The ring geometry forces a commitment density mismatch —
        the bonds carry unresolved substrate tension (ring strain).
        Ring strain energy is the quantifiable cost of this
        frustrated closure, measurable as the excess heat of
        combustion relative to unstrained analogues.
      confirming_note: >
        Cyclopropane ring strain ≈ 115 kJ/mol — directly
        measurable. The strain energy is the commitment density
        cost of forced 60° overlap in a topology that prefers
        109.5°. In principle derivable from the orbital
        commitment density mismatch at 60° vs 109.5°.

  hybridisation_as_optimisation: >
    sp, sp², sp³ hybridisation is not a separate mechanism —
    it is the geometric optimisation of phase-locking multiplicity
    for a given number of bonding partners. The substrate selects
    the winding configuration that minimises net S·R across all
    bonding orientations simultaneously. sp³ is optimal for 4
    partners (tetrahedral); sp² for 3 (trigonal planar); sp for 2
    (linear). Hybridisation is R5 operating at the molecular scale.

# ─────────────────────────────────────────────
# BOND ENERGY AS SHARED HYSTERESIS
# ─────────────────────────────────────────────

bond_energy:
  statement: >
    Chemical bond formation releases energy because shared
    outer electron windings reduce the net commitment density
    of the bonded system below the sum of the isolated atoms.
    Bond energy is the shared hysteresis reduction — the
    decrease in net S·R when two commitment topologies
    phase-lock their outer windings into a common resonance.
  mechanism: >
    Isolated atom: electron winding phase-locks to its own
    nuclear core only. Net S·R = S_atom × R_atom.
    Bonded atoms: outer electron windings phase-lock to
    both nuclear cores simultaneously. The shared phase-lock
    distributes the commitment burden across two nuclei —
    lower net S·R per electron than in isolation.
    The energy released is:
    E_bond = (S·R)_isolated_atoms − (S·R)_bonded_system
    This is the same mechanism as nuclear binding (nuclear-
    binding.yaml) — commitment topology sharing reduces net
    burden — now at the atomic/molecular scale.
  bond_strength_ordering: >
    Triple bond > double bond > single bond because more
    shared windings means greater hysteresis reduction per
    bond. A triple bond commits three pairs of electron
    windings to the shared nuclear potential — three times
    the hysteresis reduction of a single bond.
    Bond length and bond strength are inversely correlated
    because deeper commitment (more shared windings) pulls
    the nuclei closer together (shorter bond) while releasing
    more energy (stronger bond).
  electronegativity: >
    The depth of a nucleus's commitment well (proportional
    to Z_eff, the effective nuclear charge experienced by
    outer electrons) determines how strongly it attracts
    shared electron windings. High electronegativity =
    deep nuclear commitment well = strong pull on shared
    windings. Fluorine (highest electronegativity) has the
    deepest outer-shell commitment well for bonding electrons.
    In the substrate picture: high Z_eff → low local η →
    high R_eff → deeper potential for phase-lock of
    incoming electron windings.

# ─────────────────────────────────────────────
# SPECTRAL LINES AND FINE STRUCTURE
# ─────────────────────────────────────────────

spectral_structure:
  gross_structure: >
    Spectral lines arise from photon (360° dipole) exchange
    that reconfigures the electron's winding number between
    orbital resonances. The energy ΔE = hν of the emitted
    or absorbed photon equals the commitment density difference
    between the two orbital configurations.
    ΔE = E(n₁,l₁) − E(n₂,l₂) = hcR∞ · (1/n₂² − 1/n₁²)
    The Rydberg formula is the commitment density difference
    between nesting depths, expressed in photon frequency units.
    Derived in alpha-rydberg-z0.yaml; confirmed to 12 significant
    figures.
  fine_structure: >
    Fine structure splitting (e.g., sodium D-line doublet,
    hydrogen 2p₁/₂ vs 2p₃/₂) arises from the interaction
    between the electron's orbital orientation (l) and its
    chirality orientation (s = ±1/2). In substrate terms:
    the orbital commitment plane orientation and the Möbius
    chirality orientation are two independent substrate
    properties that couple at close range.
    Their coupling energy ∝ α² (two powers of α because
    it involves both the orbital EM coupling and the
    spin-orbit coupling — two emission/absorption vertices).
    Fine structure scale: ΔE_fs ∝ α² × E_n.
    This is the measurement-substrate effect operating at
    the angular winding level: different l·s coupling
    configurations have slightly different η depression
    profiles — different effective α_exp values, producing
    the energy splitting.
  hyperfine_structure: >
    Hyperfine splitting (e.g., hydrogen 21 cm line) arises
    from coupling between electron chirality (Möbius winding
    handedness) and nuclear spin (quark winding handedness
    of the proton). Two Möbius topologies at different scales
    coupling their chirality orientations — the substrate
    coupling between atomic-scale and nuclear-scale
    commitment density structures.
    Scale: ΔE_hfs ∝ α² × (m_e/m_p) × E_n — suppressed
    by the electron-to-proton mass ratio, consistent with
    the nuclear-scale commitment being much deeper than
    the atomic-scale commitment.
  zeeman_effect: >
    External magnetic field (coherent axial orientation in
    the substrate — see specifications.yaml, electromagnetism)
    applies torque to the electron winding's orientation.
    The m quantum number levels split because the field
    distinguishes between the (2l+1) orientations that were
    degenerate in the isotropic case. The energy splitting
    ΔE_Z = μ_B × B × m_l is the coupling between the
    external substrate orientation (B field) and the
    electron's orbital orientation commitment (m_l).

# ─────────────────────────────────────────────
# MAGNETOCHEMISTRY
# ─────────────────────────────────────────────

magnetochemistry:
  paramagnetism: >
    Unpaired electrons (unfilled orbitals with one electron
    rather than a conjugate chirality pair) carry net chirality
    χ = +1 or −1. This net chirality is available for axial
    alignment under an external B field. Paramagnetic response
    = number of unpaired electrons × coupling to B field.
    Consistent with specifications.yaml paramagnetic mechanism:
    some unpaired vortices → temporary axis torque under B.
  diamagnetism: >
    Fully paired electrons (all orbitals filled with conjugate
    chirality pairs) have net chirality χ_net = 0. No available
    chirality for alignment. Applied B induces opposing
    circulation (Lenz's law) — the same mechanism as
    specifications.yaml diamagnetic treatment.
  ferromagnetism: >
    Exchange interaction between adjacent unpaired electron
    windings in transition metals (d-block) produces coherent
    chirality alignment across macroscopic domains. The Hund's
    rule maximum spin multiplicity — fill orbitals with parallel
    chirality before pairing — is the R5-selected configuration
    that minimises inter-electron commitment conflict within
    a shell (parallel chirality reduces cross-winding
    interference; antiparallel increases it until conjugate
    pairing is forced).
  hunds_rule_derivation: >
    Hund's first rule (maximum multiplicity) follows from the
    substrate: within a partially filled orbital shell, the
    configuration with maximum net chirality has the lowest
    inter-electron commitment conflict. Parallel chiralities
    (same handedness) occupy different spatial orientations
    (Pauli-forced) — their trails do not interfere destructively.
    Antiparallel chiralities in different orientations do
    interfere through their conjugate coupling — higher
    commitment cost. R5 selects minimum commitment cost:
    parallel chiralities first (Hund's rule), then forced
    pairing when all orientations are singly occupied.

