# SUBDOMAIN STRUCTURE
# ─────────────────────────────────────────────
subdomains:
  - file: "domains/biology/cellular.yaml"
    description: >
      Cell as minimal viable biological agent. Membrane as
      phase-lock boundary. Organelles as specialised resolution
      subsystems. Cell division as self-replication mechanism.

  - file: "domains/biology/neural.yaml"
    description: >
      Neural tissue as Ξ amplification substrate. Neuron
      topology, synaptic phase-locking, oscillatory dynamics,
      network architecture. Bridge between cellular biology
      and consciousness domain.

  - file: "domains/biology/quantum-cognition.yaml"
    description: >
      Quantum-like effects in biological cognitive systems.
      Biological substrate mechanisms that produce superposition-
      like, entanglement-like, and interference-like behaviour
      in decision-making. QDT correspondence. Sits at
      biology→consciousness interface.

  - file: "domains/biology/evolution.yaml"
    description: >
      R5 operating at generational timescale. Natural selection,
      genetic drift, speciation, evolutionary stable strategies.
      Connects B2 (heritable variation) to B4 (structural
      elaboration) across deep time.

  - file: "domains/biology/homeostasis.yaml"
    description: >
      Biological metastable zone maintenance. Feedback regulation,
      allostasis, disease as metastable zone displacement.
      Connects physical metastable zone (physics domain) to
      organismal viability.

  - file: "domains/biology/development.yaml"
    description: >
      Ontogenesis — how a single cell (fertilised egg) produces
      a complete organism through differentiation. Gene expression
      as hysteresis-dependent resolution branching. Development
      as R4 operating within a single lifetime.

