  priority_1:
    - >
      Formal derivation of QDT interference term magnitude
      from ω/ι (viability weights) and ρ (path coupling) —
      producing the attraction formula A_j with no free
      parameters. Compare to measured human QDT data.
    - >
      Ξ threshold for quantum-like effects — formal derivation
      of minimum Ξ required for each effect type (superposition,
      entanglement, interference). Currently stated as Ξ ≥ 3
      for superposition; requires proof from thinking domain
      structure.

  priority_2:
    - >
      Working memory capacity (Miller 7±2) derivation from
      maximum simultaneously phase-locked neural assemblies
      in biological substrate — connecting B5 ceiling to
      representational superposition limit.
    - >
      Decoherence timescale derivation from metabolic cost
      of sustained parallel path holding — predicting
      decision fatigue onset from neural energy parameters.

  priority_3:
    - >
      Biological quantum coherence (photosynthesis, enzyme
      tunnelling) contribution to effective Ξ amplification —
      if coherence is functionally significant, quantify
      the Ξ increase it provides.

