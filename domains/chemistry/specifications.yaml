# PARAMETER FLOW FROM PHYSICS
# ─────────────────────────────────────────────
parameter_flow:
  S_anomaly:
    physics: "Local momentum density deviation from environment."
    chemistry: "Electron density asymmetry — determines polarity,
                reactivity, and bonding geometry."

  R_resistance:
    physics: "Substrate impedance to redistribution."
    chemistry: "Electronegativity — resistance of nucleus to
                electron trail departure. Determines bond polarity
                and ionic character."

  stability_threshold:
    physics: "S_lock/S_unlock — vortex persistence condition."
    chemistry: "Bond dissociation energy — energy required to
                break phase-lock below S_unlock.
                Activation energy — energy required to reach
                transition state (temporary S > S_lock for new bond)."

  hysteresis_H:
    physics: "Memory of past resolutions."
    chemistry: "Molecular conformation memory — some molecules
                retain geometric history (protein folding,
                molecular switches). Chemical hysteresis in
                bistable systems."

  resolution_flux_phi:
    physics: "Local rate of dilemma resolution."
    chemistry: "Reaction rate — rate at which chemical tension
                (reactant instability) resolves into products.
                Temperature increases Φ; catalysts lower R
                without changing ΔG."

