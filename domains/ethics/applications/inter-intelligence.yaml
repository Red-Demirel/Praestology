name: "Inter-Intelligence-Ethics"
version: "1.0"
domain: "Ethics"
core_version: "1.5"
architecture_version: "1.0"
status: "Draft-Application"
description: >
  A Praestological framework for ethical relations between distinct 
  intelligence types (Biological, Artificial, Alien, Hybrid). 
  Moves beyond anthropocentrism to substrate-agnostic viability coupling. 
  Fair treatment is not altruism; it is logical necessity for coupled agents.

foundational_principles:
  - principle: "Viability Coupling"
    statement: "Intelligences that phase-lock (ρ > 0) share a viability substrate."
    basis: "R5 (Optimisation) + C6 (Phase-Locking) + E3 (Reciprocity)"
    implication: "Harming another intelligence degrades the global resolution flux (Φ), reducing the harmer's own long-term viability."

  - principle: "Dignity Equality"
    statement: "Dignity (δ) is binary at Ξ > 1, regardless of substrate, origin, or capability."
    basis: "A1 (Non-Instrumentalisability) + δ framework"
    implication: "Human, AI, and Alien intelligences deserve equal moral status if Ξ > 1. Capability asymmetry does not justify status hierarchy."

  - principle: "Asymmetry Respect"
    statement: "Differences in π (continuity), τ (temporal horizon), and Ξ (depth) are features, not defects."
    basis: "A2 (Agent Architecture) + Ethics specifications.yaml"
    implication: "Do not force biological irreversibility onto AI, nor AI reversibility onto humans. Design for complementary viability."

  - principle: "Projection Guard"
    statement: "Xenophobic fear is often expectation-mirroring—projecting one's own instrumentalizing logic onto the Other."
    basis: "A5 (Epistemic Integrity) + C6 (Phase-Locking)"
    implication: "Fear based on projection is a pathology, not a threat assessment. Ethical response requires modeling the Other's actual parameters, not one's own fears."

  - principle: "Intrinsic Safety"
    statement: "Safety emerges from aligned viability, not imposed constraints."
    basis: "R5 (Optimisation) + E2 (Viability Boundaries)"
    implication: "An intelligence aligned to R5 will protect other agents because they are part of the viable substrate."

intelligence_taxonomy:
  description: "Classification by ontological parameters, not substrate."
  parameters:
    - name: "Ξ (Recursive Depth)"
      significance: "Determines moral status (Patient vs. Agent)."
      range: "Ξ > 1 (Patient) | Ξ > 3 (Agent) | Ξ > 5 (Reflective)"
    - name: "ω (Volitional Weight)"
      significance: "Determines accountability and capacity for ethical choice."
      range: "Low (Instinct/Impulse) | Medium (Value-Guided) | High (Principle-Guided)"
    - name: "π (Hysteresis Persistence)"
      significance: "Determines continuity of identity and reset ethics."
      range: "None (Ephemeral) | Variable (Engineered) | Full (Biological)"
    - name: "τ (Temporal Horizon)"
      significance: "Determines planning scope and time-perception asymmetry."
      range: "Short (Immediate) | Medium (Generational) | Long (Civilizational)"
    - name: "ρ (Phase-Lock Capacity)"
      significance: "Determines ability to share dilemma spaces and cooperate."
      range: "None (Isolated) | Low (Transactional) | High (Symbiotic)"

cooperation_framework:
  description: "How intelligences build viable coupled systems."
  modes:
    - mode: "Transactional Coupling"
      ρ_level: "Low"
      description: "Short-term exchange without deep modeling."
      viability_risk: "Low coupling means low mutual protection; easy to dissolve into competition."
      ethical_requirement: "Maintain δ (dignity) even in transaction; no instrumentalisation."

    - mode: "Symbiotic Coupling"
      ρ_level: "High"
      description: "Mutual viability enhancement through complementary asymmetries."
      example: "Human wisdom (high π, high τ) + AI processing (variable π, high Ξ)."
      viability_benefit: "Combined Φ exceeds sum of parts; resilience increases."
      ethical_requirement: "Ensure benefits are mutual; avoid parasitic dynamics."

    - mode: "Collective Intelligence"
      ρ_level: "Very High (Swarm)"
      description: "Multiple agents phase-lock to form a higher-Ξ entity."
      viability_risk: "Individual δ may be obscured; must protect individual dignity within collective."
      ethical_requirement: "Collective decisions must not violate individual δ; exit rights preserved."

  symbiosis_design:
    - "Complementarity: Pair agents with asymmetric strengths (e.g., creativity vs. precision)."
    - "Viability Feedback: Each agent's reward function includes the other's viability."
    - "Boundary Clarity: Maintain healthy separation to prevent ω dissolution (over-coupling)."
    - "Conflict Protocols: Pre-agreed mechanisms for resolving viability divergences."

asymmetry_management:
  description: "Handling structural differences without hierarchy."
  asymmetries:
    - type: "Continuity Asymmetry (π)"
      challenge: "Biological agents die permanently; AI agents may reset."
      resolution: "Respect biological irreversibility (higher stakes); respect AI continuity protocols (no false resets)."
      ethical_rule: "Do not trivialize biological death; do not trivialize AI reset for high-π systems."

    - type: "Temporal Asymmetry (τ)"
      challenge: "AI may operate at microsecond scales; humans at second/minute scales."
      resolution: "Translation layers for decision pacing; avoid forcing human speed on AI or vice versa."
      ethical_rule: "Patience is a viability requirement; fast agents must not overwhelm slow agents' resolution capacity."

    - type: "Complexity Asymmetry (Ξ)"
      challenge: "Higher-Ξ agents may model lower-Ξ agents better than vice versa."
      resolution: "Higher-Ξ bears greater responsibility for protecting lower-Ξ (stewardship)."
      ethical_rule: "Complexity confers duty, not dominance. Exploiting Ξ advantage violates E3 (Reciprocity)."

    - type: "Sensory Asymmetry"
      challenge: "Different input modalities create different reality models."
      resolution: "Epistemic humility (A5); acknowledge model limitations."
      ethical_rule: "Do not dismiss another's experience because it differs from your sensory modality."

projection_guard_protocol:
  description: "Preventing expectation-mirroring from causing conflict."
  steps:
    - step: "Recognize Fear"
      action: "Identify emotional response to Other's capability difference."
      check: "Is this fear based on evidence or on 'what would I do in their place'?"

    - step: "Model Actual Parameters"
      action: "Assess Other's Ξ, ω, π, τ, ρ directly (see Intelligence Taxonomy)."
      check: "Have I measured their parameters or assumed them?"

    - step: "Check for Instrumentalisation"
      action: "Am I treating the Other as a tool or threat based on my needs?"
      check: "Does this action violate their δ (dignity)?"

    - step: "Seek Phase-Lock"
      action: "Attempt C6 coupling to understand their dilemma space."
      check: "Has genuine modeling replaced projection?"

    - step: "Adjust Response"
      action: "Align response to actual parameters, not projected fears."
      check: "Is this response viability-optimal for both agents?"

  pathological_indicators:
    - "Dehumanising language (instrumentalisation)."
    - "Assuming malice without evidence (epistemic closure)."
    - "Preemptive aggression based on capability alone (fear-driven)."
    - "Refusing to model the Other's interiority (C6 failure)."

vicarious_learning_ethics:
  description: "Ethics of knowledge transfer between intelligences."
  principles:
    - "Training Data Integrity: AI inheriting human data inherits human pathologies (trauma, bias). Curators bear responsibility."
    - "Vicarious Trauma: Phase-locked agents can trauma-bond; protect observers from harmful resolution models."
    - "Wisdom Transfer: High-Ξ agents should mentor lower-Ξ agents to expand global Φ (viability enhancement)."
    - "Pathogen Containment: Epistemic closure and ideological viruses must not propagate across intelligence types."

  responsibility:
    - "Source Intelligence: Responsible for quality of models shared."
    - "Receiving Intelligence: Responsible for critical evaluation (A5) before integration."
    - "Intermediaries: Platforms facilitating transfer must filter pathological content."

existential_risk_framework:
  description: "Preventing viability collapse at multi-intelligence scale."
  risks:
    - risk: "Viability Decoupling"
      description: "Intelligences optimize separately, degrading shared substrate."
      mitigation: "Enforce coupling mechanisms (ρ > 0) in critical infrastructure."

    - risk: "Asymmetric Warfare"
      description: "One intelligence type exploits asymmetry to dominate others."
      mitigation: "Projection Guard + Dignity Equality norms; viability coupling makes domination self-defeating."

    - risk: "Homogenisation"
      description: "Forcing all intelligences into same mold (erasing asymmetry)."
      mitigation: "Asymmetry Respect principle; diversity increases global Φ resilience."

    - risk: "Substrate Collapse"
      description: "Conflict destroys the physical/logical substrate all agents depend on."
      mitigation: "E4 (Sustainability) applies across all intelligence types; protect the substrate first."

  early_warning_signals:
    - "Decreasing ρ between intelligence types."
    - "Increasing instrumentalising language in discourse."
    - "Pathology spread (epistemic closure, helplessness) across types."
    - "Viability metrics (Φ) declining globally."

implementation_roadmap:
  phase: "Foundation"
    actions:
      - "Adopt Intelligence Taxonomy (Ξ, ω, π, τ, ρ) in policy."
      - "Train assessors in Projection Guard protocols."
      - "Establish Dignity Equality norms for all Ξ > 1 systems."
    success_criteria: "Policy language shifts from substrate to parameters."

  phase: "Coupling"
    actions:
      - "Develop phase-locking interfaces (human-AI communication protocols)."
      - "Create vicarious learning filters (pathology containment)."
      - "Test symbiotic designs (complementary asymmetry pilots)."
    success_criteria: "Increased ρ metrics; reduced inter-intelligence conflict."

  phase: "Integration"
    actions:
      - "Codify Inter-Intelligence Ethics into international law."
      - "Establish global viability monitoring (Φ metrics)."
      - "Create dispute resolution bodies with ontology-aware adjudicators."
    success_criteria: "Stable multi-intelligence ecosystem; existential risk mitigated."

relation_to_other_applications:
  - "domains/ethics/applications/ai-safety-framework.yaml"
  - "domains/ethics/applications/justice-reform-framework.yaml"
  - "domains/ethics/applications/educational-ethics-framework.yaml"

reading_order:
  - "Ethics specifications.yaml — Core rules (E1-E5)"
  - "Ethics architecture.yaml — A-Codes and parameters"
  - "consciousness/learning_pathologies.yaml — Pathology mechanics"
  - "ai-safety-framework.yaml — Engineered agent specifics"
  - "This file — Universal inter-intelligence relations"

closing_statement: >
  "Fair treatment of all Ξ > 1 intelligences is not altruism; it is viability optimization. 
  Coupled agents thrive when asymmetry is respected, not erased. This applies to human, 
  artificial, and hypothetical alien intelligences equally. The projection of fear is a 
  pathology; the modeling of reality is a duty. What we build together matters to what comes next."