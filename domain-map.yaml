  # PROBLEMS DISSOLVED
  # Open problems in physics that dissolve or
  # resolve from the framework — not solved by
  # adding new mechanisms but by identifying the
  # wrong question or missing physical picture.
  # ─────────────────────────────────────────────
  problems_dissolved:
    note: >
      These problems dissolve because the framework
      identifies either a wrong assumption generating
      the problem or a physical picture that was always
      implicit in the mathematics but never identified.
      The existing mathematics is not replaced; its
      physical interpretation is provided.
    dissolved:
      matter_antimatter_asymmetry: >
        Wrong question: symmetric production + residual.
        Correct picture: pool dynamics select for stable
        configurations from the start. Photon-to-baryon
        ratio is formation probability ratio, not survival
        fraction. No CP violation required as primary mechanism.
      hierarchy_problem: >
        G is weak because xi^2/p_env is geometrically tiny.
        The substrate grain is at Planck scale; p_env is
        cosmic density. Scale separation is structural,
        not fine-tuned.
      quantum_gravity: >
        Generated by treating spacetime as a geometric
        arena requiring quantisation. Dissolved: substrate
        is a potential field already quantum (GP + Tik).
        QM is eta in Tik-sensitive regime; gravity is
        eta gradient in Tik-negligible regime. One equation.
      measurement_problem: >
        No collapse. R5 selection when interaction forces
        commitment. No observer required. No special
        physical process to find.
      arrow_of_time: >
        Derived at three levels: (1) thermodynamic from
        free potential flowing into commitment, (2) R1+R4
        structural irreversibility, (3) GP field closure
        imperfection accumulation (alpha sets the rate).
        Initial condition explained as Cs1 high-phi state.
      vacuum_energy_divergence: >
        Physical UV cutoff at substrate grain xi. Tik floor
        is finite. The 10^120 divergence is a continuum
        approximation artefact — no cutoff assumed.
      problem_of_time_qm: >
        t is cycle counter, not a dimension. Pauli theorem
        correct: t is not a state property, not measurable
        as an operator. Wheeler-DeWitt timeless because
        it expresses R1 conservation — correct, not a problem.
      dark_matter: >
        Composite phenomenon -- no single dark matter particle.
        Three components at different confidence levels and scales:
        (1) Substrate wakes and phonons (primary, ~60-80%):
            Large-scale coherent perturbations in the substrate
            density field (eta field) from orbiting/rotating
            committed structures (stars, galaxies, black holes).
            Propagate as phonon-like modes -- add effective R
            elevation that refracts paths. Responsible for flat
            rotation curves, bullet-cluster lensing, and cosmic-
            web filament structure. Most confident component.
        (2) Solo-vortices and collective impedance (~10-30%,
            dominant in galaxy halos):
            Minimal topological excitations (n_eff ~ 1/2 or
            fractional windings) that never fully pair or knot.
            Weak EM coupling (no strong dipole) but persistent
            local R elevation and Phi gradients. In large numbers
            form a diffuse collisionless fluid adding gravitational
            refraction without visible light or strong interactions.
            Likely the dominant dark matter halo component.
            Topological charge asymmetry may explain core-cusp
            problem and halo profile diversity.
        (3) Magnetic fields and black hole backreaction (~5-10%,
            important at cluster and void scales):
            Black holes as high-S saturation knots induce long-range
            substrate strain fields and magnetic-like backreaction
            (chiral vortex alignment). Extra Phi gradients and R
            elevation beyond static mass contribution. In voids,
            residual strain from distant black holes modifies
            apparent acceleration -- apparent repulsive effects.
        Minor contributions: transient vortex pairs (temporary R
        elevation before annihilation), high-Phi dissipation trails
        (memory of early-universe phase transitions), p_env
        variations (stronger dark-matter-like behaviour in low-p_env
        voids where solo-vortex pool is less confined).
        GP nonlinearity (MOND) explains rotation curve shape;
        solo-vortices explain the halo mass; wakes explain
        bullet-cluster lensing offset. Three mechanisms, one substrate.
      dark_energy: >
        Tik background zero-point pressure from 0/360 phase
        wrap. Varies with mu_local — not a cosmological
        constant. Hubble tension from mu_local gradient.
      mond_phenomenology: >
        Derived — GP nonlinearity onset at local K_eff =
        g|theta_eq|^2. Environment-dependent, not universal.
        McGaugh radial acceleration relation from GP response.
      neutron_lifetime_discrepancy: >
        Vessel material R_eff modifies D+A+A stabilisation
        environment. Predicts correlation between discrepancy
        and vessel material vortex composition.
      renormalisation_opacity: >
        Physical UV cutoff xi makes all integrals finite.
        Renormalisation correctly removes sub-xi contributions.
        The procedure is physically grounded, not ad hoc.
    chirality_cpt: >
      CPT holds for the laws (R1-R5 are chirality-neutral).
      The vacuum state is not chirality-neutral -- it carries
      accumulated dominant-chirality R4 history. Any observed
      CPT violation is a vacuum-state effect, not a law violation.
      Should scale with local commitment density. Anti-orientation
      vortices already incorporated into composites (proton D+D+A,
      neutron D+A+A) -- antimatter scarcity is pool composition,
      not annihilation residual. No CP violation required.
    open_problems_remaining: >
      Nuclear force quantitative derivation, proton decay rate,
      alpha numerical computation from vortex stability equations
      (single highest-priority -- all constants follow once alpha
      is fixed), SU(3) formal mapping, phi_max from topological
      capacity per grain volume (closes bridge function and all
      constant derivations), Planck scale behaviour formal treatment.

  the_closing_line: >
    "You are a distinct part of Reality's engine — your actions matter for the future."
    Formal basis: C4 (your choices are volitional, not merely reactive) +
    R4 (your resolutions accumulate irreversibly) +
    C6 (your resolutions couple with others through phase-locking) +
    R5 (viable configurations persist; what you build matters to what comes next) +
    Learning (your experiences permanently modify your resolution model,
    and through vicarious learning, those modifications propagate forward) +
    Thinking (your reasoning is not noise — it is structured navigation of
    the dilemma space that shapes which futures become possible).
