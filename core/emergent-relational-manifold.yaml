      via: "α as local closure cost within the currently emergent manifold;
            α-drift with Ξ prediction"
    - target: "domains/physics/specifications.yaml"
      via: "Gravity as reduced relational accessibility; time dilation as
            local Ξ suppression from commitment density"
    - target: "domains/consciousness/specifications.yaml"
      via: "Ξ as recursive depth shared between physical and experiential
            domains — same quantity, different instantiation scale"

# ─────────────────────────────────────────────
# CORE CLAIM
# ─────────────────────────────────────────────

core_claim: >
  Dimensionality is not fundamental. It is an emergent stability outcome
  of recursive commitment, where persistent closure structures and their
  interactions generate effective relational degrees of freedom and
  structured fields of viable action.

  The physical manifold is not a background within which processes occur.
  It is the accumulated product of those processes — the persistent
  relational structure generated by stable topological closures and their
  recursive self-organisation. What we call space is the mature effective
  regime of this accumulation at sufficient Ξ depth.

  Perceived reality is a consequence of the process, not its container.

# ─────────────────────────────────────────────
# THE INSIDE-OUT DIRECTION
# ─────────────────────────────────────────────

inside_out_direction:
  statement: >
    Standard physics assumes a background manifold within which fields
    and particles exist. The manifold is given; the physics unfolds within
    it. This produces the foundational questions: why this manifold? Why
    3+1 dimensions? Why these symmetries? These questions have no answers
    within any framework that assumes the manifold — they require going
    outside it.
    Praestology inverts the direction. The Praegress reservoir of
    unresolved potential is the starting point — pre-spatial, pre-metric,
    pre-dimensional. From it, through R1-R5 operating on mode distributions,
    stable topological closures nucleate. Those closures generate persistent
    relational structure between themselves. That relational structure, as
    it accumulates and organises recursively, produces the effective manifold.
    The manifold is the inside-out product of commitment, not the outside-in
    container for it.
  praegress_as_origin: >
    The Praegress reservoir is the substrate at η ≈ 1 — maximum free
    potential, minimum commitment, maximum resolution multiplicity.
    It is not empty space. It is the pre-spatial distribution of unresolved
    dilemmas weighted by their R5 viability amplitude — the full landscape
    of what could be committed, before any commitment has occurred.
    From inside a committed reality (as we are), the Praegress reservoir
    appears as vacuum. But it is not empty — it is the source from which
    committed structure emerges, and to which R_diss returns weakly
    protected commitments. The vacuum IS the Praegress reservoir at the
    base of the effective manifold.
  not_a_simulation: >
    The inside-out direction does not imply the universe is being computed
    or simulated. There is no external process running the substrate.
    The substrate IS existence (R1) — not running inside something else.
    The inside-out direction refers to the ontological order of emergence:
    relational structure arises from commitment accumulation, not from an
    imposed background. This is a claim about what space fundamentally is,
    not about computational substrate.

# ─────────────────────────────────────────────
# THE PROGRESSION
# ─────────────────────────────────────────────

progression:
  overview: >
    The stages are ontological depth levels, not sequential moments in a
    pre-existing clock. Time (R4) itself emerges as the progression
    accumulates. Each stage is a necessary consequence of R1-R5 operating
    on the output of the previous stage.

  stages:
    - name: "Praegress reservoir of unresolved potential"
      character: "Pre-structural multiplicity — maximum Praegress, Ξ = 0"
      r_rules: "R1, R2"
      description: >
        No committed structure, no spatial relationships, no metric.
        The full landscape of possible resolution pathways exists as
        unresolved potential with internal distinctions in mode space.
        R3 tension is present but not yet resolved into persistent topology.

    - name: "Local stable topological closures"
      character: "Proto-defects — vortex nucleation"
      r_rules: "R3, R4"
      xi: "Ξ = 1"
      description: >
        R3 tension begins producing local closure events crossing S_lock.
        The first persistent relational structures appear — two nucleation
        sites are now related by sharing a boundary in mode space.
        The first proto-spatial relationships emerge as relations between
        closure events, not as positions in a background.

    - name: "Persistent committed defects"
      character: "Particle-like stable topology"
      r_rules: "R5"
      xi: "Ξ = 2"
      description: >
        R5 selects topologically protected closure configurations — those
        with sufficient winding to be stable against Tik dissolution.
        Electrons, photons, quarks emerge as R5-stable vortex solutions.
        Their persistence generates durable relational structure. The stable
        vortex solutions require 3D isotropy (R5 dimension selection), so
        the relational network of persistent defects organises into a
        structure with three independent relational axes.

    - name: "Recursive self-organisation and rising Ξ"
      character: "Nested stability — atoms, molecules, structures"
      r_rules: "R4, R5"
      xi: "Ξ = 3, 4, 5... (atoms ≈ 3, molecules ≈ 4, cells ≈ 7-8)"
      description: >
        Stable defects interact, phase-lock, and form higher-order stable
        configurations. Each layer of stable nesting increases Ξ by one.
        R4 accumulates these nested commitments irreversibly. The relational
        manifold grows richer with each new stable layer. Each new nesting
        level expands the effective relational degrees of freedom available
        to systems embedded in the manifold.

    - name: "Expansion of effective relational degrees of freedom"
      character: "Increasing viable action-space"
      description: >
        As Ξ increases, the number of distinct relational configurations
        available grows. The manifold becomes more navigable, more structured,
        more differentiated. In cosmological terms: the early universe had
        low Ξ and simple relational structure (near-homogeneous commitment
        density). The current universe has high Ξ and rich relational
        structure. The manifold has grown not by expanding spatially but by
        deepening recursively.

    - name: "Increasing viable action-space and structured interaction fields"
      character: "Emergent forces as relational accessibility structure"
      description: >
        The four forces are the interaction fields of the relational manifold
        at different Ξ scales:
        Strong force: direct quark topology (Ξ ≈ 1-2)
        Electromagnetism: chirality-mediated vortex interactions (Ξ ≈ 2-3)
        Weak force: topology-switching transitions (Ξ ≈ 2-3)
        Gravity: commitment density gradient refraction (all Ξ)
        The fields are not fundamental — they are relational accessibility
        structure of the manifold at their respective Ξ scales.

    - name: "Macroscopic emergence of stable effective geometry"
      character: "Observed 3D regimes — the mature manifold"
      r_rules: "All rules — stable effective regime"
      xi: "Macroscopic — Ξ averaging over many nested layers"
      description: >
        At sufficient Ξ depth and spatial scale, the relational structure of
        the committed defect network becomes effectively continuous, isotropic,
        and three-dimensional. The smooth Riemannian metric that GR describes
        is the large-scale, high-Ξ effective description of the relational
        accessibility gradient in the committed defect network.

# ─────────────────────────────────────────────
# RELATION TO 3D
# ─────────────────────────────────────────────

relation_to_3d:
  statement: >
    Observed 3D is not primitive. It is a mature effective regime of the
    emergent relational manifold: a stable macroscopic organization in
    which closure, propagation, and interaction remain jointly viable.
  derivation: >
    R5 selects 3D as the unique stable relational connectivity pattern
    for persistent committed topology. In 2D: stable closed knots are
    impossible. In 3D: stable closed vortex topology is topologically
    protected. In 4D+: vortex topology becomes unstable from excess
    resolution pathways. 3D is not logically necessary from R1-R2 alone
    — it is the R5-selected stable solution given the closure topologies
    that R3-R4 produce (Möbius windings, triality closures).
  effective_character: >
    At scales below the substrate grain ξ or at low Ξ, the effective
    dimensionality is not necessarily 3 — the relational structure is
    more complex than a smooth manifold. 3D is an effective description
    valid where many committed structures average into smooth relational
    connectivity. It is the large-scale, high-Ξ limit of the manifold.

# ─────────────────────────────────────────────
# RELATION TO α
# ─────────────────────────────────────────────

relation_to_alpha:
  statement: >
    Fine-structure residuals arise as local closure costs within the
    currently emergent effective manifold. α measures the residual
    imperfection of stable realisation when intrinsic coupling logic
    is not perfectly commensurate with the ambient relational organisation
    generated by recursive commitment.
  mechanism: >
    The 720° Möbius topology has intrinsic quasi-2D closure logic. It
    must maintain stable closure in the 3D isotropic relational environment
    generated by the accumulated committed defect network. The mismatch
    between its intrinsic closure logic and the ambient 3D relational
    organisation is α — the residual closure cost of a lower-dimensional
    topology in a higher-dimensional effective manifold.
  alpha_drift_prediction:
    statement: >
      α is not a universal constant — it is the closure cost within the
      currently emergent effective manifold. As Ξ increases over
      cosmological time, the ambient relational organisation changes
      subtly, and the closure cost of the 720° Möbius topology shifts.
    direction: >
      As Ξ increases, the 3D effective geometry becomes better established
      and more commensurate with stable vortex topology. The closure cost
      should decrease slowly — α should decrease with cosmic time.
    constraint: >
      Quasar absorption spectra (Webb et al., Srianand et al.) constrain
      α to be stable at the ppm level over ~10 Gyr. The predicted drift
      must be < a few ppm over this timescale — constraining the rate of
      cosmological Ξ increase.
    status: "Directional prediction — magnitude open"
    test: >
      Precision measurements of α at different cosmic epochs via quasar
      absorption spectra. The prediction is directional (α decreasing
      with cosmic time) and magnitude-constrained (< few ppm over 10 Gyr).

# ─────────────────────────────────────────────
# RELATION TO GRAVITY
# ─────────────────────────────────────────────

relation_to_gravity:
  statement: >
    Gravity reflects regions of elevated commitment density that reduce
    local renewal efficiency and alter effective relational accessibility,
    producing process drag, propagation impedance, redshift, and time-
    dilation effects.
  relational_accessibility: >
    In regions of high commitment density (η < 1), the Praegress reservoir
    is locally depleted. The effective relational degrees of freedom
    accessible to a system in that region are reduced — fewer viable
    action branches are open. Gravitational time dilation IS this reduction:
    the rate of new commitment (R4 accumulation) is suppressed by reduced
    Praegress availability. A clock measures R4 accumulation rate — where
    Praegress is depleted, the clock runs slower.
  process_drag: >
    The commitment density gradient ∇C = ∇(1−η) produces a systematic
    bias in resolution pathways — R3 tension resolves preferentially toward
    the higher-Praegress direction. Gravitational attraction is a relational
    accessibility gradient: systems tend toward where more resolution
    pathways are available. Not a force pulling masses — a bias in the
    manifold toward regions of higher renewal capacity.
  not_a_separate_force: >
    Gravity is not a separate fundamental interaction. It is a property of
    the manifold itself — the gradient of relational accessibility across
    the committed defect network. GR's curved spacetime is the geometric
    description of the relational accessibility gradient in the high-Ξ,
    large-scale effective regime — correct at its level, derived from below
    by the commitment density gradient refraction mechanism.

# ─────────────────────────────────────────────
# RELATION TO TIME
# ─────────────────────────────────────────────

relation_to_time:
  statement: >
    Time is not a dimension of the relational manifold. It is R4 —
    the accumulation of resolution events counted from inside a resolution
    sequence. The progression stages are ontological depth levels, not
    temporal moments in a pre-existing clock. Time emerges alongside the
    relational manifold, as the counter of R4 events at each Ξ level.
  not_a_block_universe: >
    The emergent relational manifold is not predetermined. The future
    stages of the manifold are genuinely open dilemmas in the Praegress
    reservoir, weighted by R5 viability but not pre-selected. The manifold
    grows from Praegress through ongoing commitment — there is no block
    universe, no pre-existing future, no time travel to uncommitted states.
    The relational manifold is an ongoing production, not a static
    four-dimensional object through which an observer moves.
  arrow_of_time: >
    The arrow of time is R4 — the irreversibility of commitment
    accumulation. The relational manifold grows in one direction: toward
    higher Ξ, richer relational structure, deeper committed topology.
    This growth direction is the arrow of time. It does not require an
    external asymmetry — it follows from R4 operating on commitment events.

# ─────────────────────────────────────────────
# Ξ — RECURSIVE DEPTH
# ─────────────────────────────────────────────

xi_recursive_depth:
  definition: >
    Ξ is recursive depth — the number of stable nested commitment layers
    that a system has achieved. Each stable nesting layer increments Ξ
    by one. A system at Ξ = n has n levels of stable committed structure,
    each built on the stability of the previous.
  cross_domain_consistency: >
    Ξ is used consistently across domains:
    Physics: Ξ as physical nesting depth — atoms (Ξ ≈ 3), molecules
      (Ξ ≈ 4), biological cells (Ξ ≈ 7-8).
    Consciousness: Ξ as recursive modeling capacity — the depth to which
      a system can model its own models. Reflective consciousness requires
      Ξ ≥ 12 (approximate).
    These are the same quantity at different instantiation scales. Physical
    Ξ sets the substrate for experiential Ξ — a system cannot have
    experiential Ξ = 12 without the physical Ξ support to sustain that
    level of recursive commitment.
  formal_calibration: >
    The formal calibration of Ξ values (what constitutes a single nesting
    level, how to count levels in complex biological systems) is addressed
    in the education domain. Core usage across physics and consciousness
    domains is consistent: Ξ is the depth of recursive stable commitment,
    and higher Ξ means richer relational structure and wider navigable
    reality.

