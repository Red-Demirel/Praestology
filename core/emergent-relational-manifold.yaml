  requires:
    - "core/specifications.yaml          -- R1-R5 rules; emergence hierarchy;
                                            Praegress/Regress; Ξ definition"
    - "core/core-dynamical-equation.yaml -- formal expression of the process"
  provides_to:
    - target: "core/specifications.yaml"
      via: "Ontological direction for the emergence hierarchy —
            the inside-out character of the process"
