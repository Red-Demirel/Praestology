connection_to_CCR:
  statement: >
    G_eff is the CCR for the cosmic-scale committed topology — the
    average closure cost of all committed structure in the Hubble volume.
    Not a fundamental constant; it co-evolves with the universe's
    commitment density as R_diss returns topology to free potential.
    Consistent with observational hints of varying G over cosmic time,
    which ΛCDM cannot accommodate without further patches.
  status: "OPEN — gravitational_ccr_mapping in closure-configuration-ratio.yaml"

