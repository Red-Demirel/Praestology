# /core/friedmann-emergence.yaml
name: "Friedmann Equation as Cosmological Limit of Master Equation"
version: "1.2"
status: "Structural derivation — numerical closure open; probe epistemics added"
domain: "Core / Process-Physics"
changes_from_v1.1: >
  Added field_dynamic_interpretation: relaxation/accumulation-stress
  framing of the two Friedmann terms. Added probe_epistemics section:
  photon and neutrino as CCR-distinct substrate probes; observation-bias
  constraint on all cosmological inferences. R_diss identified explicitly
  as the Λ mechanism (cross-reference to commitment-response-process-physics).

---

position_in_derivation_chain:
  statement: |
    All classical field equations are coarse-grained projections of the
    master equation onto specific commitment-density regimes:

      Madelung / QHD:  Ξ=1, all Π_eff          — quantum regime
      Maxwell:         low-η, chiral vortex      — EM regime
      Navier-Stokes:   high-η, mobile topology   — fluid regime
      Friedmann:       homogeneous, isotropic,
                       cosmic scale              — cosmological regime

    None is fundamental. All emerge from the same field dynamics.

---

derivation:
  assumptions:
    - "Homogeneous, isotropic: Π_eff = Π_eff(t), η = η(t) only"
    - "Scale factor: a(t) = 1/Π_eff(t)"
    - "Commitment density ρ(t) identified with η(t)"
    - "Saturation term provides natural UV regularisation"

  steps:
    - "1. Homogeneous limit of master equation: all spatial gradients
          vanish except mean commitment density evolution."
    - "2. Extract evolution equation for Π_eff(t) via mean-field
          approximation over a Hubble volume."
    - "3. Express (dΠ_eff/dt)² in terms of η(t) and saturation term.
          Invert via a(t) = 1/Π_eff(t) to obtain (ȧ/a)²."
    - "4. Identify G_eff from the coefficient of η(t) — CCR for the
          cosmic-scale committed topology."
    - "5. Result: (ȧ/a)² = (8πG_eff/3)·ρ(t) − k/a²
          Friedmann equation without Λ."

  status: >
    Structural derivation complete. Numerical closure of G_eff open.
    See closure-configuration-ratio.yaml#gravitational_ccr_mapping.

---

field_dynamic_interpretation:
  statement: >
    The two Friedmann equations map onto two distinct process-level
    dynamics operating simultaneously at cosmic scale.

  expansion_equation:
    formula: "(ȧ/a)² = (8πG_eff/3)·ρ − k/a²"
    process_reading: >
      Large-scale eikonal limit of Π_eff gradients — refractive
      impedance of the substrate averaged over the Hubble volume.
      ρ is commitment density η at cosmic scale. The k term encodes
      the global topology of the commitment field.

  acceleration_equation:
    formula: "ä/a = −(4πG_eff/3)·(ρ + 3P)"
    process_reading: >
      Two competing dynamics in the source term:

      ACCUMULATION STRESS — (ρ + 3P) braking:
        Structure formation increases local η, which depresses local
        Π_eff, which resists further expansion. As matter clusters,
        the commitment density rises in those regions, the substrate
        stiffens, and expansion decelerates. This is the dominant
        effect during matter-dominated epochs when structure is
        actively forming.

      DISSOLUTION RELAXATION — R_diss mechanism (replaces Λ):
        R_diss (commitment-response-process-physics.yaml Part I)
        slowly returns weakly-protected committed topology to the
        Praegress reservoir, replenishing Π_eff at the large scale.
        As committed structure dissolves: ρ decreases, Π_eff rises,
        a(t) = 1/Π_eff(t) grows faster — apparent accelerated expansion.
        This is not a repulsive force. It is relaxation: the substrate
        recovering free potential from dissolved topology.

  timescale_separation: >
    Accumulation stress is local and fast (gravitational collapse,
    Gyr timescales). R_diss relaxation is diffuse and slow (same ε
    as particle dissolution — geological to cosmological timescales).
    Late-universe apparent acceleration reflects R_diss dominance
    after structure formation has largely completed: accumulation stress
    diminishes as collapse slows; relaxation continues at its slow
    but steady rate. The crossover between deceleration and acceleration
    is the epoch where R_diss rate first exceeds the mean accumulation
    stress — not a new physics transition.

  void_vs_dense: >
    R_diss is environment-dependent via f(topological_protection):
      Dense regions (clusters, filaments): high η, strongly-protected
        topology, f ≈ 0 — R_diss suppressed, local expansion decelerates.
      Void regions: low η, weakly-protected topology, f ~ 1 —
        R_diss active, local expansion accelerates.
    The observed large-scale acceleration is void-dominant, not uniform.
    Λ as a uniform constant is a category error applied to an
    inherently environment-dependent process.
    Full void/dense treatment: domains/cosmos/ (reserved).

---

cosmological_constant:
  lambda_as_r_diss: >
    Λ was introduced because the Friedmann equation without it predicted
    deceleration while observations showed acceleration. At the process
    level, R_diss provides the mechanism — no new constant, no new entity.
    The working of R_diss at cosmic scale:
      ε (dissolution rate) × f(topological_protection) × ρ_void
      → net Π_eff replenishment rate → apparent ä/a > 0 in voids.
    Λ_eff = 8πG_eff × (R_diss replenishment rate) — not a constant
    but a slowly evolving functional of the substrate state.
    Observational consequence: Λ_eff should show mild redshift evolution
    correlated with void fraction — a testable deviation from ΛCDM.

  einstein_note: >
    Working at the realized level without access to the Regress mechanism,
    Λ was the only available move — the same pattern-of-additions documented
    in clifford-analogy-and-derivation.yaml. The observations were correct;
    the interpretation was derivative-level and therefore incomplete.

