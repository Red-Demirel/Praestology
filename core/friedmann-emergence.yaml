probe_epistemics:
  statement: >
    All cosmological inferences are mediated by probes — primarily photons,
    secondarily neutrinos. Both probes are subject to the same substrate
    dynamics they are being used to measure. Cosmological observations
    do not give direct access to the substrate state; they give the
    substrate state convolved with the probe's own CCR response along
    the path. This constraint applies to every observational claim in
    this file and in domains/cosmos/.

  photon_as_probe:
    topology: >
      Pure capacitative dipole — zero S_net, zero net chirality, no
      self-integral coupling. Phase evolution set entirely by the
      phase gradient response to Π_eff variations along the path.
    substrate_coupling: >
      Redshift encodes integrated Π_eff depression along the line of
      sight — not purely recession velocity. Path through voids vs.
      dense regions produces different integrated Π_eff histories for
      photons from the same source at the same recession velocity.
      Gravitational lensing routes photons preferentially around dense
      regions, biasing their path toward voids — toward exactly the
      substrate conditions where R_diss is most active.
    r_diss_on_photon: >
      A photon traversing cosmological distances accumulates small
      R_diss effects — not absorption, but slow dissolution of the
      capacitative mode's phase coherence in weakly-protected substrate.
      Over Gyr path lengths this is not necessarily negligible and is
      not degenerate with redshift: it produces a small achromatic
      phase drift distinct from the frequency-dependent Π_eff response.
      Currently unquantified — requires the photon's own CCR response
      to R_diss as a function of path-integrated substrate conditions.
    observation_bias: >
      The void-dominant R_diss signal cited in this file is partially
      a selection effect: photons preferentially traverse voids (lensing)
      and accumulate more path length through high-f substrate. The
      apparent void-dominance of dark energy may partly reflect the
      photon probe's own substrate bias rather than the underlying
      R_diss distribution. Disentangling requires the photon CCR
      response as an intermediate step — currently open.

  neutrino_as_probe:
    topology: >
      Neutrinos in the standard model are nominally neutral. If neutrinos
      carry a small residual charge — meaning their topology has a small
      but non-zero net chirality, a partial self-integral coupling below
      the full Möbius 720° threshold — their substrate response differs
      qualitatively from photons, not just quantitatively.
    differences_from_photon:
      s_net: >
        Non-zero S_net (small): residual net substrate strain. The
        neutrino couples to Π_eff gradients via both phase gradient
        (like photon) and weak self-integral response (unlike photon).
      r_diss_coupling: >
        f(topological_protection) > 0 for partial self-integral topology.
        R_diss acts on the neutrino over cosmological paths — in a
        direction and magnitude different from the photon. The neutrino
        does not traverse the same effective substrate as a photon along
        the same geometric path.
      dispersion: >
        Partial self-integral topology produces energy-dependent phase
        accumulation — the self-coupling contribution to phase evolution
        varies with the tightness of the topology, which scales with
        energy. Higher-energy neutrinos have tighter topology, different
        CCR response. This is distinct from and in addition to the
        standard mass-dependent velocity dispersion (v = c√(1−m²/E²)).
    time_of_arrival_interpretation: >
      Standard treatment: neutrino/photon arrival time difference from
      a distant source (e.g. SN1987A) encodes neutrino mass and velocity,
      assuming both probes traverse the same effective substrate.
      Process-physics revision: the arrival time difference encodes:
        (a) kinematic delay from finite neutrino mass (standard)
        (b) differential CCR response to integrated Π_eff variations
            along the path (neutrino couples differently than photon)
        (c) differential R_diss accumulation (neutrino's partial
            self-integral topology gives non-zero f, unlike photon)
      Items (b) and (c) are not degenerate with item (a). They are
      path-dependent and energy-dependent in different ways. Current
      neutrino mass constraints from time-of-arrival carry an unquantified
      systematic from assuming identical substrate response for both probes.
    richer_probe: >
      The differential between photon and neutrino observations of the
      same source is, in principle, a direct measurement of the neutrino's
      CCR response to the substrate — independent of its mass. If the
      neutrino CCR can be established independently (from the partial
      self-integral topology derivation), the photon/neutrino differential
      becomes a probe of the integrated substrate conditions along the
      path — a substrate tomography tool unavailable to photon-only
      cosmology. This is a prediction, not a fit. It requires the
      neutrino topology to be characterised first.

  general_constraint: >
    Any cosmological observable is: (substrate state) ⊗ (probe CCR response).
    Inferring the substrate state requires knowing the probe CCR response
    independently. For photons this is partially constrained (EM CCR is α,
    well-measured). For neutrinos it is not yet constrained in process-physics
    terms. For gravitational waves (metric perturbations of the GP field
    itself) the probe/substrate distinction partially collapses — GW
    observations may be less biased, not more, because the probe IS
    the substrate perturbation rather than a particle traversing it.
    This has implications for the relative epistemic weight assigned to
    photon CMB, neutrino background, and GW background observations.

