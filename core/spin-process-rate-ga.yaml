ga_framework:
  statement: |
    Geometric Algebra (Cl(3,0)) provides the natural coordinate-free language.
    The electron's 720° rotation is a rotor in the even subalgebra Cl₃⁺,
    isomorphic to the quaternions, representing the double cover of SO(3).

  grade_decomposition:
    grade_0_scalar: "Commitment density ρ_η — the realized 'now' of each event"
    grade_1_vector: "Directional flows — propagation, gradients, momentum"
    grade_2_bivector: "Oriented planes — vortex circulation plane, writhe origin"
    grade_3_pseudoscalar: "Oriented volume — full 3D embedding phase space; chirality"

  spinor_rotor: |
    R = exp(−Iθ/2), I a unit bivector — represents the vortex's phase state.
    720° rotation → rotor returns to +1 (closure complete)
    360° rotation → rotor at −1 (half-cycle, not yet closed)

    The rotor's action: x → RxR† (conjugation)
    Chirality: sign of the grade-3 pseudoscalar component —
    determines spin-polarization of all coupled realization processes
    (CISS at molecular scale; parity selection at weak-force scale;
    homochirality at biological scale — same mechanism, different depth)

  inertia_in_ga: |
    In GA terms, inertial resistance is the cost of re-orienting
    the grade-2 bivector (circulation plane) relative to the
    grade-3 pseudoscalar (embedding volume) under displacement.

    The CCR = Ω_rotor/Ω_embed is the ratio of the bivector's phase space
    to the pseudoscalar volume — directly the coupling coefficient
    between applied force and inertial response.

    A displacement that changes the spatial position of the vortex
    requires re-aligning the rotor R in the new context.
    The grade-2 self-linking (writhe) sets the minimum re-alignment cost.
    Wr = 1 for the electron means one full self-linking must be
    re-traversed per displacement cycle — this is the inertial quantum.

