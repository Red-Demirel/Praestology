ga_framework:
  statement: |
    Geometric Algebra (Cl(3,0)) provides the natural coordinate-free language.
    The electron's 720° rotation is a rotor in the even subalgebra Cl₃⁺,
    isomorphic to the quaternions, representing the double cover of SO(3).

  grade_decomposition:
    grade_0_scalar: "Commitment density η — the resolved 'now' of each iteration"
    grade_1_vector: "Directional flows — propagation, gradients, momentum"
    grade_2_bivector: "Oriented planes — vortex circulation plane, EM bivector F"
    grade_3_pseudoscalar: "Oriented volume — full 3D embedding phase space; chirality winding"

  spinor_rotor: |
    R = exp(−Iθ/2), I a unit bivector — represents the vortex's phase state.
    720° rotation → rotor returns to +1 (closure complete)
    360° rotation → rotor at −1 (half-cycle, not yet closed)

    The rotor's action on the embedding space is conjugation: x → RxR†
    This encodes both chirality (sign of bivector I) and phase (angle θ).
    Chirality is the grade-3 pseudoscalar component — the topological
    winding direction that determines spin-polarization of coupled processes
    (CISS effect at molecular scale; parity violation at weak-force scale).

  double_cover_process_reading: |
    The rotor double-cover is not merely a mathematical curiosity.
    It is the geometric expression of the two-iteration requirement:

      Geometric statement:  R → −R under 2π rotation
      Process-rate statement: one master equation iteration advances phase by π
      Π_eff statement: committed topology depletes half local Π_eff per cycle

    These are three descriptions of the same mechanism at different levels.
    GA's double-cover IS the process-rate consequence of half-Π_eff availability.

