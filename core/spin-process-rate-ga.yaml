# ─────────────────────────────────────────────
# SPIN AS PROCESS-RATE
# ─────────────────────────────────────────────

spin_process_rate:
  statement: |
    The electron is a persistent, phase-locked topological structure:
    a 720° Möbius vortex. What experiments measure as "spin" is the
    observable manifestation of the vortex's internal phase iteration —
    the rate at which the field re-encounters its own closure point
    (the Möbius crossover) during each full 720° cycle.

    This iteration is a local realization event: the vortex advances
    through its phase space. The frequency of this advance is the
    spin precession rate. It is not an external rotation imposed on
    a particle — it is the field's own process-rate for resolving
    the closure of a chiral committed topology.

  relation_to_process_rate: |
    In the master equation, local evolution rate is scaled by 1/Π_eff.
    For a stable vortex, the phase iteration rate is set by the local
    free potential at the vortex core.

    As the vortex moves through regions of varying commitment density,
    its internal iteration rate (spin precession) changes accordingly.
    This directly links spin precession to the substrate's process-rate —
    and through it, to gravitational time dilation and velocity redshift.

    Spin precession frequency variation with local Π_eff is a direct,
    testable prediction — not a correction but the mechanism itself.

  per_iteration_phase: |
    Spin quantum number s encodes the per-iteration phase advance Δθ:

      Spin-½  (electron):  Δθ = π per iteration — two cycles to close
      Spin-1  (photon):    Δθ = 2π per iteration — one cycle to close
      Spin-0  (scalar):    Δθ = 0 — no phase rotation, pure committed density
      Spin-3/2:            Δθ = 3π/2 — four cycles to close

    Fermion/boson distinction is a Π_eff availability threshold:
    — Photon propagates in high-Π_eff: full processing capacity, one cycle closes
    — Electron's own committed topology depletes local Π_eff by half per iteration:
      two iterations required to close the loop
    — Half-integer spin = self-depleting topology
    — Integer spin = non-self-depleting topology

  double_cover_unified: |
    Three descriptions of the same mechanism at different levels:

      GA statement:          R → −R under 2π rotation (rotor double-cover)
      Process-rate statement: one master equation iteration advances phase by π
      Π_eff statement:       committed topology depletes half local Π_eff per cycle

    These are not separate claims. They are the same physical fact expressed
    at the geometric, process-rate, and field-capacity levels respectively.

