alpha_as_ccr:
  statement: |
    The fine-structure constant α is the electron's instance of the CCR —
    the irreducible orientational cost of realizing the 720° Möbius spinor
    rotor against the full 3D embedding phase space.

    CCR(electron) = (Wr · Ω_rotor) / Ω_embed = α
      Wr = 1  (Calugareanu-White: Lk=2, Tw=1, Wr=1)

  geometric_terms: |
    α_geometric⁻¹ = 4π³ + π² + π ≈ 137.036304

      4π³ — S³ volume: quaternion phase space per 720° closure (double-cover)
      π²  — bivector surface: interface cost of 2D rotor plane to 3D embedding
      π   — self-intersection residual at Möbius crossover point

    Each term is a necessary geometric cost of realization at this topology.

  alpha_measured_shift: |
    α_geometric⁻¹ = 137.036304  (bare CCR, unperturbed field)
    α_measured⁻¹  = 137.035999  (CODATA — within commitment-dense lab)

    The 2.2 ppm gap is environmental Π_eff depression compressing
    the effective embedding phase space Ω_embed slightly downward.
    Predicted, not anomalous. Testable via space-based precision metrology.

