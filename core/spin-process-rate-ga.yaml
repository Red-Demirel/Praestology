# ─────────────────────────────────────────────
# TENSION AS DERIVATIVE OF RECONFIGURATION COST
# ─────────────────────────────────────────────

tension_as_derivative:
  statement: |
    Tension in the field is the derivative of the total reconfiguration cost
    with respect to changes in the vortex's state — phase, orientation, or position.
    It is the field's resistance to change in committed topology, arising from
    finite local free potential (Π_eff) and the closure-configuration ratio (CCR).

    Formally, using the energy functional E[ψ] from the variational derivation
    of inertia (see inertia_as_reconfiguration_resistance.formal_derivation_path):

      Tension = δE[ψ] / δ(phase)

    This derivative quantifies the additional reconfiguration cost per unit
    change in the vortex's state. High derivative → strong resistance (tension).
    Low derivative → weak resistance (compliant topology).

    Note: a schematic integral C = ∫ f(CCR, Π_eff) dτ can represent the
    accumulated reconfiguration cost, but its explicit form depends on the
    completed variational derivation of inertia. Until that derivation is closed,
    tension is defined via δE[ψ]/δ(phase) rather than by a separate integral.
    Status: formal expression contingent on inertia-variational-derivation.

  reciprocity:
    statement: |
      The field's resistance to reconfiguration is not a one-way effect.
      When a vortex resists reconfiguration, the field exerts an equal and
      opposite tension on the vortex's bivector plane.

      This reciprocity is guaranteed by the variational structure of E[ψ]:

        δE/δ(phase) = −δE/δ(field)

      Change in the vortex's state costs the field free potential;
      the field returns that cost as a restoring force or internal stress
      on the vortex. This is Newton's third law, Lenz's law, and
      action-reaction — unified as a single variational identity
      at the process level.

      The identity holds for any differentiable energy functional —
      it is not specific to a particular topology or scale.
      It is the process-level origin of all mechanical reciprocity.

  manifestations: |
    Gravitational stress:
      ∇Π_eff exerts a restoring force on committed structures —
      the refraction mechanism (emergent-classical-fields.yaml).
      Tension = δE/δ(position) along the Π_eff gradient.

    Electromagnetic stress:
      The bivector plane's resistance to reorientation produces
      the Lorentz force. Tension = δE/δ(phase) of the chiral rotor
      under an external phase-gradient field.

    Mechanical / elastic stress:
      Within a committed lattice structure, the field's resistance
      to displacement of topology produces elastic restoring forces.
      Tension = δE/δ(displacement) for each committed node.
      Hooke's law is the linear approximation of this derivative.

    Cosmological stress (dark energy):
      The Regress kernel's return of commitment to free potential
      produces a global tension as realized structure dissolves
      back toward the higher-order regime.
      Appears as residual acceleration at cosmological scale —
      the derivative of the universe's total reconfiguration cost
      with respect to its overall commitment configuration.

  fluid_correspondence: |
    In fluid dynamics (emergent from the master equation via Madelung
    and NS derivation), the same variational structure produces:

      Pressure:      δE/δ(volume)       — derivative of internal energy
      Viscous stress: δD/δ(strain rate) — derivative of dissipation (Regress kernel)
      Elastic stress: δE/δ(deformation) — derivative of stored realization energy

    In Praestology these are not analogies — they are the same
    δE/δ(state) structure applied to the same field in the
    high-η, mobile-topology, Madelung-projected regime.

    The CCR sets the coupling coefficient between stress and strain
    at each commitment depth. The Regress kernel provides the
    dissipative component (viscosity in the NS limit).

    The stress-strain relationship in a compressible viscous fluid
    is the coarse-grained, derivative-level projection of
    δE[ψ]/δ(phase) operating in the high-η regime.

