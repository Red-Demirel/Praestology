alpha_as_ccr:
  statement: |
    The fine-structure constant α is the electron's instance of the
    closure-configuration ratio (CCR) — see closure-configuration-ratio.yaml.

    CCR(electron) = Ω_rotor(electron) / Ω_embed(3D)
                  = (phase space traversed per 720° closure) / (full 3D pseudoscalar volume)
                  = α

  framing: |
    α is the irreducible orientational cost of maintaining the electron's
    specific committed topology against the full orientational phase space
    of the 3D embedding field.

    It is not a defect, anomaly, or free parameter.
    It is not "how much the electron fails to couple to the field."
    It is the cost of being this electron — this specific committed closure —
    rather than uncommitted field.

    A committed structure necessarily occupies a specific orientation subset.
    The ratio of that subset to the full embedding phase space is α.
    If α = 1: rotor simultaneously all orientations = uncommitted field, not a particle.
    0 < α < 1: the only viable regime for stable committed topology.

  geometric_terms: |
    α⁻¹ = 4π³ + π² + π ≈ 137.036304

    4π³ — volume of S³: quaternion phase space traversed per 720° closure
           (S³ is the unit quaternion sphere; double-cover factor included)
    π²  — bivector surface: orientational interface cost of coupling the
           rotor's 2D circulation plane to the 3D embedding space
    π   — self-intersection residual at the Möbius crossover point
           where the 720° closure completes

    Sum: total orientational cost of one complete closure cycle.
    Ratio to embedding pseudoscalar volume: α⁻¹.

    Each term is a necessary geometric cost — none is arbitrary.

  relation_to_spin: |
    The CCR sets the conversion efficiency between process-rate and
    observable spin precession:

      ω_spin = (Π_eff · Δθ) / (CCR · τ_closure)

    Higher process-rate (higher Π_eff) → faster spin precession.
    CCR is the orientational cost per iteration — the ratio of how much
    phase space the rotor actually traverses to how much is available.

    This is not friction or resistance. It is the geometric ratio between
    the specific and the general: committed topology vs. open field.

  alpha_geometric_vs_measured: |
    α_geometric = CCR in unperturbed free field = 4π³ + π² + π inverse
    α_measured  = CCR sampled within commitment-dense lab environment

    Environmental commitment density partially pre-selects the embedding
    phase space, compressing effective Ω_embed slightly.
    Result: α⁻¹_measured < α⁻¹_geometric (CODATA: 137.035999 vs 137.036304)

    The 2.2 ppm gap is the environmental Π_eff depression imprinting
    on the measurement of a geometric ratio. It is predicted, not anomalous.

  running_alpha: |
    α runs with energy scale (QED renormalization group).
    CCR reading: at higher energy = higher local commitment density = lower Π_eff,
    the embedding phase space Ω_embed is progressively compressed.
    The ratio CCR = Ω_rotor/Ω_embed increases toward 1 as Ω_embed shrinks.
    The Landau pole (α divergence) is Ω_embed → Ω_rotor —
    physically: approach to logarithmic saturation ceiling.
    The substrate cannot be compressed beyond processing capacity —
    the same Λ·ln(1 + κ|ψ|²) that regularizes NS singularities
    prevents the Landau pole from being physical.

