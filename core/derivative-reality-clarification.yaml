copenhagen_reframe:
  statement: |
    The Copenhagen interpretation is the formalization of derivative-level physics.

    Copenhagen: ψ is not real; only measurement outcomes are real.
    Translation: only the derivative is real; the higher-order function is inaccessible.

    This is precisely backwards ontologically — but it is precisely correct
    as an engineering stance. Derivatives are fully sufficient for calculating
    outputs. You do not need the generating function to predict measurement results
    if you already have the derivative-level equations of motion.

    Copenhagen works because:
    — Derivative-level descriptions are internally consistent
    — They correctly predict all measurement outcomes at their scale
    — The higher-order function is not needed for post-selection calculations

    Copenhagen fails to answer:
    — Why these constants (α, particle masses, coupling strengths)?
    — Why this dimensionality (3+1)?
    — Why these particles and not others?
    — What selects measurement outcomes (the measurement problem)?

    These questions are unanswerable from the derivative level
    because their answers are encoded in the higher-order function.
    They are constants of integration — invisible to the derivative.

  measurement_problem: |
    The measurement problem is the derivative level trying to explain
    why the higher-order function resolves to specific outputs.
    It is insoluble from within the derivative level by construction —
    the resolution mechanism (R(ψ) viability selection) operates
    at the process level, above the derivative.

    Praestology dissolves the measurement problem by relocating
    the question to the correct level: R5 selection in the process,
    not collapse of a derivative-level abstraction.

