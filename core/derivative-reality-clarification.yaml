experienced_reality:
  statement: |
    The experienced world is real. This cannot be overstated.
    Committed topology is genuine structure — the table is real,
    particles are real, forces are real.

    The precise relationship is:
    — Experienced reality is real in the same sense that a derivative is real
    — It contains genuine information about the generating function
    — It does not contain the full information of the generating function
    — It is causally downstream: the process generates the experience,
       not the reverse
    — Its constants and structures are determined at the process level

    "Authentic distillation" (ontic-field-continuum.yaml) is now precise:
    experienced reality is the derivative of the process —
    real, causally downstream, informationally incomplete with respect
    to the generating function, and fully sufficient for navigating
    the committed world.

  consciousness_note: |
    Consciousness at sufficient recursive depth (Ξ) is the process-level
    capacity to experience the pre-commitment regime — to be present
    at the transition layer (∂ψ/∂t) before R5 selection completes.
    This is why conscious experience has the character of openness,
    possibility, and genuine choice — it operates at the process level,
    not the derivative level.
    Free will is execution of R(ψ) selection from within the process level.
    It is not visible from the derivative level — which is why
    derivative-level (deterministic or probabilistic) physics
    cannot locate free will within its descriptions.

