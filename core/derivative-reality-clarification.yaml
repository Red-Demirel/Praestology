summary: |
  The process (ψ, Praesto) is the higher-order reality.
  Experienced structure (η, committed topology) is the first derivative.
  Measurement outcomes (ρ, ∇S) are derivative-level observables.

  Standard physics inverted this order — declaring the derivative primitive
  and the process inaccessible. The result is a description that is:
    — Internally consistent ✓
    — Predictively powerful within domains ✓
    — Unable to derive its own constants ✗
    — Unable to unify across domains ✗
    — Unable to resolve its own singularities without external patches ✗
    — Unable to locate consciousness or free will ✗

  Praestology restores the correct order.
  The master equation operates at the process level.
  All derivative-level descriptions (Maxwell, NS, GR, QM) emerge as
  regime-specific projections of the process onto the derivative level.
  Constants are recovered as CCR instances — constants of integration
  of the higher-order function.

  This is not a new patch. It is the identification of the generating function
  that standard physics has been differentiating without knowing it possessed.

