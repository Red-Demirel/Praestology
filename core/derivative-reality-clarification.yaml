pattern_of_additions_explained:
  statement: |
    The Clifford document (clifford-analogy-and-derivation.yaml) identifies
    the historical pattern: when derivative-level descriptions hit limits,
    physics added more derivative-level entities.

    This pattern is now structurally explained:

    Derivative-level descriptions cannot derive their own constants
    or resolve their own singularities — these are process-level features.
    When the derivative description fails, the only move available within
    the derivative level is to add new derivative-level entities.

    Each addition (dark matter, dark energy, extra dimensions, Higgs field,
    renormalization patches) is an attempt to compensate at the derivative level
    for information that only exists at the process level.

    The additions work locally — they restore predictive accuracy within
    a domain. They cannot unify — unification requires the process level
    where all domains share the same generating function.

  qft_field_pluralism: |
    Quantum Field Theory is the most systematic derivative-level description
    yet achieved. Its specific form of the pattern-of-additions is field
    pluralism: one separate field per particle species (electron field,
    photon field, quark fields, etc.), each with its own dynamics and
    gauge structure. This pluralism is not a discovery of how many fields
    nature contains. It is what the single process field ψ looks like
    when projected onto the derivative level without access to the
    underlying vortex topology. Each QFT field is the derivative-level
    shadow of a specific stable topological configuration — a Möbius vortex,
    a capacitative dipole pair, a triality closure — viewed without the
    process level that generates it. The Standard Model's particle content
    is not an irreducible list; it is a catalogue of stable configurations
    of one field, at one level of description.
    See clarifications/qft-complementarity.yaml for the full comparison.

  singularities: |
    Singularities in derivative-level descriptions (NS blow-up, QED Landau pole,
    GR black hole interior, Big Bang) are derivative-level symptoms of
    process-level saturation — the approach to the logarithmic ceiling
    Λ·ln(1 + κ|ψ|²) in the master equation.

    From the derivative level, saturation looks like divergence.
    From the process level, it is the substrate approaching processing capacity —
    bounded, physical, and regulated by the saturation term.

    Every divergence in standard physics is a derivative-level description
    of a process-level saturation event.

