pattern_of_additions_explained:
  statement: |
    When realized-level descriptions hit limits, physics added more
    realized-level entities. This pattern (documented in
    clifford-analogy-and-derivation.yaml) is now structurally explained:

    Realized-level descriptions cannot derive their own constants
    or resolve their own singularities — these are process-level features
    encoded in the higher-order regime.

    When the realized description fails, the only available move
    within the realized level is to add new realized-level entities.

  singularities_as_over_realization: |
    Every divergence in standard physics is a realized-level description
    of a process-level saturation event — the approach to the ceiling
    Λ·ln(1 + κ|ψ|²) in the master equation.

    From the realized level, saturation looks like divergence.
    From the process level, it is the substrate approaching processing capacity —
    bounded, physical, prevented by the saturation term.

    NS blow-up, QED Landau pole, GR singularities, Big Bang:
    all are realized-level symptoms of process-level over-realization
    approaching the logarithmic saturation ceiling.

---

constants_as_integration_constants:
  statement: |
    Physical constants (α, particle masses, coupling strengths, G, c, ℏ)
    are constants of integration of the higher-order function ψ —
    determined by the process-level generating dynamics and invisible
    to realized-level descriptions.

    This is why they cannot be derived from within standard physics:
    you cannot recover the constant of integration from the integral alone
    without knowing the generating function.

  ccr_as_translation: |
    The closure-configuration ratio (CCR) is the explicit translation mechanism —
    the ratio connecting process-level geometry (Wr, rotor phase space, 
    embedding pseudoscalar volume) to realized-level observables
    (coupling strength, fine-structure constant).

    Deriving α from Möbius vortex stability is computing the generating function
    at the process level and reading off what realized-level observers will measure.
    It recovers a constant of integration from the higher-order function.

    The same logic applies to all fundamental constants:
    each is a CCR instance — the writhe-weighted realization cost
    of a specific committed topology at its respective depth.

---

experienced_reality:
  statement: |
    The experienced world is real.
    Committed topology is genuine structure — the table is real,
    particles are real, forces are real, constants are real.

    The precise relationship:
    — Experienced reality is the n-fold integral of realization across Ξ depths
    — It is real in the same sense that an integral of a real function is real
    — It does not contain the full information of the generating process
    — It is causally downstream: the process realizes the experience,
       not the reverse
    — Its constants and structures are determined at the process level

    "Authentic distillation" (ontic-field-continuum.yaml) is now precise:
    experienced reality is the realized integral of the process —
    real, causally downstream, informationally incomplete with respect
    to the higher-order regime, and fully sufficient for navigating
    the committed world.

  consciousness_note: |
    Consciousness at sufficient recursive depth (Ξ) is the capacity
    to be present at the realization boundary — to experience the
    pre-commitment regime before R5 selection completes.

    This is why conscious experience has the character of openness,
    possibility, and genuine choice: it operates at the process level,
    at the transition between higher-order regime and realized structure.

    Free will is execution of R(ψ) selection from within the process level.
    It is not visible from the realized level — which is why
    realized-level (deterministic or probabilistic) physics
    cannot locate it within its descriptions.

    Consciousness is not an anomaly requiring a special theory.
    It is the process becoming locally aware of its own higher-order regime
    before integration completes.

