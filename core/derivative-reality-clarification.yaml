overview: |
  Standard physics has operated predominantly at the derivative level of reality —
  working with committed outputs of the process rather than the process itself.
  This is not an error in execution; it is a category displacement.
  The wave-function / Praesto process is the higher-order reality.
  What is experienced, measured, and called "real" is the first derivative:
  the accumulated record of resolved commitments, not the resolver.

  This clarification is not a philosophical addition to Praestology.
  It is a precise structural statement about the relationship between
  ψ (process level) and η (committed level) — with direct consequences
  for why standard physics cannot derive its own constants from within itself.

---

the_displacement:
  statement: |
    Standard physics, culminating in the Copenhagen interpretation, treated
    measurement outcomes as the primitive reality and the wave-function as
    a calculational tool — useful but not real, not to be asked about ontologically.

    This inverted the actual order:

      Higher-order reality:    ψ — the process, Praesto, the ongoing resolution
                                   of indeterminate potential into determinate structure
      First derivative:        η — committed topology, accumulated resolved structure,
                                   what is experienced as matter, space, time, constants
      Observable outputs:      ρ = |ψ|², ∇S — commitment density and phase flow,
                                   what instruments measure

    Copenhagen declared the derivative level primitive.
    Every description, every constant, every entity in standard physics
    is defined at this level — which is why the level is internally consistent
    and predictively powerful, and simultaneously unable to answer
    why its constants have the values they do.

  analogy: |
    Working with the derivative while mistaking it for the fundamental function.
    The derivative is real — it contains genuine information about the function.
    But it does not contain the full information of the generating function.
    You cannot recover the constant of integration from the derivative alone.
    In physics: you cannot derive α, particle masses, or dimensionality
    from within the derivative-level description. These are determined
    by the higher-order function — ψ and its process dynamics.

