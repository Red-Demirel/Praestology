constants_as_integration_constants:
  statement: |
    Physical constants (α, particle masses, coupling strengths, G, c)
    are not free parameters to be measured and inserted.
    They are constants of integration — determined by the process-level
    generating function and invisible to derivative-level descriptions.

    This is why they cannot be derived from within standard physics:
    you cannot recover the constant of integration by differentiating.
    You must go to the generating function.

  ccr_as_translation: |
    The closure-configuration ratio (CCR) is the explicit translation mechanism
    between levels — the ratio that connects process-level geometry
    (rotor phase space, embedding pseudoscalar volume) to derivative-level
    observables (coupling strength, fine-structure constant).

    Deriving α from Möbius vortex stability is computing the generating function
    at the process level and reading off what derivative-level observers will measure.
    It is not fitting a constant — it is recovering a constant of integration
    from the higher-order function.

    The same logic applies to all fundamental constants:
    each is a CCR instance at its respective commitment depth and topology.

