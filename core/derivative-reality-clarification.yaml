---

overview: |
  Standard physics has operated predominantly at the realized level —
  working with committed outputs of the process rather than the process itself.
  This is not an error in execution; it is a category displacement.

  ψ (the Praesto process) is the higher-order regime — open, generative,
  holding all viable configurations simultaneously before realization.

  What is experienced, measured, and called "real" is realized structure:
  the accumulated integral of realization events, not the process that generates them.

  This clarification is not philosophical decoration.
  It is a precise structural statement with direct consequences for why
  standard physics cannot derive its own constants from within itself —
  those constants are encoded in the higher-order regime, not in the
  realized outputs it has been working with.

---

key_terminology:
  realization: |
    The mechanism by which ψ produces experienced structure.
    Not collapse, not measurement, not observation.
    Realization is the progressive integration of orientational phase-selections
    across committed planes into stable topology — the process by which
    open potential becomes determinate, experienced structure.

    One realization event = one R3→R5 cycle completing successfully:
      R3: orientational phases generated from open potential
      R4: specific phase selected, plane oriented (bivector committed)
      R5: viability confirmed, realization fires, event integrated into η

  higher_order_regime: |
    ψ — the generating process, always prior to and more general than
    any specific realized structure. ψ is not exhausted by realization —
    it remains the open field from which further realization proceeds.
    "Higher-order" means: ψ contains the information that determines
    what realized structure will look like, but realized structure does
    not contain the full information of ψ.

  realized_structure: |
    η — committed topology, the accumulated integral of realization events.
    This is what is experienced as matter, space, forces, constants.
    Real, causally downstream of ψ, and informationally incomplete
    with respect to the generating process.

---

the_displacement:
  statement: |
    Standard physics, culminating in the Copenhagen interpretation, treated
    realized outcomes as the primitive reality and ψ as a calculational tool.

    This inverted the actual order:

      Higher-order regime:    ψ — the process, holding all viable configurations
      Realization layer:      R(ψ) selection + integration — where events fire
      Realized structure:     η = ∫R(ψ)dτ — committed topology, experienced world
      Observable projections: ρ = |ψ|², ∇S — Madelung outputs, what instruments read

    Copenhagen declared the realized level primitive.
    All constants, entities, and descriptions in standard physics are
    defined at this level — which is why the level is internally consistent
    and predictively powerful, and simultaneously unable to answer
    why its constants have the values they do.

  mathematical_note: |
    Experienced reality is NOT the derivative of ψ.
    It is the accumulated INTEGRAL of realization events:

      η(r,t) = ∫₀ᵗ R(ψ) dτ

    ψ is the higher-order function.
    Realization events are selections from ψ.
    η is the running integral — the committed history of what has been realized.

    At each recursive depth Ξ, realized structure becomes the embedding
    context for the next level's realization:

      η_Ξ = ∫∫...∫ [R(ψ) applied Ξ times] dτ₁ ... dτ_Ξ

    Experienced reality at depth Ξ is an n-fold integral of realization.
    ψ remains higher-order throughout — the generating regime at every depth.

  madelung_as_projection: |
    The Madelung decomposition (ψ = √ρ · exp(iS)) is the formal projection
    from the higher-order regime onto realized observables:

      ψ (process level) → √ρ · R → {ρ: realized density, ∇S: realized flow}

    Every time physics works with ρ, u, P as primitives (fluid dynamics,
    thermodynamics, statistical mechanics), it works with Madelung projections
    of realized structure — correct within its domain, silent on foundational questions.

---

copenhagen_reframe:
  statement: |
    The Copenhagen interpretation is the formalization of realized-level physics.

    Copenhagen: ψ is not real; only measurement outcomes are real.
    Translation: only realized structure is real; the higher-order regime
                 is inaccessible and not to be asked about.

    This is backwards ontologically — but correct as an engineering stance.
    Realized-level descriptions are fully sufficient for predicting outcomes.
    You do not need the generating process to use the realized equations of motion.

  what_copenhagen_cannot_answer: |
    — Why these constants (α, particle masses, coupling strengths)?
    — Why this dimensionality (3+1)?
    — Why these particles and not others?
    — What selects realization outcomes? (the measurement problem)

    These are unanswerable from the realized level because their answers
    are encoded in the higher-order regime — they are constants of integration
    invisible to descriptions that work only with the realized integral.

  measurement_problem: |
    The measurement problem is the realized level trying to explain
    why the higher-order regime resolves to specific outputs.
    It is insoluble from within the realized level by construction.
    The resolution mechanism (R(ψ) viability selection) operates
    at the process level, above the realized integral.

    Praestology dissolves the measurement problem by relocating
    the question to the correct level: R5 realization in the process,
    not collapse of a realized-level abstraction.

