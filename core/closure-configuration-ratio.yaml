generalization:
  statement: |
    Every stable committed topology at every scale tier has a CCR.
    α is the electron's value. Other instances:

  known_instances:
    electron: |
      CCR = α ≈ 1/137
      Topology: 720° Möbius spinor rotor, Cl₃⁺ even subalgebra
      Phase space: S³ quaternion sphere (double-cover)
      Embedding: 3D pseudoscalar volume

    photon: |
      CCR → 1 (approaches full phase space)
      Topology: spin-1 transverse wave, single-cover rotor
      No rest mass: rotor traverses full available Π_eff per cycle
      No CCR compression: propagates in high-Π_eff, environment minimally constrains

    proton_neutron: |
      CCR = f(three-fold vortex binding topology)
      Instance: strong coupling constant αs at nuclear commitment depth
      Topology: triality-stabilized D+D+A or D+A+A closure
      CCR runs steeply with energy (asymptotic freedom) because
      at short range the three-fold rotor approaches Ω_embed compression faster
      Status: open — explicit computation from triality rotor geometry needed

    gravitational: |
      CCR analog: ratio of local Π_eff depression to background Π_eff
      Not a coupling constant in the gauge-theory sense —
      gravity is refractive impedance (emergent-classical-fields.yaml)
      but the same ratio logic applies: committed mass topology compresses
      local Ω_embed for all subsequent processes in that region
      Status: open — formal mapping to CCR framework needed

  spin_ccr_relation: |
    Spin quantum number s and CCR are related through the per-iteration
    phase advance Δθ:

      Δθ per iteration = 2π · s · CCR(T, d) · (Ω_embed / Ω_rotor)

    For electron: s = ½, CCR = α, Δθ = π per iteration → two iterations to close
    For photon:   s = 1, CCR → 1, Δθ = 2π per iteration → one iteration to close

    Spin is the per-iteration phase advance normalized to the closure cycle.
    The CCR sets the conversion efficiency between process-rate and
    observable spin precession — it is the orientational cost per iteration.

---

process_rate_connection:
  statement: |
    The 1/Π_eff prefactor in the master equation sets the local iteration rate.
    The CCR connects this rate to observable spin precession:

      ω_spin = (Π_eff · Δθ) / (CCR · τ_closure)

    where τ_closure is the time for one complete closure cycle.

    Consequences:
    — Spin precession rate varies with local Π_eff (gravitational/velocity redshift)
    — This is not a correction to spin — it IS the spin mechanism
    — Gravitational redshift of spin precession frequency is a direct prediction
    — Anomalous magnetic moment (g-2) is the CCR correction to the
       leading-order spin-field coupling — environmental CCR at QED depth

  g_minus_2_note: |
    The electron anomalous magnetic moment (g-2 ≈ α/π + ...) in QED
    is computed as an infinite perturbation series in α.
    CCR reading: each term is a successive environmental compression
    of Ω_embed at increasing commitment depth (loop order).
    The series converges because CCR < 1 — the orientational cost
    per additional loop decreases geometrically.
    The leading term α/π is the first environmental CCR correction
    to the bare rotor coupling.
    Status: open — explicit derivation from CCR environmental compression needed

