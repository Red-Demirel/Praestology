alpha_geometric_vs_measured:
  statement: |
    α_geometric = CCR of unperturbed Möbius rotor in free field
                = Wr · Ω_rotor / Ω_embed with no environmental compression
                = α⁻¹ = 4π³ + π² + π = 137.036304

    α_measured  = CCR sampled within commitment-dense environment
                = local η partially pre-commits orientational phase space
                = Ω_embed effectively compressed by surrounding realization
                = α⁻¹_measured < α⁻¹_geometric (CODATA: 137.035999)

    The 2.2 ppm gap is environmental realization density imprinting on
    the measurement of a geometric ratio. It is predicted, not anomalous.

  running_alpha: |
    At higher energy (higher local η, lower Π_eff), surrounding realization
    compresses Ω_embed progressively. CCR increases toward 1.
    The Landau pole is Ω_embed → Ω_rotor — physically, approach to the
    logarithmic saturation ceiling Λ·ln(1 + κ|ψ|²).
    The substrate cannot be realized beyond its processing capacity.
    The Landau pole is not a physical divergence — it is the saturation
    ceiling preventing over-realization.

  testable_prediction: |
    α_measured varies systematically with local commitment density.
    Measurements in void environments should yield values incrementally
    closer to 137.036304 than terrestrial measurements.
    Space-based precision metrology far from mass concentrations is the test.

