# AMENDMENT v2.1 — viability ratio, extreme-suppression regime, high-V_eff regime
# Note: "frozen" is the external observer's appearance only.
# Regress is continuous and rate-proportional to Π_eff — never fully absent.

viability_ratio:
  statement: |
    The viability of a committed topology is not absolute.
    It depends on the local balance between free potential (Π_eff)
    and commitment density, relative to its intrinsic CCR:

      V_eff = Π_eff / (ρ_η · CCR)

    where ρ_η is the local commitment density magnitude (scalar — the
    local value of |η|, not the full topological structure of η).
    CCR is the closure-configuration ratio of the topology in question.

    A structure persists when V_eff ≥ V_c (viability threshold set by R(ψ)).
    When V_eff < V_c, the structure is unstable and will dissolve via Regress
    at a rate proportional to Π_eff — unless it can reconfigure to a lower-CCR state.

    This makes CCR an active participant in the viability condition —
    not only the realization cost of a topology but a continuous
    determinant of whether that topology remains viable as its
    local environment (Π_eff, ρ_η) changes.

  regimes:
    viable: |
      Condition: V_eff ≥ V_c
      Behavior: structure persists, moves, interacts, reconfigures.
                R3→R4→R5 realization cycles proceed normally.
      Examples: free particles, atoms, molecules in low-density environments

    unstable_dissolving: |
      Condition: V_eff < V_c, Π_eff at normal range
      Behavior: R(ψ) drives dissolution (Regress) at normal process rate —
                commitment returns to free potential on observable timescales.
      Examples: virtual particles, unstable resonances, high-energy excitations

    extreme_suppression: |
      Condition: Π_eff → 0 (extremely low free potential)
      Behavior: Regress continues but at a rate proportional to Π_eff —
                τ_regress = f(1/Π_eff) diverges as Π_eff → 0.
                The process is not halted; it proceeds on timescales that
                approach and may exceed cosmological observation windows.

                From outside: the structure appears frozen — an observational
                artifact of the timescale divergence, not a process discontinuity.
                From inside: Regress and realization continue at near-zero rate.

                Key distinction: dissolution itself is a realization event
                requiring processing capacity. Regress rate scales with Π_eff
                continuously — no sharp threshold, no discontinuity.
                The master equation's 1/Π_eff prefactor produces this behavior
                directly, with no additional mechanism required.
      Examples: deep black hole interiors, regions of extreme commitment density

  relation_to_master_equation: |
    The 1/Π_eff prefactor on the time derivative governs local process rate
    continuously. As Π_eff → 0, evolution rate → 0 asymptotically.
    There is no discontinuous freeze threshold — only continuous suppression.

    Gravitational time dilation:    Π_eff moderately low → clocks slow
    Extreme suppression regime:     Π_eff → 0 → process rate → 0 asymptotically
    "Frozen" appearance:            τ_regress exceeds observation window —
                                    external appearance only, not process reality

---

black_hole_interpretation:
  statement: |
    A black hole is not a singularity or a breakdown of physics.
    It is a region of extreme Π_eff suppression where all process rates —
    realization and Regress alike — approach zero asymptotically.

    The committed structure (collapsed matter) is not held together by forces
    and is not frozen in an absolute sense. It is dissolving via Regress
    at a rate so slow it is unobservable on any accessible timescale.
    The event horizon is the surface where τ_regress first exceeds
    the cosmological observation window — not a geometric discontinuity
    but a process-rate horizon.

  explains: |
    Apparent stability:  τ_regress ≫ t_universe inside the horizon —
                         Regress proceeds but is unobservable from outside
    Hawking radiation:   at the horizon, Π_eff is low but non-zero;
                         Regress events occasionally couple to the external field,
                         carrying commitment outward as thermal radiation —
                         the same continuous Regress mechanism, now with
                         access to external free potential
    No singularity:      Π_eff → 0 suppresses process rate before divergence;
                         logarithmic saturation Λ·ln(1+κ|ψ|²) prevents
                         infinite commitment density from forming —
                         consistent with singularities-as-over-realization
                         (derivative-reality-clarification.yaml)
    Information:         committed topology is not destroyed — it dissolves
                         via Regress on extreme timescales, returning structure
                         to free potential incrementally; information is not lost
                         but becomes inaccessible on any finite observation window

  cross_reference: "domains/cosmos/black-hole-extreme-suppression.yaml (to be created)"

