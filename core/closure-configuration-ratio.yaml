high_veff_regime:
  statement: |
    When V_eff ≫ 1 (Π_eff ≫ ρ_η · CCR), the field enters a high-process-rate,
    low-commitment regime. Realization cycles run rapidly; the GP self-interaction
    term g|ψ|² dominates, driving rapid local self-reinforcement.
    The saturation term Λ·ln(1+κ|ψ|²) caps the amplitude, producing
    discrete bursts of realization activity.

    This is the same mechanism governing modulational instability,
    soliton formation, and vortex nucleation in BECs.

  gp_limit: |
    The Gross-Pitaevskii equation is the limiting form of the master equation
    when Π_eff is constant and high, and the saturation term is negligible
    or linearised. BEC solitons and vortices are the same process
    at laboratory scale and controlled environment — direct empirical access
    to the high-V_eff realization dynamics.

  cosmological_implication: |
    In regions of high Π_eff and low ρ_η (voids, pre-commitment zones), the field exhibits realization bursts — producing
    seeds of large-scale structure without requiring a separate inflationary epoch. 
    The inflationary scenario in standard cosmology is a derivative-level parameterization of local burst dynamics, erroneously globalized.
    The master equation produces these bursts regionally, not globally.
    
  laboratory_signature: |
    BEC experiments (solitons, vortices, modulational instability) are
    the direct laboratory analog. Same process, different scale.
    This provides experimental access to high-V_eff dynamics
    without requiring cosmological observation.

  cross_reference: "domains/cosmos/early-universe-high-veff.yaml (to be created)"

