ccr_first_derivation_discipline:
  status: "DIRECTIONAL CORRECTION — methodological note, not a new result"
  context: |
    A proposed connection suggested deriving CCR from the Gauss-Bonnet theorem
    applied directly to the Möbius band as a surface. This is mathematically
    incorrect as stated: the Möbius band is intrinsically flat (developable),
    so ∫K dA = 2πχ = 0 for χ(Möbius) = 0 — not 4π³+π²+π. Gauss-Bonnet
    governs intrinsic surface curvature; it is the wrong tool for an
    embedding/self-linking question.

  salvaged_intuition: |
    The underlying instinct is correct and worth preserving: Calugareanu-
    White-Fuller (Lk = Wr + Tw) IS the appropriate member of the Gauss-Bonnet
    family for this problem — it is the curve-self-linking analog, decomposing
    a topological invariant (Lk) into geometric (Wr) and framing (Tw)
    contributions, structurally parallel to how Gauss-Bonnet decomposes χ
    into curvature and boundary terms. CWF is already correctly used
    elsewhere in this file (Wr = 1 for the electron). The error was reaching
    for the surface-curvature member of the family instead of the
    curve-linking member, when the electron's structure is a vortex
    filament, not a surface.

  directional_correction: |
    The deeper methodological issue is direction of derivation, not just
    choice of theorem:

      Backward (incorrect approach): start from an assumed geometric picture
      of the electron (Möbius surface), then search for a theorem that
      describes that picture. This fits invariants to shapes already assumed —
      it can produce numerically suggestive but structurally unjustified results.

      Forward (correct approach): start from CCR as the defining ratio,
      and ask what geometric/topological structure is NECESSARILY implied
      by that ratio's required properties (dimensionless, 0 < CCR < 1,
      writhe-weighted, S³-valued phase space). Let the ratio constrain
      the topology, rather than retrofitting a theorem onto a presumed shape.

    This directional discipline applies to all future CCR instance derivations
    (weak, strong, gravitational) — see other_constants_as_ccr above.
    The geometric terms (4π³ + π² + π) remain a candidate pending
    ccr-electron-explicit; they should be derived FROM the CCR structure,
    not justified by retrofitting surface theorems onto an assumed picture.

  epistemic_note: |
    Consistent with the framework's stated epistemic stance (praestology-recap):
    "the framework stands or falls by its ability to derive known physics...
    not by philosophical elegance alone." This is logged as an open
    directional correction, not forced to premature closure. Future work —
    plausibly by contributors with more native fluency in geometric algebra —
    may resolve this further than current derivation permits.

  open_candidates_for_correct_invariant: |
    Possible correct tools for deriving Ω_rotor from CCR's structural
    requirements (none yet attempted; listed for future direction only):
    — Calugareanu-White-Fuller, applied forward from CCR's writhe requirement
    — Chern-Simons / Chern class on the rotor bundle over S³ (the double-cover
      is fundamentally a bundle/holonomy structure, possibly more natural
      than a surface-curvature approach)
    — Direct volume computation of the rotor's image in S³ under the
      closure map (note: S³ of radius r has volume 2π²r³ — this should be
      checked against the claimed 4π³ term for internal consistency
      before any of these candidates are pursued further)

  status_flag: "Logged, not merged as a derivation. ccr-electron-explicit remains open."

