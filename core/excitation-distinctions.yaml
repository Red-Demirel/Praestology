# /core/excitation-distinctions.yaml
name: "Excitation Distinctions — Vortex/Knot, Effect, and Product of Interaction"
version: "1.1"
status: "Core clarification — ontological distinction"
domain: "Core"
changes_from_v1.0: >
  Added precision note on photon grade (grade-2 field strength F vs
  grade-1 propagating phase gradient — two levels of description, not
  a contradiction). Split "product of interaction" into two subcategories:
  post-R5 decaying states (Higgs boson, decay products) and pre-R5
  substrate fluctuations (virtual particles) — these are ontologically
  distinct and the distinction clarifies why virtual particles are
  calculational artifacts while the Higgs boson was a physical detection.

description: >
  In Praestology, "excitation" covers at least three distinct phenomena.
  This file clarifies the distinctions, maps them to GA grades, and
  cross-references them with the process/realized level. The distinctions
  are particularly useful for readers coming from QFT, where "excitation"
  is used loosely across all three categories, producing category errors
  that Praestology's ontology dissolves.

dependency_map:
  requires:
    - "core/specifications.yaml"
    - "core/derivative-reality-clarification.yaml"
    - "core/process-physics/forces-as-rotor-consequences.yaml"
  provides_to:
    - target: "clarifications/qft-complementarity.yaml"
      via: "Ontological precision behind the particle/force/virtual distinction"
    - target: "core/process-physics/quanta-as-ccr-cost.yaml"
      via: "Distinguishes quantum (R3→R5 closure unit) from transient excitation"

---

distinctions:

  vortex_knot:
    type: "Vortex/Knot — Stable Topological Structure"
    definition: >
      A stable, persistent configuration of the ψ-field with a specific
      winding number and topological charge. R5-selected, irreversible
      commitment. Persists over long timescales unless undergoing interaction
      that crosses V_c.
    examples:
      - "Electron (Möbius 720° self-integral vortex)"
      - "Photon (capacitative dipole vortex pair)"
      - "Quark (triality closure arc)"
    ga_grade: >
      Grade-2 (bivector) with specific rotor orientation and chirality.
      Note on the photon: the electromagnetic field strength F is grade-2
      (F = E∧e₀ + I·B in Cl(3,1)) — this is the photon's field structure.
      The propagating degree of freedom (phase gradient ∇S) projects onto
      grade-1 at the Madelung level. Both are correct descriptions at
      their respective levels: grade-2 is the field; grade-1 is the
      propagating phase. The photon is a grade-2 structure whose observable
      propagation is a grade-1 projection.
    process_level: "η (committed structure, post-R5)"
    derivative_observable: "Particle — stable, localised, persistent"

  effect:
    type: "Effect — Field Resistance / Force"
    definition: >
      The field's resistance to rotor reconfiguration under external gradients,
      phase-locking, or viability constraints. Not a structure but a dynamic
      response — the field resisting change to its grade structure. Forces
      are effects in this sense: the field pushing back against rotor
      reconfiguration at specific commitment regimes.
    examples:
      - "Electromagnetic force (grade-2 bivector phase-gradient resistance)"
      - "Gravity (grade-3 pseudoscalar Π_eff gradient refraction)"
      - "Inertia (CCR cost per reconfiguration — second variation of E[R])"
      - "Strong force (triality phase-lock resistance near saturation)"
    ga_grade: >
      Regime-dependent: grade-2 (EM), grade-3 (gravity), grade-0 (inertia
      as scalar cost), grade-2 triality (strong). The effect's grade is set
      by which grade of the rotor is being resisted.
    process_level: "R3–R5 dynamics (the process in active resistance)"
    derivative_observable: "Force, field, acceleration, coupling constant"

  product_of_interaction:
    type: "Product of Interaction — Transient State"
    definition: >
      A temporary configuration generated by vortex/knot interactions.
      Two ontologically distinct subcategories with different process-level
      status — these must not be conflated:

    subcategory_a_post_r5_decaying:
      name: "Post-R5 decaying committed state"
      definition: >
        A configuration that has crossed V_c (R4 committed, R5 fired) but
        whose topology is weakly protected — R_diss acts on it rapidly,
        dissolving it back to free potential. The state was real (committed);
        it decays because f(topological_protection) is large.
      examples:
        - "Higgs boson: grade-0 condensate ripple, committed under collider
           stress, decays in ~1.6×10⁻²² s via R_diss to lower-grade modes"
        - "W/Z bosons at rest: SU(2) orientation-switching modes, committed
           but short-lived"
        - "Decay products: post-fission/fusion committed fragments"
      ga_grade: "Grade-0 (scalar ripple) or grade-2 (orientation mode)"
      process_level: "Post-R5 committed, rapidly dissolving via R_diss"
      derivative_observable: "Resonance with measurable mass and lifetime"
      qft_equivalent: "Real particles with finite lifetime (Breit-Wigner resonances)"

    subcategory_b_pre_r5_fluctuations:
      name: "Pre-R5 substrate fluctuation (uncommitted)"
      definition: >
        A substrate configuration that explores the R3 phase space but
        never crosses V_c — the rotor explores an orientation but R5 does
        not fire. No commitment to η occurs. These are not physical states
        that exist and then decay; they are the R3 exploration paths that
        perturbation theory samples without them ever becoming real.
      examples:
        - "Virtual photon in electron-electron scattering: a substrate
           phase-gradient fluctuation coupling two Möbius vortices, sampled
           by the perturbative expansion but never committed"
        - "Virtual quark-antiquark pairs in the QCD vacuum: triality
           fluctuations in the high-η substrate below V_c"
      ga_grade: "Indeterminate — pre-R5, no committed grade structure"
      process_level: "R3 (indeterminate, uncommitted)"
      derivative_observable: "Calculational artifact of perturbation theory —
        appears as internal Feynman diagram lines, not detectable states"
      qft_equivalent: "Off-shell virtual particles (propagators, not external lines)"
      critical_distinction: >
        Virtual particles in QFT are sometimes described as "briefly real"
        or "borrowing energy from the vacuum." In process-physics terms this
        is a category error: they are pre-R5 substrate fluctuations that
        never commit. They have no mass, no lifetime, no energy in the
        process-physics sense — they are the exploration phase of R3,
        sampled by the perturbative expansion. The Higgs boson was detected
        because it committed (post-R5); a virtual photon in scattering
        cannot be detected because it never does.

---

comparison_table:
  - term: "Vortex/Knot"
    ontological_status: "Stable committed topology (post-R5)"
    ga_grade: "Grade-2 (bivector)"
    persistence: "Long-term (R5-selected, protected)"
    example: "Electron, Photon, Quark"

  - term: "Effect"
    ontological_status: "Field resistance to reconfiguration"
    ga_grade: "Regime-dependent (0,1,2,3)"
    persistence: "Regime-dependent"
    example: "EM force, Gravity, Inertia"

  - term: "Post-R5 decaying"
    ontological_status: "Committed but weakly protected"
    ga_grade: "Grade-0 or grade-2"
    persistence: "Short (rapid R_diss)"
    example: "Higgs boson, W/Z at rest, resonances"

  - term: "Pre-R5 fluctuation"
    ontological_status: "Uncommitted R3 exploration"
    ga_grade: "Indeterminate"
    persistence: "Never committed — not a temporal property"
    example: "Virtual photon, virtual quark pairs"

---

relation_to_qft:
  statement: >
    QFT uses "excitation" across all four categories above without
    distinguishing them. This produces persistent category errors:
      - Virtual particles (pre-R5 fluctuations) are described as "briefly
        real" — importing temporal existence that process-physics denies them.
      - Forces (effects) are described as "particle exchanges" — importing
        vortex/knot ontology onto field resistance.
      - Resonances (post-R5 decaying) and stable particles (vortex/knot)
        are distinguished only by lifetime, not by ontological category.
    Praestology's four-way distinction provides a cleaner ontology:
    real particles are committed stable topology; forces are field resistance;
    resonances are committed unstable topology; virtual particles are
    uncommitted exploration. Each has a distinct process-level identity.

  higgs_clarification: >
    The Higgs detection at LHC confirmed: the grade-0 condensate exists
    (the field was excited and decayed as predicted). It did not confirm
    a fundamental particle in the sense of a stable vortex/knot. The Higgs
    boson is a post-R5 decaying committed state — real in the process sense,
    but transient and weakly protected. The condensate beneath it is the
    stable structure; the boson is a ripple in it.

