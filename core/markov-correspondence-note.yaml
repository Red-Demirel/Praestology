# /core/markov-correspondence-note.yaml
name: "Correspondence and Divergence with the Markov Master Equation"
version: "1.1"
status: "Structural clarification — positions framework relative to
         Markov/master equation formalism; foundational inversion stated"
domain: "Clarifications"
changes_from_v1.0: >
  Added foundational_inversion section: external observer assumption
  stated precisely; R1 ruling out the view from nowhere; Bloch-Nordsieck
  infrared connection as historical case where external-observer position
  produced a known problem dissolved by the framework (soft photons as
  Regress); participant-centric ontology as the structural consequence.
description: >
  The framework's process-level dynamics bear a precise structural
  resemblance to the Markov master equation — but diverge at two
  specific points that are not incidental. This file documents the
  correspondence and the divergences, explaining why the framework
  arrives at a non-Markovian, intrinsic-time formulation from first
  principles rather than by choice.

---

markov_master_equation:
  statement: >
    The Markov master equation describes the time-evolution of a
    probability distribution P(s,t) over states s:
      dP(s,t)/dt = Σ_{s'} [W(s|s')·P(s',t) − W(s'|s)·P(s,t)]
    where W(s|s') are transition rates between states, t is external
    and continuous, and the future depends only on the present state
    (memoryless condition). It is written from outside the system —
    an observer's equation with an independent clock.

  observer_position: >
    The Markov equation assumes:
      1. External time t — runs independently of what is observed
      2. Fixed transition rates W(s|s') — do not depend on history
      3. Memoryless — P(s,t) fully determines future evolution
      4. State space pre-given — states exist independently of transitions
    These are derivative-level assumptions: the observer stands outside
    the process, watches states change, and records transitions against
    an external clock.

---

correspondence:
  statement: >
    Starting from R1–R5 and commitment dynamics, the framework arrives
    at a structure that almost coincides with the Markov equation:

  coincident_elements:
    transition_rates: >
      R5 firing rate Γ_R5 ∝ Π_eff plays the same role as W(s|s') —
      it sets how fast the system moves between configurations.
    distribution_over_states: >
      The Born rule (quanta-as-ccr-cost.yaml) — probabilities as
      statistical summaries of local projection variance — plays the
      same role as P(s,t). The distribution over committed outputs
      is the framework's analogue of the Markov probability distribution.
    state_transitions: >
      R3→R4→R5 completion is a transition between configurations —
      structurally the same move as W(s|s')·P(s',t) in the Markov sum.

  the_limit_of_coincidence: >
    In the limit where Π_eff is uniform and constant (no η accumulation,
    no environmental variation, no commitment history effects), the
    framework reduces to a Markov equation with external time t.
    This is the same limit where:
      - Non-Markovian memory effects vanish
      - The system looks memoryless to an external observer
      - The intrinsic clock matches the external clock
    Standard statistical mechanics and kinetic theory operate in this
    limit — which is why the Markov equation works so well for
    equilibrium and near-equilibrium systems.

---

divergences:
  statement: >
    The framework diverges from Markov at two specific points, both
    of which follow from R1–R5 rather than being imposed as corrections.

  divergence_1_intrinsic_time:
    markov: "t is external — runs independently of the system"
    framework: "t = ∫Π_eff(τ)dτ — intrinsic, local, set by the
                substrate's own R5 firing rate"
    consequence: >
      In regions of depressed Π_eff (dense η, near mass), the local
      clock slows. A Markov observer with external time would describe
      this as the transition rates changing — the physics appearing
      different in different locations. The framework shows the R5
      mechanism is unchanged; the time variable is local. Gravitational
      time dilation is the clearest expression: not changed physics but
      a slower intrinsic clock where η is dense.
    why_intrinsic: >
      The process has no external observer and no external clock.
      Time is what R5 firing events accumulate — the committed record
      of Π_eff-weighted cycles. Any other time variable would require
      something outside the process to measure it, which contradicts R1
      (the process is the generating ground, nothing is outside it).
      Intrinsic time is not a choice — it is what follows from
      deriving time from within R1–R5 rather than assuming it as given.

  divergence_2_non_markovian_memory:
    markov: "Memoryless — future depends only on present state"
    framework: "η encodes commitment history — prior R5 events shape
                current Π_eff and therefore current R5 rate"
    consequence: >
      The system is explicitly non-Markovian: the same current state
      (same |ψ|², same observable configuration) reached by different
      commitment histories may have different ψ_res structures
      (inside-out-channeling.yaml: path-dependence of Praegress
      channeling). Different ψ_res → different local Π_eff → different
      current R5 rate → different future evolution. The history matters.
    experimental_signature: >
      Non-Markovian memory in transition states: correlated fluctuations
      in R5 firing rate over multiple cycles. The modified Eyring-Polanyi
      equation (thermodynamics-and-heat-emergence.yaml) predicts this
      as measurable rate correlations beyond standard Arrhenius kinetics.
      If observed, it falsifies the Markov approximation for those systems
      and confirms η-encoded memory.
    why_non_markovian: >
      η is the committed integral of all prior R5 events —
      η = ∫R(ψ)dτ. It accumulates irreversibly (R4 is permanent).
      The current Π_eff depends on current η, which depends on all
      prior R5 events. Memorylessness would require η to have no effect
      on Π_eff — which contradicts inside-out-channeling: committed
      topology narrowing future Praegress pathways IS the central
      mechanism. Memory is structural, not an add-on.

---

unified_statement:
  statement: >
    The Markov master equation is what you write when you are an external
    observer with a universal clock watching a system transition between
    pre-given states. The framework's master equation is what you derive
    when you are inside the process, using the process's own firing rate
    as the clock, with commitment history shaping the rate itself.

  the_key_inversion: >
    Standard physics writes the master equation first (Markov, external
    time) and then asks what corrections are needed for non-equilibrium,
    memory, and relativistic effects. The framework derives the equation
    from inside R1–R5 and arrives at a non-Markovian, intrinsic-time
    formulation as the natural result — with the Markov equation
    emerging as the limiting case when Π_eff is uniform and η history
    effects are negligible. The corrections are not added; they are
    the ground state. The Markov equation is the approximation.

  why_almost_markov: >
    The near-coincidence is not accidental. The Markov equation was
    constructed to describe transition processes efficiently — it
    captures the essential structure (rates, distributions, state
    transitions) without needing access to the generating mechanism.
    It works because in most laboratory conditions Π_eff is
    approximately uniform and η history effects are small compared
    to thermal noise. The framework explains why it works in those
    conditions and predicts precisely where it will fail:
      - Strong Π_eff gradients (near mass, in cavities — Purcell effect)
      - Long-timescale η accumulation (geological, cosmological)
      - Coherent reactant preparation (phase-aligned R3 proposals)
      - Near-saturation regimes (strong fields, dense matter)
    All four are conditions where non-Markovian memory or intrinsic-time
    effects become measurable. All four have known anomalies in current
    physics that the framework accounts for structurally.

