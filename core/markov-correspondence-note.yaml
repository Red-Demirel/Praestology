foundational_inversion:
  statement: >
    Markov, Kolmogorov, and Nordsieck share one foundational assumption:
    there exists a neutral vantage point from which states and transitions
    can be observed without the observer being part of what is described.
    The system is over there; the observer and their clock are over here.
    Probability is a description of what the observer sees from that
    external position. The framework inverts this completely — not as a
    philosophical choice but as a structural consequence of R1.

  external_observer_assumption: >
    Kolmogorov's forward and backward equations assume the transition
    kernel P(s,t|s',t') depends only on the time interval (t-t') and
    the states, not on the path taken to reach s'. This requires the
    observer to fully specify a state without knowing how it was reached.
    In the framework this is impossible: the same |ψ|² (same derivative-
    level observable) with different η histories has different ψ_res
    structures and therefore different Π_eff and different R5 rate.
    The "state" is not fully specified by any derivative-level observable
    alone — it requires the commitment history. The Kolmogorov property
    fails not because of quantum effects but because η is path-dependent.

  inside_out_position: >
    Each committed topology (η) is simultaneously:
      - The result of prior R5 events (commitment history)
      - The constraint on current Praegress flow (inside-out channeling)
      - The shaper of future R5 rates (Π_eff depression)
      - The local clock against which its own evolution is measured
        (t = ∫Π_eff dτ)
    The object experiences its own effects. Committed structure modifies
    the Π_eff that governs its own future commitment rate. This is not
    paradoxical self-reference — it is what inside-out channeling means:
    the history of commitment is the landscape through which new
    commitment flows. Every description is from a committed position
    within the process, not from outside it.

  r1_rules_out_external_position: >
    The external observer position is not neutral — it is a specific
    ontological commitment: that there exists a level of description
    from which the system can be fully specified without that description
    being part of the system. The framework does not have this level
    available. Not as a limitation but as a consequence of R1: the
    process is the generating ground; any description of it is itself
    a committed output of the process. There is no view from nowhere
    because "nowhere" would have to be outside existence, which R1
    rules out. The nearest existing frameworks are relational quantum
    mechanics (Rovelli: all states are relational to an observer within
    the system) and internal observer approaches in quantum cosmology
    (DeWitt, Hartle-Hawking with internal clocks) — but neither derives
    this from a single axiom. R1 does.

  bloch_nordsieck_connection:
    statement: >
      The Nordsieck infrared divergence problem (Bloch-Nordsieck 1937)
      is a specific historical case where the external-observer position
      produced a known problem that the framework dissolves structurally.
    the_problem: >
      In QED scattering, arbitrarily many soft (low-energy) photons can
      be emitted. An external observer trying to describe the process
      cannot draw a clean boundary between "the system" and "the soft
      photon environment" — the number of emitted photons is unbounded,
      producing infrared divergences in perturbation theory. The
      Bloch-Nordsieck theorem regularizes this by summing over all soft
      emissions — acknowledging that no finite-energy measurement can
      distinguish zero photons from arbitrarily many soft ones.
    process_physics_account: >
      Soft photon emissions are Regress — the field releasing accumulated
      CCR imperfection per cycle (commitment-response-process-physics.yaml
      #imperfect_closure_and_alpha). Each rotor cycle accumulates a small
      phase residual δφ; when this exceeds S_lock, the field sheds it as
      a capacitative dipole emission (spontaneous emission at the process
      level). The emissions are continuous and unbounded in number because
      Regress is a continuous process, not a discrete event.
      The infrared divergence is a derivative-level symptom of an external
      observer trying to count, from outside, what is a continuous internal
      Regress flow. Bloch-Nordsieck works because summing over all soft
      emissions is the derivative-level approximation to integrating over
      the continuous Regress — it accidentally recovers the right answer
      by exhausting the emission space rather than by identifying the
      mechanism. From inside the process: there is no divergence, only
      continuous Regress at rate α per cycle.
    consequence: >
      The infrared problem and its Bloch-Nordsieck resolution are both
      derivative-level constructs. The framework dissolves the problem
      by identifying soft photon emission as Regress — a process-level
      mechanism that requires no regularization because it is continuous
      and bounded by the CCR imperfection per cycle. The "sum over all
      soft photons" is the derivative-level shadow of ∫R_diss dτ.

  participant_centric_ontology: >
    The framework's position is participant-centric: every description
    is from within the process, at a committed location, experiencing
    the effects of prior commitments and shaping future ones. This is
    not solipsism — different committed positions are coupled through
    shared Praegress pathways and phase-locking (ρ). But there is no
    position that is not committed, no clock that is not intrinsic,
    no description that is not itself a committed output of R5.
    The external observer of Markov, Kolmogorov, and Nordsieck is
    not wrong — it is a derivative-level idealisation that works well
    when commitment history effects are small and Π_eff is approximately
    uniform. It fails precisely where the framework's predictions diverge
    from Markov: strong Π_eff gradients, long η accumulation timescales,
    coherent phase preparation, near-saturation regimes.

