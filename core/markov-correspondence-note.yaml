connection_to_existing_non_markovian_frameworks:
  statement: >
    Several existing frameworks address non-Markovian dynamics without
    identifying the generating mechanism. The framework provides that
    mechanism:
  lindblad: >
    Lindblad equation: the standard quantum master equation for open
    systems, Markovian by construction (Born-Markov approximation).
    Describes R_diss-like decay but treats the environment as memoryless.
    The framework's R_diss is non-Markovian because the environment
    (surrounding η) accumulates commitment history.
  nakajima_zwanzig: >
    Nakajima-Zwanzig equation: formally exact non-Markovian master
    equation obtained by projecting out environmental degrees of freedom.
    Produces memory kernel K(t-t') encoding environmental history.
    In process-physics terms: K(t-t') encodes the η history — the
    commitment density accumulated between t' and t. The memory kernel
    is the Praegress pathway narrowing from prior R5 events.
  stochastic_schrodinger: >
    Stochastic Schrödinger equation: unravels the Lindblad equation
    into individual quantum trajectories. Each trajectory is a sequence
    of quantum jumps — structurally R5 events. The stochastic element
    comes from external noise; in the framework it comes from process
    indeterminism (specifications.yaml #indeterminism_as_ground).
    The "noise" is not external — it is R1.

