    - >
      Stationary vortex solutions — find ψ_vortex(r) satisfying the full
      equation with ∂ψ/∂t = −iE/ħ · ψ. These are the particles.
      Their energies are the particle masses.
    - >
      Seven-constraint calibration (F02) — calibrate γ₀ (= ε), η, D, μ, Vc
