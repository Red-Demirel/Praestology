maxwell_from_ga:
  status: "DERIVED — grade-2 projection of master equation onto committed chiral-vortex regime"
  statement: |
    The electromagnetic field in GA is a single bivector field:
      F = E + IB    (grade-2 multivector; I = unit pseudoscalar)

    Maxwell's four equations collapse to one GA equation:
      ∇F = J

    where ∇ is the vector derivative (grade-1 operator) and J is the current multivector.

  praestology_reading: |
    F is the grade-2 component of ψ in the committed chiral-vortex regime.
    E (grade-1 vector part) ← commitment density gradient ∇ρ in polar vortex
    B (grade-2 bivector part) ← rotational phase gradient ∇∧(∇S) in axial vortex

    Maxwell is not a separate field theory.
    It is the grade-2 projection of the master equation
    applied to committed chiral topology at the electromagnetic scale.

    ∇F = J is the long-wavelength, committed-vortex limit of:
      i(1/Π_eff) ∂ψ/∂t = [...] ψ
    under: high-η, phase-locked, grade-2 dominant conditions.

  status_note: "Explicit term-by-term derivation open — structure is clear, algebra to be completed"

