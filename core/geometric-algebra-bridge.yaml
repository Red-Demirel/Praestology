    U(1), SU(2), Spin(3) are rotor subgroups of the GA geometric product.
    They do not need to be postulated as independent gauge symmetry groups.
    They emerge as the symmetry algebras of phase-locked chiral vortex topology
    at different recursive commitment depths.

  mappings:
    U1: |
      Phase rotation R = exp(Iθ) where I is the unit pseudoscalar in 2D subspace.
      Symmetry of uncommitted scalar field — EM gauge symmetry.
      Conserved quantity (Noether): electric charge = winding number of U(1) rotor field.

    SU2: |
      Two-component rotor structure in even subalgebra of G(3,0).
      Symmetry of spin-½ committed vortex pairs.
      Conserved quantity: weak isospin = topological winding of SU(2) rotor configuration.

    Spin3: |
      Full rotation group in 3D — rotor group of G(3,0) is Spin(3) ≅ SU(2).
      Symmetry of spatial orientation of committed topology.
      Conserved quantity: angular momentum = bivector grade projection.

  standard_model_note: |
    The Standard Model gauge structure U(1) × SU(2) × SU(3) is the symmetry algebra
    of phase-locked chiral vortices at three recursive commitment depths.
    Not postulated — emergent from rotor structure of ψ at each scale tier.
    SU(3) color: symmetry of three-fold vortex binding (proton/neutron topology) — open.

