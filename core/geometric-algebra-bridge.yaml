viability_operator_in_ga:
  status: "PROVISIONAL — mechanism clear; explicit GA form open"
  statement: |
    R(ψ) in GA is a grade-selective damping operator:
      - Acts on high-grade multivector components (low-viability configurations)
      - Reinforces grade-0 and grade-1 structure that crosses viability threshold V_c
      - Produces grade-reduction (commitment) when reinforcement exceeds threshold

    Formal expression:
      R(Ψ) = Σ_k  γ_k(V_k - V_c) · <Ψ>_k

    where <Ψ>_k is the grade-k projection of Ψ, V_k is its viability measure,
    and γ_k is the grade-k decay/reinforcement rate.

    Low-viability high-grade components decay → return to free potential (R1)
    High-viability low-grade components lock → committed structure (R4/R5)

  open: "Explicit calibration of γ_k from observed decay rates — open"

