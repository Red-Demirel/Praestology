chirality:
  status: "NATIVE in GA — no hand-inserted sign conventions required"
  mechanism: |
    A chiral vortex is a rotor R = exp(Bθ/2) where B is an oriented bivector.

    Left-handed vortex:   B = +e₁∧e₂  (positive orientation)
    Right-handed vortex:  B = -e₁∧e₂  (negative orientation)

    Chirality is the sign of the bivector — it is intrinsic to the geometric object,
    not a convention imposed on a scalar equation.

  spin_half_from_rotors: |
    Under a 2π rotation: R → -R  (rotor sign flip)
    Under a 4π rotation: R → +R  (rotor returns to identity)

    This is the double-cover property of rotors — exactly spin-½ behavior.
    The 720° periodicity of the Möbius vortex drops out from rotor algebra
    without the additional postulate that spin-½ "requires" quantum mechanics.

    Fermion statistics is the rotor double-cover applied to committed chiral vortex topology.

  topological_protection: |
    Topological winding of a rotor field R(r) cannot be continuously unwound
    without passing through a singularity (zero-amplitude point where R is undefined).
    This is the GA statement of topological protection — the mechanism behind
    particle stability and the winding-number contribution to α derivation.

