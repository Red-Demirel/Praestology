---

overview: |
  Geometric Algebra (GA) and Lie groups do not modify the foundational ontology
  or the master equation. They supply a coordinate-free, grade-aware representation
  language in which Praestology mechanisms become explicit rather than implicit.

  Key gain: mechanisms that required hand-inserted conventions in standard tensor/
  complex notation (chirality, spin, phase-locking, topological protection) drop out
  naturally from GA structure without additional postulates.

  No new ontological primitives are introduced at any step.
  All GA/Lie structures are emergent descriptions of the single ψ process.

---

core_principle:
  statement: |
    GA is inherently process- and rotation-oriented. It treats vectors (grade-1),
    bivectors / oriented planes / rotations (grade-2), and higher-grade multivectors
    uniformly under a single geometric product.

    This maps directly onto Praestology's objects:
      Grade 0 (scalar)    ←→  commitment density ρ, mass/energy
      Grade 1 (vector)    ←→  directed flow u, momentum, gradient ∇S
      Grade 2 (bivector)  ←→  vortex planes, EM field F = E + IB, angular momentum
      Grade 3 (trivector) ←→  volume orientation, pseudoscalar in 3D
      Full multivector    ←→  uncommitted field — all grades active, maximum freedom

  grade_as_commitment_depth: |
    Commitment is grade-reduction.
    High-Π_eff (potential regime): full multivector — all grades active
    R3 exploration: multivector components competing
    R5 lock (commitment): grades progressively freeze
    Fully committed structure: low-grade residual (scalar density + vector flow)

    Phase-locking is literally grade-reduction of the multivector field.
    This gives R5 a precise mathematical meaning without new primitives.

