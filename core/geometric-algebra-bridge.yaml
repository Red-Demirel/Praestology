    Π_eff(r,t) acts as the inverse refractive index of the substrate.
    Wave paths curve toward lower Π_eff — exactly Fermat's principle in GA form.

    Gravitational lensing: path integral of rotor field R(r) along geodesic
    in Π_eff landscape — curvature without curved spacetime manifold.

    This is coordinate-free and background-independent by construction —
    GA operates without a fixed metric tensor.

