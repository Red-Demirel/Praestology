madelung_in_ga:
  status: "EXACT — same content as complex Madelung; GA makes grade structure explicit"
  standard_form: |
    ψ = √ρ · exp(iS)    [complex notation]

  ga_form: |
    Ψ = ρ^(1/2) · R     [GA notation]

    where R = exp(Bθ/2) is a rotor, B is a unit bivector (oriented rotation plane)
    and θ is the phase angle.

  grade_separation: |
    Continuity equation  ←  grade-0 projection of ∇Ψ equation
    Momentum equation    ←  grade-1 projection
    Quantum pressure Q   ←  grade-2 (bivector) divergence
    Vorticity           ←  grade-2 component of ∇∧u

    Grade separation IS physics separation.
    No projection operators or index gymnastics required.
    The structure of the equation selects the physics automatically.

