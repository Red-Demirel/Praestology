issue_2_n_sat_dependency_chain:
  status: "OPEN — multiple regime derivations rest on an unclosed functional form"
  summary: >
    emergent-classical-fields.yaml uses the saturating nonlinearity
    g·|ψ|²/(1+|ψ|²/n_sat) as a settled input across at least three
    regime derivations (Maxwell's low-η limit, the strong force's
    near-saturation limit, and implicitly the weak force's threshold
    crossing). The specific functional FORM of this saturation term —
    not just the value of n_sat — is listed as an open derivation in
    commitment-response-process-physics.yaml, which in turn depends on
    vortex-stability.yaml's own unclosed ccr-electron-explicit item.

  the_chain: >
    emergent-classical-fields.yaml
      (treats saturation form as given input)
        ← depends on ←
    commitment-response-process-physics.yaml: n-sat-from-topological-capacity
      (status: OPEN, priority 1 — "whether V ∝ |ψ|²/(1+|ψ|²/n_sat)
      is correct or requires modification — tanh, log, or other forms")
        ← depends on ←
    vortex-stability.yaml: ccr-electron-explicit
      (status: OPEN, priority 1 — equilibrium Möbius shape and writhe
      not yet computed)

  why_this_matters: >
    This is not merely "one open item among several." The specific
    mathematical FORM used in emergent-classical-fields.yaml's regime
    table — not just unresolved numerical constants within an agreed form —
    is provisional. If the eventual topological-capacity derivation yields
    a tanh or logarithmic saturation instead of the rational form, the
    qualitative shape of at least the strong-force near-saturation regime
    (which explicitly relies on dV/d(|ψ|²) → 0 at the saturation point)
    and possibly the weak-force threshold-crossing regime would need
    re-examination, not just re-fitting.

    What is robust regardless of functional form:
      - Saturation EXISTS at some finite n_sat (topological capacity is finite)
      - dV/d(|ψ|²) → 0 as |ψ|² → n_sat (derivative vanishes at saturation)
      - The regime ordering (linear → nonlinear → saturation) is stable
    What is not robust:
      - Specific expressions for coupling strengths at intermediate densities
      - The exact shape of the MOND transition region (gravity regime)
      - The precise threshold for the weak-force V_c crossing

  current_recommendation: >
    emergent-classical-fields.yaml should carry an explicit note stating
    that its regime table assumes a specific saturation functional form
    that is itself two derivation-steps from closed, and that qualitative
    conclusions drawn from the SHAPE of that function are correspondingly
    provisional. What is already robust: the qualitative regime ordering,
    the existence of saturation, and the grade-projection derivation chain.
    This tracking note serves that function pending inline update.

