# /core/process-physics/open-reconciliation-notes.yaml
name: "Open Reconciliation Notes"
version: "1.2"
status: "ACTIVE TRACKING — deliberately surfaced inconsistencies and dependency-of-dependency risks"
domain: "Core / Process-Physics"
changes_from_v1.0: > >
  Added issue_3: the 4π geometry factor is a shared upstream dependency
  of both the α identification (issue_1) and Maxwell's GA grade derivation
  in emergent-classical-fields.yaml — currently invisible in tracking.
  Minor wording only elsewhere.

description: >
  This file tracks places where recently added process-physics files make
  claims not yet reconciled with each other, or where a file treats as
  settled something that is, one or two steps upstream, still an open
  derivation. These are not hidden elsewhere in the framework — they are
  tracked here explicitly, because Praestology does not claim closed-form
  derivation of fundamental constants from first principles. The framework's
  position is structural (what ratios and mechanisms a stable process
  requires), not numerological (fitting formulas to known constants).
  An itemised, honest account of where that structure is not yet internally
  reconciled is part of the claim, not a liability to be minimised.

stance: >
  Praestology is not in the business of presenting a finished derivation
  of α, G, ħ, or any other constant as a solved problem. Where two files
  each propose a process-level identification of the same quantity, both
  are kept visible until reconciled — neither is quietly retired in favour
  of the other without an explicit note explaining why. Where a file's
  derivation chain depends on an upstream file's still-open item, that
  dependency is named here even if the downstream file does not repeat
  the caveat inline.

---

issue_1_alpha_dual_identification:
  status: "OPEN — two structurally distinct identifications of α, not yet shown equivalent"
  summary: >
    Two process-physics files each claim to identify the process-level
    origin of the fine-structure constant α, using different objects.

  identification_a:
    source: "vortex-stability.yaml"
    framing: "STATIC GEOMETRIC RATIO"
    statement: >
      α = S_burden / (4π · S_cap,sat)
      — the self-energy of the stable Möbius 720° vortex relative to the
      capacitative (photon) saturation threshold. This is a property of
      the equilibrium topology: a ratio of two energy/action scales,
      evaluated once the equilibrium shape and its writhe Wr are known.
      Depends on solving a calculus-of-variations problem (equilibrium
      Möbius shape in the GP field) and then a topological integral
      (Calugareanu-White-Fuller writhe of that shape). Time does not
      appear in this definition — it is a ratio of two fixed quantities.

  identification_b:
    source: "commitment-response-process-physics.yaml"
    framing: "DYNAMICAL PER-CYCLE RESIDUAL"
    statement: >
      α = residual mismatch (Ω_rotor − Ω_embed) / Ω_embed, per rotation cycle
      — the fractional phase correction that accumulates each time the
      rotor completes one cycle, because finite substrate resistance R
      prevents Ω_rotor and Ω_embed from matching exactly. This is a rate:
      a per-cycle imperfection that accumulates over time and is explicitly
      tied to spontaneous emission, decoherence, and the arrow of time.
      Time is intrinsic to this definition — it is a residual that appears
      once per rotation, not a fixed ratio of static quantities.

  why_not_automatically_resolved: >
    commitment-response-process-physics.yaml gestures at a bridge
    (ccr_connection: "ΔCCR = Wr · δΩ/Ω_embed ... gives α") but this
    asserts the two quantities are proportional via Wr without independently
    deriving that the static self-energy ratio (identification_a) and the
    dynamical per-cycle closure residual (identification_b) are numerically
    identical rather than merely analogous.

    A geometric ratio of two energy scales and a kinetic residual of two
    frequencies are different kinds of quantity (dimensionless ratio of
    actions vs. fractional rate per cycle). They could turn out to be
    exactly the same quantity viewed two ways — that would be a genuinely
    strong result — or they could be two different numbers of the same
    order, in which case at most one is actually α and the other needs
    a different name or a corrected relationship.

  what_would_resolve_this: >
    Either (a) a derivation showing identification_b's per-cycle residual
    integrates, in steady state, to exactly identification_a's static
    ratio — i.e. that the rate, accumulated appropriately, reproduces the
    equilibrium self-energy ratio without additional free parameters; or
    (b) a demonstration that they answer different questions — e.g.
    identification_a is α_int (bare isolated-vortex value), while
    identification_b describes how α_int relates to α_exp or to emission
    phenomenology — in which case the files should be edited to make that
    division of labour explicit rather than each independently claiming to
    be "the process-level origin of α."

  upstream_dependency: >
    Both identifications share the 4π isotropic geometry factor as an
    unresolved upstream dependency — see issue_3 below. Resolution of
    issue_3 is a prerequisite for full resolution of issue_1, because
    the 4π appears in identification_a's denominator and its derivation
    from the GP Green's function may clarify whether the factor is truly
    geometric (static) or whether it has a dynamical interpretation
    that bridges to identification_b.

  current_recommendation: >
    Do not treat either file's α claim as settled pending the other.
    Both vortex-stability.yaml and commitment-response-process-physics.yaml
    should retain their own framing. Any future file citing "α as derived
    in process-physics" should cite this note alongside whichever file it
    draws from, rather than presenting either identification as sole or final.

