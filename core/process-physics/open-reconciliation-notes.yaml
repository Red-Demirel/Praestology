methodological_note:
  why_track_separately_rather_than_inline: >
    All three issues could be added as inline caveats to the files where
    they arise. They are tracked here in addition, because:
      (1) issue_1 spans two files neither positioned to unilaterally
          declare itself correct over the other;
      (2) issue_2 is a dependency-of-a-dependency easy to lose as more
          files cite emergent-classical-fields.yaml without re-checking
          what it rests on;
      (3) issue_3 is a shared upstream dependency currently invisible
          in both files that use it;
      (4) a single visible location for "things we know don't fully fit
          together yet" is more useful, for collaborators and skeptical
          readers alike, than caveats scattered across multiple files.

  relationship_to_framework_epistemics: >
    This file is itself an instance of the same discipline practiced
    elsewhere in the framework (e.g. vortex-stability.yaml's own
    honest_assessment, alpha-rydberg-z0.yaml's explicit refusal to
    present fixed numerical closures). Praestology's claim is structural:
    it specifies what a stable process must satisfy, and lets the numbers
    fall out of that structure where the math has actually been done —
    not the reverse. Tracking unreconciled claims openly, including ones
    that might look bad next to each other, is consistent with that claim
    rather than a threat to it. A framework that derived all its constants
    cleanly on the first pass, with no visible seams, would be more
    suspicious, not more credible.

