issue_3_4pi_geometry_factor:
  status: "OPEN — shared upstream dependency of issue_1 and Maxwell GA grade derivation"
  summary: >
    The factor 4π appears in two separate places across the process-physics
    files, each stated from physical reasoning (R5 substrate isotropy) but
    neither yet formally derived from the GP field equations:

  appearance_a:
    source: "vortex-stability.yaml"
    location: "step 4 (CCR_value) and why_4pi_factor section"
    role: >
      The denominator 4π in α = S_burden/(4π · S_cap,sat).
      Stated as the isotropic geometry factor: the Möbius crossover
      coupling radiates into 4π steradians of surrounding substrate.
      Marked as: "Stated from R5 — formal GP field derivation open"
      Open derivation ID: 4pi-from-GP-geometry (priority 1)

  appearance_b:
    source: "emergent-classical-fields.yaml"
    location: "maxwell_emergence, longitudinal_force note"
    role: >
      The 4π appears implicitly in the Maxwell equations via the
      Lorenz gauge derivation from the master equation phase gradient.
      The grade-1 current J has a 4π coupling to the grade-2 bivector F
      in SI units (μ₀ = 1/ε₀c²). Whether this 4π is the same geometric
      factor as in appearance_a — i.e. whether the isotropic substrate
      coupling of the Möbius crossover and the isotropic radiation field
      of classical EM are both instances of the same spherical integration
      of the GP Green's function — is not stated.

  why_this_matters: >
    If both 4π factors derive from the same GP Green's function integral
    (the spherical integration of the coupling kernel around a localised
    source in 3D — standard result: 4π), then resolving 4pi-from-GP-geometry
    simultaneously closes a part of issue_1 (the denominator in identification_a)
    and confirms the Maxwell reduction in emergent-classical-fields.yaml.
    If they are different 4π factors with different derivations, that
    distinction needs to be made explicit — two coincident factors from
    different geometry would be notable.

    Either way, the current situation — two files each using a 4π factor
    from physical reasoning without establishing whether they share a
    common derivation — is a reconciliation gap that could mislead a
    reader into thinking the factor is better established than it is.

  what_would_resolve_this: >
    The GP Green's function in 3D for a point source at the vortex core:
      G(r) = −1/(4πr)   [standard 3D Laplacian Green's function]
    The spherical integration of the coupling kernel around the crossover
    point should yield 4π as the isotropic solid angle normalisation —
    this is the standard result and is expected to hold. The formal
    derivation would:
      (a) confirm the 4π in identification_a is the solid-angle factor
          from the GP Green's function at the crossover geometry;
      (b) show this is the same factor that appears in the Maxwell
          wave equation derivation from the master equation phase gradient;
      (c) establish whether the two appearances are identical in origin
          or coincidentally equal.

  current_recommendation: >
    4pi-from-GP-geometry (priority 1, vortex-stability.yaml) should be
    noted as a shared prerequisite for both issue_1 resolution and
    Maxwell regime validation in emergent-classical-fields.yaml.
    The open derivation priority is confirmed as correct.

