# core/process-physics/foundations.yaml
name: "Foundations"
version: "1.1"
status: "Process-First — ontological commitments; pointers only"
description: >
  The foundational ontological commitments of Praestology's physics domain.
  All physical observables are realized from ψ (the process-level substrate),
  governed by R1–R5 and described using Geometric Algebra (GA).
  This file states what physics IS in this framework; it does not re-derive it.
  Read derivative-reality-clarification.yaml and process-to-observable-hierarchy.yaml
  before this file — those establish the level-structure these commitments presuppose.

reading_order:
