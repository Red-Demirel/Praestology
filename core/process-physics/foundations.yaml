## Scale-Setting Elements: ħ and c

scale_setting:
  description: >
    The GA/CCR base is dimensionless — CCR is a pure ratio, rotors are
    unit objects, phase space volumes are numerical. Physical dimensions
    at the realized level require scale-setting elements that translate
    between the dimensionless process level and the dimensioned realized
    level. ħ and c are proposed as this translation layer.
  status: "OPEN STRUCTURAL HYPOTHESIS — mechanism proposed, not yet derived"

  planck_constant:
    proposal: >
      ħ is the translation element from the dimensionless process-level
      (GA/CCR base) to the dimensioned realized level — setting the unit
      of action, and through it the unit of distance/structure.
      It is not a CCR instance (CCR is dimensionless; ħ is not) but the
      scale-setter that makes CCR ratios legible as physical quantities
      at the realized level.
    open_questions: >
      What determines the specific value of ħ — i.e., what fixes the
      scale of the translation? Is ħ derivable from Π_eff's normalization
      (φ_max in the definition Π_eff = φ/φ_max) or from the saturation
      parameter κ in the logarithmic term? These questions need to be
      addressed before ħ can be stated as more than a proposal.
    status: "OPEN — mechanism proposed; value-setting question unresolved"
    see_also: ["closure-configuration-ratio.yaml",
               "core-dynamical-equation.yaml"]

  speed_of_light:
    proposal: >
      If ħ sets the unit of structure/distance (realized-level length scale),
      and the process-rate (Π_eff in 1/Π_eff · ∂ψ/∂t) sets how fast
      realization proceeds locally, then c = structural unit / process-rate unit.
      c is the ratio of these two scale-setting elements — not a CCR instance
      and not a direct Π_eff value, but the relation between the two
      scale-setters that translates process-rate into realized-level velocity.
    consequence: >
      c is locally variable wherever Π_eff varies — lower Π_eff near mass
      concentrations means slower local realization rate for the same
      structural unit, yielding the correct gravitational time dilation
      already in the framework. c is not a universal constant at the
      process level; it is an evaluated parameter, co-varying with Π_eff.
    sequencing: >
      ħ must be settled before c — c is the ratio of the distance scale
      (set by ħ) to the process-rate unit (set by Π_eff). Without ħ fixed,
      c has no distance unit to relate to.
    status: "OPEN — contingent on ħ proposal; mechanism internally consistent"
    see_also: ["core-dynamical-equation.yaml",
               "emergent-classical-fields.yaml",
               "closure-configuration-ratio.yaml"]

