## Mathematical Foundation: Geometric Algebra (GA)
geometric_algebra:
  description: >
    GA (Cl(3,0)) is the natural coordinate-free language for ψ and its
    dynamics. It provides unified treatment of vectors, bivectors, and
    higher-grade multivectors — mapping directly onto the grade structure
    of realization (grade-3 chirality → grade-2 bivector → grade-1 flow
    → grade-0 density). GA is a descriptive layer, not an ontological
    primitive; it arises from the dynamics of ψ, not the reverse.
  role:
    - Describes vortex topology, chirality, rotor phase space
    - Makes CCR's geometric content explicit (Ω_rotor, Ω_embed, writhe)
    - Provides coordinate-free derivation of Maxwell, spin, and inertia
  see_also: ["geometric-algebra-bridge.yaml",
             "spin-process-rate-ga.yaml"]

