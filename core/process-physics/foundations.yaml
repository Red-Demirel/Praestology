## Ontological Commitments

commitments:

  - name: "Mass as Inertia-Effect"
    description: >
      Mass is not an intrinsic property of a point-like particle.
      It is the realized manifestation of a committed topology's resistance
      to reconfiguration — the cost of re-traversing the vortex's orientational
      closure cycle against finite local free potential (Π_eff).
      The CCR enters as the coupling coefficient between applied perturbation
      and inertial response.
    derivation_status: >
      Derivation path identified: second variation of the energy functional
      E[ψ] with respect to spatial displacement of the Möbius vortex solution.
      NOT yet completed — this is an open variational derivation.
    see_also: ["spin-process-rate-ga.yaml#inertia-variational-derivation",
               "closure-configuration-ratio.yaml"]

  - name: "Space and Time as Emergent from ψ Dynamics"
    description: >
      Space and time are not containers or independent dimensions.
      Space is the relational pattern of commitment gradients (∇η) —
      not an arena but a description of where commitment is and is not.
      Time is the local process-rate: the 1/Π_eff-scaled iteration rate
      of the master equation at each point. Both are emergent from ψ;
      neither is fundamental.
      QHD (via Madelung) and optical refraction (via ∇Π_eff) provide
      the appropriate mathematical descriptions — not as replacements
      for space-time but as the process-level grounding from which
      the realized-level space-time description emerges.
    see_also: ["derivative-reality-clarification.yaml",
               "process-to-observable-hierarchy.yaml",
               "core-dynamical-equation.yaml",
               "navier-stokes-derivation.yaml"]

  - name: "Energy as Rate and Flow of η ↔ Π Conversion"
    description: >
      Energy is not a substance or an independently conserved primitive.
      It is the bookkeeping of η ↔ Π_eff conversion rate and flow —
      how rapidly and in which direction committed topology is dissolving
      into free potential (Regress) or free potential is resolving into
      committed topology (realization).
      In the master equation, energy appears as the eigenvalue of the
      time-evolution operator — a derived quantity, not a primitive.
    note: >
      If Φ is used as a symbol for this bookkeeping quantity elsewhere
      in the framework, the mapping Φ ↔ η↔Π conversion rate should be
      made explicit in the file introducing that notation.
      Currently, the master equation uses Π_eff, ψ, η, ρ_η as primary
      symbols; Φ is not yet defined in the core files.
    see_also: ["core-dynamical-equation.yaml",
               "spin-process-rate-ga.yaml#tension_as_derivative"]

