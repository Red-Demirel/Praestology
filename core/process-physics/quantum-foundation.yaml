## Quantum Phenomena from Substrate Dynamics
quantum_phenomena:

  - name: "Superposition"
    description: >
      Superposition is the ontological state of ψ in the pre-realization
      regime (R3) — the field genuinely holding multiple viable configurations
      simultaneously before R5 selection fires. It is not a statement of
      observer ignorance about a hidden classical state. It is the actual
      physical condition of the field before viability selection completes.
      Superposition ends when R5 fires — not when an observer looks.
    see_also: ["../core/specifications.yaml#R3",
               "process-to-observable-hierarchy.yaml"]

  - name: "Realization (formerly: measurement/collapse)"
    description: >
      Realization is the R3→R4→R5 cycle completing successfully:
      a specific orientational phase is explored (R3), committed (R4),
      confirmed viable against V_c (R5), and written permanently into η.
      This is a continuous physical process in the substrate — not an
      instantaneous observer-triggered event. "Collapse" and "measurement"
      are deprecated: they import Copenhagen observer-dependence that
      is not present in the process-level description.
    governing_rule: "R5 — selection fires realization. R4 is commitment only."
    see_also: ["core-dynamical-equation.yaml",
               "../core/specifications.yaml#R5",
               "process-to-observable-hierarchy.yaml#transition_R5"]

  - name: "Non-Locality"
    description: >
      Non-locality arises because ψ is a single continuous field — there
      is no gap between separated regions of the substrate. Correlations
      between topologies realized at different locations persist because
      they were realized from the same continuous ψ, sharing the same
      field history (η = ∫R(ψ)dτ across all space).
      GA describes the topology of these correlations but does not itself
      explain non-locality — field continuity is the mechanism; GA is
      the language in which it is expressed.
    see_also: ["../core/foundational-ontology.yaml",
               "geometric-algebra-bridge.yaml"]

  - name: "Entanglement"
    description: >
      Entanglement is correlated rotor orientation across separated
      committed topologies — both realized from a shared pre-commitment
      ψ configuration. The correlation is written into η at the moment
      of realization and persists because η is permanent. Measuring one
      topology does not affect the other — both are already committed;
      what changes is the observer's knowledge of the shared realization
      history.
    status: "MECHANISM IDENTIFIED — formal derivation as shared-rotor
             orientation open (see geometric-algebra-bridge.yaml
             #entanglement-as-rotor-correlation)"
    see_also: ["geometric-algebra-bridge.yaml#open_derivations",
               "closure-configuration-ratio.yaml"]

