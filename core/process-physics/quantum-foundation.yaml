## Quantum Mechanics as Ξ=1 Projection
qm_as_projection:
  statement: >
    Standard quantum mechanics is what you get when ψ is restricted to
    Ξ=1 commitment depth and the Copenhagen viability filter is applied:
    only realized outputs (η, ρ, ∇S) are tracked; the process level (ψ)
    is declared inaccessible. This is internally consistent and predictively
    powerful within its domain — and silent on why its constants have the
    values they do, because those are encoded at the process level.
  implication: >
    Quantum phenomena are not mysterious exceptions to classical physics.
    They are the direct observational signature of the process level (ψ)
    at commitment depth Ξ=1, where Π_eff is high enough that the
    pre-realization regime is directly accessible.
  see_also: ["derivative-reality-clarification.yaml",
             "process-to-observable-hierarchy.yaml",
             "../core/specifications.yaml"]

---

## Wave-Function as Process-Level Description
wave_function:
  description: >
    The wave-function is not a primitive and not a derivative of ψ.
    It IS ψ — restricted to Ξ=1 commitment depth and expressed in the
    standard complex-amplitude notation that committed observers use to
    track the pre-realization regime from within the realized level.

    η (committed topology) is the accumulated INTEGRAL of realization
    events — η = ∫R(ψ)dτ — not a derivative of ψ. The wave-function
    describes the open process; η is the committed record of what has
    been realized from it.

  emergence:
    - "R2 (Structure): gradients form in ψ — the potential landscape"
    - "R3 (Exploration): orientational phases generated from open potential"
    - "R4 (Commitment): specific phase selected and locked"
    - "R5 (Selection): viability confirmed; realization fires; committed
       to η permanently"

  mathematical_basis: >
    GA (Cl(3,0)) provides the natural coordinate-free language for ψ's
    grade structure. Madelung decomposition (ψ = √ρ · exp(iS)) is the
    formal translation from process-level to realized-level variables —
    exact, not an approximation.
  see_also: ["geometric-algebra-bridge.yaml",
             "navier-stokes-derivation.yaml#madelung_decomposition",
             "process-to-observable-hierarchy.yaml"]

