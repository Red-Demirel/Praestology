## Quantum Mechanics as Realized-Level Description
qm_status:
  description: >
    Standard quantum mechanics operates at the realized level (η, ρ, ∇S),
    describing the outputs of ψ's dynamics at Ξ=1.
    Praestology provides the process-level (ψ) foundation from which QM
    emerges as a regime-specific projection — correct within its domain,
    silent on the origin of its constants, and unable to dissolve the
    measurement problem because that problem is insoluble from the
    realized level by construction.
  key_points:
    - "ψ is the higher-order regime — the generating process"
    - "η = ∫R(ψ)dτ — committed topology; the realized integral of ψ"
    - "QM mistakes η (and ρ, ∇S) for fundamental reality"
    - "The measurement problem is insoluble from the realized level —
       it dissolves at the process level via R5 realization"
  see_also: ["derivative-reality-clarification.yaml",
             "../core/specifications.yaml#axiom"]

