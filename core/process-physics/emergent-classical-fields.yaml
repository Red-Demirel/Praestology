# ─────────────────────────────────────────────
# WEAK FORCE (TOPOLOGY SWITCHING)
# ─────────────────────────────────────────────

weak_force_emergence:
  regime: "Intermediate commitment density, topology-switching transitions"
  constraints:
    - "η moderate"
    - "Chiral flips, decay channels"
    - "Crossing viability threshold V_c"
  master_equation_reduction: >
    The viability operator R(ψ) mediates transitions between chiral
    states. The R_forward non-linearity allows topology change at
    S_lock threshold crossings — the same mechanism as vortex pair
    formation/dissolution, applied to chiral reorientation.
  emergent_equations: "SU(2) × U(1) electroweak theory (effective description)"
  gauge_symmetry: "SU(2) × U(1) — orientation space × phase"
  cc_connection: >
    The weak coupling constant is the CCR for chirality-flip transitions —
    the cost of reorienting the rotor across a stability threshold.
    The W/Z mass (Higgs mechanism) is the commitment cost of the
    SU(2) orientation space acquiring a stable ground state — the
    rotor finding a preferred orientation at the electroweak scale.
    Open derivation: parity-violation-from-r5 in open_derivations.
  ga_grade: >
    Rotor flip from bivector e₁₂ to conjugate bivector e₂₁ — a grade-2
    orientation change. Grade-3 pseudoscalar chirality changes sign.
    The W boson is a grade-2 → grade-2 transition mode;
    the Z boson is the neutral (grade-2 self-coupling) mode.

---

# ─────────────────────────────────────────────
# MADELUNG / QUANTUM HYDRODYNAMICS
# ─────────────────────────────────────────────

madelung_emergence:
  regime: "Low commitment, high Π_eff, full quantum coherence (Ξ=1)"
  constraints:
    - "η ≈ 0 (near-vacuum)"
    - "Π_eff ≈ Π₀ (approximately constant)"
    - "R_diss negligible (strongly protected topology)"
    - "Full grade-0/grade-2 split maintained (Hermitian R_forward only)"
  master_equation_reduction: >
    The GP equation with Hermitian R_forward reduces to the linear
    Schrödinger equation (low-η limit). Madelung decomposition
    ψ = √ρ·exp(iS) gives exact grade-0 and grade-2 projections.
    (See madelung-as-rotor-consequence.yaml for the full derivation.)
  emergent_equations: "Continuity + quantum Hamilton-Jacobi (Madelung)"
  gauge_symmetry: "U(1) phase symmetry — same as Maxwell but at rotor level"
  cc_connection: >
    The quantum potential Q = (Π_eff²/2)·(∇²√ρ/√ρ) is the amplitude-
    curvature cost of the rotor field — grade-0 × grade-2 coupling
    (see Q-as-grade-coupling open derivation). Q → 0 in the fluid limit
    (slowly varying ρ), recovering Euler. Q is the distinguishing
    feature of quantum vs classical hydrodynamics.
  ga_grade: >
    Rotor R = e^{-Iθ/2} generates phase S = θ (grade-2).
    Amplitude √ρ is grade-0.
    Q involves the Laplacian of grade-0 relative to grade-2 —
    the cost of amplitude variation in the rotor field.
    The clean grade split (grade-0 continuity, grade-2 Hamilton-Jacobi)
    holds exactly when R(ψ) = R_forward only (Hermitian).
    R_diss breaks this split — onset of decoherence and classical limit.
    (See commitment-response-process-physics.yaml Part III.)

