# ─────────────────────────────────────────────
# STRONG FORCE (QUARK CONFINEMENT)
# ─────────────────────────────────────────────

strong_force_emergence:
  regime: "Very high local commitment density (quark cores)"
  constraints:
    - "η near saturation (|ψ|²/n_sat → 1)"
    - "Triality-stabilised closures: D+D+A, D+A+A configurations"
    - "Short-range, topological confinement (< 1 fm)"
  master_equation_reduction: >
    The saturation term g·|ψ|²/(1+|ψ|²/n_sat) dominates with
    dV/d(|ψ|²) → 0, producing extreme restoring forces that resist
    separation of the winding arcs. The R_forward kernel enforces
    colour neutrality by requiring triality closure for stability.
  emergent_equations: "QCD (effective SU(3) gauge theory)"
  gauge_symmetry: "SU(3) — triality orientation space of three winding arcs"
  cc_connection: >
    The strong coupling constant α_s is the CCR for triality-stabilised
    closures — the cost of maintaining three winding arcs in mutual
    phase-lock. Running coupling (α_s decreasing at high energy) is
    CCR variation with Π_eff: at high energy density (high Π_eff),
    the embedding frequency Ω_embed increases faster than Ω_rotor,
    reducing CCR — asymptotic freedom. Open derivation: su3-from-triality.
  ga_grade: >
    Grade-2 bivector couplings between the three winding arcs.
    Grade-3 pseudoscalar determines chirality (handedness of the triality).
    Colour charge is the orientation of the grade-2 coupling bivector
    in the three-arc configuration space — three independent orientations
    corresponding to R, G, B colour assignments.
  residual_force: >
    The nuclear force (residual strong) is the flux tube fringe field
    extending beyond the colour-neutral hadron boundary — the grade-2
    field leaking past the confinement scale. Exactly analogous to
    van der Waals forces in chemistry (electron cloud leakage past
    the neutral atom boundary). Same mechanism, next scale up.
    See domains/physics/nuclear-binding.yaml for the nuclear-scale
    instantiation.

