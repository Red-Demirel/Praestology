fundamental_definitions:

  temperature:
    definition: >
      Temperature is the local R3 exploration rate — the Π_eff of the
      substrate at that location. High T: wide pathway width, rapid R3
      phase exploration, high R5 commitment frequency per unit committed
      time. Low T: narrow pathway width, restricted R3 updates, low R5
      firing rate.
    absolute_zero: >
      Asymptotic limit where Π_eff → 0. Local R3 exploration ceases;
      t = ∫Π_eff dτ stops accumulating; committed topology is frozen
      against further reconfiguration. Not a violation of uncertainty —
      uncertainty is grade-projection cost (forces-as-rotor-consequences.yaml),
      which remains at zero Π_eff as a geometric property of the rotor
      field, not a dynamic one.
    note: >
      Temperature ↔ Π_eff is directionally established from
      gravity-inertia-equivalence-from-r5.yaml #thermodynamics_pointer.
      Formal derivation connecting the statistical mechanics temperature
      parameter to Π_eff is open.

  heat_generation:
    definition: >
      Heat generation is channel overload: Praegress flow forced through
      a restricted local channel meets high impedance. The channel dilates
      (local Π_eff transiently widens) to pass the excess potential,
      spiking R5 firing rate and releasing accumulated Regress tension as
      thermal kinetic energy — disordered commitment events propagating
      outward into the surrounding substrate.
    connection: >
      Same mechanism as fluid turbulence in emergent-classical-fields.yaml:
      when the viability threshold is not reached by ordered flow, the field
      explores multiple configurations (R3 cascade) — disordered R5 events
      are thermal noise at the molecular scale.

  heat_transfer:
    definition: >
      Heat transfer is Π_eff equalisation across adjacent substrate regions.
      Regress tension propagates outward from high-Π_eff (high T) regions
      to low-Π_eff (low T) regions until the constraint landscape is uniform.
      Same directionality as inside-out-channeling.yaml: tension flows from
      wide channels to narrow channels, widening them.

  cooling:
    definition: >
      Cooling is local Π_eff suppression — narrowing of the R3 pathway width.
      Passive: η accumulation from ambient committed topology narrows pathways
      over time (standard radiative cooling).
      Active: forced R5 commitment events deposit η rapidly, depressing Π_eff
      by inside-out channeling. This is the Zeno cooling mechanism from
      quantum-zeno-as-commitment.yaml: high-frequency forced R5 firing → rapid
      η accumulation → Π_eff depression → T reduction.
    zeno_cooling_status: >
      Structural prediction — the mechanism is identified from the Zeno
      unification. Whether deliberate electromagnetic forcing at the right
      frequency can produce measurable Zeno cooling beyond standard laser
      cooling is an open experimental question. Candidate: optical cavity
      QED systems where photon-mediated R5 events can be rate-controlled.

