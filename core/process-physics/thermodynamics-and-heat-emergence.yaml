efficiency_and_carnot:
  carnot_reinterpretation: >
    The Carnot efficiency limit η_C = 1 − T_cold/T_hot = 1 − Π_eff,cold/Π_eff,hot
    is the structural consequence of irreversible R5 closures carrying Regress cost.
    Every conversion of thermal Praegress flow into directed macroscopic work requires
    some R5 events to commit irreversibly into η — this Regress cost cannot be
    recovered. The Carnot limit is the minimum unavoidable CCR transaction cost
    per conversion cycle.

  phase_anchoring:
    statement: >
      If incoming R3 proposals (reactant rotor orientations) are pre-aligned
      before the R5 gate — coherent phase orientation rather than random —
      the CCR mismatch cost at R5 is reduced. Less Regress is shed per
      commitment event → higher conversion efficiency → approaches Carnot
      limit from below.
    correction_from_v0.1: >
      Phase-anchoring approaches but does not exceed the Carnot limit.
      The limit is structural: irreversible R5 closures always carry some
      Regress cost. Perfect phase alignment would reach Carnot efficiency;
      it cannot exceed it without violating R5 irreversibility. Claims of
      "exceeding classical efficiency limits" are not supported by the
      framework's own structure.
    status: >
      Structural prediction — pre-alignment reducing CCR cost is consistent
      with established quantum thermodynamics results (coherence-enhanced
      efficiency in quantum heat engines, Scully et al. 2003 et seq.).
      The process-physics mechanism provides a generative account of why
      coherence helps. Formal derivation connecting phase alignment to
      CCR cost reduction is open.

