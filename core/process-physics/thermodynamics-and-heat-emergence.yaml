biological_chemical_extensions:
  epistemic_status: >
    The following are domain-level predictions derived from the thermal
    mechanism above. They are structurally consistent with the framework
    but extend into biology and chemistry where the process-physics
    connection requires additional derivation steps. Flagged as predictions,
    not established results.

  vascular_regulation:
    statement: >
      Vasoconstriction increases local tissue impedance — vessel geometry
      restriction narrows surrounding R3 pathway width, depressing local
      Π_eff (lower T, reduced metabolic rate). Vasodilation reduces
      impedance — opens pathway width, increasing Π_eff (higher T,
      elevated metabolic rate).
    process_mechanism: >
      The vascular system actively modulates local η via geometry:
      a narrower vessel forces flow through a higher-impedance channel,
      which by inside-out channeling reduces the surrounding Π_eff.
      This is the biological analog of Zeno cooling (narrowing channel)
      and thermal dilation (widening channel) at the tissue scale.
    status: "DOMAIN PREDICTION — mechanism consistent; quantitative connection open"

  chemical_kinetics:
    modified_eyring_polanyi:
      formula: "k_R5 = Π_eff · exp(−(V_c − Φ_proposals) / I_sub)"
      variables:
        k_R5: "Process-level reaction rate (R5 commitment events per unit time)"
        Π_eff: "Local pathway width — substrate R3 exploration rate"
        V_c: "Viability threshold for R5 selection"
        Phi_proposals: "Coherent phase alignment of incoming R3 reactant rotors"
        I_sub: "Substrate impedance — CCR transaction cost per R5 event"
      interpretation: >
        Standard Eyring-Polanyi k = (k_BT/h)·exp(−ΔG‡/RT) maps to this as:
          k_BT/h ↔ Π_eff (thermal exploration rate = local Π_eff)
          ΔG‡/RT ↔ (V_c − Φ_proposals)/I_sub (activation cost = CCR mismatch
            between reactant phase alignment and viability threshold)
        Pre-exponential factor (transmission coefficient κ) ↔ rotor orientation
        match between reactant topology and transition-state CCR.
      predictions: >
        Testable signatures at the chemistry level:
          - Non-Markovian memory in transition states: if Φ_proposals retains
            phase coherence longer than standard thermal decoherence predicts,
            the reaction rate shows memory effects — correlated fluctuations
            in k_R5 over multiple cycles.
          - Suppressed activation energy in phase-aligned reactions: coherent
            reactant preparation (Φ_proposals → V_c) reduces effective ΔG‡,
            measurable as rate enhancement above standard Arrhenius prediction.
          - Enzymatic coherence: enzymes may function by maintaining local
            high-Π_eff pockets that preserve Φ_proposals — consistent with
            observed quantum coherence in biological catalysis (Fleming et al.,
            FMO complex; Klinman, hydrogen tunneling in enzymes).
      status: "DOMAIN PREDICTION — formula structurally motivated; numerical
               calibration of I_sub and V_c against experimental rates open"

