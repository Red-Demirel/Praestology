ccr_derivation_path:
  statement: >
    The following is the derivation path for establishing CCR from
    first principles. It is NOT a derivation of the number 137.036.
    It is a derivation of the structural ratio that stable Möbius
    topology imposes, expressed in terms computable from the GP equation
    and the Calugareanu-White theorem.

  step_1_equilibrium_shape:
    status: "Open — priority 1"
    goal: >
      Solve for the equilibrium shape of the Möbius 720° vortex
      in the GP field with saturating nonlinearity:
        iħ∂ψ/∂t = [−(ħ²/2m)∇² + V + g(ρ)|ψ|²]ψ
      with g(ρ) as the saturating interaction (commitment-response
      function, not simple cubic nonlinearity).
      This is a calculus of variations problem — the equilibrium
      configuration minimises the GP energy functional subject to
      the Möbius topological constraint (720° non-orientable boundary
      condition on the phase field).
    what_is_determined: >
      The equilibrium vortex shape determines the writhe Wr of the
      centreline. The shape is not spherical — the 720° twist and
      non-orientability impose a specific 3D geometry that encodes Wr.

  step_2_writhe_computation:
    status: "Open — priority 1"
    goal: >
      Apply Calugareanu-White-Fuller theorem to compute Wr for
      the equilibrium configuration from step 1:
        Lk = Wr + Tw
        Tw = ½ (fixed by Möbius non-orientability)
        Lk = Wr + ½
      Wr is the geometric writhe of the centreline — computable
      from the centreline shape via:
        Wr = (1/4π) ∮∮ (dr₁ × dr₂) · (r₁ - r₂)/|r₁ - r₂|³
      For the equilibrium Möbius configuration, this integral should
      yield a specific value determined by the GP field geometry.
    key_question: >
      Does the equilibrium GP Möbius configuration give a writhe Wr
      that makes Lk = Wr + ½ = a specific value related to α⁻¹/(4π)?
      This is the central open mathematical question.

  step_3_self_energy_ratio:
    status: "Open — follows from step 2"
    goal: >
      Compute the self-energy of the Möbius 720° vortex relative
      to the capacitative dipole saturation energy:
        E_self(Möbius) / E_sat(dipole 360°) = f(Wr, ξ, ρ_s)
      The self-energy includes: standard log(R/ξ) term + topological
      self-energy from the non-orientable twist (the Lk contribution).
      The ratio f is what becomes S_burden/S_cap,sat in the α formula.

  step_4_CCR_value:
    status: "Follows from step 3 — identifies α_int"
    goal: >
      From f(Wr, ξ, ρ_s), establish:
        α_int = f / (4π)
        α_int⁻¹ = 4π / f
      This is the bare CCR — the self-integral coupling efficiency
      of an isolated Möbius vortex in perfect vacuum (Π_eff = Π_eff,vac).
    candidate_expressions: >
      The five candidates from alpha-from-vortex-stability.yaml are
      different geometric expressions of f:

      Candidate 1 — Phase-locking safety margin:
        α⁻¹ = 4π × N_stable,  N_stable = 10.90498...
        N_stable is the number of external dipole-equivalent phase-lock
        steps required to sustain the Möbius self-coupling — derivable
        from the GP stability eigenvalue spectrum.

      Candidate 2 — Pi-series (currently preferred geometric candidate):
        α_int⁻¹ = 4π³ + π² + π = π(4π² + π + 1) = 137.036304
        Interpretation:
          Outer π: projection factor (crossover → external substrate basis)
          4π²:     full external dipole phase space (720° → two solid angles)
          π:       internal loop accumulation (first 360° before crossover)
          1:       minimum topological unit (the crossover point itself)
        Gap to CODATA: 137.036304 − 137.035999 = 0.000305 (2.2 ppm)
        Interpretation: α_int⁻¹ = pi-series; CODATA measures α_exp⁻¹
        with Π_eff depression. The gap is the self-depression correction.
        Status: numerical conjecture — becomes a result only if the
        writhe calculation in step 2 independently produces N_stable =
        10.90498 without knowing the numerical target.

      Candidate 3 — Critical angle:
        α⁻¹ = 4π / sin(θ_crit),  θ_crit = 5.254°
        The critical stability angle of the Möbius winding axis relative
        to the dipole propagation plane.

      Candidate 4 — Winding-number ratio:
        α⁻¹ = 4π / (n_chiral/n_dipole)²,  ratio ≈ 0.303
        Ratio of minimum stable chiral winding to dipole reference winding.

      Candidate 5 — Topological linking number:
        α⁻¹ = 4π × χ_eff,  χ_eff = 10.905 = N_stable
        Identical numerical requirement to candidate 1.
        If χ_eff from the CWF theorem equals the pi-series value,
        candidates 2 and 5 are measuring the same invariant in two
        different geometric languages — a deep confirmation.
    honest_assessment: >
      No existing mathematical result gives the self-linking number of
      a Möbius vortex in a GP field as a specific multiple of π.
      The path is identified; the calculation has not been done.
      All candidates are numerical conjectures until step 2 is completed
      independently of the numerical target.

  step_5_Π_eff_correction:
    status: "Structural prediction — magnitude requires step 4"
    goal: >
      Compute the leading-order Π_eff depression correction:
        α_exp⁻¹ = α_int⁻¹ − δ(Π_eff)
      where δ(Π_eff) encodes the self-depression of local free potential
      by the electron's own committed topology and the measurement apparatus.
      If pi-series is correct: δ = 0.000305 at the CODATA measurement scale.
      The sign is fixed: apparatus commitment depresses local Π_eff →
      increases effective Z_eff → slightly modifies the coupling projection.
      Direction: α_exp < α_int (measured coupling slightly stronger than bare).
    prediction: >
      Different measurement techniques have different Π_eff depression
      profiles. The small spread between precision α measurements
      (g-2 vs atom interferometry vs Josephson) is partly real signal
      of substrate depression, not purely experimental systematic error.
      Each technique's self-depression profile is predictable from the
      apparatus's committed topology — this is testable with sufficient
      precision if CODATA 2022 updates shift the spread.

