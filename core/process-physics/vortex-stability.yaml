# ─────────────────────────────────────────────────────────────
# PART II: CCR — THE STABILITY CONDITION
# ─────────────────────────────────────────────────────────────

CCR_as_stability_condition:

  definition:
    formula: "CCR = (Wr · Ω_rotor) / Ω_embed"
    terms:
      Wr: >
        Writhe of the vortex filament — the self-linking of the
        Möbius centreline in the embedding space. From the
        Calugareanu-White-Fuller decomposition: Lk = Wr + Tw.
        For the Möbius 720° vortex: Tw = ½ (half-integer, the
        defining property of the non-orientable surface).
        Wr is the geometric part of the self-linking — depends
        on the specific equilibrium shape of the vortex in the GP field.
        This is the key open computation: what is Wr for the stable
        Möbius 720° configuration in the GP equation with saturating
        nonlinearity?
      Omega_rotor: >
        Phase rotation rate of the self-integral at the crossover —
        the internal coupling frequency at the Möbius intersection point.
      Omega_embed: >
        Natural frequency of the embedding substrate — the GP field's
        characteristic oscillation scale set by Π_eff and the local
        commitment density.
    what_CCR_is_not: >
      CCR is not a fixed number. It is a ratio evaluated under specific
      substrate conditions. In the cosmological standard environment
      (Π_eff = Π_eff,std), CCR evaluates to the value that corresponds
      to α_int. In a depressed-η measurement environment, it evaluates
      to the value that corresponds to α_exp. The "running of α" with
      energy scale is the running of Π_eff — the same CCR, different
      local substrate conditions.

  alpha_as_CCR:
    statement: >
      In the context of electromagnetic interaction, α is the CCR of
      the stable Möbius topology expressed as a ratio to the capacitative
      saturation threshold:

        α = CCR / (4π · S_cap,sat / S_burden)

      or equivalently, using the alpha-rydberg-z0.yaml primary path:

        α = S_burden / (4π · S_cap,sat)

      where:
        S_burden   = substrate cost of the Möbius self-integral loop
                     (the full topological commitment of the 720°
                     non-orientable winding including crossover coupling)
        S_cap,sat  = capacitative saturation threshold (photon-mode
                     maximum phase capacity before topology reorganises)
        4π         = isotropic geometry factor from R5 (substrate
                     isotropy — the crossover coupling radiates into
                     the full 4π steradians of surrounding substrate)

    direction_of_argument: >
      The direction is: CCR structural requirement → stable Möbius
      configuration → S_burden/S_cap,sat ratio → α.
      NOT: assume α, fit topology to match.
      The CCR is what the Möbius stability condition imposes.
      α is what you measure when you probe that condition from outside
      using photons (capacitative modes) as the coupling reference.

  why_4pi_factor:
    status: "Stated from R5 — formal GP field derivation open"
    statement: >
      R5 requires substrate isotropy: no preferred direction in the
      process field. The internal crossover coupling radiates into
      the full spherical substrate surrounding the vortex. The
      isotropic measure of the surrounding phase space is 4π steradians.
      The coupling ratio is therefore normalised by 4π — the crossover's
      coupling to the full isotropic substrate is S_burden / (4π · S_cap,sat).
    open: >
      Formal derivation of the 4π factor from the GP field geometry —
      showing explicitly that the spherical integration of the GP
      coupling kernel around the Möbius crossover yields the 4π factor.
      Expected to follow from the Green's function of the GP equation
      in 3D at the vortex core scale.

