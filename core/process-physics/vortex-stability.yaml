# ─────────────────────────────────────────────────────────────
# PART I: TOPOLOGY — WHAT STABLE COMMITTED STRUCTURES ARE
# ─────────────────────────────────────────────────────────────

topology:

  two_fundamental_modes:
    statement: >
      The process field admits two topologically distinct stable
      vortex configurations. All stable committed structures at the
      particle level are variants or composites of these two.

    capacitative_mode:
      name: "Dipolar-capacitative (photon-type)"
      topology: "360° orientable dipole pair — opposite circulations"
      S_net: "≈ 0 — perfect external strain cancellation"
      self_coupling: "None — two vortices in external alignment only"
      statistics: >
        Bosonic: two capacitative modes can occupy the same substrate
        region — their strain fields cancel additively.
      persistence: >
        Unstable if one partner is disturbed. No internal degree
        of freedom — only relative phase between the two partners.
        Stores and releases phase completely; no residual internal
        state after emission.
      CCR_value: >
        CCR_cap = reference value — the saturation threshold
        S_cap,sat defines the unit against which the self-integral
        CCR is measured.

    self_integral_mode:
      name: "Möbius self-integral (electron-type)"
      topology: "720° non-orientable — Möbius band embedded in GP field"
      S_net: "> 0 — net chirality from Möbius handedness"
      self_coupling: >
        Intrinsic: at the Möbius crossover point (where the band
        intersects itself after the first 360°), the current phase
        of the vortex couples to the phase it had 360° earlier.
        This is not proximity coupling between two objects.
        It is topology coupling to its own history.
      statistics: >
        Fermionic: two self-integrals cannot occupy the same substrate
        region — they would be forced to share an integration variable,
        merging into a single topology. Pauli exclusion is a topological
        necessity, not a separate quantum postulate.
      charge: "Direction of self-integral coupling (chirality of Möbius twist)"
      spin_half: >
        The 720° requirement for phase return — double traversal
        because self-reference requires it. The first 360° brings
        the phase back to the crossover with a sign flip;
        the second 360° returns it to the original orientation.
        Spin-½ is not postulated — it is the phase return condition
        of the non-orientable topology.
      mass: >
        Commitment density of the self-integral loop — the substrate
        cost of maintaining the Möbius self-coupling continuously.
        Nonzero because the non-orientable topology requires continuous
        Regress commitment to sustain the crossover coupling.

  crossover_as_em_coupling_point:
    statement: >
      The Möbius crossover point is physically the electromagnetic
      coupling point. It is where the electron emits and absorbs photons.
      The photon (external dipole pair) couples to the electron at this
      crossover, where the electron's internal loop presents an external
      face to the substrate.
    why_alpha_is_small: >
      The crossover is one point on the full 720° Möbius path.
      α ≈ 1/137 means that per complete phase rotation, the crossover
      coupling produces 1/137 of a unit interaction. The smallness is
      the geometric consequence of one self-intersection per 4π × CCR
      steradians of phase space. Not mysterious — it is the ratio of
      one topological point to the full coupling volume it must project
      across.
    symmetry: >
      Electron and positron have the same α: chirality determines charge
      sign, but the Möbius self-intersection topology is identical
      regardless of twist direction. The coupling magnitude is set by
      the topology, not the chirality.

