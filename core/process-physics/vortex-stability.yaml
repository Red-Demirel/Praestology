stability_mechanism:
  statement: >
    A stable vortex is not a frozen static object. It is a dynamic
    equilibrium sustained by the substrate's ongoing Regress motion.
    Topological protection prevents discontinuous unwinding;
    the Tik background prevents continuous diffusive unwinding.
    Three stabilisation contributions, two destabilising forces.

  destabilising:
    diffusive_unwinding: >
      τ_decay ∝ 1/(D · ∇²ω) — phase coherence erodes through
      diffusion in the η field. Tighter core → faster unwinding.
      The substrate grain ξ sets the minimum core size.
    topological_tunnelling: >
      Tik-induced tunnelling through the topological barrier —
      same mechanism as quantum tunnelling (foundations.yaml pillar 6)
      applied at the vortex topology level. Rate is extremely low for
      stable particles; high for unstable resonances.

  stabilising:
    zero_point_floor:
      statement: >
        Always present. η-independent at leading order.
        The minimum Tik amplitude — the substrate's intrinsic
        granularity — provides continuous stochastic counter-torque
        that prevents monotonic phase decoherence.
      connection_to_hbar: >
        ħ = minimum counter-torque per cycle. The zero-point floor
        is the physical origin of ħ as a stability threshold —
        not a postulated constant but the minimum action required
        to refresh one complete vortex phase cycle against diffusion.
        This is the direction toward the open derivation:
        planck-from-vortex-stability.yaml.

    thermal_tik:
      statement: >
        Temperature-dependent amplitude above zero-point floor.
        U-shaped lifetime curve: optimal Tik amplitude at T_optimal
        (counter-torque matches diffusion rate); destabilising above
        S_lock (chaotic disruption exceeds refresh rate).
      testable: >
        BEC vortex pair lifetime vs fluctuation amplitude should
        show the U-shaped curve. T_optimal encodes S_lock directly
        — measuring T_optimal gives S_lock for that analog system.

    environmental_dynamics:
      statement: >
        Structured, correlated substrate motion (phonons, GW,
        turbulent cascades, biological vibrational modes) providing
        phase-coherent potential beyond stochastic Tik.
        Resonance condition: ω_env ≈ n · ω_vortex (integer n).
        On-resonance: coherent refreshing — the environment actively
        sustains the vortex. Off-resonance: adds to background Tik.
      CCR_connection: >
        The resonance condition ω_env = n · ω_vortex is the same
        integer closure condition as the CCR at the environmental
        coupling scale. Environmental resonance is not a separate
        effect — it is CCR closure at the extrinsic coupling frequency
        rather than at the internal Möbius crossover frequency.

  phase_lock_condition:
    formula: "Δθ = 2π·n  (n ∈ ℤ)"
    statement: >
      Stable closure requires integer multiple of 2π phase winding.
      This is not postulated — it follows from the topology of the η
      field phase: non-integer winding produces destructive
      self-interference and decays to the nearest integer.
      This is the same condition as angular momentum quantisation
      L = nħ in atomic physics — the same phase closure requirement
      at different scales. One condition, two conventional labels.

  binding_energy:
    formula: "E_bind ≈ Γ²/(8π·ρ_s) × log(Λ/ξ)"
    terms:
      Gamma: "Γ = 2πħ/m_eff — minimum circulation quantum"
      rho_s: "ρ_s — substrate commitment density"
      Lambda: "Λ — pair separation scale"
      xi: "ξ — substrate grain size (GP coherence length)"
    statement: >
      Logarithmic binding energy — same form as the KT vortex pair
      energy (Kosterlitz-Thouless), confirmed experimentally in 2D BECs
      and superfluid films (Hadzibabic et al. 2006, Nobel 2016).
      The KT transition is the collective manifestation of this
      binding energy at the macroscopic level — direct empirical
      confirmation of the formation and persistence mechanism.

