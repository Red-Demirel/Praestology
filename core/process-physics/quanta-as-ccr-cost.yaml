# /core/process-physics/quanta-as-ccr-cost.yaml
name: "Quanta as Indivisible Units of CCR Cost – R3→R5 Closure Events"
version: "2.1"
status: "Structural clarification — core-invariant; grade assignment corrected"
domain: "Core / Process-Physics"
changes_from_v2.0: >
  Corrected grade assignments in heisenberg_as_conjugate_grade_projection:
  position and momentum grades are level-dependent — Madelung projection
  gives grade-0/grade-1; full GA rotor gives grade-1/grade-2. Both are
  correct at their respective levels; the file now states which level
  each assignment belongs to, consistent with forces-as-rotor-consequences.yaml
  and madelung-as-rotor-consequence.yaml. Added precision caveat to ħ
  constancy implication: predicted variation is at or below current
  measurement precision in laboratory environments; the 2.2 ppm α
  discrepancy is the scale template.

description: >
  A quantum is the indivisible unit of CCR cost per R3→R5 closure event.
  It is the minimum rotor phase-space reconfiguration that crosses the
  viability threshold V_c and writes a permanent increment to hysteresis (η).
  The unit itself is invariant — it does not vary with environment. What
  varies is the observable projection: the local Π_eff, η density, inertia
  (Praegress stress), and tension (Regress release) profile at the moment
  R5 fires. The statistical distribution of quanta in observation is a map
  of local projection conditions, not of uncertainty in the quantum itself.

