heisenberg_as_projection_artifact:
  statement: >
    Δx·Δp ≥ ħ/2 is the minimum information loss from projecting a
    determinate rotor state onto incompatible grade bases. Not ontological
    uncertainty — geometric projection cost.
  grade_assignments:
    position: "Grade-1 vector — rotor's spatial location"
    momentum: "Grade-2 bivector — rotor's phase gradient ∇S"
  mechanism: >
    The geometric product xp = ⟨xp⟩₀ + ⟨xp⟩₂ contains both scalar
    and bivector parts. A grade-restricted observer measuring one grade
    at a time cannot reconstruct the full multivector. The product of
    projection errors is bounded below by ħ — the minimal discrete step
    in rotor phase space.
  implication: >
    A process-level observer with direct access to both grade-1 and
    grade-2 components simultaneously would experience no uncertainty.
    The conjugate variables are unified in the rotor; separated only
    by derivative-level projection.
  open_derivation:
    id: "uncertainty-from-grade-projection"
    description: >
      Derive Δx·Δp ≥ ħ/2 from Cl(3,0) grade projection geometry,
      showing ħ as minimal rotor phase-space step.
    depends_on: ["planck-from-vortex-stability", "geometric-algebra-bridge.yaml"]

