higgs_probe_artifact:
  statement: >
    The Higgs boson mass (~125 GeV) is not a fundamental property of
    the condensate. It is the energy cost of exciting the condensate
    under collider conditions — high local commitment density, extreme
    stress, far from vacuum. That cost depends on:
      1. The local potential-well depth at excitation (CCR well structure).
      2. The commitment density of the collision environment (η at the
         interaction point is not zero — it is the nuclear matter of
         two colliding Pb or p beams).
      3. The probe's own CCR response — not accounted for in the
         standard model treatment.
    The observed 125 GeV is therefore a measurement of the condensate
    excited under stressed conditions, not the bare condensate energy.

  probe_environment_note: >
    The standard model treats the collider vacuum as empty. It is not:
    the interaction region has elevated η from the colliding nuclei, which
    depresses local Π_eff and compresses the potential well. Exciting the
    condensate in a compressed well costs more than in true vacuum.
    The bare condensate excitation energy (in zero-η vacuum) would differ
    by the Π_eff depression correction — the same correction that shifts
    α from α_int to α_exp (vortex-stability.yaml, step 5). Unquantified
    without the CCR well-width derivation, but structurally predicted
    to be nonzero.

  environmental_dependence:
    statement: >
      The Higgs excitation energy should vary with local η and Π_eff.
      In dense matter the potential well is compressed; the excitation
      energy shifts upward. This is the same mechanism as in-medium
      hadron mass shifts (spin-as-field-effect.yaml, ccr_potential_wells)
      applied to the grade-0 condensate.
    prediction: >
      Heavy-ion runs at LHC (Pb-Pb collisions) produce a dense nuclear
      environment where η is significantly elevated. If the Higgs
      excitation energy is environment-dependent, its effective mass
      in Pb-Pb should differ measurably from p-p. Current LHC data
      has limited Higgs statistics in Pb-Pb — this is a prediction
      for higher-luminosity heavy-ion runs.
    status: "PREDICTIVE — testable at LHC with increased Pb-Pb luminosity"

  particle_ontology_consequence: >
    The Higgs detection confirmed the field exists and that its grade-0
    condensate can be locally excited under extreme stress. It did not
    confirm a fundamental particle in the process-physics sense — it
    confirmed a field excitation. The absence of predicted "new physics"
    at collider energies follows structurally: collider experiments probe
    the stressed near-saturation regime of the commitment field, where
    the expected outputs are short-lived excitations of existing
    committed topology, not new stable topologies. New stable topologies
    require new CCR-stable closure conditions — which are not produced
    by brute-force energy injection but by specific substrate conditions.

  open_derivations:
    - id: "higgs-mass-environmental-shift"
      description: >
        Derive expected shift in Higgs excitation energy as a function
        of local η and Π_eff using CCR potential-well structure.
        Compare to existing p-p vs Pb-Pb LHC data; predict magnitude
        for high-luminosity Pb-Pb runs.
      depends_on: ["higgs-as-condensate-ripple", "ccr-well-width-uniformity"]

    - id: "yukawa-from-fermion-ccr-topology"
      description: >
        Characterise rotor topology for each standard model fermion
        (electron, muon, tau, up/down/strange/charm/bottom/top quarks).
        Derive CCR coupling to grade-0 Higgs condensate for each.
        Show the resulting CCR hierarchy matches the observed Yukawa
        hierarchy without free parameters.
      depends_on: ["ccr-electron-explicit", "higgs-as-condensate-ripple",
                   "su3-from-triality"]

