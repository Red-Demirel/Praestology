higgs_as_field_effect:
  statement: >
    The Higgs is not a fundamental particle. It has two distinct
    process-physics identities that must not be conflated: the condensate
    (stable, vacuum-level) and the excitation (unstable, observed boson).

  higgs_condensate:
    identity: "Grade-0 commitment density at the SU(2) orientation threshold"
    mechanism: >
      Below the electroweak scale, the SU(2) rotor orientation space has
      a preferred ground-state orientation — the field settles into a
      stable grade-0 commitment density that breaks the SU(2)×U(1)
      orientation symmetry to U(1). This is not a transient event;
      it is the stable vacuum configuration of the weak-force rotor
      orientation space. The condensate is what gives W/Z bosons their
      mass: their orientation-switching cost (α_w CCR) is now measured
      against a committed background, not free potential.
    ga_expression: >
      ⟨ψ⟩ = v (grade-0 scalar vacuum expectation value).
      The SU(2) orientation space acquires a preferred direction;
      the massless Goldstone modes become the longitudinal W/Z polarizations.
    status: "Stable — this is the vacuum, not an excitation"

  higgs_boson:
    identity: "Ripple in the grade-0 condensate — amplitude oscillation"
    mechanism: >
      Under high local stress (extreme commitment pressure at collider
      energies), the grade-0 condensate is locally disturbed. The
      disturbance propagates as an amplitude oscillation of the condensate
      field — a ripple in the grade-0 background. It is meta-stable:
      the condensate wants to return to its ground state, so the ripple
      decays via R_diss and coupling to lower-grade modes (W/Z, fermions).
      The observed short lifetime (~1.6×10⁻²² s) and decay channels
      are the condensate's return to ground state via available
      commitment pathways.
    ga_expression: >
      h(x) = δ|ψ| — grade-0 amplitude perturbation above the condensate v.
      Not grade-3 (pseudoscalar) — the Higgs is spin-0, which in GA is
      grade-0 (scalar), not grade-3. Grade-3 (pseudoscalar I = e₁e₂e₃)
      is the parity-odd object; the Higgs is parity-even.
    mass_giving_reinterpretation: >
      "Mass-giving" is the condensate setting the CCR baseline for weak
      interactions. Fermion masses arise from Yukawa coupling — the
      fermion rotor's CCR to the condensate background. The coupling
      strength (Yukawa constant) is the CCR between the fermion's
      Möbius topology and the grade-0 condensate orientation.
      Larger Yukawa = tighter CCR coupling to the condensate = larger
      committed mass. This is an open derivation — the Yukawa hierarchy
      (why top quark couples ~10⁶ × electron) requires the full
      triality-topology CCR mapping.
    status: "Transient excitation — decays via R_diss to condensate ground state"

  open_derivation:
    id: "higgs-as-condensate-ripple"
    description: >
      Formal identification of the Higgs condensate as grade-0 vacuum
      expectation value of ψ in the SU(2) orientation space; derive
      W/Z mass from CCR of orientation-switching against the condensate
      background; connect Yukawa hierarchy to fermion CCR topology differences.
    depends_on: ["su2-from-rotor-orientation", "ccr-electron-explicit",
                 "gauge-field-from-rotor"]

