pre_gauge_effects:
  statement: >
    Gauge symmetry describes the committed state (η). It is silent on
    the R3→R4 transition where streams explore, curve, and achieve
    phase-lock before R5 selection confirms viability. These transition-
    layer effects are structurally necessary but invisible to gauge symmetry.

  probe_epistemics_note: >
    Observable signatures below are subject to the same constraint as
    cosmological observables (friedmann-emergence.yaml probe_epistemics):
    the measurement probe is itself subject to the substrate dynamics
    being measured. Predictions marked PREDICTIVE assume the probe CCR
    response is separable from the signal — which requires verification
    per experimental context.

  effects:
    counter_rotating_vortex_alignment:
      name: "Counter-rotating vortex alignment (photon coherence)"
      description: >
        Counter-rotating vortices maintain phase coherence via shared
        Π_eff field coupling their phase gradients — viability-selected,
        not gauge-enforced. The standard model describes this as photon
        polarization and quantizes it as a gauge eigenstate. The rotor
        framework describes it as a viability-selected coupled rotor
        state existing in the transition layer before R5 commitment.
      observable_signature: >
        Prolonged coherence in high-Π_eff, low-ρ_η environments where
        R5 selection is delayed. Standard physics predicts decoherence
        on interaction timescales; the rotor framework predicts extended
        coherence where Π_eff is high enough to sustain the transition
        layer. Measurement of coherence is itself mediated by the probe's
        own CCR response to the same Π_eff environment — probe and signal
        are not independent.
      status: "PREDICTIVE — testable in high-Π_eff regime; probe separation required"

    mobius_closure_selection:
      name: "Vortex encircling and closure (720° Möbius formation)"
      description: >
        The 720° Möbius closure is the viability-selected outcome of
        stream dynamics, not a fixed geometric property of spin-½.
        The stream curves under Π_eff gradients, self-reinforces through
        g|ψ|², and achieves closure at the angle where the saturation
        term bounds further commitment. Alternative closures (360°,
        1080°) are explored (R3) and rejected (R5) as non-viable under
        standard V_c. The 720° angle is the specific closure satisfying
        Wr = 1 (minimal stable self-linking) under local V_c.
      observable_signature: >
        Deviations from spin-½ behavior in extreme Π_eff gradients
        (near black hole horizons, dense matter) where V_c shifts and
        alternative closures may become viable. Standard physics predicts
        fixed spin; rotor framework predicts environment-dependent
        effective spin structure.
      status: "PREDICTIVE — testable in extreme-suppression regime"

    phase_locking_precursor:
      name: "Phase-locking precursor (pre-R4 bivector coupling)"
      description: >
        Before R4 locks a specific phase, the rotor explores multiple
        orientational phases (R3). During exploration, bivector components
        of nearby streams can couple transiently, producing correlated
        phase fluctuations not corresponding to any committed gauge state.
        Gauge symmetry has no description for this regime — it applies
        only after commitment.
      observable_signature: >
        Anomalous correlations in weak-measurement experiments where
        measurement is delayed, preventing early R4 commitment. Standard
        physics predicts no correlation beyond entanglement; rotor
        framework predicts additional bivector coupling from the
        pre-commitment regime.
      status: "PREDICTIVE — testable in weak-measurement regime"

