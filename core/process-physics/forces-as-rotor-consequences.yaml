gauge_symmetries_emergence:
  statement: >
    Gauge symmetries are stable collective patterns emerging from multi-rotor
    interactions in the single field at different commitment regimes. They are
    not fundamental — they are the derivative-level catalogue of what rotor
    topology does at each density scale. The generative mechanism is
    multi-rotor dynamics and commitment gradients of ψ.

  u1_electromagnetic:
    regime: "Low-η, linear phase gradient"
    mechanism: >
      Coherent phase gradients of chiral rotors — simple bivector dynamics.
      U(1) is the residual symmetry of phase rotation when the rotor's
      grade-2 bivector is projected onto a single complex phase.
      It appears as a symmetry because the projection discards the
      bivector's orientation, leaving only the phase angle free.
    ga_origin: "Grade-2 bivector → grade-1 phase gradient projection"

  su2_weak:
    regime: "Moderate-η, topology-switching near V_c"
    mechanism: >
      Paired rotor reorientations near commitment thresholds — the orientation
      space of the SU(2) spinor rotor. When two rotor orientations are
      energetically close (near V_c), the field explores both before R5
      selects. The SU(2) doublet structure is the two-dimensional orientation
      space of that exploration. Topology-switching instabilities (chirality
      flips) are the W/Z excitations.
    ga_origin: "Grade-2 bivector orientation space; rotor conjugation R → R'"

  su3_strong:
    regime: "High-η, near-saturation, triality closure"
    mechanism: >
      Flux confinement and phase-locking in triple-vortex ensembles.
      Three winding arcs must close mutually — each arc's orientation
      is constrained by the other two. The SU(3) structure is the
      orientation space of three mutually-constrained grade-2 bivectors.
      Colour charge is which of the three orientation axes is active.
      Confinement is topological necessity: partial arc separation
      increases CCR mismatch cost without bound.
    ga_origin: "Three mutually-constrained grade-2 bivectors; triality closure"

  derivative_level_note: >
    The gauge formalism (U(1), SU(2), SU(3)) is an effective derivative-level
    catalogue. It correctly describes the symmetry structure of the committed
    outputs. It does not describe the generating mechanism — the multi-rotor
    dynamics and commitment gradients that produce those symmetries.
    gauge-symmetry-reinterpretation.yaml covers this transition in detail.

