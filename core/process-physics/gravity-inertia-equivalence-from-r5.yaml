constraint_narrowing_mechanism:
  reference: "core/inside-out-channeling.yaml — full mechanism there"
  summary: >
    High η density → low local Π_eff (viable R3 pathway width suppressed)
    → R5 threshold V_c relatively easier to cross in that region
    → R3 paths propagating through varying Π_eff refract toward lower
    Π_eff → committed structure attracts more commitment → self-reinforcing.
    No repulsive counterpart at classical scale: gravity is always attractive
    because constraint narrowing always reduces Π_eff further — there is no
    process mechanism that would widen pathways by adding commitment.

  time_dilation: >
    t = ∫Π_eff(τ)dτ (gp-as-derivative-layer.yaml #t_emergence).
    Dense η depresses Π_eff → R5 fires less frequently → t accumulates
    slower locally → gravitational time dilation. Not a geometric effect
    of curved spacetime but suppressed R5 cycle rate from inside-out
    channeling. The metric quantity g₀₀ ∝ Π_eff² encodes the same
    suppression at the derivative level.

