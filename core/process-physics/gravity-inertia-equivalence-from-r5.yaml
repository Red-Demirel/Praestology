alexander_et_al_2026:
  reference: >
    Alexander, Temple & Vogler (2026). "The instability of critical and
    underdense Friedmann spacetimes at the Big Bang as an alternative to
    dark energy." Proceedings of the Royal Society A, 482(2338): 20250912.
  summary: >
    Mathematical proof that all Friedmann spacetimes are unstable to radial
    perturbation at every order. Homogeneity is measure-zero; any deviation
    grows. Proposed mechanism: self-similar expanding wave solution to
    Einstein-Euler equations, seeded at the Big Bang, producing apparent
    acceleration as an observational effect of inhomogeneous local structure —
    no cosmological constant required.
  alignment:
    confidence: "STRUCTURAL CONSISTENCY — not confirmation of mechanism"
    statement: >
      Both frameworks conclude: locally-seeded inhomogeneous structure-building
      is the generic physical case. Alexander et al. derive this from within GR;
      Praestology derives it from R5 locality and inside-out commitment.
      Independent starting points, same structural result.
    what_cannot_be_claimed: >
      The framework does not predict their specific wave solution; their
      mathematics does not confirm Praegress/Regress or constraint-narrowing.
  copernican_note: >
    Alexander et al.'s "special place" tension does not arise here: every
    participant has an outward-directed view from their own committed position
    (participant-centric-ontology.yaml). No view from nowhere, no privileged
    center paradox — each R5 event defines its own relational geometry.
  difference: >
    Alexander et al. identify that the homogeneous background is unstable
    without identifying what generates the inhomogeneous replacement.
    The framework provides the candidate generating mechanism: R5 commitment
    events firing locally under constraint narrowing, building committed
    structure outward. Compatible but independent claims at different levels.

