core_claim:
  statement: >
    Gravity and inertia are not two phenomena that happen to be equivalent
    (the equivalence principle, empirically confirmed but never derived).
    They are the same mechanism described from opposite sides of R5:
    gravity is the shape of the constraint landscape in the explorative
    regime — the narrowing of available R3 paths toward regions of high
    η density (inside-out channeling). Inertia is what that same locked
    potential looks like once R5 has fired: the committed structure's
    resistance to reconfiguration, proportional to the depth of the R5
    commitment event that produced it.

  equivalence_principle_derived: >
    Gravitational mass (how strongly a structure depresses local Π_eff
    and narrows the constraint landscape) and inertial mass (how much
    reconfiguration resistance that structure carries) are equal because
    they are not two independent properties. They are two readings of
    the same quantity: the depth of the R5 commitment event, measured
    from opposite sides of the commitment boundary.
      Pre-R5 (explorative): depth manifests as Π_eff depression →
        constraint narrowing → refraction of new R3 paths → gravity
      Post-R5 (committed): depth manifests as η increment →
        reconfiguration resistance → inertia
    The equivalence principle is not a postulate; it is a structural
    consequence of R5 being the single event that generates both effects.

