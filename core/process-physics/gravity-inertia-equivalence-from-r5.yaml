friedmann_scope_clarification:
  statement: >
    The Friedmann equations assume homogeneity and isotropy as a
    starting condition applied to the committed derivative layer (η).
    This assumption has two distinct statuses in the framework:

  explorative_regime_isotropy:
    status: "Correct — but misapplied"
    statement: >
      The explorative regime (R3) IS isotropic: before R5 selection,
      all rotor orientations are equally available — no committed
      direction is preferred. R3 has orientational symmetry by
      construction (indeterminism as ground state, specifications.yaml
      #indeterminism_as_ground). This is the isotropy that Friedmann
      actually captures — but it is an isotropy of process, not of
      committed structure.

  committed_layer_homogeneity:
    status: "Derivative-level idealisation — generically incorrect"
    statement: >
      After R5 fires locally, the committed η field is inhomogeneous
      by construction: each R5 event is a local commitment that builds
      structure outward from that point (inside-out-channeling.yaml).
      A homogeneous committed background requires that all R5 events
      fired simultaneously and uniformly — which contradicts both R5
      locality and the inside-out character of commitment. Homogeneity
      of η is not a consequence of the framework; it is an idealisation
      imposed on top of it for tractability.

  alexander_et_al_connection: >
    Alexander, Temple & Vogler (2026) prove mathematically that all
    Friedmann spacetimes are unstable to radial perturbation at every
    order — perfect homogeneity is a measure-zero idealisation, any
    deviation grows. This is what the framework predicts from the
    process level: local R5 commitment events produce inhomogeneous
    η by construction; the homogeneous Friedmann background is the
    wrong starting point for the committed layer. Alexander et al.
    reach this conclusion from within GR; the framework reaches it
    from R5 locality. Independent derivation, same structural result.

  friedmann_file_qualification: >
    friedmann-emergence.yaml should be read as deriving the large-scale
    average behaviour of the committed η field — a coarse-grained
    description valid at Hubble scales where local inhomogeneity
    averages out. It is not a description of what the derivative
    layer looks like locally. The Friedmann equations are the
    homogeneous, isotropic LIMIT of the master equation, not its
    generic solution. This qualification should be added to
    friedmann-emergence.yaml in the next update.

