direction_reversal:
  statement: >
    The standard problem has been to quantize gravity — to make it compatible
    with quantum mechanics. This framework proposes the opposite direction:
    gravity is downstream of the quantum/explorative regime, not parallel to
    it or incompatible with it.
  mechanism: >
    Gravity is what the R3 constraint-narrowing landscape looks like from
    the η side, once R5 has committed potential into structure. You don't
    quantize gravity because it was never a separate force — it is the
    macroscopic shadow of quantum constraint dynamics, projected onto the
    derivative layer through R5.
  infinities_dissolved: >
    Non-renormalizable infinities in quantum gravity arise from treating
    gravity as a quantum field on top of committed spacetime — the wrong
    level. The divergences are derivative-level symptoms of process-level
    saturation. The master equation's saturation term provides the UV
    regulator at the process level. Nothing to renormalize because the
    boundary is a process-level condition, not a field interaction.

