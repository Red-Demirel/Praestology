## Suggested Additional Constants — Open Hypotheses Only
suggested_extensions:
  description: |
    The CCR framework may extend to other fundamental constants.
    NONE of the following are derivations, mechanisms, or established
    relations. Each is a candidate direction for future work, listed
    per the framework's own epistemic stance: "architectural... open
    to participation... stands or falls by ability to derive known
    physics, not by philosophical elegance alone" (praestology-recap).

    Per ccr_first_derivation_discipline (closure-configuration-ratio.yaml):
    these should be approached by asking what topology CCR's structure
    necessarily implies for each case — not by assuming a topology first
    and retrofitting CCR language onto it.

  candidates:
    - name: "Gravitational Constant (G)"
      status: "SPECULATIVE — no topology identified"
      open_question: |
        What committed topology would G's CCR be the ratio of?
        Gravity in this framework is refractive impedance from ∇Π_eff
        gradients (emergent-classical-fields.yaml), not a gauge coupling —
        it is not obvious G admits the same rotor/writhe structure as α.
        This needs to be established before any CCR-style relation is proposed.
      references: ["closure-configuration-ratio.yaml#gravitational_ccr_mapping"]

    - name: "Planck Constant (ħ)"
      status: "SPECULATIVE — no topology identified"
      open_question: |
        ħ sets the scale of action, not a dimensionless ratio like α.
        Before proposing ħ as a CCR instance, the dimensional mismatch
        (CCR is dimensionless; ħ is not) must be resolved — likely ħ
        relates to CCR only via a dimensioned scale factor, not as a
        direct CCR instance itself. Open.
      references: ["../core/specifications.yaml#R4"]

    - name: "Speed of Light (c)"
      status: "SPECULATIVE — likely not a CCR instance directly"
      open_question: |
        c is a propagation rate (Π_eff-dependent, per master-equation.yaml),
        not a phase-space ratio. It is more likely related to the maximum
        gradient of Π_eff than to any topology's CCR. This candidate may
        belong in a different framework section (process-rate, not CCR).
      references: ["derivative-reality-clarification.yaml"]

    - name: "Cosmological Constant (Λ)"
      status: "SPECULATIVE — mechanism gestured at, not derived"
      open_question: |
        Possible connection to Regress kernel dynamics at cosmic scale
        (see closure-configuration-ratio.yaml high_veff_regime,
        regionalized — not a global "early universe" mechanism).
        No topology or ratio has been formally proposed.
      references: ["core-dynamical-equation.yaml"]

    - name: "Electron Mass (m_e)"
      status: "OPEN — overlaps directly with inertia-variational-derivation"
      open_question: |
        This is not a new candidate — it is the same open item as
        inertia_as_reconfiguration_resistance in spin-process-rate-ga.yaml.
        m_e should emerge from the variational derivation of inertia
        (second variation of the energy functional), with CCR entering
        as the coupling coefficient — not as an independent CCR instance.
      references: ["spin-process-rate-ga.yaml#inertia-variational-derivation"]

