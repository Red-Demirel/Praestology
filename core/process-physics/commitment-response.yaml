# ─────────────────────────────────────────────────────────────
# PART II: IMPERFECT CLOSURE AS THE PROCESS ORIGIN OF α
# ─────────────────────────────────────────────────────────────

imperfect_closure_and_alpha:

  statement: >
    The domain file identifies α as "the fractional phase correction
    accumulated in the GP order parameter field per 360° rotation."
    At process level, this has a precise identification:

      α = residual mismatch (Ω_rotor − Ω_embed) / Ω_embed per cycle
        = CCR gap from ideal closure

    Perfect closure would mean Ω_rotor = Ω_embed exactly — the rotor
    and the embedding substrate oscillate at exactly the same rate,
    and each cycle returns the GP field to exactly its prior state.
    Finite substrate resistance R prevents this: each cycle accumulates
    a residual δΩ = Ω_rotor − Ω_embed, producing the phase mismatch
    δφ per rotation that the domain file measures as α.

  ccr_connection:
    statement: >
      CCR = (Wr · Ω_rotor) / Ω_embed
      Ideal closure: CCR = Wr · (1 + 0) → exact integer or half-integer Lk
      Finite R: CCR = Wr · (1 + δΩ/Ω_embed) → non-integer residual
      The CCR gap from ideal integer closure is:
        ΔCCR = Wr · δΩ/Ω_embed
      This ΔCCR per cycle, normalized by the isotropic coupling (4π)
      and expressed relative to the capacitative saturation threshold,
      gives α. α is not a separate constant — it is the per-cycle
      CCR imperfection of the stable Möbius topology.
    direction: >
      The imperfect closure is not a correction to the CCR.
      The CCR IS the ratio including the imperfection.
      Perfect closure (R=0, ideal superfluid) would give CCR = exact
      rational — no EM coupling, no photon emission, no arrow of time.
      Finite R (realistic substrate) gives CCR = rational + δ,
      where δ encodes α. Electromagnetic interaction is the
      field-level consequence of this imperfection propagating
      outward through the GP field.

  spontaneous_emission_from_imperfect_closure:
    statement: >
      Each cycle of the Möbius rotor accumulates phase correction δφ
      in the surrounding GP field. When accumulated δφ crosses S_lock,
      the GP field undergoes a trail reconfiguration — it sheds the
      accumulated phase as a photon (capacitative dipole pair emission).
      This is spontaneous emission at the process level:
        Not: quantum fluctuation creating a virtual photon
        But: GP field relieving accumulated CCR imperfection by
             shedding a capacitative mode (photon) at the S_lock threshold
      The Einstein A coefficient scales as ω³α³ — three powers of the
      imperfection rate per cycle — because:
        ω³: three powers of frequency encoding the phase accumulation
            rate (faster rotation → faster accumulation → faster emission)
        α³: three factors of the imperfection per cycle (one per field
            coupling vertex in the perturbative expansion)
      This is not QED with unexplained coupling — it is the direct
      consequence of finite-R substrate imperfection at the rotor level.

  arrow_of_time:
    statement: >
      Each GP field phase correction is an irreversible R4 accumulation
      event at the field level. The arrow of time at the quantum scale
      is the accumulation of CCR imperfection per cycle.
    process_level_statement: >
      Perfect closure (R=0) → exactly reversible evolution, no arrow
      of time, no EM radiation, no decoherence. The universe would be
      a perfectly reversible quantum coherent system.
      Finite R → per-cycle imperfection → GP field accumulates phase
      corrections → spontaneous emission → decoherence → classical limit.
      The arrow of time is not thermodynamic (statistical) at the
      fundamental level — it is topological: finite substrate resistance
      prevents exact phase closure, making each Realization cycle
      slightly but irreversibly different from the last.
      R_diss amplifies this on long timescales; the per-cycle δφ from
      imperfect closure initiates it at the quantum level.
    distinction_from_r_diss: >
      Imperfect closure (α) → arrow of time at QM timescales:
        irreversibility per rotation cycle, spontaneous emission,
        decoherence of quantum superpositions into classical mixtures.
      R_diss → arrow of time at geological/cosmological timescales:
        dissolution of weakly protected topology, radioactive decay,
        memory fading, cosmic structure relaxation.
      Two distinct mechanisms operating at vastly different timescales,
      both ultimately from finite substrate resistance R — one at the
      per-cycle rotor level, one at the weakly-protected-topology level.

