# /core/process-physics/commitment-response.yaml
name: "Commitment Response Function — Process-Physics Foundation"
version: "1.0"
status: "Core clarification — R(ψ) as Realization operator decomposition; R_diss open calibration"
domain: "Core / Process-Physics"
builds_on: "domains/physics/commitment-response-function.yaml v2.1"
description: >
  This file re-expresses the commitment response function R(ψ) in
  process-physics terms, establishing what R_forward and R_diss are
  at the level of the Realization operator — not just as GP nonlinearities
  but as the two functional components of R(ψ) that implement R4 and R5.

  Three upgrades over the domain version:
  (1) R(ψ) = R_forward + R_diss is the decomposition of the Realization
      operator itself — R_forward implements R4 commitment; R_diss
      implements R5 sustainability by returning weakly protected commitment
      to the free potential reservoir.
  (2) Imperfect closure is identified as the process-level origin of α:
      the finite residual mismatch between Ω_rotor and Ω_embed per cycle
      is the CCR gap from ideal closure — α is that gap rate, not a
      separate field property.
  (3) R_diss is a non-Hermitian component of R(ψ). In the Madelung/GA
      grade structure, it breaks the clean grade-0/grade-2 split that
      gives exact continuity + Hamilton-Jacobi. The imaginary eigenvalues
      from R_diss produce probability decay — this is where quantum
      decoherence and the classical limit live in the framework.

cross_reference_policy:
  statement: >
    This file provides the process-level basis for the domain file.
    Domain file (domains/physics/commitment-response-function.yaml)
    remains the authoritative source for: GP parameter values, regime
    table, black hole saturation phenomenology, R_diss physical
    manifestations, ε/τ_diss calibration constraints.
    This file establishes WHY those structures take the forms they do —
    the process-level derivation chain that the domain file presupposes.
  level_crossing_note: >
    References to domains/physics/specifications.yaml and
    domains/physics/quantum-foundations.yaml in the domain file are
    intentional — those files describe the realized-level consequences.
    This file points to core/process-physics/ equivalents for the
    same content at the process level.

---

# ─────────────────────────────────────────────────────────────
# PART I: R(ψ) AS REALIZATION OPERATOR DECOMPOSITION
# ─────────────────────────────────────────────────────────────

realization_operator_decomposition:

  master_equation_position:
    statement: >
      The master equation at process level:

        iħ ∂ψ/∂t = [-ħ²/(2m_eff)·∇² + V_ext + R(ψ) - μ_local] ψ

      R(ψ) is the Realization operator — it is what makes the
      process field ψ commit to configurations, rather than evolving
      as a free field. Without R(ψ), the equation is a free GP field;
      with R(ψ), it generates and sustains committed topology.
      The decomposition R(ψ) = R_forward(ψ) + R_diss(ψ) is not a
      mathematical convenience — it is a functional decomposition
      of what Realization does:
        R_forward: implements R4 (commitment — locking free potential
                   into topological structure)
        R_diss:    implements R5 (sustainability — returning weakly
                   protected commitment to the Praegress reservoir)

  R_forward:
    formula: "R_forward(ψ) = g|ψ|² / (1 + |ψ|²/n_sat)"
    process_interpretation: >
      R_forward is the commitment valve. It converts free potential
      (|ψ|² below local equilibrium) into committed topology through
      the saturating nonlinearity. Low density: linear response,
      small commitment per unit field. High density: saturating
      response — additional free potential is increasingly costly
      to commit, approaching the topological capacity limit n_sat.
    why_saturating_not_cubic: >
      Standard GP uses g|ψ|² (cubic nonlinearity — no saturation).
      This produces unbounded compression and mathematical singularities.
      The saturating form V = g|ψ|²/(1+|ψ|²/n_sat) ensures:
        dV/d(|ψ|²) → 0 as |ψ|² → n_sat
      The potential flattens at saturation — additional commitment
      is infinitely costly but never strictly impossible. Singularities
      cannot form because the commitment cost per unit density diverges
      before infinite density is reached. This is not a regularisation
      trick — it is the process-level statement that topological
      capacity is finite per substrate grain volume ξ³.
    hermitian_character: >
      R_forward is Hermitian — it conserves probability (total
      |ψ|² = constant). Commitment shuffles free potential into
      committed states but does not reduce total field amplitude.
      This corresponds to unitary evolution: R4 as a conservative
      commitment process at the process level.

  R_diss:
    formula: "R_diss(ψ) = −ε|ψ|² / (1 + τ_diss|ψ|²) · f(topological_protection)"
    process_interpretation: >
      R_diss is the dissolution kernel — the mechanism by which R5
      is implemented at the field level. It slowly returns weakly
      protected committed topology to the Praegress reservoir.
      Without R_diss, R_forward commits potential irreversibly —
      R4 accumulates without bound, eventually exhausting free
      potential (φ → 0 everywhere) and producing total stasis
      (R3 failure). R_diss is what makes R4 accumulation sustainable
      under R5: not by reversing R4 globally (which would violate it)
      but by allowing weakly protected topology to dissolve on timescales
      much longer than its formation timescale.
    non_hermitian_character: >
      R_diss is non-Hermitian — it does not conserve |ψ|². The
      imaginary eigenvalues it introduces to the master equation
      produce probability decay in committed configurations. This is
      physically correct: weakly protected topology does lose
      amplitude over time as it dissolves. The total field amplitude
      is not conserved — dissolved commitment returns as free potential
      (Praegress reservoir), not as field amplitude at the same location.
    timescale_separation: >
      ε << 1/(proton lifetime): R_diss is slow relative to
      all particle physics and quantum dynamics. On QM timescales
      (fs to ns), R_diss is completely negligible — the system
      evolves under R_forward only, giving exact unitary QM.
      On geological/cosmological timescales (Gyr), R_diss
      accumulates: unstable isotopes decay, molecular memories fade,
      large-scale structure gradually returns to the reservoir.
      The apparent irreversibility at long timescales is R_diss;
      the apparent reversibility at short timescales is R_forward
      dominance.

  r5_closure:
    statement: >
      The decomposition R = R_forward + R_diss is the formal
      implementation of the R4-R5 tension in the master equation:
        R4 demands: commitment accumulates (R_forward)
        R5 demands: the process continues indefinitely (requires
                    free potential not to be exhausted)
        Resolution: R_diss returns weakly protected commitment
                    to free potential at rate ε·f << R_forward rate
      The steady state: d(free potential)/dt = 0
      = nucleation rate (Tik + R_forward) − dissolution rate (R_diss)
      This is the cosmological steady state — not heat death, not
      infinite densification, but a sustained dynamic equilibrium
      between commitment and renewal. R5 is not a principle imposed
      on top of R4; R_diss is its field-level implementation.

