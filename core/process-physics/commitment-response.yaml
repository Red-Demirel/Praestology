# ─────────────────────────────────────────────────────────────
# PART III: R_DISS AS NON-HERMITIAN MADELUNG BREAKING
# ─────────────────────────────────────────────────────────────

r_diss_madelung_breaking:

  statement: >
    From madelung-as-rotor-consequence.yaml: the master equation in
    GA form decomposes exactly into:
      Grade-0 projection → continuity equation (Hermitian, exact)
      Grade-2 projection → quantum Hamilton-Jacobi (Hermitian, exact)
    This exact grade split requires R(ψ) = R_forward(ψ) — Hermitian.
    R_diss is non-Hermitian. When R_diss is included, the clean grade
    split is broken:

      iħ ∂ψ/∂t = [...+ R_forward + R_diss] ψ

    R_diss introduces a non-Hermitian imaginary term that couples
    grade-0 and grade-2 components — the probability density ρ is
    no longer independently conserved.

  grade_breaking_explicitly:
    statement: >
      Writing ψ = √ρ · exp(iS) (Madelung decomposition):
      With R_forward only:
        ∂ρ/∂t + ∇·(ρu) = 0                    [grade-0, exact]
        ∂S/∂t + |∇S|²/2 + V + g·ρ + Q = 0     [grade-2, exact]
      With R_diss added:
        ∂ρ/∂t + ∇·(ρu) = −2ε_eff · ρ · f      [grade-0, modified]
        ∂S/∂t + |∇S|²/2 + V + g·ρ + Q = Im[R_diss] [grade-2, modified]
      The continuity equation gains a source/sink term from R_diss:
      probability density decreases at rate 2ε_eff · f in regions of
      weakly protected topology. The Hamilton-Jacobi equation gains
      an imaginary correction to the phase.
    physical_reading: >
      The continuity modification: committed topology (localized ρ)
      slowly drains as R_diss dissolves weakly protected configurations.
      The phase modification: the dissolution introduces a small imaginary
      component to the phase evolution — a dissipative phase drift that
      accumulates over the dissolution timescale.
      Both modifications are negligible on QM timescales (ε << 1).
      On geological/cosmological timescales, the continuity modification
      is the dominant effect: ρ decays for weakly protected topology
      (unstable isotopes, molecular patterns, large-scale structure).

  decoherence_and_classical_limit:
    statement: >
      Quantum decoherence is the transition from pure states
      (sharp grade-0/grade-2 split, Hermitian evolution) to
      mixed states (grade coupling, non-Hermitian R_diss).
      At the process level: coherent quantum evolution is R_forward
      dominated (exact Madelung decomposition holds).
      Decoherence is the onset of R_diss relevance at the system scale —
      when the system's topology becomes weakly protected enough for
      R_diss to contribute non-negligibly to its evolution.
    environment_dependence: >
      f(topological_protection) determines when R_diss becomes relevant:
        Strongly protected (electron, proton): f ≈ 0, R_diss negligible
          → long-lived coherent quantum states
        Weakly protected (large molecules, neural engrams, cosmic filaments):
          f ~ 1, R_diss significant on characteristic timescale
          → decoherence and dissolution on τ_diss scale
      This is why macroscopic objects decohere rapidly: their topology
      (molecular bonding patterns, thermal motion) has large f —
      they dissolve coherence into the substrate on femtosecond timescales
      (thermal decoherence) or longer (biological patterns).
      It is also why electrons do not decohere: f ≈ 0 for Möbius topology.
    classicality: >
      The classical limit is not a separate postulate ("collapse",
      "measurement", "decoherence via environment"). It is the regime
      where R_diss is effective (large f, weakly protected macroscopic
      topology) — the Madelung equations develop significant source terms,
      the quantum potential Q becomes negligible relative to R_diss effects,
      and the remaining real equation is the classical Hamilton-Jacobi.
      Classical mechanics is the long-timescale R_diss limit of the
      process field dynamics, not a separate theory.

  pt_symmetry_threshold:
    statement: >
      The master equation with R = R_forward + R_diss has a
      PT-symmetry threshold — the boundary between:
        Unbroken PT (|R_forward| > |R_diss|): eigenvalues real,
          quantum coherent evolution, no probability decay
        Broken PT (|R_diss| dominates locally): eigenvalues complex,
          probability decay, classical dissipative dynamics
      For all stable particle topologies, |R_forward| >> |R_diss|
      (f ≈ 0) → unbroken PT → stable quantum particles.
      For macroscopic weakly protected topology, PT breaking occurs
      at the scale where f·ε becomes comparable to the coherence
      maintained by R_forward.
    connection_to_domain_file: >
      The invariance check in the domain file (imaginary part of
      eigenvalues << real part for stable topologies) is the
      statement that stable particle topologies sit well within
      the unbroken PT regime. This is confirmed by construction
      (f ≈ 0 for electron/proton) but requires explicit verification
      that f remains ≈ 0 across all relevant substrate conditions.

