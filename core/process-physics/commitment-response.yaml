# ─────────────────────────────────────────────────────────────
# PART IV: IMPLICATIONS NOT CAPTURED IN DOMAIN FILE
# ─────────────────────────────────────────────────────────────

process_physics_extensions:

  n_sat_from_topology:
    statement: >
      n_sat is the saturation density — topological capacity per
      grain volume ξ³. At process level: n_sat is the maximum number
      of stable distinct phase-lock configurations per ξ³ that the
      substrate can maintain simultaneously.
      This is derivable in principle from the vortex stability
      equations: how many independent CCR-satisfying configurations
      fit in a volume ξ³ without mutual interference?
      The saturating nonlinearity is not an ansatz — it follows
      from this finite topological capacity: once ξ³ is full, each
      additional configuration costs unboundedly more free potential.
    open: >
      Derive n_sat from vortex-stability.yaml topological capacity
      counting. Expected form: n_sat ∝ 1/ξ³ with a combinatorial
      factor from the number of distinct stable winding configurations
      per grain. This would identify the saturation nonlinearity form
      (whether V ∝ |ψ|²/(1+|ψ|²/n_sat) is correct or requires
      modification — tanh, log, or other forms).

  healing_length_as_process_grain:
    statement: >
      ξ(r) = ħ/√(2m_eff · g · |θ(r)|²/(1 + |θ(r)|²/n_sat))
      is density-dependent — smaller in denser regions.
      At process level: ξ is the current resolution grain of the
      substrate at position r. It is not fixed — it tracks the
      local commitment density. In voids (low |θ|²): ξ is large,
      the substrate is coarse-grained. In dense matter (|θ|² → n_sat):
      ξ approaches the Planck scale — the GP healing length at
      maximum commitment density IS the minimum resolution grain.
      The Planck length is not a separately postulated quantum
      gravity scale — it is the GP healing length at saturation,
      derived from n_sat and the substrate parameters.
    implication: >
      There is no separate "quantum gravity" problem in this framework.
      The Planck scale is the density-dependent grain size at saturation.
      The breakdown of the continuum approximation at the Planck scale
      is the breakdown of the GP equation when |θ|² → n_sat and ξ → ξ_min.
      What happens below ξ_min is discrete topology — the grain-level
      structure of the substrate — not a new physical theory.

  gravitational_waves_as_transient_commitment_process_level:
    statement: >
      Gravitational waves are propagating modulations of R_forward
      amplitude — not in the topology (which propagates at c via
      committed structure) but in the free-potential field ahead of
      moving committed structures. As mass moves, it transiently
      commits local free potential in its wake, then releases it —
      creating a propagating R_forward pulse in the GP field.
      This pulse has: quadrupole geometry (from the mass quadrupole
      moment of the source); transverse polarization (because the
      pulse is a phase-gradient propagation in the GP field, which
      is transverse); energy content (the transiently committed
      potential released as the pulse passes).
      At process level: a gravitational wave is a propagating
      R_forward modulation — a coherent wave in the GP commitment
      field produced by time-varying mass quadrupole moments.
      No graviton required — the carrier is the process field itself.

  universality_of_regime_table:
    statement: >
      The regime table in the domain file (quantum vacuum → atomic →
      Newtonian → MOND → strong gravity → near saturation) is not a
      list of separate physical theories. At process level, it is
      one GP equation with one R(ψ) in different operating regimes
      of the same saturation curve:

        |θ|²/n_sat << 1: linear regime → QM + Newton
        |θ|²/n_sat ~ 0.1: onset nonlinear → MOND transition
        |θ|²/n_sat ~ 0.5: strongly nonlinear → neutron stars, GR
        |θ|²/n_sat → 1: near saturation → black holes, Hawking

      The "different theories" (QM, GR, MOND) are different
      linearization regimes of the same nonlinear process equation.
      None is fundamental; all are regime approximations.
      The process field with R(ψ) = R_forward + R_diss contains
      all of them as limiting cases.

