      Non-uniformity implies environment-dependent commitment tolerance:
      narrow wells in dense matter, wide wells in voids. Consequences
      for hadron spectrum in nuclear matter and R_diss rate in voids.
    depends_on: ["ccr-electron-explicit", "vortex-stability.yaml"]

