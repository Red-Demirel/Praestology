  - "core/core-dynamical-equation.yaml"
  - "core/emergent-relational-manifold.yaml"
  - "core/resolution-hierarchy.yaml (this file)"
  - "domains/physics/fine-structure-constant.yaml"
  - "domains/consciousness/specifications.yaml"

