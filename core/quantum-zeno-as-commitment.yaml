decay_rate_formula:
  statement: >
    In standard QM, the Zeno transition rate Γ(ν_meas) is:
      Γ(ν_meas) ∝ 1/ν_meas  (Zeno regime: ν_meas >> Γ₀)
      Γ(ν_meas) ∝ ν_meas    (Anti-Zeno regime: ν_meas ~ Γ₀)
    In process-physics terms:
      Γ = Γ₀ · (Π_eff(ν_meas) / Π₀)
    where Π_eff(ν_meas) is the local free potential under continuous
    R5 firing at rate ν_meas. At high ν_meas:
      Π_eff(ν_meas) ∝ 1/ν_meas  (each R5 deposit reduces Π_eff)
    giving Γ ∝ 1/ν_meas — standard Zeno suppression recovered.
    The functional form is a prediction from the inside-out channeling
    mechanism, not a separate postulate.
  status: "Functional form identified; formal derivation of Π_eff(ν_meas)
           from R5 deposition rate open — requires pi-eff-from-channeling-density"

---

implications:
  measurement_problem: >
    The Zeno mechanism shows why continuous measurement produces classical
    behavior: continuous R5 firing → continuous Π_eff depression →
    R3 pathway width → 0 → no quantum exploration → classical committed
    behavior. Classical limit is Zeno limit. The measurement problem
    dissolves: "why does measurement produce classical behavior?" because
    measurement is R5, and continuous R5 exhausts R3 pathway width.
  decoherence: >
    Environmental decoherence is distributed Zeno: the environment consists
    of many committed structures (molecules, photons) each interacting with
    the system and depositing small η increments. The cumulative Π_eff
    depression from many small interactions is equivalent to a single
    infrequent large measurement in Zeno terms. Decoherence rate scales
    with environmental commitment density — denser environments decohere
    faster because more R5 events fire per unit time.
  quantum_biology: >
    Long-lived quantum coherence in biological systems (photosynthesis,
    avian magnetoreception, enzyme tunneling) occurs in high-Π_eff
    environments where R5 firing rate is suppressed by the biological
    structure. The biological architecture creates a high-Π_eff pocket
    that maintains R3 exploration — the opposite of the Zeno condition.
    This is the same mechanism as pre-gauge coherence in
    forces-as-rotor-consequences.yaml #counter_rotating_vortex_alignment.
    Domain: biology (Ξ > 1) — flagged as extension.

