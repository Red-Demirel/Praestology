unification_table:
  statement: >
    Quantum Zeno, gravitational time dilation, and inertia are the same
    mechanism — Π_eff suppression from η accumulation — differing only
    in what generates the η:

  instances:
    quantum_zeno:
      eta_source: "Measurement apparatus — R5 events from apparatus-system interaction"
      pi_eff_effect: "Local Π_eff depressed at measurement location"
      observable: "Transition rate suppression proportional to measurement frequency"
      timescale: "Femtoseconds to microseconds (quantum coherence timescales)"

    gravitational_time_dilation:
      eta_source: "Mass — accumulated committed topology (η of matter distribution)"
      pi_eff_effect: "Π_eff depressed by surrounding η field; t = ∫Π_eff dτ runs slower"
      observable: "Clocks run slower near mass; GPS correction; gravitational redshift"
      timescale: "All timescales — GR effect"

    inertia:
      eta_source: "The structure itself — its own committed topology resists reconfiguration"
      pi_eff_effect: "Reconfiguration costs CCR against the local Π_eff background"
      observable: "F = ma — force required to change committed topology's R3 pathway"
      timescale: "Instantaneous — resistance to acceleration at each moment"

    vortex_zeno:
      eta_source: "Topological protection — the vortex's own committed topology"
      pi_eff_effect: "Strong topology depletes local Π_eff → suppresses dissolution"
      observable: "Stable particles do not spontaneously decay (electron, proton lifetime)"
      timescale: "Cosmological — topological protection maintains committed state"
      note: >
        Particle stability is topological Zeno: the committed topology's
        own η accumulation continuously suppresses the R3 pathways that
        would lead to dissolution. Strongly protected topology (f ≈ 0)
        is the extreme Zeno limit — continuous self-measurement by the
        committed structure prevents its own decay.

    uv_cutoff:
      eta_source: "Not η-driven — Π_eff finiteness is the pre-existing condition"
      pi_eff_effect: "High-frequency phase proposals demand R5 faster than Π_eff
                      allows → proposals cannot commit → emission suppressed"
      observable: "Blackbody UV cutoff — emission falls off above peak frequency;
                   Planck distribution recovered without quantization postulate"
      timescale: "Instantaneous — structural throughput limit, not dynamic suppression"
      note: >
        The UV cutoff differs from other Zeno instances in direction:
        QZE suppresses by externally forcing R5 above Π_eff capacity,
        actively depressing Π_eff. The UV cutoff suppresses because
        internal demand exceeds pre-existing Π_eff capacity — no η
        accumulation required, Π_eff is simply finite. Both are R5
        gate rate-limiting; the driver differs. The unifying principle:
        R5 is a rate-limited gate. Any demand — external or internal —
        exceeding local Π_eff throughput is suppressed.
        See praestology-and-blackbody-spectrum.yaml #connection_to_zeno.

  what_drives_eta:
    external_measurement: "Apparatus-system interaction → R5 → η deposit"
    gravitational: "Mass distribution → sustained η field → ambient Π_eff depression"
    inertial: "Structure's own committed η → local Π_eff depletion per cycle"
    topological: "Winding number → f(topological_protection) → R_diss suppression"

