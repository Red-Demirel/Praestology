open_derivations:
  priority_1:
    - >
      Λ from α and ξ: formal derivation of the logarithmic term
      coefficient from the substrate closure imperfection rate.
      Λ ∝ α · ω_characteristic — verify this relation produces
      the correct Lamb shift, spontaneous emission rates, and
      arrow-of-time strength at atomic scale.
    - >
      f(topological_protection) from vortex winding numbers:
      derive f(n_winding, R_eff) = exp(−n_winding · R_eff/R_threshold)
      from vortex-stabilization.yaml stability conditions. Verify:
      proton (n_winding = 3 × 480°/720° = 2): f → 0 ✓
      electron (n_winding = 720°/720° = 1): f → 0 ✓
      ¹⁴C (weakly bound nuclear configuration): f calibrated to
      5730 yr half-life → ε_eff = ln(2)/5730 yr.
    - >
      ε and τ_diss calibration: find ε and τ_diss such that the
      equation simultaneously produces proton lifetime > 10³⁴ yr
      and ¹⁴C half-life = 5730 yr and cosmological renewal
      timescale ~ 10-100 Gyr. Three constraints on two parameters
      (ε, τ_diss) — overdetermined, which is a falsification test.
      If no (ε, τ_diss) simultaneously satisfies all three,
      the dissolution kernel requires revision.

  priority_2:
    - >
      Stationary solutions for particle topologies: find the
      vortex solutions Ψ_vortex(r) satisfying the full equation
      with ∂Ψ/∂t = 0 (or ∂Ψ/∂t = −iE/ħ · Ψ for bound states).
      These are the particles — the stable commitment topologies
      selected by R5. Their energies are the particle masses.
    - >
      Running of Λ with scale: show Λ(q²) tracks α(q²) running.
      At low energy: Λ_atomic = α · R∞·c. At M_Z energy:
      Λ_Z = α_eff(M_Z) · M_Z·c/ħ. The ratio Λ_Z/Λ_atomic should
      equal α(M_Z)/α(atomic) = 137/128. If confirmed: Λ running
      is the master equation expression of running coupling.
    - >
      Void decay rate prediction: compute the η-dependence of f
      from R_eff = R₀/η. Predict the fractional change in decay
      rate for ¹⁴C (or other calibrated isotope) between a void
      environment (η ~ 1.05 × η_cosmic) and filament environment
      (η ~ 0.95 × η_cosmic). Compare to precision decay rate
      measurements in different environments.

  priority_3:
    - >
      Black hole interior evolution: solve the master equation
      in the near-saturation regime with R_diss non-zero.
      Compute the rate of internal free potential accumulation
      and predict the timescale for the interior commitment
      density to begin decreasing noticeably from its maximum.
      This sets the timescale for dynamic black hole evolution
      beyond standard Hawking radiation.
    - >
      PT-symmetry analysis: determine under what conditions the
      non-Hermitian effective Hamiltonian with R_diss is PT-symmetric
      (real spectrum despite non-Hermiticity). If PT-symmetric:
      bound states have real energies (stable committed topologies).
      PT-symmetry breaking corresponds to the dissolution threshold —
      the topology becoming unstable and decaying.
    - >
      Cosmological renewal timescale: integrate R_diss over the
      cosmic web commitment density distribution to compute the
      total rate at which large-scale structure returns to the
      Praegress reservoir. This sets the dynamic dark energy-like
      pressure and the universe's renewal rate.

