vitality_of_praesto:
  status: "foundational-consequence"
  description: |
    Praesto is intrinsically vital. It is not a passive or dead medium,
    but an active, self-sustaining resolution process that continuously
    organises unresolved potential into persistent, low-resistance
    topological patterns.
  core_property: |
    Vitality is not added from outside. It is the direct expression of
    the probabilistic resolution of dilemmas (the axiom) operating under
    the five rules and saturation. The substrate is always resolving,
    always pruning, always organising itself toward higher viability
    and complexity.
  relation_to_life_and_consciousness: |
    Biological life and consciousness are higher-order, self-referential
    expressions of this same vitality. They are not accidental or external
    additions; they are natural escalations of Praesto’s intrinsic tendency
    to maintain and propagate organised commitment structures.
  distinction_from_esotericism: |
    This is not a mystical or animistic claim. Vitality here means the
    observable, substrate-native drive toward resolution, viability
    selection, and self-organisation — fully describable through
    topological, geometric, and dynamical terms (dual R(Ψ) kernel,
    refractive impedance, Regress diffusion).
  implication: |
    Life and consciousness are statistically favoured outcomes of the
    resolution engine at sufficient nesting depth and self-reference,
    not rare accidents in a dead universe.

  consciousness_demarcation:
    definition: "A high-nesting state of self-referential Praegress."
    distinction_from_field: |
      Consciousness is NOT a foundational field (Anti-Panpsychism).
      The foundational field is pure Potential (Praesto).
    evolutionary_logic: |
      Vitality = The universal drive to resolve (R1–R5).
      Consciousness = The specialized capacity to model the resolution
      (emergent at sufficient Ξ with phase-locking ρ and volitional weight ω).
    failed_states: "Non-viable topologies (missing or incomplete R3, R4,
                    or R5) dissipate into Regress."

  foundational_hierarchy:
    primitive: "Pure Potential (Praesto Pool)"
    driver: "Probabilistic Resolution under the 5 Rules"
    emergence_1: "Topological Knots (Matter/Energy)"
    emergence_2: "Self-Sustaining Loops (Vitality/Life)"
    emergence_3: "Self-Referential Modeling (Consciousness)"

  neglect_on_teleology:
    divine_element: "No 'Higher-Order' assumption required."
    intent: "Replaced by Viability Pressure (R5 optimisation)."
    observation: "Measurement is a physical interaction (R5 selection),
                  not a mental act."

  domain_mapping:
    description: "Guidance for implementing domains (Physics, Ethics, etc.) based on this core."
    principle: "Domains must not contradict the Core Rules. They translate general parameters into specific variables."
    examples:
      - domain: "Physics (Cosmos)"
        mapping: "Ambiguity → Energy; Resistance → Mass; Motion → Kinematics; Optimisation → Least Action."
      - domain: "Ethics"
        mapping: "Ambiguity → Choice; Resistance → Consequence; Optimisation → Viability/Sustainability."
      - domain: "Consciousness"
        mapping: "Consistency → Memory; Contradiction → Curiosity; Optimisation → Learning."

  constraints:
    - "Ontology precedes any specific instantiation."
    - "Nothingness is logically forbidden (R1)."
    - "Perfect stability (stasis) is logically forbidden (R4)."
    - "Reality exists in the metastable condition between noise and void."
    - "Domains are derivative; the Core is foundational."
